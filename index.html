<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A+ Tools Portal</title>
  <style>
    :root {
      --bg1: #1f2430;
      --bg2: #2b3245;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #f3f6fb;
      --muted: #b9c2d0;
      --accent: #8fb7ff;
      --accent-hover: #a8c7ff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, #34405a 0%, transparent 35%),
        radial-gradient(circle at bottom right, #253049 0%, transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(143, 183, 255, 0.45);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.3);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.35rem;
    }

    .card p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      color: #0f172a;
      background: var(--accent);
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.88rem;
      opacity: 0.9;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 1.7rem;
      }

      .card {
        padding: 20px;
      }

      .button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>A+ 刷题工具入口</h1>
      <p>选择一个工具进入</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>工具1</h2>
        <p>进入第一个 A+ 记忆/刷题小工具。</p>
        <a class="button" href="123.html">进入工具1</a>
      </article>

      <article class="card">
        <h2>工具2</h2>
        <p>进入第二个 A+ 记忆/刷题小工具。</p>
        <a class="button" href="456.html">进入工具2</a>
      </article>
    </section>

    <div class="footer">
      GitHub Pages 首页入口
    </div>
  </main>
</body>
</html>
