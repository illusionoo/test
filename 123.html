tire profile is downloaded, which may take a few minutes. For subsequent logons on the same machine, only the changes to the profile are downloaded, making the process much faster. If the user then logs in to a different machine, the entire profile must be downloaded so that the logon won’t be as fast as the user is accustomed to. They don’t need to be listed as a user on this computer as long as they are a user on the Active Directory. A peripheral being connected or not should not affect the profile download, and entering the wrong password would quickly generate an error message stating that fact.", "notes": [], "multi": false}, {"qnum": 37, "stem": "A Windows user at your office receives the message shown in the graphic when trying to print a document. They know that there were two printers listed yesterday. What is most likely the problem?", "options": {"A": "Someone has deleted their printers.", "B": "Both printers are offline.", "C": "Both printers are out of paper.", "D": "The print spooler service needs to be restarted."}, "correct": ["D"], "explanation": "When the Print Spooler service is not running, a user will not be able to see or print to any of their devices. Open the Services console and restart the Print Spooler to remedy the situation. It’s unlikely that someone deleted their printers, but if that’s the case you have security concerns to address. If the printers were offline or out of paper, most likely the printer would send a message stating this fact to the user’s screen.", "notes": [], "multi": false}, {"qnum": 38, "stem": "The time on your Windows computer is always off by a few minutes, called time drift. You need to ensure that it will keep the right time, because an incorrect time will not allow it to log in to your server. Which of the following actions will not help?", "options": {"A": "In Settings, select Time & Language, then Date & time, and ensure that Set Time Zone Automatically and Set Time Automatically are set to On.", "B": "Right-click on the time on the taskbar and choose Internet Time, and then choose a different time server.", "C": "Open the Services console and ensure that the Windows Time service start is set to Automatic and that the service is started.", "D": "In Settings, select Time & Language and then Date & Time, and click Sync Now."}, "correct": ["B"], "explanation": "The option you would choose when right-clicking the time on the taskbar is Adjust Date and Time, not Internet Time. Occasionally, the time on a computer is off because of errors in settings in Windows or a domain controller. If the time is off by exactly an hour, or exactly several hours, then most likely the time zone is set manually and incorrectly. If it’s off by minutes, then it’s something else causing it, but you can sync the time now and correct the settings using the Date & Time options on the Time & LANGUAGE tab in the Settings app. On an Active Directory (AD) domain, the domain controller uses the Windows time service and Network Time Protocol (NTP) to synchronize the time of all the computers on the domain, so it’s important to ensure that the Window Time service is running.", "notes": [], "multi": false}, {"qnum": 39, "stem": "A Windows workstation that is set to boot from the C: drive, and normally boots just fine, will not boot properly. Instead, there is an error message stating that no OS is found. What steps should you take to fix this problem?", "options": {"A": "Boot to installation media, navigate to a command prompt, type startup repair, and press Enter.", "B": "Boot to the installation media, open SFC, and choose Startup Repair.", "C": "Boot to the installation media, and then navigate to Startup Repair.", "D": "Boot to safe mode."}, "correct": ["C"], "explanation": "If the operating system (OS) is missing, it could be due to a bad or corrupted boot sector on the hard drive, or the OS may indeed be missing. Your first step would be to ensure that the boot files are not corrupted. To do this, boot to the installation media (you might have to set your basic input/output system/unified extensible firmware interface [BIOS/UEFI] to boot to the installation media drive), then navigate to Startup Repair and follow the onscreen prompts. Typing startup repair at a command prompt returns an error message. System file checker (SFC) is used to verify OS files, not a program you can open and choose something in, and you wouldn’t be able to boot into safe mode because the computer thinks the OS is missing. You might be thinking it could be non-bootable media in a drive, but the question states that the computer is set to boot from the C: drive.", "notes": [], "multi": false}, {"qnum": 40, "stem": "A Windows workstation is running slowly. You have already verified that there is no malware in the system. What will you do next? (Choose two.)", "options": {"A": "Check available physical memory.", "B": "Check available virtual memory.", "C": "Roll back the OS update to a prior one.", "D": "Restore from a restore point."}, "correct": ["A", "B"], "explanation": "There are many reasons why a system would be running slowly. If it suddenly starts running slowly, suspect that malware might be involved and take steps to locate and remove it. If no malware is found, check the physical and virtual memory. You might need to increase the physical random access memory (RAM) or change virtual memory settings. It could also be that a RAM module has failed or needs to be reseated. Other possibilities are a too-full hard drive (which rarely happens with today’s huge hard drives) or a problem with hardware. Ensuring that the operating system (OS) is up to date is always a good idea. You would not roll back to a prior update, and restoring from a restore point would not necessarily help here.", "notes": [], "multi": true}, {"qnum": 41, "stem": "An application on your Windows workstation isn’t working properly, and when you research the error message online, the result is that you need to update the application. Where can you go to do this? (Choose two.)", "options": {"A": "Check for an Update option in the software.", "B": "In the Control Panel, click Programs and Features.", "C": "Check the application’s company website.", "D": "In the Settings app, select Apps and then Apps & Features."}, "correct": ["A", "C"], "explanation": "The first place to look for updates would be an option on the application’s menu. If nothing is found there, check the application’s company website. Programs and Features in the Control Panel and Apps & Features in the Settings app have options to uninstall, change, or repair, but not update, applications.", "notes": [], "multi": true}, {"qnum": 42, "stem": "You’re trying to launch an application on your Windows workstation, but the application won’t load. You’ve tried uninstalling and reinstalling the application, but it didn’t help. Which of the following should you do next?", "options": {"A": "Check the application’s website for updates.", "B": "Verify that your system meets the application requirements.", "C": "Choose a different application that does the same thing.", "D": "Reinstall Windows."}, "correct": ["B"], "explanation": "With all due respect, you should have verified that your system meets the application’s minimum requirements before you even purchased or downloaded it. Remember, too, that you’ll need enough random access memory (RAM) for all the programs that are running at the same time. If your operating system (OS) is newer than the application’s required OS, you could check the manufacturer’s website for an update, but that would happen after you compare your system to the application’s requirements. You certainly would not reinstall Windows because an application won’t start, and although you could find a different application that meets your needs, that’s not the best solution here.", "notes": [], "multi": false}, {"qnum": 43, "stem": "You’re in Microsoft Word and want to open a file that you used yesterday. You know that you saved the file, and it shows in the list of recently used files, but when you click on it a message says that the file can’t be found. You then go to the folder where the file is stored and see that the file extension has been changed. What should you immediately suspect?", "options": {"A": "The drive is corrupted, and you need to reinstall Windows.", "B": "The Word program is corrupted, and you need to reinstall Word.", "C": "A coworker has been playing with your computer and opened and saved your file using a different program.", "D": "Your computer has been infected by malware."}, "correct": ["D"], "explanation": "Your first thought in this situation should be that there is malware on your computer. You would perform the procedures for malware removal immediately. It’s unlikely that you would need to reinstall the Word program or Windows, and while it’s possible that someone has been playing tricks on you, that’s not the most likely reason, unless that someone is the person who wrote the malware.", "notes": [], "multi": false}, {"qnum": 44, "stem": "A Windows 11 computer user receives an error message that a needed service failed to start. Where can that user go to start the service? (Choose two.)", "options": {"A": "The Services tab of Task Manager", "B": "Computer Management", "C": "The Services console", "D": "Device Manager"}, "correct": ["B", "C"], "explanation": "All services can be found in the Services console and a link to it can be found in Computer Management. A subset of those can be found on the Services tab of Task Manager in Windows 10, but not Windows 11. If the service needed isn’t there, a link at the bottom of the page will take you to the full list of services. Device Manager is intended for managing hardware devices and drivers.", "notes": [], "multi": true}, {"qnum": 45, "stem": "A Windows system is running slowly. Which of the following is not likely to be the culprit?", "options": {"A": "The PC has too little RAM.", "B": "The paging file is too large.", "C": "The system is infected with malware.", "D": "The hard drive is too large."}, "correct": ["D"], "explanation": "The first concern when a system is running too slowly is that there may be malware. Once you’ve verified that there isn’t any malware, if the system is still running slowly, check the page file size. The page file is the file that holds virtual memory. Virtual memory is using a part of a hard drive as if it were random access memory (RAM). A larger paging file may alleviate low memory warnings, but the price is slower performance because the hard drive is slower than RAM. To change the amount of hard drive space reserved for virtual memory, search for Advanced System Settings and select View Advanced System Settings. On the System Properties window, click the Advanced tab. Then, in the Performance box, click Settings. In the Performance Options window, choose the Advanced tab, and in the Virtual memory box, click the Change button. Deselect Automatically Manage Paging File Size for All Drives, then click Custom Size. Adjust the size by typing the appropriate value in the Initial Size (MB) box and Maximum Size (MB) box, then click Set. If you have a magnetic hard drive (HDD) and a solid-state drive (SSD), the SSD will be faster but using it for virtual memory can shorten its life. If possible, it’s better to increase the physical RAM than the virtual memory. A hard drive being too large would not cause this problem.", "notes": [], "multi": false}, {"qnum": 46, "stem": "You are trying to apply Windows Updates to a Windows client computer. The update fails and gives you an error message. What should you do next?", "options": {"A": "Run the Windows Update troubleshooter in the Settings app.", "B": "Wait until the next Windows Update comes out in six months.", "C": "Reinstall the operating system.", "D": "Purchase an updated computer."}, "correct": ["A"], "explanation": "In Windows 10 and 11, if the update fails to work properly, search for Windows Update in Windows Settings, then scroll down to Find and Fix Problems with Windows Update. The troubleshooter will search for and attempt to resolve any problems that may prevent updates to your operating system (OS). When it has finished, check for updates again. You might need to run the troubleshooter more than once. It’s important that the OS is kept up to date because updates may be patching security holes in the system. You would not want to reinstall the system, because eventually you would need to install the same update, and most likely you would not need to purchase an updated computer.", "notes": [], "multi": false}, {"qnum": 47, "stem": "You work for a government entity, and it insists that you use the government time server, time.NIST.gov, to sync the time on your computer system. Where will you go to do this?", "options": {"A": "In the Settings app, select Time & Language and then Date & Time. Ensure that Set Time Automatically and Set time Zone Automatically are both set to On.", "B": "Open the Services console, and ensure that Windows Time is set to time.NIST.gov and that the service is started.", "C": "In the Control Panel, select Date and Time; on the Internet Time tab, click Change Settings; and then, under Server, choose time.NIST.gov.", "D": "Double-click the time in the task bar, and on the Internet Time tab, under Servers, choose time.NIST.gov."}, "correct": ["C"], "explanation": "You can choose the time server to sync with by going to the Control Panel, selecting Date and Time, and on the Internet Time tab, clicking Change Settings, then the down arrow on the right of the entry box, and choosing the correct server in the Server box. The Date and Time options in Windows Settings will allow you to change time zone settings and set time automatically, but not which server you are using. In the Services app, you can choose how and if the Windows Time service runs but again, not the time server that is being used.", "notes": [], "multi": false}, {"qnum": 48, "stem": "A Windows user complains that every day they get a message that a service they need for a particular program has not started, and they must open the Services console and start it. What will you tell the user?", "options": {"A": "Some services behave that way. You’ll need to start it every day.", "B": "Open the Services console, double-click the service, and on the General tab, change the Startup Type to Automatic.", "C": "Open the Services console, double-click the service, and on the General tab, change the Startup Type to Manual.", "D": "Open the application and look for a place to have it start the service for the user."}, "correct": ["B"], "explanation": "Services will behave as you tell them to. Services can be set to Automatic so that they’ll start automatically when the computer starts, or to Automatic (Delayed Start) so that the computer will start faster. They still start when the computer starts up, just two minutes later. Manual start is what the user is currently doing. Starting of the service would be set up in the Services console, not the application. A service can also be triggered to start by some event or other software, then closed again when it is no longer needed. To access the Services console, click Windows Key + R, then type services.msc in the box and press Enter.", "notes": [], "multi": false}, {"qnum": 49, "stem": "You’ve noticed that lately your games freeze or crash more often, and you received a message stating that your computer is low on memory. What can you do to resolve this? (Choose two.)", "options": {"A": "Increase virtual memory.", "B": "Decrease virtual memory.", "C": "Increase physical memory.", "D": "Buy a bigger hard drive."}, "correct": ["A", "C"], "explanation": "When you’re getting messages that your computer is low on memory, you can stop some programs that are running in memory. However, more than likely you will need to increase physical memory and/or virtual memory. A rule of thumb is that virtual memory should be 1.5 times the physical memory, but you can change the setting to a larger value if you want. The downside of using more virtual memory instead of physical memory is that virtual memory resides in a page file (pagefile.sys) on the hard drive, and hard drives are slower than random access memory (RAM), so having a larger swap file (i.e., virtual memory) may slow the system performance. To change virtual memory, search for Advanced System Settings, and select View Advanced System Settings. On the System Properties window, click the Advanced tab and then in the Performance box, click Settings. Click the Advanced tab, and on the Performance Options window, in the Virtual Memory box, click the Change button. Deselect Automatically Manage Paging File Size for All Drives, then click Custom Size and adjust the size by typing the appropriate value in the Initial Size (MB) box and Maximum Size (MB) box. Then click Set.", "notes": [], "multi": true}, {"qnum": 50, "stem": "You’re attempting to install an application, and it warns you that it needs 4 GB of RAM. Where will you go to see if you have sufficient RAM to run this application? (Choose two.)", "options": {"A": "Open the case and see how many modules are installed.", "B": "Use the System Information utility.", "C": "Use the Performance tab in Task Manager.", "D": "In the Control Panel, select Memory."}, "correct": ["B", "C"], "explanation": "There are several places in the operating system (OS) where you can see how much physical random access memory (RAM) is installed in the system. Opening the case and counting the modules is neither necessary nor an accurate measure of how much RAM you have. The System Information utility (msinfo32.exe) has this and much more informa- tion about your computer. The Performance tab in Task Manager will not only show you how much physical memory you have, but it will also show you how much is being used. It can give you a better idea of whether you have enough RAM installed, because it is also taking into consideration what is normally being used in your system. Another place you can see installed RAM, not shown in the options for this question, is by searching for System in the Settings app and choosing About. There is no Memory utility in the Control Panel.", "notes": [], "multi": true}, {"qnum": 51, "stem": "A user reports that their PC was fine until an OS update was installed. However, the update had not been tested yet and is found to be incompatible with a necessary business applica- tion. What is your next step? (Choose two.)", "options": {"A": "Roll back the update.", "B": "Update the business application.", "C": "Do nothing; have the user take awareness training.", "D": "Go to the Control Panel, Programs and Features, and click on View Installed Updates."}, "correct": ["A", "D"], "explanation": "Given the description, it might be best to roll back the update, although not all updates can be rolled back. In cases where there are mission-critical applications, it’s best to pause the updates and test them in a sandbox before rolling them out. To access the screen for rolling back the update, go to the Control Panel, Programs and Features, and click on View Installed Updates. On the resulting screen, you’ll see the updates and an option on the right to uninstall the offending one, if it’s possible. Until the business application and update can be proven compatible, the update cannot be installed as is.", "notes": [], "multi": true}, {"qnum": 52, "stem": "While booting up a Windows PC, you find it takes a long time at the Welcome screen. A message stating “Your roaming profile isn’t synchronized with the server…” appears. Which of the following are true? (Choose two.)", "options": {"A": "The User Profile service detected a slow connection.", "B": "A locally cached profile was loaded.", "C": "User Profile Service is not running.", "D": "Screen resolution is not compatible with the user profile."}, "correct": ["A", "B"], "explanation": "The Windows User Profile service detects when there is a slow link between the client computer and the domain controller. The service will then load the user’s profile from a copy that is cached on the local machine. If the user has used a different machine since the last time they used the current one, then the profile changes will not be on the local machine. The User Profile service is running, because it is what generates the error message. Screen resolution has nothing to do with this error message.", "notes": [], "multi": true}, {"qnum": 53, "stem": "You just installed new external speakers on a Windows computer, and you’ve received an error message saying “Not enough USB Controller Resources.” What would most likely cause this error? (Choose two.)", "options": {"A": "The motherboard is damaged.", "B": "The USB devices are drawing more power than the limit.", "C": "There are too many devices on a USB 3.0 hub controller.", "D": "The speaker drivers are conflicting with the USB hub controller drivers."}, "correct": ["B", "C"], "explanation": "Universal serial bus (USB) ports provide limited power to the devices connected to them. If that power is exceeded, one or more of the devices attached to the controller may stop working, and the error message “Not enough USB Controller Resources” may be generated. They also have a limited number of endpoints available on each port. Some devices use more endpoints than others, and if the limit is exceeded, the same error message will be generated. A damaged motherboard could cause many things to malfunction but likely would not generate this error message, and it is highly unlikely that the speaker drivers would conflict with the USB hub controller drivers.", "notes": [], "multi": true}, {"qnum": 54, "stem": "A smartphone user has complained that their phone won’t let them look at anything in landscape—no matter how they turn it, it will not automatically rotate. You look at their screen, and it appears as shown in the graphic. Why isn’t their phone letting them look at pictures in landscape view?", "options": {"A": "Their Bluetooth is off.", "B": "Their focus is off.", "C": "Their camera is not on.", "D": "Their orientation is locked."}, "correct": ["D"], "explanation": "On the graphic, the third icon down on the left, just above Focus, is the screen orientation. Notice that the lock is closed. That means that their smartphone orientation is locked in Portrait mode and will not autorotate. Bluetooth, focus, and the camera have nothing to do with this problem.", "notes": [], "multi": false}, {"qnum": 55, "stem": "Mobile device users on your network report that the network has a very slow response time. Which of the following are likely contributors to this problem? (Choose two.)", "options": {"A": "Low battery life", "B": "Signal interference", "C": "Unintended Wi-Fi connections", "D": "Weak signal"}, "correct": ["B", "D"], "explanation": "Slow data speeds can be caused by too much interference or by a weak signal. If there is too much interference, try changing the channel on Wi-Fi routers to less used channels; performance should increase. Fix weak signals by installing more access points or signal boosters, or by moving closer to an existing access point, or away from physical obstructions.", "notes": [], "multi": true}, {"qnum": 56, "stem": "Several mobile device users have reported that when they eat lunch in the garden next to the office building, they have limited Internet connectivity. What is the most likely fix for this?", "options": {"A": "Boosting WAP signal strength", "B": "Having all the users reboot their devices", "C": "Rebooting the WAP", "D": "Having the users turn on Wi-Fi on each of their devices"}, "correct": ["C"], "explanation": "A limited connectivity error means that your device is able to connect to Wi-Fi but not to the Internet. Because this is happening with several users in the same area, the issue is likely caused by a problem with the wireless access point (WAP), not an individual device. The users are getting a limited connectivity error, so they’re connecting to the WAP but not getting an IP address from the DHCP server or router. Try cycling the WAP off and back on to resolve the issue. If that doesn’t work, troubleshoot the connection between the WAP and the router (if the router is acting as the DHCP server). You don’t need to boost the signal strength, because the users are able to connect to the WAP. Having all the users reboot their devices will not solve the issue, and if they’re getting a limited connectivity message, then Wi-Fi on their device is already turned on.", "notes": [], "multi": false}, {"qnum": 57, "stem": "You’ve been looking for a specific Android app and found it at an amazing price. It almost seems too good to be true, which makes you pause to consider whether it is the real app or not. Which of the following should you do before paying for and downloading this app? (Choose three.)", "options": {"A": "Check the reviews and the number of reviews.", "B": "Check the developer’s name and how long the app has been available.", "C": "Verify the spelling of the app name.", "D": "Install the free version and see if there are any problems."}, "correct": ["A", "B", "C"], "explanation": "There are many bootleg, imitation/fake, and malicious apps waiting for unsuspecting users to download them. They often have names very similar to the actual app, but there are ways to identify the spoofed apps. First, check the reviews. If you see negative comments about problems with mobile devices after installing the app, beware. Look at the number of downloads or reviews. If it’s a popular app, it will have a high number of both. For example, if you see a Hulu app with fewer than a million reviews, it is probably not the real app. Research the app and the company from which it originates. Check the spelling of not only the app name, but the description and the screenshots as well. Misspelled words are a sign that the app is not legitimate. How long has the app been available? Popular apps will not have been released three days ago. If there is a free version, don’t download and install it without first doing your due diligence. Offering something for free is a way to get you to download and install something malicious. If you download an app and it asks for permissions that you don’t think it should need, be suspicious.", "notes": [], "multi": true}, {"qnum": 58, "stem": "A user on your network complains that they see a message for a long time that says “Waiting for the User Profile Service.” and their profile is very slow to load. What could be the problem?", "options": {"A": "There is a slow link between the domain controller and the client, but it was not correctly detected by the User Profile service.", "B": "The user has never logged in to this computer before.", "C": "Windows needs to be updated.", "D": "The user entered an invalid password."}, "correct": ["A"], "explanation": "This message happens when the User Profile service incorrectly identifies the connection between the client and server as a fast connection, when it is actually slow. These settings can be configured on the domain controller. If the User Profile service detects a slow connection, it will load a cached profile from the local machine instead of the roaming profile on the server. If it’s the first time the user has logged in to a particular machine, then the profile will take longer to load because the entire profile is loaded, not just the changes, and it wouldn’t generate this error message. It is unlikely that a failure to update Windows would affect this message, and if a user entered an invalid password, they would see a message stating that.", "notes": [], "multi": false}, {"qnum": 59, "stem": "You’re working on a Windows client and have received an error message saying “Not Enough USB Controller Resources.” Which of the following is not a possible remedy for this situation?", "options": {"A": "Plug a USB cable from a power block into one of the USB ports on the motherboard.", "B": "Purchase an external hub or docking station that is separately powered, and plug devices into it.", "C": "Move devices that don’t need USB 3.X speed to USB 2.0 ports.", "D": "Disable the XHCI Mode option in the BIOS/UEFI settings."}, "correct": ["A"], "explanation": "Plugging a universal serial bus (USB) cable from a power block into a motherboard port will not solve your problem, and it will likely destroy your motherboard. The first thing you should try is rearranging the devices that are using the USB ports. USB hubs have a limit as to how much power they can provide and the number of endpoints that each port can support. A device may have multiple endpoints, and devices that are heavily involved in data transfer may use many more endpoints than other devices. Using a separately powered external hub or docking station means that the port won’t be providing power to the devices, so this may resolve the issue. Disabling the XHCI Mode option in the BIOS/UEFI may help with the resource error but will effectively turn off USB 3.0 and your hubs will behave like 2.0 ports. USB 2.0 ports use fewer resources than USB 3.0 ports. Other troubleshooting options could be to update the chipset drivers for the motherboard and check the power options in the basic input/output system/unified extensible firmware interface (BIOS/UEFI). Make sure any USB controller drivers are updated. If you have plugged and unplugged devices, try going to Device Manager to scan for hardware changes and test the devices again. Also in Device Manager, uninstall all USB controllers and restart the computer. Windows will scan for hardware changes and all the USB controllers that were uninstalled should be reinstalled, which will allow the USB controllers to return an unresponsive port to a working condition.", "notes": [], "multi": false}, {"qnum": 60, "stem": "Your friend has complained that they can’t connect their phone to their Wi-Fi network at home and they’ve used all their cellular data. You look at their screen, and it appears as shown in the graphic, where the image backgrounds are as follows: airplane is gray, cellular is green, Wi-Fi is white, and Bluetooth is blue. What is the problem?", "options": {"A": "Airplane mode is on.", "B": "Their Bluetooth is turned off.", "C": "Their Wi-Fi is turned off.", "D": "Their cellular service is turned off."}, "correct": ["C"], "explanation": "Either Airplane mode being on or Wi-Fi turned off would keep them from connecting to their Wi-Fi, but in this case, according to the graphic, the Wi-Fi is turned off. Cellular service and Bluetooth should have no effect on their ability to connect to their home Wi-Fi network.", "notes": [], "multi": false}, {"qnum": 61, "stem": "You’re using the most recent version of Microsoft Edge to browse the Internet on your Windows workstation. It has been working fine, but today, when you visit any website, you receive an error message that there is an invalid certificate. It happens regardless of the site you visit. What should you do?", "options": {"A": "Check your computer’s time and date.", "B": "Refresh your certificate through the Security settings in the Control Panel.", "C": "Set your Security Level to low for the Internet Zone in Internet Properties in the Control Panel.", "D": "In Microsoft Edge, turn off Enhance Your Security on The Web."}, "correct": ["A"], "explanation": "If your computer is set to an incorrect time and date (I’m talking years off, not just a few minutes), then it can cause invalid certificate errors for the websites you want to visit. Refreshing your certificate is not an option in the Security settings in the Control Panel, and there is no low option for the Internet Zone in Internet Properties. It’s never recommended to turn off your security settings for browsing the Internet. Note that if your date and time are way off, it might be that the basic input output system/unified extensible firmware interface (BIOS/UEFI) is not retaining its settings, in which case the CMOS battery needs to be changed.", "notes": [], "multi": false}, {"qnum": 62, "stem": "You use an iPad and an iPhone at work. Which of the following represent the greatest threats to leaking personal files or data? (Choose two.)", "options": {"A": "Unauthorized root access (i.e., jailbreak)", "B": "Unintended Wi-Fi connections", "C": "Unauthorized location tracking", "D": "High resource utilization"}, "correct": ["A", "B"], "explanation": "When authorized users access devices through unintended connections or unauthorized users access absconded devices (such as with root access), they can access the data on the device. Every firm should have a policy for protecting data (i.e., encryption) and dealing with leaks when they occur.", "notes": [], "multi": true}, {"qnum": 63, "stem": "You receive a notice from your wireless provider that you are about to exceed your data transmission limit for the month. What type of risk does this present?", "options": {"A": "Your account might be deactivated.", "B": "You might incur a security breach.", "C": "You might have to pay high fees.", "D": "Your phone might be locked out of the system."}, "correct": ["C"], "explanation": "Going over the limit on your phone’s data plan is generally not a major risk, other than to your finances. Data overage charges can be high, depending on your provider and service plan. It is unlikely that your account will be deactivated, made more vulnerable to security breaches, or locked out of the cellular system.", "notes": [], "multi": false}, {"qnum": 64, "stem": "Your Android-based phone has recently started rebooting randomly. Which of the following might be the cause? (Choose two.)", "options": {"A": "You’ve installed a poorly written app.", "B": "The phone’s battery is at room temperature.", "C": "Auto-restart is enabled.", "D": "You’re typing too fast on the keyboard."}, "correct": ["A", "C"], "explanation": "The most likely cause for an Android phone randomly restarting is a poorly written app. Any apps that you’re not using should be deleted from the device. Another cause may be that on some Android phones, there is an auto-restart feature as a part of a Device Care option to boost phone performance. If it is on, turn the feature off to avoid automatic restarts. Batteries that are too hot or too cold can cause problems, but room temperature batteries are okay. Typing too fast on the keyboard wouldn’t cause a reboot problem. Other problems not listed might be the battery overheating or third-party cases that don’t fit just right (causing a button to stick), defective hardware, or corrupted operating system (OS) files.", "notes": [], "multi": true}, {"qnum": 65, "stem": "A smartphone user calls to report that their phone has no wireless connectivity. What is the first thing you should tell them to do?", "options": {"A": "Turn the phone off and back on again.", "B": "Check whether Airplane mode is on.", "C": "Perform a reset to factory default.", "D": "Adjust the Wi-Fi signal receptivity."}, "correct": ["B"], "explanation": "A common cause for lack of wireless connectivity is that the device is in Airplane mode, which can easily happen by an unintended touch on that part of the screen. Ensure that the device is not in that mode, then cycle the power if necessary. If the problem persists, you’ll need to perform further troubleshooting. There is no Wi-Fi receptivity setting, and you would not reset the device to factory default without exhausting all other options first.", "notes": [], "multi": false}, {"qnum": 66, "stem": "Your network has several dozen mobile device users. Several of them have reported that there are areas within your office where network access is very slow. Which of the following is not likely something you can do to help them?", "options": {"A": "Install a new WAP.", "B": "Test the network with a Wi-Fi analyzer.", "C": "Check for network interference and congestion.", "D": "Get new devices for those having problems."}, "correct": ["D"], "explanation": "Multiple users have the same complaint, so it’s not likely a problem with their devices. Your first step should be to use a Wi-Fi analyzer to see signal strength, channels used, and various other network metrics. Any company with a wireless network should have one for troubleshooting purposes. A Wi-Fi analyzer could be as simple as an app on your phone, to a very sophisticated and expensive device. Based on what you find, you might need to install a new wireless access point (WAP) that uses a different channel to avoid congestion or move physical obstructions to your network.", "notes": [], "multi": false}, {"qnum": 67, "stem": "A user on your network is suddenly receiving an overwhelming number of pop-up ads on their mobile device. What is likely happening? (Choose two.)", "options": {"A": "They contracted malware.", "B": "Their browser’s pop-up blocker is turned off.", "C": "They are the victim of an adware attack.", "D": "They need to reinstall their browser."}, "correct": ["B", "C"], "explanation": "The specific behavior exhibited most likely means that their device is the victim of an adware attack, or that their browser’s pop-up blocker has been turned off. Adware tracks your movements and targets you with advertisements, trying to get you to click on them and spend your money.", "notes": [], "multi": true}, {"qnum": 68, "stem": "An Android phone user just received a new Bluetooth headset for phone calls. They’ve reported that it does not work with their phone. Both devices are powered on and appear to be operational. What is most likely the problem?", "options": {"A": "Bluetooth is turned off on the Android device.", "B": "Bluetooth is turned off on the mobile headset.", "C": "The devices need to be paired.", "D": "Airplane mode is on."}, "correct": ["C"], "explanation": "While all of the options are possible, the most likely in this scenario is that the devices need to be paired. If the Bluetooth devices have not been used together previously, they must be paired so they can work together. Pairing is usually a simple process. CompTIA’s steps to configure Bluetooth devices (from Exam 220–1201) are: 1. Enable Bluetooth. 2. Enable pairing. 3. Find a device for pairing. 4. Enter the appropriate PIN code. 5. Test connectivity.", "notes": [], "multi": false}, {"qnum": 69, "stem": "You have an unlimited data plan with your cellular provider, but today you received a notice from your provider that you are about to exceed your data transmission threshold for the month. What will likely happen?", "options": {"A": "Your account might be deactivated.", "B": "You might incur a security breach.", "C": "Your data transmissions will be slower than normal.", "D": "Your phone might be locked out of the system."}, "correct": ["C"], "explanation": "Even most unlimited plans aren’t truly unlimited. Most mobile or even home Internet providers will slow down your transmission rate when you exceed a specified data threshold. It is highly unlikely that your account will be deactivated, become vulnerable to security breaches, or be locked out.", "notes": [], "multi": false}, {"qnum": 70, "stem": "A user complains that their Apple device is randomly restarting. They haven’t installed any new software recently. What steps will you take to troubleshoot the problem? (Choose two.)", "options": {"A": "Ensure that the iOS or iPadOS and apps are up to date.", "B": "Check their battery health in Settings.", "C": "Replace the battery.", "D": "Reset the phone to factory default."}, "correct": ["A", "B"], "explanation": "If everything is up to date and your battery is healthy but the problem continues, you need to contact Apple Support. Most batteries are not user replaceable. Be sure to back up your data before contacting Apple Support. If you reset the phone to the factory default, you will lose everything on the phone.", "notes": [], "multi": true}, {"qnum": 71, "stem": "A very serious-looking pop-up appears on your mobile device screen and says to click it for an update to your anti-malware software that will eradicate a virus your device has contracted. Which of the following should you not do?", "options": {"A": "Click the link to update your anti-malware.", "B": "Restart the device in safe mode if that is an option on your device.", "C": "Update your anti-malware as you normally do, and run a scan.", "D": "Check online for information about this fake security warning."}, "correct": ["A"], "explanation": "This is a typical fake security warning. If you click the message, or anywhere on the message, it will likely install the malware that it is mentioning. To ensure that your device is clean, update your anti-malware software and run a scan. It’s important to keep your operating system (OS) and all software updated with the latest versions. Use reliable anti-malware software, strong passwords, or a password manager; avoid using public Wi-Fi (just because it says it’s Starbucks Wi-Fi doesn’t necessarily mean that it is); and do your due diligence when choosing new apps to download and install, even from places like the Google Play app.", "notes": [], "multi": false}, {"qnum": 72, "stem": "A smartphone user is concerned about their privacy and wants to ensure that others can’t hack into their phone and track down their location or access their personal data and pictures. Which of the following actions will provide them with some protection to help prevent this from happening? (Choose two.)", "options": {"A": "Install an anti-malware app.", "B": "Install OS updates as soon as they are available.", "C": "Disable location services.", "D": "Enable sync with a cloud provider."}, "correct": ["A", "B"], "explanation": "Smartphones are susceptible to malware, just like any other computer device. Some malware can be configured to perform unauthorized location tracking. To help prevent this, always patch and update the operating system (OS) as soon as updates are available and install anti-malware software. Some services such as maps require that location services are enabled, but if the user chooses to, location services can be disabled. Exactly how to do that depends on the device, but the option is most likely in the Settings menu. Enabling sync with a cloud provider will make a backup of their data, but it does nothing to protect it from being leaked.", "notes": [], "multi": true}, {"qnum": 73, "stem": "You’re trying to pay for coffee at your favorite shop using its NFC reader and Apple Pay, but your phone isn’t communicating with it. What is most likely the problem? (Choose two.)", "options": {"A": "Wi-Fi is disabled.", "B": "NFC isn’t enabled.", "C": "Airplane mode is on.", "D": "Bluetooth is disabled."}, "correct": ["B", "C"], "explanation": "To use near-field communication (NFC) services like Apple Pay and Google Pay, you need to ensure that Airplane mode is off and NFC is enabled. Wi-Fi and Bluetooth have no effect on the NFC reader. NFC has a very short transmission range, measured in centimeters or inches.", "notes": [], "multi": true}, {"qnum": 74, "stem": "You’re attempting to share files with an iPad user by using AirDrop. You both have Wi-Fi turned on, but you can’t seem to connect. Which of the following could be causing the problem? (Choose two.)", "options": {"A": "One of you does not have Bluetooth turned on.", "B": "You are not listed in their contacts.", "C": "They have their AirDrop Receiving setting set to Everyone.", "D": "They turned off their hotspot."}, "correct": ["A", "B"], "explanation": "For AirDrop to work, both of you must have Wi-Fi and Bluetooth enabled, and you need to be within Wi-Fi and Bluetooth range. If either party has a hotspot on, it must be turned off. If you are not in the receiver’s contact list and they have their AirDrop Receiving setting set to Contacts Only, then you will not be able to send them information. If you are in their contacts list, then your Apple ID email or your phone number must be in the contact card. If they change their AirDrop Receiving setting to Everyone, then they can receive the file even if you are not in their contacts list.", "notes": [], "multi": true}, {"qnum": 75, "stem": "An Android device user is suddenly receiving an overwhelming number of pop-up ads on their mobile device and has called you for help. What is most likely the reason for the pop-ups?", "options": {"A": "Malware", "B": "A third-party app", "C": "A firewall", "D": "A proxy server"}, "correct": ["B"], "explanation": "Often times when a third-party app is installed, you also unknowingly give it permission to bombard you with “helpful” pop-up messages. While it could be malware, that doesn’t happen as often. Firewalls and proxy servers provide a layer of protection, but they are not causing pop-ups. Some other issues could be that browser settings need to be updated, or the browser cache cleared. Most devices will also enable the user to block pop-ups and redirects through the Settings app.", "notes": [], "multi": false}, {"qnum": 76, "stem": "You’re attempting to update the iOS on your iPhone, but the update fails, and you receive the message “Unable to install update. Software update requires a network connection.” What should you do first?", "options": {"A": "Retry the update using the same network connection.", "B": "Connect the iPhone to your PC and update it that way.", "C": "Remove apps or data to make enough room on your phone for the update.", "D": "Connect to a different network."}, "correct": ["A"], "explanation": "If the update fails once because of a lost or insufficient network connection, retry the update using the same network connection. If it fails again, connect the iPhone to your computer to perform the update. This error message has nothing to do with insufficient room on your iPhone, and connecting to a different network might solve the problem, but that isn’t what you would do first.", "notes": [], "multi": false}, {"qnum": 77, "stem": "An application failed to update on a user’s phone. Which of the following are likely to be the problem? (Choose two.)", "options": {"A": "The phone is plugged into power.", "B": "There is insufficient space on the phone.", "C": "They're using Wi-Fi instead of Ethernet.", "D": "The Internet connection is weak."}, "correct": ["B", "D"], "explanation": "Regardless of the operating system (OS), if there is insufficient space on a smartphone or a weak Internet connection, an application is unlikely to update. Allowing the power to go too low or the device to turn off during an update may cause problems, so it’s perfectly fine to have the phone plugged in while doing updates. Generally speaking, mobile devices use Wi-Fi instead of Ethernet, and you will want a strong Wi-Fi signal.", "notes": [], "multi": true}, {"qnum": 78, "stem": "A user reports that their mobile phone has been experiencing higher-than-normal use of resources for about a week. What two things should you immediately suspect could be causing the problem? (Choose two.)", "options": {"A": "Unauthorized root access", "B": "Failing battery", "C": "Excessive number of open apps", "D": "Stuck sync operation"}, "correct": ["A", "C"], "explanation": "Higher than normal resource utilization can be a telltale sign that a device is running more than it should be—perhaps the drives are being searched, or the camera is recording your every move. Or it could be that the user has too many apps open, and the device is struggling with available resources. The latter tends to happen more on Android smartphones than iPhones. Unauthorized root access on an Android or jailbreaking an iPhone cause the phone to be susceptible to malware attacks but don’t by themselves cause more resources to be used. A stuck sync operation would not likely cause high resource utilization.", "notes": [], "multi": true}, {"qnum": 79, "stem": "You are visiting a customer’s office in a large city high-rise building. You need to make a call on your mobile phone, but you have only one bar and the call will not complete. What should you do?", "options": {"A": "Wait a few minutes and try again.", "B": "Cycle the power off and on.", "C": "Reset to factory defaults.", "D": "Step outside or near a window."}, "correct": ["D"], "explanation": "Weak signals are a common culprit behind dropped signals. Before you engage in communication, the device’s signal strength should be evaluated. If the signal is low (e.g., no bars), then change location. For example, step outside, drive out of the tunnel, or exit the elevator and try for a better signal. A low battery can affect signal strength, so keep the battery charged as much as possible. Waiting a few minutes won’t help if something is blocking the signal. And cycling the power off and on probably won’t help either. You certainly wouldn’t reset your phone to factory defaults any time that your signal was weak!", "notes": [], "multi": false}, {"qnum": 80, "stem": "The GPS app on your mobile phone keeps popping up randomly on the screen, and your phone seems to be running very slowly. Which choice will likely not help in this situation?", "options": {"A": "Restart the phone in safe mode.", "B": "Force-stop the application.", "C": "Perform a malware scan.", "D": "Uninstall the app."}, "correct": ["B"], "explanation": "You don’t need to force-stop the application because it isn’t unresponsive. What you should do is suspect that your phone is infected with malware. Most Android phones have a method to restart in safe mode. Once there, perform a malware scan and uninstall the offending app. Make sure your operating system (OS) and other apps are updated. If you identify any other suspicious apps (i.e., apps that are acting strangely), then they might have been infected as well and should be removed and a clean copy downloaded and installed.", "notes": [], "multi": false}, {"qnum": 81, "stem": "While driving through the remote countryside, you notice that your mobile phone battery has quickly drained of power. What is the most likely cause of this?", "options": {"A": "The battery needs to be replaced.", "B": "The phone has been searching for a signal.", "C": "You need to cycle the power off and on again.", "D": "You need to replace the phone."}, "correct": ["B"], "explanation": "While apps, usage, and so on can contribute to power drain, one of the biggest offenders is the search for a cellular signal. It’s unlikely that the battery needs to be replaced, power cycled off and on, or the phone replaced. Simply recharge the battery. The phone will also use battery power if it’s searching for a Wi-Fi signal, so when you’re traveling and not using Wi-Fi, turn the Wi-Fi off to conserve battery resources.", "notes": [], "multi": false}, {"qnum": 82, "stem": "A user wants to use developer mode on their Android device to make some tweaks to the system. What settings will you tell them they should not leave on? (Choose two.)", "options": {"A": "USB configuration", "B": "Show Touches", "C": "Developer mode", "D": "Debugging"}, "correct": ["C", "D"], "explanation": "If Developer mode and the Debugging feature are left on, then whenever the PC is connected to any computer, the Android device is essentially wide open, meaning that passwords, bank accounts, photos, and so on are visible to anyone who accesses it. There are many features that can be manipulated in Debugging mode, such as Show Touches, Pointer Location, Transition Animation Scale, and so on. Just ensure that Developer mode and Debugging are turned off when you are done with them.", "notes": [], "multi": true}, {"qnum": 83, "stem": "You’re trying to update your iPhone’s iOS, but there is not enough free space on your phone to do the update. Which of the following should you do? (Choose two.)", "options": {"A": "Use your computer to perform the update.", "B": "Remove content and apps that you don’t use.", "C": "Purchase more internal memory for your iPhone.", "D": "Purchase an SD card for your iPhone."}, "correct": ["A", "B"], "explanation": "To update the iOS, you need to have sufficient room on your iPhone. You might be able to use your computer to do the update, because files can be temporarily stored on the computer by the update while it is working. If it still won’t update using your computer, then you need to make space on your iPhone by removing apps or data that you aren’t using. Adding internal storage to an iPhone is not possible, and while it is possible to use an adapter and a secure digital (SD) memory card for extra storage, the card can’t be used to hold the iOS.", "notes": [], "multi": true}, {"qnum": 84, "stem": "You’re trying to install a new application from the Play Store on your Android mobile device, but the installation isn’t working. Which of the following might be the problem? (Choose two.)", "options": {"A": "The Play Store cache is empty.", "B": "The network speed is too fast.", "C": "The date and time on your device are wrong.", "D": "There are other downloads or updates pending in the Play Store queue."}, "correct": ["C", "D"], "explanation": "The Play Store sometimes won’t install updates or apps if your date or time is incorrect, so ensure that they are correct. Having updates pending in the Play Store queue could also be a problem, so you’ll need to cancel those updates before installing the new software. You’ll also need a good Wi-Fi connection and sufficient space on your device for the new app. The other two options are irrelevant.", "notes": [], "multi": true}, {"qnum": 85, "stem": "A user is complaining that they see a lot of ads popping up on their screen in the bottom right (i.e., the notifications area). They have run a scan using their anti-malware software, and it says their computer is clean. The constant pop-ups are interfering with their work, and they ask you what can be done about it. Which of the following is not true?", "options": {"A": "These are push notifications, not pop-ups.", "B": "Nothing can be done about them.", "C": "The user allowed them at some point.", "D": "The user can disable or block all or some."}, "correct": ["B"], "explanation": "These are push notifications, not pop-ups, because they are coming up on the desktop, not in a browser. You can definitely do something about them. In order for them to show, you would have had to innocently agreed to them at some point. And yes, you can disable or block all or some of them. You might want some notifications and not others. In Windows Settings, search for Notifications, and on the Notifications screen you’ll find options for allowing or blocking notifications. Choosing which ones to allow can also be done through your browser and how depends on the browser being used. Each browser (i.e., Safari, Firefox, Opera, etc.) has its own path to the specific settings that need to be changed, and they may change over time, but all will allow you to choose which notifications to see and which to block.", "notes": [], "multi": false}, {"qnum": 86, "stem": "You’re attempting to update an Android phone but receive an error message that the update failed. Which of the following could be the problem? (Choose two.)", "options": {"A": "The device has insufficient storage space.", "B": "There is a good Wi-Fi connection.", "C": "There is insufficient battery power.", "D": "The device is plugged into its charger."}, "correct": ["A", "C"], "explanation": "An Android device won’t perform an operating system (OS) update under the following conditions: If the Wi-Fi connection is not strong enough, the battery power or storage space is too low, or the device is no longer supported. If there is insufficient storage, remove apps or data that are no longer needed to make room for the update. Ensure that there is a good Wi-Fi connection. If the battery power is insufficient, plug the device in until it is fully charged.", "notes": [], "multi": true}, {"qnum": 87, "stem": "You’re considering installing a desktop alert system for your business, which has both in-house and remote workers. Which of the following are true regarding desktop alerts? (Choose two.)", "options": {"A": "Desktop alerts are limited to desktops.", "B": "Desktop alerts provide an excellent emergency communication system such as weather alerts.", "C": "Desktop alerts are text only, not graphics.", "D": "Desktop alert software can be made interactive and can become a security threat."}, "correct": ["B", "D"], "explanation": "It’s possible that you’ve already signed up for desktop alerts. If you receive weather warnings on your computer or phone, or school closings, power outages, or other notifications, these are desktop alerts. Desktop alerts can be displayed on wall-mounted displays, desktops, mobile devices, and phones, and they are an excellent way to provide mass notifications to affected people. They can include text and graphics, and they can be made full screen and interactive so that the receiver can respond. But like many other useful features in computer systems, they can be abused by those with malicious intent. For example, an interactive button on a desktop alert could be used to deploy malware when the user clicks it. There are many third-party vendors for desktop alert systems.", "notes": [], "multi": true}, {"qnum": 88, "stem": "A friend asks you what jailbreaking a device is and if they should do it. Which of the following is not true about jailbreaking?", "options": {"A": "Jailbreaking is like cracking software or gaining root access to a phone, which makes your device more vulnerable to attack.", "B": "Jailbreaking might be illegal depending on where you are in the world.", "C": "Jailbreaking is a safe way to get more out of your device.", "D": "Jailbreaking gives the user full access to the device, and on an iPhone, it allows the user to download apps not approved by Apple."}, "correct": ["C"], "explanation": "Jailbreaking does let you do more with your device, but it isn’t necessarily safe or legal. Jailbreaking is most commonly done with Apple devices because they are more locked down (i.e., closed source) than Android (i.e., open-source). Jailbreaking an iPhone, for instance, allows the user to install apps that are not approved by Apple. When you open the device up for you by cracking software or gaining root access, it also opens your device up more for cybercriminals to perpetrate an attack on it. Jailbreaking also voids the warranty on your device. The device may become unstable, and with the warranty voided, you are not likely to receive support in fixing problems. Jailbreaking may even be illegal depending on where you are in the world.", "notes": [], "multi": false}, {"qnum": 89, "stem": "A user is attempting to install new features for an app from the developer’s website instead of from the Google Play app store, where they originally downloaded the app. The update with the new features fails to install. Why? (Choose two.)", "options": {"A": "The signatures don’t match.", "B": "The update is an APK format.", "C": "Only Google can write apps for Android devices.", "D": "The website is likely spoofed."}, "correct": ["A", "D"], "explanation": "Apps from the Google Play app store are required to be signed by the developer, and any updates won’t be installed unless the signatures for the update and the original software match. This is a security feature for Android devices. If the signatures don’t match, an error message like “Signatures do not match previously installed version” will appear. If you’ve downloaded the update from somewhere other than the Google Play store and received this error, there is a good chance that the website is a spoof of the actual developer’s site, and a criminal is trying to get you to install malware. Android package (APK) source is the format for Android apps on the Google Play store prior to August 2021. Updates for existing apps may still be in this format, but any newly developed apps after August 2021 on the Google Play store will be in an Android App Bundle (AAB) format.", "notes": [], "multi": true}, {"qnum": 90, "stem": "Recently you’ve noticed a suddenly high volume of traffic on the VLAN that is used by mobile devices at your business. You know that the number of mobile devices hasn’t increased that much. What should you suspect?", "options": {"A": "A mobile device is malfunctioning.", "B": "One or more mobile devices is infected with malware.", "C": "Devices are experiencing limited connectivity.", "D": "Your monitoring software is infected."}, "correct": ["B"], "explanation": "The most likely reason for a sudden high increase in network traffic is that there is malware on the system and that malware is using your network to do something. Luckily, the mobile devices are on a virtual local area network (VLAN), so it isn’t directly affecting your main network. You need to immediately identify the source of the network traffic and perform malware removal procedures. A malfunctioning mobile device is not likely to be the source of the problem. Limited connectivity would not present as an increase in network traffic, and it is unlikely that your monitoring software being infected is the problem. High network traffic is precisely the sort of incident that your monitoring software should be designed to detect.", "notes": [], "multi": false}, {"qnum": 91, "stem": "What is one of the best ways to prevent malware from being spread by desktop alerts?", "options": {"A": "Educate the end users.", "B": "Block all desktop alerts.", "C": "Always log in as an administrator.", "D": "Update anti-malware once a month."}, "correct": ["A"], "explanation": "Desktop alerts perform a valuable function, but they can be subject to misuse by cybercriminals. The best protection for this type of attack is user education. You would not want to block all desktop alerts because they serve a purpose, and you certainly don’t want to log on as an administrator unless absolutely necessary to avoid an attacker gaining administrator access and to avoid accidentally doing something as an administrator that could damage a system, because administrators can do anything in a system. Anti-malware should be updated daily.", "notes": [], "multi": false}, {"qnum": 92, "stem": "You’re attempting to boot a computer that worked fine yesterday, but today it says “OS not found” or a similar message. What will you do first?", "options": {"A": "Verify the boot options in BIOS/UEFI.", "B": "Verify there are no USB drives inserted.", "C": "Restart the computer.", "D": "Remove the HDD."}, "correct": ["B"], "explanation": "If a computer’s boot order is set to boot only to a universal serial bus (USB) drive, then leaving a non-bootable media in that drive will give the error that the operating system (OS) is not found, when in fact it may be perfectly fine and residing on the hard drive. Your first course of action is to verify that there is no media inserted into USB ports. If you find it there, remove the non-bootable media and restart the computer. If it starts normally, the issue is resolved, but you shouldn’t stop there. Enter the basic input/output system/unified extensible firmware interface (BIOS/UEFI) and verify the boot options. For a secure environment, you will want to disable booting to drives other than the intended boot drive, usually a hard drive. It’s true that booting to alternate drives may be necessary when troubleshooting, but leaving that option always available opens the system up to potential attack.", "notes": [], "multi": false}, {"qnum": 93, "stem": "A user complains that their Windows 11 laptop seems to be unstable. They had installed some software, and although they have removed it, the system is still behaving strangely. You have examined the system and determined that it is not infected with malware. What will you do next?", "options": {"A": "Boot to installation media and reformat the hard drive, and then reinstall the operating system.", "B": "Hold the Shift key and restart the computer. The computer will restart in WinRE.", "C": "Perform a system restore from the restore point created immediately before the software was installed.", "D": "Delete the Registry and restart the computer."}, "correct": ["C"], "explanation": "A seemingly unstable Windows installation may be repaired by using a system restore point from a time when the system was working well. If that doesn’t resolve the issue, a more involved step would be to boot into Windows Recovery Environment (WinRE), navigate to Reset this PC, and choose to keep your personal files, performing an in-place update that will reinstall the Windows 11 operating system (OS) files. There is no need to reformat the drive and reinstall the OS or delete the Registry.", "notes": [], "multi": false}, {"qnum": 94, "stem": "You are donating some old mobile devices to charity. What should you do before you give them away?", "options": {"A": "Replace the storage media with new media, and destroy the old storage media.", "B": "Delete all your personal/company files.", "C": "Perform an in-place update.", "D": "Perform a Factory Image Restore."}, "correct": ["D"], "explanation": "Whenever a device will leave your possession, whether it is being donated or recycled, you need to ensure that all data is removed from the device. The simplest way to do this is by restoring the device to its factory settings, if a restore image is available. The process for a factory image restore on phones and mobile devices will be different depending on the device. With Windows OS, boot to the Windows Recovery Environment (WinRE) and navigate to Factory Image Restore. If you are in a government or industry where data security is an absolutely essential matter, you may be required to use other means such as physically destroying the device or performing multiple zero-writes to the storage media.", "notes": [], "multi": false}, {"qnum": 95, "stem": "Your company uses an Active Directory domain to control resources on your network. It also uses a PC image to prepare computers for first use within your organization. One of your computer users complains that they can’t print, and a few other activities are working strangely. You have determined that there is no malware on the system. What will you do to restore this computer to working order?", "options": {"A": "Back up the user files and reinstall the operating system.", "B": "Reinstall the company’s PC image.", "C": "Boot into WinRE and reset the PC, keeping the user files.", "D": "Boot into WinRE and perform a Factory Image Restore. Chapter Operational Procedures THE COMPTIA A+ 220–1202 TOPICS COVERED IN THIS CHAPTER INCLUDE THE FOLLOWING: ✓ 4.1 Given a scenario, implement best practices associated with documentation and support systems information management. ▪ Ticketing systems ▪ User information ▪ Device information ▪ Description of issues ▪ Categories ▪ Severity ▪ Escalation levels ▪ Clear, concise written communication ▪ Issue description ▪ Progress notes ▪ Issue resolution ▪ Asset management ▪ Inventory lists ▪ Configuration management database (CMDB) ▪ Asset tags and IDs ▪ Procurement lifecycle ▪ Warranty and licensing ▪ Assigned users ▪ Types of documents ▪ Incident reports ▪ Standard operating procedures (SOPs) ▪ Software package custom installation procedure ▪ New-user/onboarding setup checklist ▪ User off-boarding checklist ▪ Service-level agreements (SLAs) ▪ Internal ▪ External/third party ▪ Knowledge base/articles ✓ 4.2 Given a scenario, apply change management procedures. ▪ Documented business processes ▪ Rollback plan ▪ Backup plan ▪ Sandbox testing ▪ Responsible staff member ▪ Change management ▪ Request forms ▪ Purpose of the change ▪ Scope of the change ▪ Change type ▪ Standard change ▪ Normal change ▪ Emergency change ▪ Date and time of change ▪ Change Freeze ▪ Maintenance windows ▪ Affected systems/impact ▪ Risk analysis ▪ Risk level ▪ Change board approvals ▪ Implementation ▪ Peer review ▪ End-user acceptance ✓ 4.3 Given a scenario, implement workstation backup and recovery methods. ▪ Backup ▪ Full ▪ Incremental ▪ Differential ▪ Synthetic full ▪ Recovery ▪ In-place/overwrite ▪ Alternative location ▪ Backup testing ▪ Frequency ▪ Backup rotation schemes ▪ On site vs. off site ▪ Grandfather-Father-Son (GFS) ▪ 3-2-1 backup rule ✓ 4.4 Given a scenario, use common safety procedures. ▪ Electrostatic discharge (ESD) straps ▪ ESD mats ▪ Electrical safety ▪ Equipment grounding ▪ Proper component handling and storage ▪ Cable management ▪ Antistatic bags ▪ Compliance with government regulations ▪ Personal safety ▪ Disconnect power before repairing PC ▪ Lifting techniques ▪ Fire safety ▪ Safety goggles ▪ Air filtration mask ✓ 4.5 Summarize environmental impacts and local environment controls. ▪ Material safety data sheet (MSDS) documentation for handling and disposal ▪ Proper battery disposal ▪ Proper toner disposal ▪ Proper disposal of other devices and assets ▪ Temperature, humidity-level awareness, and proper ventilation ▪ Location/equipment placement ▪ Dust cleanup ▪ Compressed air/vacuums ▪ Power surges, under-voltage events, and power losses ▪ Uninterruptible power supply (UPS) ▪ Surge suppressor ✓ 4.6 Explain the importance of prohibited content/activity and privacy, licensing, and policy concepts. ▪ Incident response ▪ Chain of custody ▪ Informing management/law enforcement as necessary ▪ Copy of drive (data integrity and preservation) ▪ Incident documentation ▪ Order of volatility ▪ Licensing/digital rights management (DRM)/end-user license agreement (EULA) ▪ Valid licenses ▪ Perpetual license agreement ▪ Personal-use license vs. corporate-use license ▪ Open-source license ▪ Non-Disclosure Agreement (NDA)/mutual non-disclosure agreement (MNDA) ▪ Regulated data ▪ Credit card payment information ▪ Personal government-issued information ▪ PII ▪ Healthcare data ▪ Data retention requirements ▪ Acceptable Use Policy (AUP) ▪ Regulatory and business compliance requirements ▪ Splash screens ✓ 4.7 Given a scenario, use proper communication techniques and professionalism. ▪ Present a professional appearance and wear appropriate attire ▪ Match the required attire of the given environment ▪ Formal ▪ Business casual ▪ Use proper language and avoid jargon, acronyms, and slang, when applicable ▪ Maintain a positive attitude/project confidence ▪ Actively listen and avoid interrupting the customer ▪ Be culturally sensitive ▪ Use appropriate professional titles and designations, when applicable ▪ Be on time (If late, contact the customer) ▪ Avoid distractions. ▪ Personal calls ▪ Texting/social media sites ▪ Personal interruptions ▪ Appropriately deal with difficult customers or situations ▪ Do not argue with customer and/or be defensive ▪ Avoid dismissing customer issues ▪ Avoid being judgmental ▪ Clarify customer statements (i.e., ask open-ended questions to narrow the scope of the issue, restate the issue, or question to verify understanding) ▪ Use discretion and professionalism when discussing experiences/encounters ▪ Set and meet expectations/timeline and communicate status with the customer ▪ Offer repair/replacement options, as needed ▪ Provide proper documentation on the services provided ▪ Follow up with customer/user at a later date to verify satisfaction ▪ Appropriately handle customers’ confidential and private materials ▪ Located on a computer, desktop, printer, etc. ✓ 4.8 Explain the basics of scripting. ▪ Script file types ▪ .bat ▪ .ps1 ▪ .vbs ▪ .sh ▪ .js ▪ .py ▪ Use cases for scripting ▪ Basic automation ▪ Restarting machines ▪ Remapping network drives ▪ Installation of applications ▪ Automated backups ▪ Gathering of information/data ▪ Initiating updates ▪ Other considerations when using scripts ▪ Unintentionally introducing malware ▪ Inadvertently changing system settings ▪ Browser or system crashes due to mishandling of resources ✓ 4.9 Given a scenario, use remote access technologies. ▪ Methods/tools ▪ RDP ▪ VPN ▪ Virtual network computer (VNC) ▪ Secure Shell (SSH) ▪ Remote monitoring and management (RMM) ▪ Simple Protocol for Independent Computing Environments (SPICE) ▪ Windows Remote Management (WinRM) ▪ Third-party tools ▪ Screen-sharing software ▪ Video-conferencing software ▪ File transfer software ▪ Desktop management software ▪ Security considerations of each access method ✓ 4.10 Explain basic concepts related to artificial intelligence (AI). ▪ Application integration ▪ Policy ▪ Appropriate use ▪ Plagiarism ▪ Limitations ▪ Bias ▪ Hallucinations ▪ Accuracy ▪ Private vs. public ▪ Data security ▪ Data source ▪ Data privacy"}, "correct": ["B"], "explanation": "If the computer is behaving strangely, the simplest fix is to reinstall the company’s PC image. This will delete any files that exist on the computer and install any software and settings that are necessary for the company. The user can then log in to the domain. There is no need to back up their files, because on the domain their files will be saved in a home directory on a server. Booting into Windows Recovery Environment (WinRE) to reset or perform a factory restore is not the best way to resolve the problem.", "notes": [], "multi": false}], "skipped": []}, "ch9": {"title": "Chapter 9 - Operational Procedures", "questions": [{"qnum": 1, "stem": "You have a laptop with a dead hard drive. You want to replace it with a newer SSD but have a few concerns. What disadvantage do SSDs have versus HDDs?", "options": {"A": "They produce more heat.", "B": "They are slower.", "C": "They are more susceptible to damage.", "D": "They cost more per gigabyte."}, "correct": ["D"], "explanation": "Solid-state drives (SSDs) have many advantages over hard disk drives (HDDs), including producing less heat, retrieving data faster, and being less susceptible to damage from shock or overheating. However, they are more expensive per gigabyte.", "notes": [], "multi": false}, {"qnum": 2, "stem": "Your friend is an artist, and they have recently purchased a new convertible laptop. It can be used as a regular laptop or it can be folded into a tablet computer. You’ve recommended they purchase a stylus to use with their new computer. Which of the following is not an advantage of a stylus?", "options": {"A": "They don’t leave greasy fingerprints on your screen.", "B": "There are never compatibility issues.", "C": "They can make more precise lines than fingers can.", "D": "You can use them in cold weather and have gloves on your hands."}, "correct": ["B"], "explanation": "There are many benefits to using a stylus with your touchscreen computer. Using a stylus can aid artists in being more precise in their art than is possible using fingertips. Styli are more sanitary than fingers and don’t leave behind the oils that your skin would on the touchscreen. Their use makes it easier to create handwritten notes than simply using your fingers. Not every stylus is compatible with every touchscreen, so you must know what kind of touchscreen you have to ensure that your stylus is compatible with it. Most touchscreens are capacitive, which means that the stylus must be constructed so that it will interrupt an electrostatic field. Resistive screens only register pressure and are better for uses such as making lines darker in a drawing program. Almost any material can be used to make a stylus. A stylus can connect via a USB port or wirelessly using Bluetooth.", "notes": [], "multi": false}, {"qnum": 3, "stem": "In a tablet computer with an LCD, which component is responsible for providing the right kind of energy to light the display?", "options": {"A": "Inverter", "B": "LCD", "C": "Backlight", "D": "Screen"}, "correct": ["A"], "explanation": "Fluorescent lighting, and liquid crystal display (LCD) backlights in particular, require fairly high-voltage, high-frequency energy. The component that provides the right kind of energy is the inverter, which is a small circuit board installed behind the LCD panel that takes direct current (DC) and inverts it to alternating current (AC) for the backlight. An inverter is not needed in a display that uses LED backlighting because LEDs use DC just like motherboards do.", "notes": [], "multi": false}, {"qnum": 4, "stem": "A friend just purchased a stylus that uses Bluetooth connectivity. They aren’t very tech savvy, so you have offered to set it up for them. What step of the Bluetooth connection process will you do after the laptop has found the stylus for pairing?", "options": {"A": "Enable pairing.", "B": "Test connectivity.", "C": "Enter the appropriate PIN code.", "D": "Enable Bluetooth."}, "correct": ["C"], "explanation": "The CompTIA A+ exam objectives list these steps for connecting Bluetooth devices as follows: 1. Enable Bluetooth. 2. Enable pairing. 3. Find a device for pairing. 4. Enter the appropriate personal identification number (PIN) code. 5. Test connectivity.", "notes": [], "multi": false}, {"qnum": 5, "stem": "You’re hiking in the mountains and have brought along a mobile device that has an app with all local trail maps on it to ensure that you don’t get lost. You look at the map and notice that the blue dot indicating where you are hasn’t moved since you left home. What do you need to enable in your mobile device for the app to work properly?", "options": {"A": "Airplane mode", "B": "GPS", "C": "Wi-Fi", "D": "Location services"}, "correct": ["D"], "explanation": "Location services on your device may use the global positioning system (GPS), which relies on satellites, Bluetooth, Wi-Fi, or cellular location services to determine your approximate location. Location services can be enabled, disabled, or conditionally enabled for different apps on your phone that need the service to function properly. Airplane mode turns off all network connectivity.", "notes": [], "multi": false}, {"qnum": 6, "stem": "What protocol/type of protocol guarantees delivery of a packet of information across a network (or networks) and will resend the packet if its arrival is not acknowledged? (Choose two.)", "options": {"A": "TCP", "B": "UDP", "C": "Connectionless", "D": "Connection-oriented"}, "correct": ["A", "D"], "explanation": "Protocols are either connection-oriented, meaning they will guarantee delivery, or connectionless, meaning they will not guarantee delivery. Connectionless protocols are used for activities such as streaming, where a missing packet here and there is less important than continuing to send the information. Connection-oriented protocols are used when it is important that each packet arrives. Some connection-oriented protocols are Transmission Control Protocol (TCP), Hypertext Transfer Protocol Secure (HTTPS), and Secure Shell (SSH) Protocol, whereas User Datagram Protocol (UDP), Dynamic Host Configuration Protocol (DHCP), and Trivial File Transfer Protocol (TFTP) are examples of connectionless protocols.", "notes": [], "multi": true}, {"qnum": 7, "stem": "Which two port numbers need to be opened to enable communications for FTP?", "options": {"A": "20/21", "B": "21/22", "C": "22/23", "D": "23/25"}, "correct": ["A"], "explanation": "File Transfer Protocol (FTP) uses ports 20 and 21. Port 22 is used by Secure Shell (SSH), port 23 is/was used by Telnet, and port 25 is used by Simple Mail Transfer Protocol (SMTP). Note that Telnet is insecure and has been deprecated.", "notes": [], "multi": false}, {"qnum": 8, "stem": "Which Internet appliance stands between a PC and the Internet and can include stateful packet inspection (i.e., packet filtering) and act as a gateway translating traffic between networks or protocols? (Choose two.)", "options": {"A": "Spam gateway", "B": "Unified Threat Management (UTM)", "C": "Load balancers", "D": "Proxy servers"}, "correct": ["B", "D"], "explanation": "A unified threat management (UTM) appliance is a single device on your network that provides multiple security fu
