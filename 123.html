tify to Never Notify, with Notify Only if Apps Try to Make Changes between the two. UAC can be found in Windows 11 by going to the Control Panel, then choosing System and Security. Once there, select Security and Maintenance, then click Change User Account Control settings (and in Windows 10, choose Security and Maintenance in the Control Panel). Then click Change User Account Control settings. But in both versions of Windows, it’s easier to simply search for UAC. Windows Defender Firewall is a software firewall included in Windows OSs. Facial recognition is a logon option, and Personalization allows you to change items such as themes, colors, and backgrounds.", "notes": [], "multi": false}, {"qnum": 117, "stem": "A friend is considering purchasing an antivirus program. You let them know that there is one included with the Windows operating system. What settings should they look for in Windows settings?", "options": {"A": "Windows Defender Firewall", "B": "Virus & Threat Protection", "C": "Windows Update", "D": "Device Security"}, "correct": ["B"], "explanation": "In both Windows 10 and 11, a quick search for virus & threat protection will bring you to the Windows settings for that feature. Windows Defender Firewall is a built-in firewall found in the Control Panel. Windows Update, which is in the Settings app, is for keeping the operating system (OS) files patched. Device security is also found in the Settings app, and it has settings and information for the security features of your computer, such as the trusted platform module (TPM) chip.", "notes": [], "multi": false}, {"qnum": 118, "stem": "Your company’s website has been a victim of a botnet attack, causing your server to crash. What type of attack did the botnet attack cause?", "options": {"A": "Brute-force", "B": "Zero-day", "C": "Distributed denial-of-service", "D": "Non-compliant system"}, "correct": ["C"], "explanation": "A distributed denial-of-service (DDoS) is caused by a botnet attack. It is a denial-of-service (DoS) attack because legitimate users are unable to access resources. The “distributed” part of the name comes from the fact that there was traffic from many infected computers (i.e., zombies), in different locations, attacking your server at the same time, also known as a botnet. Bots, by themselves, are a form of software that runs automatically and autonomously and are not harmful. Botnet, however, has come to be the word used to describe malicious software running on multiple zombies and under the control of a bot-herder, the person perpetrating the attack. Both DoS and DDoS attacks can be launched by botnets, as can many forms of adware, spyware, and spam (via spambots). A brute-force attack uses software to repeatedly try to discover a password. Zero-day attacks happen the same day a vulnerability is discovered. Such attacks are able to evade antivirus/anti-malware programs because antivirus/ anti-malware companies have not had time to respond to the vulnerability yet. A non-compliant system is one that is not updated or complying with corporate security policies.", "notes": [], "multi": false}, {"qnum": 119, "stem": "What type of attack is like an SQL injection, except that it uses a website and HTML or JavaScript instead of a database, where malicious code is injected into the website (which is normally trusted by the user) and then used to gather data from the website user’s computer because their systems don’t see the normally trusted website as a threat?", "options": {"A": "Zero-day attack", "B": "SQL injection", "C": "Unprotected system", "D": "Cross-site scripting"}, "correct": ["D"], "explanation": "Cross-site scripting (XSS) is similar to a structured query language (SQL) injection, except it uses a website and hypertext markup language (HTML) or JavaScript instead of a database. Code is injected into the website and used to gather data from legitimate website users, because their systems don’t see the normally trusted website as a threat. Zero-day attacks happen the same day a vulnerability is discovered. Such attacks are able to evade antivirus programs because antivirus/anti-malware companies have not had time to respond to the vulnerability yet. An SQL injection occurs when an attacker places code into a database instead of data and the code is executed, giving the attacker access to the data in the database. An unprotected system is one that lacks normal measures of security such as a software firewall on the system and antivirus/anti-malware.", "notes": [], "multi": false}, {"qnum": 120, "stem": "Your company has various locations, each with its own management needs, but wants a cohesive way to manage all the users, computers, and other resources on the network. What directory services feature will you enroll those users, computers, and resources into that will provide a way to manage each location in one place?", "options": {"A": "Active Directory", "B": "Organizational units", "C": "Security groups", "D": "Home folders"}, "correct": ["B"], "explanation": "An organizational unit (OU) is a grouping of resources including people, computers, servers, printers, and so on, into a single centrally controlled unit. A domain is managed by Active Directory software. One best practice is to group the users into security groups and then establish access to resources on the group level, which will then give that access to members of the group. Home folders provide a central place on a server to store users’ documents, each with their own home folder, which gets the documents off of the local computer, consolidating security for those folders into one place.", "notes": [], "multi": false}, {"qnum": 121, "stem": "The company’s vice president just called you into the IT department because they received an email from you requesting their username and password. They didn’t respond because they thought you should know them already. What kind of attack was just attempted?", "options": {"A": "Phishing", "B": "Vishing", "C": "Whaling", "D": "Evil twin"}, "correct": ["C"], "explanation": "Whaling is an attack on a powerful or wealthy fish (i.e., person), phishing uses email, and vishing is using voice calls to gain information. Vishing, phishing, and whaling are variations of the same type of attack. In all of them, someone attempts to gain usernames, passwords, or other information by intimidation, coercion, or other means, collectively known as social engineering. Then they’ll use that information to attack your company’s systems. All the options are a play on the word fishing. The attacker is casting a line and hoping you will bite on it. An evil twin attack happens when someone plugs an unauthorized wireless access point (WAP) into your network and gives it the same service set identifier (SSID) that your valid network has.", "notes": [], "multi": false}, {"qnum": 122, "stem": "What is the name of the software used to control access to resources in a Windows domain?", "options": {"A": "Home folder", "B": "Security group", "C": "Organizational unit", "D": "Active Directory"}, "correct": ["D"], "explanation": "Active Directory is the name given to the software and large database that is used to manage resources on a Windows domain. Using a home folder on an Active Directory server to store the user’s files adds a level of security because the user’s data is not on the local drive and is less subject to being stolen. A security group is a group of computers or users that need the same access to resources. Permissions are granted to the security group and passed on to the group’s members. Organizational units (OUs) are groupings that can include people, computers, and resources. Group policies can be applied to OUs, ensuring that all computers and users in that group are given the proper permissions.", "notes": [], "multi": false}, {"qnum": 123, "stem": "You’ve been reading about a recent malware that is causing problems for other companies and want to verify that your Windows built-in antivirus definitions are up to date. Where is this done?", "options": {"A": "Virus and Threat Protection in the Settings app", "B": "Virus and Threat Protection in the Control Panel", "C": "Windows Defender Firewall in the Settings app", "D": "Windows Defender Firewall in the Control Panel"}, "correct": ["A"], "explanation": "Virus and threat protection can be found in the Settings app, in the Windows security section. There you can see when the last update was done and run a system scan, among other options. Virus and threat protection is not found in the other locations.", "notes": [], "multi": false}, {"qnum": 124, "stem": "You are a junior IT administrator, and your supervisor has asked you to ensure that all workstations have the built-in Windows firewall activated. Where can you go to do that? (Choose two.)", "options": {"A": "Firewall & Network Protection in the Settings app", "B": "Firewall & Network Protection in the Control Panel", "C": "Windows Defender Firewall in the Settings app", "D": "Windows Defender Firewall in the Control Panel"}, "correct": ["A", "D"], "explanation": "The Windows built-in firewall can be configured either in the Settings app, using Firewall & Network Protection, or in the Windows Defender Firewall, which is found in the Control Panel. It isn’t found in the other two locations.", "notes": [], "multi": true}, {"qnum": 125, "stem": "Your company has started using new software in the cloud, but your users are finding that they can’t use the software. Their computers are running Windows 11. What can you do to ensure that the software can be used remotely by the employees? (Choose two.)", "options": {"A": "Click on Allow An App Through Firewall in the Firewall & Network Protection settings of the Settings app.", "B": "Click on Allow An App Through Firewall in the Virus & Threat Protection settings of the Settings app.", "C": "Click on Allow An App Through Firewall in Windows Defender Firewall, which can be found in the Control Panel.", "D": "Add a new rule in Administrative Tools in the Control Panel."}, "correct": ["A", "C"], "explanation": "The firewall can be configured to allow an application through (or block one) in both the Firewall & network protection settings of the Settings app or in Windows Defender Firewall in the Control Panel. Virus & threat protections are for configuring antivirus. It is not configured in the Virus & threat protection settings of the Settings app. Administrative tools is found in Windows 10, but not Windows 11 where it was replaced with Windows Tools, and it doesn’t have settings for the firewall, although it does contain a shortcut to the Windows Defender Firewall.", "notes": [], "multi": true}, {"qnum": 126, "stem": "Employees at your company work on very confidential projects. All employees have been instructed to lock their screens whenever they walk away from their computer, even if it’s only for a minute. What key sequence will immediately lock their desktop and require a password to reenter?", "options": {"A": "Windows Logo Key+X key", "B": "Windows Logo Key+L key", "C": "Windows Logo Key+Right arrow", "D": "Windows Logo Key+D key"}, "correct": ["B"], "explanation": "Use the Windows Logo key + L key simultaneously to lock the Windows desktop. Windows Logo key + X key brings up the Power Menu, which has shortcuts to many often-used tools. Windows Logo key + Right arrow will snap the active window to the right half of the screen, and Windows Logo key + the D key displays the desktop by minimizing all the other apps. These keyboard shortcuts work in both Windows 10 and Windows 11.", "notes": [], "multi": false}, {"qnum": 127, "stem": "Your employees have all been trained in end-user best practices, including locking their laptop when they walk away from it. What can be done to ensure that each employee’s laptop and its data will remain with the company and not fall into someone else’s hands? (Choose two.)", "options": {"A": "Use a cable equipment lock to secure the laptop to the desk.", "B": "Use MDM software to wipe the laptop remotely if stolen.", "C": "Place the laptop in a desk drawer when the employee walks away.", "D": "Ask a stranger to watch the laptop when they use the restroom at a coffee shop."}, "correct": ["A", "B"], "explanation": "A laptop cable lock is a type of equipment lock that uses a special slot on the laptop’s side and a very strong cable wrapped around something solid, like a desk, to secure the laptop to the work area. A key is used to free the laptop from the cable when you want to take it somewhere. Mobile device management (MDM) software can be used to wipe a laptop remotely if it is stolen. Placing a laptop in a desk drawer might get it out of sight, but it is still vulnerable, and you should never let a laptop out of your sight when you’re in a public place.", "notes": [], "multi": true}, {"qnum": 128, "stem": "You’re setting up authentication for new users of Windows 10 and Windows 11 desktop machines. Which of the following Windows logon methods require specific hardware? (Choose two.)", "options": {"A": "Username and password", "B": "PIN", "C": "Fingerprint identification", "D": "Facial recognition"}, "correct": ["C", "D"], "explanation": "Fingerprint scanners and facial recognition technology are both biometric logins and require a fingerprint reader and camera, respectively, as well as special software to interpret the input. Many laptops come equipped with this hardware, but not all. Both could be added to a laptop or desktop that is missing the hardware by connecting them via a universal serial bus (USB) port. A username and password can also be used, and a personal identification number (PIN) is used.", "notes": [], "multi": true}, {"qnum": 129, "stem": "You’re setting up new users on your network and have told them that they will need to change their user password the first time they log in, and that their password must meet complexity requirements. Which of the following is not true about password best practices?", "options": {"A": "Passwords minimum length is eight characters.", "B": "Longer passwords are better.", "C": "At least one of each of these should be used: upper- and lowercase letters, numbers, and special characters.", "D": "Passwords four characters long are okay if they are complex."}, "correct": ["D"], "explanation": "Passwords should be a bare minimum of eight characters long, and complexity should be required using at least one upper- and lowercase letter, number, and special character. If you must choose between a longer password or a more complex password, then longer is better. Four characters is definitely not long enough.", "notes": [], "multi": false}, {"qnum": 130, "stem": "You’ve just hired a new employee who will be working at a Windows workstation on your network. You’re helping the user understand what their password should be like. Which of the following are best practices for passwords? (Choose two.)", "options": {"A": "Password complexity is enforced.", "B": "Passwords should be easy to guess in case you forget, like your dog’s name.", "C": "Password expiration after 45 days", "D": "Password expiration after 180 days"}, "correct": ["A", "C"], "explanation": "Password complexity should be enforced. Passwords created by a user are better than randomly generated passwords, because the user can remember them easier without having to write them down. They should not, however, be something that is easy for someone else to guess, like their dog’s name or someone’s birthday. Passwords should expire after a reasonable time, making it more difficult for someone to use a compromised password. A length of 180 days (i.e., six months) is too long of a time between password expiration, but 45–90 days is more reasonable.", "notes": [], "multi": true}, {"qnum": 131, "stem": "Your company has a Windows domain managed by a Domain Controller. Following best practices, what feature of the Domain Controller is used to apply permissions to users?", "options": {"A": "Active Directory", "B": "User accounts", "C": "Security groups", "D": "Home folders"}, "correct": ["C"], "explanation": "A domain is a grouping of resources, including people, computers, servers, printers, and so on, into a single centrally controlled unit. The domain is managed by Active Directory software. One best practice is to group the users into security groups and then assign permissions to the security groups. Security group members will all have the access that was assigned to the group. Home folders provide a central place for the users’ documents, each with their own home folder on the server. This removes the documents from the local computer, consolidating security for those folders into one place.", "notes": [], "multi": false}, {"qnum": 132, "stem": "You’re examining password considerations such as length, complexity, and expiration for several Windows 11 Pro workstations. What utility can you use on the workstation to configure the password requirements?", "options": {"A": "Users Accounts in the Control Panel", "B": "Local Users and Groups", "C": "Administrative Tools", "D": "Local Security Policy"}, "correct": ["D"], "explanation": "Password policies such as history, password age, length, and complexity can be found by searching for and choosing Local Security Policy, then opening Password Policy. User Accounts in the Control Panel is for adding and managing users. You can set the password there, but not the password policies. Administrative Tools is available in Windows 10, but not Windows 11, where it was replaced with Windows Tools. Local Security Policy is in Pro editions of Windows 10 and 11 only, not Home editions.", "notes": [], "multi": false}, {"qnum": 133, "stem": "Which of the following is a protocol that facilitates communication between an identifica- tion provider and a service provider, such as a web application, by passing an electronic authentication token between them, enabling single sign-on?", "options": {"A": "SSO", "B": "SAML", "C": "PAM", "D": "IAM"}, "correct": ["B"], "explanation": "Security assertions markup language (SAML) is a protocol that passes an identity token between an identification provider (IdP) and a service provider (SP), enabling secure single sign-on (SSO). A one-time password (OTP) is often delivered via email or short message service (SMS) and is only valid for that session. This helps verify that the person requesting access is the person who previously entered their email or phone number into a system. Privileged access management (PAM) keeps track of any entity that has more than standard access to resources, whether the entity is human, application, or machine. Identity access management (IAM) is similar to PAM, except that it is for any entity, not just privileged entities. It provides a framework for monitoring identities and access using adaptive multifactor authentication (MFA).", "notes": [], "multi": false}, {"qnum": 134, "stem": "A computer user is setting up a new Windows 11 Home computer for the first time. They called you because they can’t figure out how to set it up with a local account. What will you tell them?", "options": {"A": "That option is not available. They must use a Microsoft account.", "B": "Press F10 during bootup to create a local account.", "C": "They must switch to the Pro edition if they want to use a local account after setup.", "D": "Local accounts are never available in Windows 11."}, "correct": ["A"], "explanation": "When setting up a Windows 11 Home PC for the first time, you are required to use a Microsoft account. The setup will allow you to create an account during setup. Pressing F10 does not change the type of account you need to set up Windows 11 Home. A local account can be used whether they have Windows 11 Home or Pro, but when setting up the Home version, it must be set up with a Microsoft account. It is possible to add a local account later and use it to log in to either Windows 11 Home or Pro.", "notes": [], "multi": false}, {"qnum": 135, "stem": "When using a Microsoft account to log in to your Windows 11 computer, which of the following is not true?", "options": {"A": "Your username is your email.", "B": "There are more recovery options if you use a Microsoft account rather than a local account to access your computer.", "C": "You won’t be able to use your computer if your Internet access is down.", "D": "You can access information stored on OneDrive from another computer if you log in with your Microsoft account."}, "correct": ["C"], "explanation": "You will be able to use your computer if you log in using your Microsoft account, even if the Internet is down. It will just use cached versions of files. All other options are true.", "notes": [], "multi": false}, {"qnum": 136, "stem": "Your friend wants to change the password for another user who has forgotten their password and is unable to log in to the PC. When they try to access User Accounts in the Control Panel, they are unable to access it. What will you tell them?", "options": {"A": "They need administrator access to change or create another user’s account, and their user account is only a Standard account.", "B": "They can change it in Local Users and Groups.", "C": "They need to use the command-line utility to change the user’s password.", "D": "They can’t change the password, but they can add a new username for the password and make the new user an administrator so they can access their data."}, "correct": ["A"], "explanation": "Administrators have access to everything in the system, but a Standard user account is limited in what they can do. They are not able to add or manage another user’s account, for example. Nor are they able to access another user’s files. Local Users and Groups is available in Pro or greater editions, but a Standard user still won’t be able to manage users there or with the command line.", "notes": [], "multi": false}, {"qnum": 137, "stem": "You are disposing of used hard drives, and a network administrator recommends performing a low-level format. What is the difference between a low-level format and a standard format?", "options": {"A": "Low-level formats are performed at the factory, and standard formats are performed using the format command.", "B": "Standard formats are performed at the factory, and low-level formats are performed using the format command.", "C": "A modern low-level format fills the entire drive with zeros, returning it to factory mode. A standard format creates the master file table (MFT) and root directory.", "D": "A standard format records the tracks and marks the start of each sector on each track. A low-level format creates the file allocation table and root directory."}, "correct": ["C"], "explanation": "What is known as a low-level format now (also called a Zero-fill) is drastically different than it was years ago. The intent is the same though, which is to erase all data on the hard drive so it’s not recoverable. Technically, the low-level format needs to happen first. Then the drive is partitioned, creating one or more sections, and a standard format is used to create the file allocation table and root directory.", "notes": [], "multi": false}, {"qnum": 138, "stem": "What three ways can a user sign on to a Windows system using the passwordless Windows Hello sign-on? (Choose three.)", "options": {"A": "Single device PIN", "B": "MFA", "C": "Fingerprint", "D": "Facial recognition"}, "correct": ["A", "C", "D"], "explanation": "Windows Hello is a passwordless way to sign on to a Windows workstation. Instead of a password, a user can enter a personal identification number (PIN) that is only valid for that one device or use biometrics—a fingerprint or facial recognition—to log in to their device. Multifactor authentication (MFA) is using more than one method to prove who you are.", "notes": [], "multi": true}, {"qnum": 139, "stem": "You work for a bank whose policy is to physically destroy, rather than recycle, hard drives that are no longer needed. Which of the following is not a physical destruction method for hard drives?", "options": {"A": "Incinerating", "B": "Drilling", "C": "Zero filling", "D": "Shredding"}, "correct": ["C"], "explanation": "Zero filling a drive will make data that was once on the drive unreadable, but it is not a physical destruction method. Methods of physical destruction include drilling, shredding, degaussing, and incinerating.", "notes": [], "multi": false}, {"qnum": 140, "stem": "A friend is getting overwhelmed with the number of website passwords they need to remember and has been writing them down. But the passwords aren’t very complex, and your friend has used the same ones on several sites. You offer to help them. What will you do?", "options": {"A": "Clear their browser cache.", "B": "Clear their browsing data.", "C": "Update their certificates.", "D": "Show them how to use their browser’s password manager."}, "correct": ["D"], "explanation": "A password manager is software that uses algorithms to generate secure passwords. The passwords are encrypted in the software manager. In a browser, the user typically only needs to remember their email or login password to gain access to the others. Most password managers will use two-factor authentication (2FA) to allow the user to log in and change any passwords. Websites that you access are stored in a cache on your computer so that the next time you visit the website, it will only download the changes and make websites load much more quickly. If a website you visit isn’t updating properly, clearing the cache should resolve the issue. Certificates are issued by a certificate authority and prove that the website (or person) is who they say they are. A browser might warn you or block your access to a website whose certificate is expired or invalid.", "notes": [], "multi": false}, {"qnum": 141, "stem": "You work for a company that is trying to be green. The company wants to repurpose its old PCs by giving them to a charitable organization rather than destroying or recycling them. What should you do before you give them away? (Choose two.)", "options": {"A": "Wipe all the drives.", "B": "Low-level-format the drives.", "C": "Standard-format the drives.", "D": "Delete all the PCs’ users and all their files and leave a generic Administrator account active."}, "correct": ["A", "B"], "explanation": "Before you give a computer to someone else, you will certainly want to remove all of your data from it by using a drive-wiping software. But to be sure everything is gone, zero-write (also called a low-level format) the drive to restore it to its factory default condition. This can often be accomplished with a utility provided by the computer manufacturer, or in Windows, by using options in the Windows Recovery Environment (WinRE), also known as the Recovery Console. A standard format creates the master file table (MFT) and root directory.", "notes": [], "multi": true}, {"qnum": 142, "stem": "You’re donating a Windows PC to a charity but first want to remove all your data and restore the PC’s OS to its original factory installation. You’ve booted into the Windows recovery environment (WinRE). What does Microsoft call the recovery option to reinstall the OS and delete all user files and data?", "options": {"A": "Refresh Your PC", "B": "Reset Your PC", "C": "Restore Your PC", "D": "Repair Your PC"}, "correct": ["B"], "explanation": "In the Windows Recovery Environment (WinRE), choose Troubleshoot, then Reset this PC. Choosing Reset this PC will give you two options. You can choose to keep your personal files but remove apps and settings or remove everything including your files and perform a fresh install. In this scenario, choose to remove everything. Refresh, restore, and repair do not have the option to reset the PC to factory default.", "notes": [], "multi": false}, {"qnum": 143, "stem": "You are setting up a Windows 11 Pro computer that will house data shared by several people. How will you establish security for this group?", "options": {"A": "Use the Local Users and Groups app to create groups such as Accounting, Office, and so on. Then set up permissions for each group on shared files. Add users to and remove them from the group as needed.", "B": "In the Control Panel, User Accounts, make all the users Administrators so they can do what they need.", "C": "Use the Local Users and Groups app to create groups such as Accounting, Office, and so on. Then set up permissions for each person on the shared files. Add users to the groups just for organizational purposes.", "D": "Groups are only used on servers, so set up each person with their specific NTFS permissions on the shared data folders."}, "correct": ["A"], "explanation": "Choice A, use the Local Users and Groups app to create groups, set up permissions for each group on shared files, then add users to the group as needed, is considered a best practice. By arranging security in this way, when someone changes jobs, leaves the company, or joins the company, all you need to do is remove the user from the group and/or add them to the group with the security access that they need. This process saves on human error, as there is just one place that security is set up (for the group) instead of establishing the settings for each individual user. Local Users and Groups is available in Pro or better versions of modern Windows Operating Systems (OSs).", "notes": [], "multi": false}, {"qnum": 144, "stem": "You’re providing system training to new employees, and they want to know where they should keep their passwords. What will you tell them? (Choose two.)", "options": {"A": "Passwords should be written on a sticky note and attached to the bottom of their keyboard.", "B": "Passwords will be saved in password manager software, and multifactor authentication is used for network access.", "C": "Passwords should be taped to the monitor where they can see them.", "D": "They need to memorize their password and not write it down."}, "correct": ["B", "D"], "explanation": "One of the best practices you can do to protect a network is to train employees on how to handle IT information and events. All too often, users place their passwords where they are easy for them to find, but they are also too easy for someone with malicious intent to find. Passwords need to meet complexity requirements but be simple enough for users to remember. Other tools for securing passwords are to use password management software and multifactor authentication (MFA). Windows Credential Manager and macOS Keychain are two utilities that can manage passwords for users. Credential Manager is not on the CompTIA A+ objectives, but Keychain is, as is using password managers.", "notes": [], "multi": true}, {"qnum": 145, "stem": "One of your suppliers called today to tell you that its customer database and purchase order system have been compromised, and your company is one of the few whose informa- tion has been tampered with. The supplier is providing you with new authentication information and suggests that you change the passwords you’re using to access its systems. What has happened here?", "options": {"A": "QR code phishing", "B": "Ransomware", "C": "Whaling", "D": "Supply chain/pipeline attack"}, "correct": ["D"], "explanation": "A supply chain/pipeline attack occurs when a malicious actor attempts to infiltrate a larger company by attacking one of their suppliers. QR code phishing happens when an unsuspecting person scans a QR code and visits a site that they think is legitimate, but it’s actually a phishing site intended to gather their personal information. Ransomware is software that holds your company’s network or information hostage in a logical way, such as encrypting your hard drive and refusing to give you the key until you pay a ransom. Whaling is phishing for a wealthy or influential target.", "notes": [], "multi": false}, {"qnum": 146, "stem": "Workers have been instructed to log off or lock their computers whenever they walk away from them, but as you walk around the company, you notice computers unlocked when no one is sitting there. Which of the following are the best ways to mitigate this problem? (Choose two.)", "options": {"A": "Fire people who won’t lock their computer.", "B": "Enforce screensaver locks after a short time of inactivity.", "C": "Train users on the importance of locking their PCs.", "D": "Enforce password complexity."}, "correct": ["B", "C"], "explanation": "Configuring all the computers to lock the screensaver after a short period of inactivity would help mitigate the problem. If a user was still at their desk but doing something else, they could easily enter their password and log in again. Training employees on network and data safety is always helpful. Firing them would be a very drastic measure, but depending on the environment, it might be the company’s policy. However, it won’t prevent someone from accessing a system. Enforcing password complexity should always be done, but it also won’t prevent someone from accessing a system that isn’t locked or logged off.", "notes": [], "multi": true}, {"qnum": 147, "stem": "Data encryption has been established for data that travels across the network, but you work in a secure environment and want to encrypt all the data on users’ storage drives, including laptop drives, to prevent dissemination of information if the drives are compromised or stolen. Which of the following would not be a good solution to encrypt this data-at-rest?", "options": {"A": "Use EFS and let the employee choose what to encrypt.", "B": "Use a third-party encryption solution.", "C": "Use MDM software.", "D": "Use BitLocker on desktop systems."}, "correct": ["A"], "explanation": "Data-at-rest is any data that is sitting on a drive or stored somewhere. It’s not moving between network locations but needs to be protected. Letting employees choose what to encrypt with encrypting file system (EFS) is not a good solution, because it opens too much possibility for human error. There are third-party companies that specialize in protecting data-at-rest. Other solutions are to use mobile device management (MDM) software. Using MDM, the IT administrator can enforce encryption on remote devices, even those owned by employees who are using their personal devices for company business. If the device is lost or stolen, company data can be wiped from it using MDM software. BitLocker is a solution for encrypting entire hard drives, but it requires Pro or higher editions of both Windows 10 and 11, and a trusted platform module (TPM) chip or module on the motherboard. BitLocker stores an encryption key in the TPM, and the TPM will only allow access to the key when the computer starts as expected.", "notes": [], "multi": false}, {"qnum": 148, "stem": "You have a new smartphone that can authorize a transaction by using your phone’s camera while you are simply looking at it. What is this technology called?", "options": {"A": "PIN code", "B": "Fingerprint scanner", "C": "Device encryption", "D": "Facial recognition"}, "correct": ["D"], "explanation": "Facial recognition and fingerprint readers are available on most smartphones and mobile devices. Facial recognition uses your cell phone’s camera, sensors, and a dot projector to make a 3D map of your face. Your phone then uses that 3D map to recognize you for future transactions. Personal identification number (PIN) codes are numbers that you enter to gain access. Fingerprint scanners require that you touch a spot repeatedly to configure the scanner so it will identify you. Once the device has a map of your fingerprint, you can use your finger to log in or authorize certain transactions. Device encryption is not a method of identifying the user.", "notes": [], "multi": false}, {"qnum": 149, "stem": "Which method of logging in to a mobile device may make it easy for someone to guess your password based on marks left by the oils in your skin?", "options": {"A": "Facial recognition", "B": "Fingerprint", "C": "Pattern", "D": "Swipe"}, "correct": ["C"], "explanation": "Some mobile devices allow the user to draw a pattern on the screen that is recognized by the device, then the user is allowed access. The problem with using this security device is that, because the pattern is repeatedly drawn on the screen, someone may see the oils left behind by your skin and be able to figure out the pattern that is drawn. Facial recognition uses the mobile device’s camera to make and store a 3D map of your face. To gain access to the device, the camera reads your face again and compares it to the stored image. Fingerprint readers compare your fingerprint to one stored on the device for access. With a swipe lock, the user merely swipes across the screen to unlock it.", "notes": [], "multi": false}, {"qnum": 150, "stem": "Which of the following is the least secure way to access a mobile device whose screen is locked?", "options": {"A": "Facial recognition", "B": "PIN code", "C": "Swipe", "D": "Pattern"}, "correct": ["C"], "explanation": "Most mobile devices will lock after a period of inactivity. For some, merely swiping across the device will unlock it. Because this can be done by anyone, it isn’t secure. Facial recognition is a biometric type of identification (i.e., something that you are), so it is quite secure depending on the software used to recognize the face. Personal identification number (PIN) codes and patterns are something that a user must know and although a hacker might figure them out, they’re still more secure than merely swiping across the device.", "notes": [], "multi": false}, {"qnum": 151, "stem": "You just installed a security camera that communicates on port 4150. The video camera is connected to your SOHO router. With the camera set up, you can view the video stream from your computer that is on the same SOHO router, but not remotely on your phone or another computer. What did you forget to do?", "options": {"A": "Configure port forwarding on the router", "B": "Close port 4150", "C": "Connect the camera to the router", "D": "Disable the firewall"}, "correct": ["A"], "explanation": "Because the camera communicates over port 4150, the port would need to be open and have port forwarding configured, so your remote connection can access the camera, through the router, using that port. You know that the camera is properly connected to the router because you can access the video stream on it from a computer connected to the same router. Disabling the firewall should not be done because the firewall is a vital part of your network’s security.", "notes": [], "multi": false}, {"qnum": 152, "stem": "You are installing a SOHO router and a wired network for a small office. The manager is concerned that employees will visit websites with objectionable material. Which feature should you look for in a router to help prevent such access?", "options": {"A": "Content filtering", "B": "Disabling ports", "C": "VPN access", "D": "Port forwarding/mapping"}, "correct": ["A"], "explanation": "Content filtering is the process of blocking objectionable content from either websites or email. Many routers and firewalls will provide content filtering services. In many cases, a reference service is used to block websites, and filters can be implemented to scan emails for prohibited content. Disabling ports stops traffic from entering the network; it does not filter for content. Virtual private network (VPN) access means that a user can access the network remotely just as if they were sitting in the office. Port forwarding/mapping is used when you need traffic on a particular port to go to a particular network device. It is often used for gaming and security cameras.", "notes": [], "multi": false}, {"qnum": 153, "stem": "Your office is in a building with several other companies. You want to configure the wireless network so that casual users in the building are not able to easily see your network name. What should you do to configure this?", "options": {"A": "Enable WPA3.", "B": "Enable MAC filtering.", "C": "Disable SSID broadcasts.", "D": "Reduce radio power levels."}, "correct": ["C"], "explanation": "One method of “protecting” the network that is often recommended is to turn off the service set identifier (SSID) broadcast. The SSID is the name of your network. The access point is still there and can still be accessed by those who know of it, but it prevents those who are looking at a list of available networks from finding it. This should be considered a weak form of security because there are still ways, albeit a bit more complicated, to discover the presence of the access point besides the SSID broadcast. Wi-Fi protected access 3 (WPA3) is the most recent secure Wi-Fi encryption standard; however, it has suffered password leaks. The vulnerabilities are expected to be mitigated with future updates. Media access control (MAC) filtering allows or denies access to the network based on the MAC address associated with a network interface card (NIC). Reducing radio power levels won’t send the network’s signal as far, but it won’t hide the network’s name from anyone within range.", "notes": [], "multi": false}, {"qnum": 154, "stem": "You’re changing some configuration settings on your SOHO router and notice that WPA3 is not available. What might you be able to do to resolve this issue?", "options": {"A": "Configure port forwarding.", "B": "Configure content filtering.", "C": "Update the SSID.", "D": "Update the router’s firmware."}, "correct": ["D"], "explanation": "Just like computers, routers occasionally need their software updated to add new features or correct security holes. On a router this is called a firmware update, because it is updating software that is embedded in chips on the router’s circuit board (i.e., the router’s firmware). Port forwarding will send traffic for a specified port number to a specified computer. Content filtering inspects packets for specified content and rejects or allows packets to enter or leave the network based on those criteria. The service set identifier (SSID) is the name of the network.", "notes": [], "multi": false}, {"qnum": 155, "stem": "Which of the following are very fast and very secure ways to access your mobile device? (Choose two.)", "options": {"A": "PIN code", "B": "Fingerprint", "C": "Swipe", "D": "Facial recognition"}, "correct": ["B", "D"], "explanation": "Facial recognition and fingerprint readers are available on most smartphones and mobile devices, and they can identify you faster than you can enter numbers on a screen. Facial recognition uses your smartphone’s camera, sensors, and a dot projector to make a 3D map of your face. The phone then uses that 3D map to recognize you for future transactions. Fingerprint readers can use capacitive, optical, or ultrasonic sensors, but regardless of the method, they make a map of your fingerprint and, like facial recognition, compare that map to your body. With either one, you can gain access to a device or authorize a transaction in about one second. PIN codes are a number that you enter to gain access. They can be entered quickly but can also be guessed, so they’re not as secure as biometrics (i.e., fingerprint scanning and facial recognition). Using a swipe to unlock a mobile device is fast, but not secure.", "notes": [], "multi": true}, {"qnum": 156, "stem": "In most browsers, where will you find the ability to enable or disable plug-ins/extensions and features?", "options": {"A": "Browser history", "B": "The browser’s website", "C": "The browser’s settings", "D": "Windows Settings"}, "correct": ["C"], "explanation": "Most often enabling and disabling features can be found in the browser settings, although the exact path depends on the browser being used. For example, in the Opera browser, extensions can be found on the toolbar. Your browser history keeps track of where you’ve been on the Internet. The browser’s website might tell you how to enable and disable features, but isn’t where you would configure them, neither is Windows Settings.", "notes": [], "multi": false}, {"qnum": 157, "stem": "What method of securing a mobile device requires entering a series of numbers?", "options": {"A": "PIN code", "B": "Fingerprint", "C": "Pattern", "D": "Facial recognition"}, "correct": ["A"], "explanation": "A personal identification number (PIN) code is a number that you enter to gain access to a mobile device. Fingerprint scanners and facial recognition systems are biometrics, meaning that they use a part of your body to identify you. Once a 3D map of your face or fingerprint is made, that map is compared to the new one generated when you touch the screen or look into the camera. If they match, access is granted. Drawing a pattern on the device’s screen is also sometimes used.", "notes": [], "multi": false}, {"qnum": 158, "stem": "Your company has a policy that allows you to use your personal smartphone for company work because it will save the company money and is convenient for you. The IT manager installed some company software on it, and now you can’t get into your favorite fantasy football gambling site. What has happened?", "options": {"A": "Remote wipe", "B": "Content filtering", "C": "Application updates", "D": "Malware attack"}, "correct": ["B"], "explanation": "Although your first instinct might be to think you’re the victim of a malware attack, it’s most likely that your company made you sign a mobile device management (MDM) policy or bring your own device (BYOD) policy that says they can install content filtering software on your device. Content filtering is used to block any incoming or outgoing traffic that may be dangerous, sensitive, or inappropriate. It’s likely that the policy also says that they can remotely wipe their data and applications from your device if you leave the company. Application updates are one of the many actions you should take to protect/harden a system, and a malware attack is unwanted software that invades your system and harms you in some way.", "notes": [], "multi": false}, {"qnum": 159, "stem": "You own a small company with a SOHO router and a web server that is used to sell your products. You don’t want the IP address of your web server to change, so you’ve paid the ISP for a specific IP address that is yours and will not change. What would you configure on your router for your ISP connection?", "options": {"A": "Dynamic WAN IP", "B": "Static WAN IP", "C": "UPnP", "D": "Screened subnet"}, "correct": ["B"], "explanation": "On your router, you would configure a static wide area network (WAN) Internet provider (IP) address. That is the address that the Internet service provider (ISP) has assigned to you. Usually the ISP uses dynamic addressing, and your WAN setting would be Dynamic WAN IP, so having a static WAN IP generally involves higher fees paid to the ISP. Universal plug and play (UPnP) is a protocol that lets devices find and communicate with each other on your local area network (LAN), such as your laptop and printer. Unfortunately, UPnP could also be used by malware to spread to other devices on your network. A screened subnet uses one or more routers to create a separate area on a network where servers, such as a web server, can be accessed either from inside the LAN or from the Internet. It provides greater security and protects the LAN.", "notes": [], "multi": false}, {"qnum": 160, "stem": "What is the protocol that allows devices on your LAN, such as your laptop and printer, to find each other?", "options": {"A": "WPA3", "B": "WPA2", "C": "PIN", "D": "UPnP"}, "correct": ["D"], "explanation": "Universal plug and play (UPnP) is a protocol that lets devices find and communicate with each other on your local area network (LAN) such as your laptop and your printer. Unfortunately, UPnP could also be used by malware to spread to other devices on your network. Wi-Fi protected access version 3(WPA3) and Wi-Fi protected access version 2 (WPA2) are wireless networking encryption protocols. A personal identification number (PIN) is used to authenticate to a computer system.", "notes": [], "multi": false}, {"qnum": 161, "stem": "You are configuring a new SOHO router that replaced a failed one. Your network has a mixture of devices purchased several years ago and newer ones purchased in 2025. Which of the following encryption options should you choose?", "options": {"A": "WPA3", "B": "WPA2", "C": "WPA2/WPA3", "D": "WEP"}, "correct": ["C"], "explanation": "Wi-Fi protected access version 3 (WPA3) is the newest and most secure wireless encryption protocol for your small office/home office (SOHO) router; however, the devices that you’ve had for a few years might not be able to work with it. For the time being, until those legacy devices can be replaced, it’s best to use the WPA2/WPA3 mixed mode so that all your devices can connect to the network as securely as possible. Wired equivalent privacy (WEP) and Wi-Fi protected access (WPA) should no longer be used, as they are not secure. WEP and WPA are not listed in the CompTIA A+ exam objectives, but WPA2 and WPA3 are. A better alternative than mixed mode, if possible, is to put the older devices on their own network using WPA2 until they can be replaced and the devices that support WPA3 on a network with only WPA3 to protect that part of the network at a higher level.", "notes": [], "multi": false}, {"qnum": 162, "stem": "You perform very confidential work as a government contractor, and you work from home. Your contract specifies that the only external computers your computer can communicate with are the government computers involved in the project. What can you configure on your router to block all other computers from communicating with your network?", "options": {"A": "IP address filtering", "B": "Untrusted sources", "C": "Hashing", "D": "Port filtering"}, "correct": ["A"], "explanation": "Configuring IP filtering enables you to set which IP addresses are allowed to communicate through your router and which are not. Untrusted sources are websites that your browser has deemed suspicious or dangerous, and it warns you of such. Hashing is the act of translating a character string into code. Port filtering is a way of allowing or denying access to a network based on the port number in the packet. Filtering router traffic by port is also an excellent security practice.", "notes": [], "multi": false}, {"qnum": 163, "stem": "Your company has decided to allow users to use their own devices for company business. This decision will save the company money on hardware. To use their personal devices, the company will require that employees sign an agreement. What would this agreement be called?", "options": {"A": "BYOD policy", "B": "MDM policy", "C": "Cell phone policy", "D": "Remote work policy"}, "correct": ["A"], "explanation": "A company may have many policies and procedures that employees must agree to as a condition of employment. The bring your own device (BYOD) policy describes the conditions for an employee using their own device for company business. This policy likely includes that the company will use mobile device management (MDM) software to secure the company information on the user’s device. Companies may have many other policies like cell phone policies and remote work policies, but those are not the name given for using your own device for work.", "notes": [], "multi": false}, {"qnum": 164, "stem": "Your iPhone requires a passcode to unlock it. Because of recent phone thefts around your office, you want to set your phone so that all data is destroyed if incorrect passcodes are entered 10 times in a row. Which feature allows you to do this?", "options": {"A": "Failed login attempts restrictions", "B": "Screen locks", "C": "Remote wipes", "D": "Locator applications"}, "correct": ["A"], "explanation": "Failed log-in attempt restrictions will destroy all local data on the phone if incorrect passcodes are entered ten times in a row. While this is recommended for users with phones that contain sensitive data and that are frequently taken into public venues or placed in compromising positions, the casual user should not turn on this feature unless they can be sure there will always be a recent backup available. Screen locks require authentication to access the device. Remote wipes enable a user to wipe their data when a device is lost or stolen. Locator applications can help you (or police) find your phone.", "notes": [], "multi": false}, {"qnum": 165, "stem": "You own a small company with a SOHO router and a web server that is used to sell your products. You are concerned about the security of your LAN, so your IT consultant is going to set up a two-router system like the one shown in the graphic, to protect your LAN from web server traffic. What is this arrangement called?", "options": {"A": "Dynamic WAN IP", "B": "Static WAN IP", "C": "UPnP", "D": "Screened subnet Internet Web server LAN Router Router"}, "correct": ["D"], "explanation": "A screened subnet uses two or more routers with packet filtering to create a separate area on a network where servers, such as a web server, can be accessed from either inside the local area network (LAN) or from the Internet. This arrangement provides greater security and protects the LAN from network traffic. A static wide area network internet protocol (WAN IP) is one that doesn’t change and needs to be configured on your router. Universal plug and play (UPnP) is a protocol that lets devices find and communicate with each other on your local area network (LAN), such as your laptop and your printer. Unfortunately, UPnP could also be used by malware to spread to other devices on your network. A WAN IP is the IP address a company gets from the internet service provider (ISP), and it can be dynamic (i.e., it changes) or static (i.e., it doesn’t).", "notes": [], "multi": false}, {"qnum": 166, "stem": "You turned your back for a minute in the coffee shop, and your mobile device is now missing. Which one of the following is not a way to achieve a remote wipe on a mobile device?", "options": {"A": "Exceeding failed login attempts restrictions", "B": "Using Google Find My Device or the Apple Find My app", "C": "Using MDM software", "D": "Disabling guest access"}, "correct": ["D"], "explanation": "Exactly how to wipe your device depends on the device. If you have configured failed log-in restrictions on your device, then after the prescribed number of failed attempts, the device will either lock or, in the case of an iOS device, ten failed tries will cause the device to be erased. For Android devices, you can use Google Find My Device to remotely wipe it, and for iOS devices, you can use the Find My app using a different iOS device. Mobile device management (MDM) software can also be used to wipe Apple, Android, or Windows devices. Disabling guest access is a good security practice, but it won’t wipe the device’s data.", "notes": [], "multi": false}, {"qnum": 167, "stem": "You are setting up a router and network for a SOHO business. The router has wired and wireless connections. Which of the following is not a method for configuring secure management access or a secure location for the router?", "options": {"A": "Place the router in the kitchen area for easy access.", "B": "Disable any guest accounts on the network. If guests need access, set up a separate VPN for them.", "C": "Restrict IP addresses that can manage the router.", "D": "Place the router in an area that can be locked."}, "correct": ["A"], "explanation": "A kitchen is one of the worst places for a router to be. First, there will be electromagnetic interference (EMI) from appliances like refrigerators and microwaves, which will interfere with the wireless signal, and if they’re too close to the router or wires, they could interfere with the wired signal too. Second, having easy access to the router might be good for the IT person, but it’s a terrible idea for security. For physical security, place the router in a room or an enclosure that can be locked and out of reach of passersby. Any guest access or guest accounts should be disabled. If your company needs to have Wi-Fi available for visitors, place it on a separate virtual local area network (VLAN), so that your network isn’t exposed to those connections. IP addresses that are able to log in to the router should be restricted. Other things you can do to secure a router are to obviously change the router’s default service set identifier (SSID), username, and password, and if possible, use access control lists to limit access in addition to ensuring you keep firmware updated to protect against malware attacks. For Wi-Fi routers, take a walk around with a Wi-Fi meter and ensure that the signal doesn’t extend into areas where it should not be. If it extends too far, you might need to turn the power down or possibly move the router.", "notes": [], "multi": false}, {"qnum": 168, "stem": "You’re setting up a new wireless router for your company. Which of the following security settings should you not do?", "options": {"A": "Ensure that encryption is enabled (WPA2/WPA3).", "B": "Create a VLAN for guest users.", "C": "Turn your wireless signal power to maximum to decrease interference.", "D": "Update the router’s firmware."}, "correct": ["C"], "explanation": "Turning your signal power to maximum would likely increase interference if there were nearby Wi-Fi networks, and it won’t enhance security. You do need to ensure that the appropriate encryption scheme is enabled. If you expect to have guest users, create a virtual local area network (VLAN) for them and use it to restrict access. In addition, it’s important to update the router’s firmware to protect against any new malware.", "notes": [], "multi": false}, {"qnum": 169, "stem": "A user needs to download a new video card driver for their HP laptop. They find the driver on the HP support website and ask you if they can download it. The HP site is an example of what?", "options": {"A": "Part of an access control list", "B": "An authenticator website", "C": "A trusted source", "D": "An untrusted source"}, "correct": ["C"], "explanation": "Trusted software sources are sources that you know and work with all the time (e.g., Microsoft, HP, or other manufacturers’ websites), and there are untrusted sources; you should differentiate between them. Don’t use or let your users use untrusted software sources. Generally, common sense can be your guide, but there are “safe lists” of trusted software vendors from authoritative watchdog companies like Comodo. Access control lists (ACLs) define who can have access to a resource. The question does not describe an authenticator website.", "notes": [], "multi": false}, {"qnum": 170, "stem": "You’re explaining browser synchronization to a coworker. Which of the following are true about synchronizing browser data? (Choose three.)", "options": {"A": "You must be logged in to devices so they will synchronize.", "B": "You can disable or enable synchronization on individual devices.", "C": "Synchronization happens in the background.", "D": "You can’t synchronize between Windows devices and Apple devices."}, "correct": ["A", "B", "C"], "explanation": "You must be logged in to your browser for it to synchronize with other devices. You can enable or disable synchronize on one or more devices, if you don’t want a certain device to synchronize. Synchronization usually happens in the background. Because we’re talking about browser synchronization, you can synchronize between Windows and Apple devices. Browser synchronization depends on the browser, not the operating system (OS).", "notes": [], "multi": true}, {"qnum": 171, "stem": "You receive an email from an overseas bank notifying you that a relative has left you a generous inheritance. You need to respond with your bank routing information so the bank can electroni- cally transfer the funds directly to your account. What is this most likely an example of?", "options": {"A": "Phishing", "B": "Ransomware", "C": "Spoofing", "D": "Whaling"}, "correct": ["A"], "explanation": "Social engineering is a process in which an attacker attempts to acquire information about you, your network, and your system by social means, such as talking to people in your organization. A social engineering attack can occur over the phone, by email, or in person. When an attempt is made through email or instant messaging, it is known as phishing or smishing, respectively, and is often made to look as if a message is coming from sites where users are likely to have accounts (e.g., banks, eBay, and PayPal are popular). Ransomware is software that holds your computer hostage in a logical way, such as encrypting your hard drive and refusing to give you the key until you pay a ransom. Spoofing is when someone or something pretends to be something else, such as an attacker’s server using a familiar look and feel of a website, even a similar IP. Whaling is phishing for a wealthy or influential target.", "notes": [], "multi": false}, {"qnum": 172, "stem": "Which of the following are methods to keep your mobile device safe? (Choose three.)", "options": {"A": "Use a swipe to unlock a mobile device.", "B": "Accept and install OS updates as soon as possible.", "C": "Install antivirus/anti-malware software.", "D": "Use a remote backup application to safeguard your data in the event that you must wipe your phone."}, "correct": ["B", "C", "D"], "explanation": "Using a swipe to unlock a mobile device does not protect your device or your data. At the very least, using a personal identification number (PIN) is far safer than using a swipe to unlock a mobile device. Keeping operating systems (OSs) up to date to plug any vulnerabilities is especially important. All devices should have some form of antivirus, even if it is one that is built into the OS. Make sure that you are using a remote backup application to ensure that if your mobile device is lost or stolen and you must remotely wipe all the data, you will be able to download it to a new device.", "notes": [], "multi": true}, {"qnum": 173, "stem": "A coworker has been having some trouble with their browser being slow and some often-used web pages that won’t load. You tell them to clear their browser’s data. Which data should they clear? (Choose two.)", "options": {"A": "Their browser cache", "B": "Tracking and cookies", "C": "History", "D": "Passwords"}, "correct": ["A", "B"], "explanation": "Cached files are parts of the web page that have been downloaded to make subsequent website page loading faster. Cookies store information, like your username, shopping cart, or first name, that a website uses to personalize your experience. Both cached files and cookies can cause conflicts with websites and can slow down your browser if too much is stored. Your history is a record of where you have been. Deleting it protects your privacy. Clearing passwords will not make the pages load faster, but passwords should be stored in a separate password manager for better security.", "notes": [], "multi": true}, {"qnum": 174, "stem": "You’re visiting your mother-in-law and need to use her computer. The idea of her knowing what websites you use for work makes you uncomfortable. How can you ensure that she will not know what websites you’ve visited while there?", "options": {"A": "Enable private browsing mode.", "B": "Update the certificates.", "C": "Change the computer’s date to a different one, and then set it back when you’re done.", "D": "Use a proxy browser."}, "correct": ["A"], "explanation": "The best solution is to enable private browsing mode. You might be thinking that you could simply clear the browser’s history, but that would clear her history too, which she might not want you to do. Certificates are issued by a certificate authority and prove that the website (or person) is who they say they are. Certificates are updated by the website owners, not you. Changing the date might cause websites to give you certificate warnings and keep them from opening for you. It also won’t keep the computer from recording the browsing history. Proxy browsers are similar to the network address translation (NAT) feature found in routers. A proxy browser will hide your actual IP address to protect information about your location or even personal information from being captured by someone else. A proxy browser will still store your browsing history, and you would need to have it installed on the computer to use it.", "notes": [], "multi": false}, {"qnum": 175, "stem": "A user is complaining that so many ads are popping up on their screen when they’re doing Internet research that they can’t get their work done. What can you configure in their browser to mitigate this problem?", "options": {"A": "Private-browsing mode", "B": "Pop-up blocker", "C": "Password manager", "D": "Certificates"}, "correct": ["B"], "explanation": "Pop-up blockers are available in virtually every browser to stop those annoying ads from overtaking your screen. Look in the browser’s settings for this option. Private-browsing mode, or incognito mode, stops the browser from saving your browsing history or cookies and keeps your activities from being seen by others on the same Wi-Fi, or later by another user of the device. Password managers provide a single login for you and are able to generate unique and complex passwords for all the websites that you browse. Certificates are digital identifications for a website. They are not involved in pop-ups.", "notes": [], "multi": false}, {"qnum": 176, "stem": "You work as a contractor for a government entity that requires proof of data destruction when decommissioning old hard drives and computers. What is the best way to do this?", "options": {"A": "Hire a third-party vendor to do the destruction and provide a certificate of destruction and recycling.", "B": "Have the recycling center give you a receipt for the drives.", "C": "Destroy them within your company, and show pictures of the destroyed drives to the government entity.", "D": "Zero-write all the drives."}, "correct": ["A"], "explanation": "Data destruction contractors (who are third-party vendors) can be certified by groups such as National Association for Information Destruction (NAID) or can show that they follow government rules (e.g., Health Insurance Portability and Accountability Act [HIPAA] in the United States) for data destruction. They can provide proof of destruction, which would be difficult to do on your own. Once you drop a drive off at a recycling center, you have no idea where that drive or its data might end up. While you could destroy the data on your own either physically or logically, it would be better in this case to have a third-party vendor certify the data destruction.", "notes": [], "multi": false}, {"qnum": 177, "stem": "Which of the following is a physical security measure that will trigger an alarm of some sort when it detects anything moving within its observation area?", "options": {"A": "Lighting", "B": "Equipment locks", "C": "Motion sensors", "D": "Authenticator application"}, "correct": ["C"], "explanation": "Motion sensors are commonly used to trigger alarms that will turn on lights or otherwise warn of an intruder or something moving. Lighting and equipment locks are also physical security measures. An authenticator application, a type of soft token used for multifactor authentication (MFA), is a logical, rather than a physical, security measure.", "notes": [], "multi": false}, {"qnum": 178, "stem": "Which of the following types of physical security is used to lock, unlock, and start vehicles and lock or unlock building and room doors?", "options": {"A": "Lighting", "B": "Equipment locks", "C": "Motion sensors", "D": "Mobile digital keys"}, "correct": ["D"], "explanation": "A mobile digital key is contained in a smartphone’s wallet and is available on many newer vehicles to lock and unlock doors and start vehicles. They can also be used to lock and unlock buildings and rooms. Lighting can discourage access by making intruders more visible. Equipment locks are placed on servers and laptops to discourage stealing data or equipment, and motion sensors trigger lights or other alarms/deterrents.", "notes": [], "multi": false}, {"qnum": 179, "stem": "You have identified sensitive information in your company that needs to be monitored, whether it’s being stored, accessed, or moved. What solution will you employ?", "options": {"A": "Firewall", "B": "VPN", "C": "Group policy", "D": "DLP"}, "correct": ["D"], "explanation": "Data loss prevention (DLP) is the process of identifying and monitoring sensitive data to ensure it’s only accessed by authorized persons and doesn’t leave the company, whether it is on a server, in the cloud, or on an endpoint device. DLP can help ensure that a company is in compliance with government regulations regarding sensitive data. A firewall can be configured to block certain types of traffic based on things like IP address, protocol, or MAC address. A virtual private network (VPN) is a secure path between a local and remote device. In a Windows domain, password policies can be configured at the domain level using group policy objects (GPOs). There are hundreds of variables that can be configured. Variables that can be configured relating to passwords include password complexity and length, and the time between allowed changes to passwords.", "notes": [], "multi": false}, {"qnum": 180, "stem": "Which of the following manages identities and their access to resources using adaptive MFA?", "options": {"A": "SSO", "B": "SAML", "C": "PAM", "D": "IAM"}, "correct": ["D"], "explanation": "Identity access management (IAM) provides a framework for monitoring identities and access using adaptive multifactor authentication (MFA). Adaptive MFA changes the factor required based on the situation. For example, logging in from an unexpected location would require a different authentication factor than logging in from an expected location. Single sign-on (SSO) enables a user to enter their identification and authentication one time to access multiple services or applications. SSO is supported by security assertions markup language (SAML), which is a protocol that passes an identity token between an identification provider (IdP) and a service provider (SP), enabling secure SSO. Privileged access management (PAM) keeps track of any entity that has more than standard access to resources, whether human, application, or machine. Identity access management (IAM) is similar to PAM, except that it is for any entity, not just privileged entities. It provides a framework for monitoring identities and access using adaptive MFA.", "notes": [], "multi": false}, {"qnum": 181, "stem": "You believe your computer has contracted a boot sector virus. Which command-line tool permits someone to make changes to the operating system without having to boot up Windows?", "options": {"A": "WinRE (also known as the recovery console)", "B": "RADIUS", "C": "Administrative Tools", "D": "Active Directory"}, "correct": ["A"], "explanation": "The Windows Recovery Environment (WinRE), also known as the recovery console, in Windows 10 and 11 provides a command-line tool (among other tools) that allows the administrator to copy or remove directories, enable or disable services, write a new Master Boot Record (MBR), format volumes, and much more. If you have a virus that has infected the drive’s boot sector, the only way to access the system before the boot sector virus loads is to boot to another drive, either a DVD or USB that contains either the Windows installation media or bootable antivirus. Using the installation media is one way to enter the WinRE. Typically, the system will automatically enter the WinRE if booting into Windows has failed three times in a row. You can force this to happen by turning the power off as soon as Windows starts to load and repeating that until the system boots into WinRE. From the recovery environment’s main screen, choose Troubleshoot, then Advanced Options, and finally Command Prompt to get to the command prompt. Here you can enter commands or run antivirus software to remove a boot sector virus on the other hard drive. Remote authentication dial-in user service (RADIUS) is an authentication encryption protocol. Administrative tools can be found in the Control Panel of Windows 10 and is a collection of commonly used tools. Administrative tools is renamed Windows Tools in Windows 11. Active Directory is the database and software used to control and manage a Windows domain.", "notes": [], "multi": false}, {"qnum": 182, "stem": "Your company allows you to use your personal smartphone for company work, because it will save the company money on hardware. You gave a week’s notice that you’re accepting a job with a different company, and suddenly your productivity applications are missing, along with your company files. What has happened?", "options": {"A": "Remote wipe", "B": "Content filtering", "C": "Application updates", "D": "Malware attack"}, "correct": ["A"], "explanation": "Although your first instinct might be to think you’re the victim of a malware attack, it’s most likely that your company made you sign a mobile device management (MDM) policy or bring your own device (BYOD) policy that says they will remotely wipe any company files on your device if you leave the company. Content filtering is used to block any incoming or outgoing traffic that may be dangerous, sensitive, or inappropriate. Application updates are one of the many actions you should take to protect/harden a system, and a malware attack is unwanted software that invades your system with the intent of harming you in some way.", "notes": [], "multi": false}, {"qnum": 183, "stem": "Which of the following are important methods of patch management on mobile devices? (Choose two.)", "options": {"A": "Application updates", "B": "Content filtering", "C": "Screen locks", "D": "OS updates"}, "correct": ["A", "D"], "explanation": "Each option is a part of mobile device security, but application updates and operating system (OS) updates are the necessary actions for patch management. Content filtering blocks undesirable or dangerous sites on a corporate network, and screen locks keep people from accessing your computer.", "notes": [], "multi": true}, {"qnum": 184, "stem": "Your friend wants to know what Secure DNS is, so you’re attempting to explain it to them. Which of the following is not true?", "options": {"A": "It’s encrypted DNS information that uses HTTPS.", "B": "It’s probably on by default on their browser.", "C": "It’s only available in corporate versions of browsers.", "D": "It protects your information in transit between you and a website."}, "correct": ["C"], "explanation": "Secure Domain Name System (DNS)\\Domain Name System (DNS) over hypertext transfer protocol secure (HTTPS) is probably enabled on your browser right now. It’s not just a corporate setting. It protects your IP address and sign-in information, while DNS is translating the human-friendly website name that you type into an IP address. You might need to configure it in your browser; usually it’s found in Settings. For example, in Google Chrome, click on the three stacked dots next to your user icon, scroll down and choose Settings, then Privacy and Security. Then click on Security and scroll down to find the Advanced settings, which includes DNS settings.", "notes": [], "multi": false}, {"qnum": 185, "stem": "What login OS option typically requires a domain and uses Kerberos?", "options": {"A": "PIN", "B": "SSO", "C": "Facial recognition", "D": "Username/password"}, "correct": ["B"], "explanation": "Single sign-on (SSO) enables users to enter their username and password one time to access multiple systems. It typically requires the Kerberos authentication protocol and a domain to implement it, although there are also third-party and cloud solutions. Kerberos uses keys to keep users’ passwords hidden as they traverse the network or Internet. A personal identification number (PIN) is a series of numbers known only to the person logging in. Facial recognition software compares the face presented with a stored image, using measurements like the width of the nose or the distance between eyes, to determine whether to grant access. Usernames and passwords provide identification and attempt authentication, respectively.", "notes": [], "multi": false}, {"qnum": 186, "stem": "You right-click a folder in Microsoft Windows, choose Properties, and click the Security tab. What are you now looking at?", "options": {"A": "Path", "B": "Content filtering", "C": "ACL", "D": "UAC"}, "correct": ["C"], "explanation": "An access control list (ACL) can be viewed by right-clicking, choosing Properties, and then clicking the Security tab on a file or folder in a New Technology File System (NTFS) environment. The ACL provides a list of users or groups that have been assigned NTFS permissions for the chosen object. The path can be viewed on the shortcut tab. Content filtering allows or denies network packets based on specified criteria and is set up in a router or network security device. User account control (UAC) is the box that pops up when a user tries to access a restricted resource. It requires entering an administrator password to continue.", "notes": [], "multi": false}, {"qnum": 187, "stem": "Where is folder redirection configured in Active Directory?", "options": {"A": "Home folder", "B": "Group policy", "C": "OU", "D": "VPN"}, "correct": ["B"], "explanation": "Folder redirection requires a shared folder on the server and is configured in the Active Directory group policy. The group policy is then applied to the appropriate organizational unit (OU). Folder redirection allows users’ profile folders to be stored in a more centralized location on the network, rather than on the user’s local device. A profile stored this way is called a roaming profile. The home folder is the specific location where a user’s documents and such are stored, such as \\\\%servername%\\home\\%username%, then usually mapped to drive H:%username%, making it simple for end users. An OU is a management tool that can be used to organize Active Directory resources and can contain users, comput- ers, and other resources. A virtual private network (VPN) is created across a public network by using strong encryption protocols.", "notes": [], "multi": false}, {"qnum": 188, "stem": "You perform very confidential work as a government contractor, and you work from home. You use a browser interface to perform some of your work. What can be configured in a browser to ensure that the data you receive is not altered between a web server and you?", "options": {"A": "IP address filtering", "B": "Trusted sources", "C": "Hashing", "D": "Port filtering"}, "correct": ["C"], "explanation": "Hashing is an algorithm that is computed on the sender and receiver to ensure that data is not intercepted and changed. Using trusted sources to download drivers or software, IP address filtering, and port filtering are all important security concepts, but filtering is generally done on a router or firewall.", "notes": [], "multi": false}, {"qnum": 189, "stem": "A few users have been accessing material on restricted websites via your company’s network. What type of server can you install to block content from a list of prohibited websites?", "options": {"A": "DNS server", "B": "Authentication server", "C": "Proxy server", "D": "Web server"}, "correct": ["C"], "explanation": "A proxy server makes requests for resources on behalf of a client. Proxy servers are known for three things. One, the proxy server can cache the information requested, speeding up subsequent searches. Two, the proxy can act as a
