person on its own or in context with other information. This includes someone’s full name, address, and other contact information; the names of family members; and other details that people would consider private. A first name is considered to be generally common enough that it is not PII. A first name, if not common, would be PII.", "notes": [], "multi": false}, {"qnum": 40, "stem": "You are training mobile users on potential security risks. Which of the following could make users more susceptible to an on-path attack?", "options": {"A": "Unintended Wi-Fi connection", "B": "Unauthorized account access", "C": "Unauthorized location tracking", "D": "Unauthorized camera activation"}, "correct": ["A"], "explanation": "No unintended or unauthorized event is a good thing for mobile users. The one that leaves a user most susceptible to an on-path attack is an unintended Wi-Fi connection. This is because the device at the other end that the user is connecting to could be intercepting data or storing it for a possible attack later.", "notes": [], "multi": false}, {"qnum": 41, "stem": "The network you manage has a dozen Windows workstations. You want to ensure that users do not have the ability to change the boot order, so that they can’t boot to an unauthorized device. Which step should you take?", "options": {"A": "Disable AutoRun.", "B": "Restrict user permissions.", "C": "Set a BIOS/UEFI password.", "D": "Enable a strong password policy."}, "correct": ["C"], "explanation": "The way to protect against this is to implement a basic input output system/unified extensible firmware interface (BIOS/UEFI) password. If a user can get into the BIOS/UEFI settings, they can change the boot sequence, boot to an unauthorized device, and then do some damage to the system. A strong Windows password will help protect Windows but does not protect the computer hardware or information before Windows loads. AutoRun is a feature of Windows and does not affect the boot process. If enabled, AutoRun will initiate any program, even if its malware, found in an autorun.inf file on any media that is inserted. User permissions limit what a user can do on a computer system.", "notes": [], "multi": false}, {"qnum": 42, "stem": "A user needs to travel for a presentation and wants to be sure their laptop does not run using battery power. However, they also want to leave their files and applications running so that when they turn it back on, the applications are already open. Which of the following statements is true?", "options": {"A": "The user will be unable to do this.", "B": "The user should put their computer into standby mode.", "C": "The user needs to activate the sleep power plan.", "D": "The user should have their computer hibernate."}, "correct": ["D"], "explanation": "In Hibernate mode, the computer saves all the contents of memory to the hard drive, preserves all data and applications exactly where they are, and allows the computer to power off completely. When the system comes out of hibernation, it returns to its previous state. Sleep continues to use a small trickle of power until there is none left, then will go into Hibernate mode. Windows 10–11 support a feature called Modern Standby. Modern Standby must also be supported by the hardware. It is not the right answer because it also uses a small amount of power. With Modern Standby, the system will wake from the lowest power to allow short bursts (i.e., milliseconds) of software execution as the system needs them. The system uses just enough power to process background tasks but still preserve battery life. The result is that when in sleep mode, a computer can stay connected to a local area network (LAN) and reacts much like a smartphone with instant on/instant off ability.", "notes": [], "multi": false}, {"qnum": 43, "stem": "A user calls the Help Desk and tells you that when they type Wiley.com, the browser goes to a site that looks similar but has a strange name at the top. What’s happening to this user? (Choose two.)", "options": {"A": "Browser redirection", "B": "Malware infection", "C": "Desktop alert", "D": "Browser update failure"}, "correct": ["A", "B"], "explanation": "Browser redirection is a symptom of a malware attack that has changed settings in the browser. Run anti-malware software and if necessary, change settings in the browser. Desktop alerts provide helpful notices, such as operating system (OS) updates that are needed, dangerous weather alerts, Amber (missing child) alerts, or other events. A browser update failure will either notify you or manifest as different issues.", "notes": [], "multi": true}, {"qnum": 44, "stem": "You have a Windows Pro workstation installed in a workgroup. There is no centralized security. Which tool should you use to help protect yourself against malicious network attacks?", "options": {"A": "Software firewall", "B": "NTFS Permissions", "C": "Local Security Policy", "D": "Computer Management"}, "correct": ["A"], "explanation": "Windows 10–11 both incorporate a software firewall called Windows Defender Firewall with Advanced Security, which can be used to stop incoming and outgoing network traffic. Traffic is allowed or denied according to specific rules that are part of an access control list (ACL). By default, Windows Defender Firewall blocks incoming traffic. By creating exceptions, you can configure what incoming traffic you want to allow through. New Technology File System (NTFS) permissions are used to configure user access to files, folders, and volumes. Local Security Policy is used to configure items such as password policy and account lockout policies. Computer Management is a Microsoft Management Console and has several frequently used tools.", "notes": [], "multi": false}, {"qnum": 45, "stem": "You are working on a client’s desktop computer, and the video card is dead. You can get a warranty replacement, but it will take three days to arrive. Or you can replace it with a more expensive card today, but the customer would need to pay the cost difference. Which of the following is the best way for you to continue the service call?", "options": {"A": "Tell the customer that the video card is dead. It will take three days for the video card to arrive, and you will return then to replace it.", "B": "Tell the customer that the video card is dead. It will take three days for a warranty replacement to arrive (at no cost), or you can replace it with an upgraded model today if they want to pay the difference in cost.", "C": "Tell the customer that the video card is dead. Offer to replace it today with a more expensive video card, and they can pay the difference in cost.", "D": "Tell the customer that they will be without a computer for three days, but then you will come back and fix it."}, "correct": ["B"], "explanation": "Set and meet, or exceed, customer expectations and communicate timelines and status. Customers want to know what is going on. In addition, giving the customer a choice in repair or replacement options will usually help the customer feel better because they have a choice in the outcome. Remember that if they have called you, their day is already more difficult than normal, so treat customers with kindness and compassion.", "notes": [], "multi": false}, {"qnum": 46, "stem": "You are attempting to update a Windows 11 workstation using Windows Update. The update fails with this message: “Failure configuring Windows updates. Reverting changes.” You reboot and try again but receive the same error. What should you try next? (Choose two.)", "options": {"A": "Wait until changes are reverted. Unplug removable media from your computer and try again.", "B": "Wait until changes are reverted. Run a malware scan and try again.", "C": "Wait until changes are reverted. Run the Windows Update Troubleshooter.", "D": "Ignore the update."}, "correct": ["A", "C"], "explanation": "If an operating system (OS) update fails, it could be a configuration issue or simply a one-time glitch in the process. Wait until Windows Update reverts the changes, then reboot and try the update again. If that does not work, you can unplug removable media from your computer and try again, or you can try the Windows Update Troubleshooter.", "notes": [], "multi": true}, {"qnum": 47, "stem": "A user calls and complains that they can’t see any printers when they try to print a document from their Windows computer. They say that they had three network printers showing yesterday, and they can access the server across the network. What will you do first?", "options": {"A": "Reinstall the network printers.", "B": "Check the status of the Print Spooler service.", "C": "Reinstall Windows.", "D": "Repair Windows."}, "correct": ["B"], "explanation": "Check the simple things first. If the Print Spooler service isn’t running, then printers will not show. It’s unlikely that you will need to reinstall or repair Windows.", "notes": [], "multi": false}, {"qnum": 48, "stem": "A user calls the Help Desk because they are not able to access the Internet. After asking a few questions, you discover that if they type an IP address in the browser, then the website pops up. Other users on the same switch aren’t having this problem. Where will you start looking for the problem?", "options": {"A": "File server", "B": "Web server", "C": "DNS settings", "D": "DHCP settings"}, "correct": ["C"], "explanation": "If you can reach a website using an Internet Protocol (IP) address, then the problem has something to do with Domain Name System (DNS) settings. The default DNS server can be configured using Dynamic Host Configuration Protocol (DHCP) settings. But because the other users aren’t having this problem, it’s not a setting on the DHCP server, which means it must be configured on the local computer. The user is able to reach the file server, and if they’re accessing a remote website, the problem wouldn’t be your company’s web server.", "notes": [], "multi": false}, {"qnum": 49, "stem": "Whenever you log in to a computer at work, a screen with the company’s name and some text appears. You must click OK before you can access the company network. What is a common security purpose of a company’s custom splash screen?", "options": {"A": "Announce upcoming events", "B": "Advertising their products", "C": "Tracking employee time", "D": "Confirming agreement to an AUP"}, "correct": ["D"], "explanation": "An acceptable use policy (AUP) describes what users are and are not allowed to do on the company’s network. Often, companies will use a splash screen to confirm that the employee has read and agrees to the AUP or other company policies before they can use the network. In different environments such as a kiosk or app, a splash screen can display while the program is loading, and in those situations, it may be used to reinforce a brand or advertise products. There are ways to track employee time on the network, but that’s not the job of the splash screen.", "notes": [], "multi": false}, {"qnum": 50, "stem": "Which of the following features are not available in the Home edition of Windows but are available in Pro and higher editions? (Choose three.)", "options": {"A": "File compression", "B": "Joining a Windows Domain", "C": "Group Policy Editor (gpedit.msc)", "D": "RDP host"}, "correct": ["B", "C", "D"], "explanation": "Windows 10–11 treat these items the same. The difference lies in whether the Home or Pro edition is being used. All Windows editions support the New Technology File System (NTFS) file compression. Only Windows editions that are Pro or higher support joining a domain, using the Group Policy Editor (gpedit.msc), and being a Remote Desktop Protocol (RDP) host. Windows Home editions can be a client connecting to an RDP host, but not an RDP host.", "notes": [], "multi": true}, {"qnum": 51, "stem": "You’re configuring a remote connection and need a protocol or process to ensure that both parties to a transaction are who they say they are, and to encrypt their user information as it passes from one to the other. Which of the following will you use?", "options": {"A": "Multifactor authentication", "B": "Kerberos", "C": "RADIUS", "D": "TKIP"}, "correct": ["B"], "explanation": "When a client wants to authenticate to a server over a public network, Kerberos works with an authentication server (AS) to ensure that each party to the connection is who they say they are. Multifactor authentication (MFA) requires two or more factors for the user to prove their identity, such as a password and biometric login. The four available factors are what you know, what you have, who you are, and where you are. Remote authentication dial-in user service (RADIUS) is a protocol used specifically between a remote connection and server. It authenticates the remote user, and if the RADIUS server has the remote user configured as a client, it will send configuration information back to the user. RADIUS authenticates the remote user, not both parties. Temporal Key Integrity Protocol (TKIP) was used to encrypt information on wireless networks, but it is no longer considered secure.", "notes": [], "multi": false}, {"qnum": 52, "stem": "A user called the Help Desk because their mouse pointer is moving across the screen and windows are opening and closing. They believe it’s not malware, because they said they didn’t do anything; they just opened an email with a strange subject. Which of the following will be most important to prevent malware on this computer going forward?", "options": {"A": "Educate users regarding threats.", "B": "Install anti-malware and set it to update automatically.", "C": "Enable and configure software firewalls.", "D": "Enable and configure hardware firewalls."}, "correct": ["A"], "explanation": "While all four of these options will help to keep a computer system safe, all it takes is one employee who doesn’t know how to recognize dangers and a malicious software can be unleashed on a computer system. Regular user education regarding common threats should be a part of your company’s security plan.", "notes": [], "multi": false}, {"qnum": 53, "stem": "When your friend launches their new favorite game, they often get low-memory warnings. Which of the following can you do to prevent this problem from happening in the future? (Choose two.)", "options": {"A": "Use Task Manager to end unnecessary programs.", "B": "Increase virtual memory.", "C": "Increase physical memory.", "D": "Put in a faster NIC."}, "correct": ["B", "C"], "explanation": "If you’re running low on memory, you have two options. You can modify the virtual memory settings, or you can add more physical memory if the motherboard will support it. Using Task Manager to close unnecessary programs will help in the short term but not in the long term if you often have those programs running. A faster network interface card (NIC) won’t help here.", "notes": [], "multi": true}, {"qnum": 54, "stem": "A friend is having trouble with the network connection on their Windows 11 computer, so you open Network and Internet in the Settings app. Which of the following is not an option there?", "options": {"A": "Advanced network settings", "B": "Mobile Hotspot", "C": "VPN", "D": "Share a Printer"}, "correct": ["D"], "explanation": "There are many settings that can be reached through Network & Internet in the Settings app. Of them, Advanced Network Settings, Mobile Hotspot, and Virtual Private Network (VPN) are just a few. The main menu items here include Wi-Fi, VPN, Mobile Hotspot, Airplane Mode, Proxy, Dial-up, Properties (for the connection), and Advanced Network Settings.", "notes": [], "multi": false}, {"qnum": 55, "stem": "You need to manually configure the IP address for a server. Which of the following pieces of information is not needed to configure IPv6?", "options": {"A": "IPv6 address", "B": "Subnet mask", "C": "Subnet prefix length", "D": "Default gateway"}, "correct": ["B"], "explanation": "When configuring a static Internet Protocol (IP) address in IPv6 networking, a subnet mask is not needed, but you do need to know the subnet prefix length. That’s the only difference between configuring IPv4 and IPv6. In addition to the IPv6 address and default gateway, you’ll need to know the address of the preferred Domain Name System (DNS) server.", "notes": [], "multi": false}, {"qnum": 56, "stem": "A user is trying to use Google Chrome on their Windows computer, but they receive the error message “Unable to access the network.” If they use Microsoft Edge, they are able to access websites with no problem. What do you need to do?", "options": {"A": "Uninstall and reinstall Google Chrome.", "B": "Instruct the user to only use Microsoft Edge.", "C": "Ensure that Google Chrome is a permitted program in Windows Defender Firewall.", "D": "Reinstall the operating system."}, "correct": ["C"], "explanation": "If they are able to access the Internet using Microsoft Edge, then the issue is with Google Chrome. The most likely problem is that the firewall isn’t allowing it. To resolve the problem, go into Windows Defender Firewall, and in the inbound rules, add Google Chrome and allow it to send information through the firewall.", "notes": [], "multi": false}, {"qnum": 57, "stem": "Which of the following is not done/created before the change board approves a change?", "options": {"A": "Rollback plan", "B": "Sandbox testing", "C": "Risk analysis", "D": "Change freeze"}, "correct": ["D"], "explanation": "If you’re planning a change to an IT system, it’s important to have a rollback plan, in case the change fails, and to test the change in a sandbox before you go live with it. You’ll also want to do a thorough risk analysis and identify the systems that will be affected or impacted by the change. Getting end-user acceptance is also helpful, so be sure to explain to users why the change is necessary and involve them in the changes that will affect them, such as user input screens. A change freeze happens near the end of the project, when no more material changes to the project are allowed.", "notes": [], "multi": false}, {"qnum": 58, "stem": "Your company makes a full backup every Sunday. Monday through Friday, the company creates differential backups. It keeps the weekly backup for a month, the daily backups are overwritten each week, and the company creates a backup once a month that is kept for a year. What is this backup scheme called?", "options": {"A": "On-site/off-site", "B": "Grandfather-father-son (GFS)", "C": "3-2-1 backup rule", "D": "Synthetic"}, "correct": ["B"], "explanation": "The grandfather-father-son (GFS) method of backing up, as described in the question, ensures that there are short-term, medium-term, and long-term backups of a system. You should have backups both on-site and off-site. The 3-2-1 backup rule says you should have three copies of data, using two different types of media, with one of them being off-site. A synthetic backup is a full backup created by combining a recent full backup and the changes since then to create new files. It can be done outside the system, so there is no downtime and it’s faster than doing a full backup.", "notes": [], "multi": false}, {"qnum": 59, "stem": "A user has called the Help Desk, and you’ve entered their ticket. The problem they describe is beyond your training. What do you do?", "options": {"A": "Hang up and tell them to call the PC manufacturer.", "B": "Put them on hold for an hour while you figure it out.", "C": "Escalate the problem to the next level.", "D": "Tell them to perform a factory installation of their operating system."}, "correct": ["C"], "explanation": "If a problem is beyond your abilities, of course, you will follow the company policy. However, in most cases, you will escalate the problem to someone else who has appropriate training or experience to resolve the issue. Any of the other options might lose a customer permanently.", "notes": [], "multi": false}, {"qnum": 60, "stem": "Your friend has a new Windows 11 computer, and they’re getting way too many notifications while they’re trying to work. What will you tell them?", "options": {"A": "Yes, we all do. It’s just something we have to deal with.", "B": "I can help you fix that. It’s easy.", "C": "We can turn them all off or all on; you don’t get to choose.", "D": "You have to reinstall your apps and tell them no when they ask if you want to allow notifications."}, "correct": ["B"], "explanation": "It’s easy to pick and choose which notifications you want popping up on your screen. In the Windows 11 Settings application, search for Notifications and click the link. Once there, you can choose the application from which you want to receive notifications.", "notes": [], "multi": false}, {"qnum": 61, "stem": "Your client has computers using macOS and other computers that are Windows-based. They want to have a shared drive configured so that both operating systems can access it. The files are very large, some of them exceeding 4 GB. What filesystem should you use to format the shared drive?", "options": {"A": "NTFS", "B": "ext4", "C": "exFAT", "D": "FAT32"}, "correct": ["C"], "explanation": "FAT32 and exFAT are both compatible with both Windows and macOS systems, but the exFAT filesystem supports files greater than 4 GB; FAT32 does not. New Technology File System (NTFS) is only compatible with Windows, ext4 is used in Linux/UNIX systems, and Apple File System (APFS) is the filesystem for macOS 10.13 and later.", "notes": [], "multi": false}, {"qnum": 62, "stem": "A user wants to have Full Control over their C: drive and all the contents of it, because they have one program that defaults to saving files in a folder there. Why will you not give them this access? (Choose two.)", "options": {"A": "It is a security risk.", "B": "It violates the Windows EULA.", "C": "Only administrators can have access to the C: drive.", "D": "It violates the principle of least privilege."}, "correct": ["A", "D"], "explanation": "It sounds like the user needs Read, Write, and perhaps Modify permissions to the folder on the C: drive, and they don’t need any other access on that drive. The principle of least privilege is one of the most important security rules in computer systems. It says that you give a user only the access that they need to perform their job duties and nothing more. If they have access to the entire C: drive, and an attacker gets in on their account, then the attacker will have complete access too and can cause all sorts of trouble. Limiting them to only the folder they need also limits their exposure. The other two options are simply not true.", "notes": [], "multi": true}, {"qnum": 63, "stem": "A user has a computer that suddenly started running very sluggishly. Upon inquiry, you find that they went to some websites yesterday that they don’t normally visit, so you decide to follow the best-practice procedures for malware removal. What is the first step?", "options": {"A": "Quarantine infected systems.", "B": "Disable System Restore in Windows Home.", "C": "Investigate and verify malware symptoms.", "D": "Schedule scans and run updates."}, "correct": ["C"], "explanation": "The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7 . Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end-user.", "notes": [], "multi": false}, {"qnum": 64, "stem": "A user tells you that they received a BSOD error on a Windows computer. No changes have been made to this computer recently. What is the best way to restart Windows to see whether you can isolate the issue?", "options": {"A": "Boot to the Windows installation media and start the WinRE.", "B": "Boot to safe mode.", "C": "Boot using an anti-malware boot drive.", "D": "Boot normally and see whether the error happens again."}, "correct": ["D"], "explanation": "If this is the first time the error has occurred, simply reboot and see if it goes away. Windows is quite stable, but occasionally a blue screen of death (BSOD) occurs, and you must reboot. If it doesn’t happen again, there likely isn’t a problem. If it continues to happen, look for any error message on the screen that will give you a clue about what the problem is, and then troubleshoot from there. If there is no error message, assume the problem is hardware or a corrupted driver and boot into safe mode to fix the issue.", "notes": [], "multi": false}, {"qnum": 65, "stem": "A user is attempting to log in to the computer that they normally use at work. The user reports that their profile is very slow to load and then they get an error message that says “Unable to load profile.” What should you suspect?", "options": {"A": "The profile is too large.", "B": "The profile is corrupted.", "C": "The user logged on using the wrong password.", "D": "They need to reboot and try again."}, "correct": ["B"], "explanation": "If a user profile is very large, it may be slow to load but should eventually get there. If there is an error message that it is unable to load, suspect a corrupted profile. To verify that’s the problem, create a new user and copy the existing user profile to the new user, then try to log on as the new user. If the same error occurs, the profile is corrupted. You’ll need to delete the corrupted profile and when the user logs on again, a new profile will be created.", "notes": [], "multi": false}, {"qnum": 66, "stem": "An app on your Android-based device won’t open. What will you try first?", "options": {"A": "Check for Android updates.", "B": "Check for app updates.", "C": "Restart the device.", "D": "Clear the app’s data and cache."}, "correct": ["C"], "explanation": "The first thing to try for an Android-based device that won’t load an app is to restart the device and try the app again. If that doesn’t work, try each of the following and restart between them, then see if the app will launch. First, check for Android updates. Next, check for app updates. Finally, clear the app’s data and cache. If none of these solutions work, you might need to contact the app developer.", "notes": [], "multi": false}, {"qnum": 67, "stem": "You’re installing a new video card in a computer. It was an expensive card, and you want to ensure that it isn’t damaged by ESD. Until you are ready to place the card in the slot, what is the safest place for the card?", "options": {"A": "Lying on the antistatic mat", "B": "Lying on the antistatic bag", "C": "Inside its antistatic bag", "D": "Lying on the edge of the computer so that it’s grounded"}, "correct": ["C"], "explanation": "When you’re installing a new component, the safest place for it is inside (not lying on) the antistatic bag in which it arrived. If an antistatic bag isn’t available, the next safest place is lying on a grounded antistatic mat. You would never leave a new card teetering on the case’s edge, and antistatic bags are essentially a Faraday cage, designed to keep static on the outside, so lying the component on the bag is not a good idea.", "notes": [], "multi": false}, {"qnum": 68, "stem": "Your company is an MSP. A client in another state is having a problem with their Windows 11 Desktop station and wants your help. What tool will you most likely use to assist them?", "options": {"A": "RDP", "B": "VPN", "C": "VNC", "D": "RMM"}, "correct": ["D"], "explanation": "As a managed services provider (MSP), you’ll already likely have remote monitoring and management (RMM) software set up to manage your client’s computers and infrastructure. Remote Desktop Protocol (RDP) will let you take control of their system but requires user interaction, and a virtual private network (VPN) is used for connecting remotely to a network as if you were sitting in the office. A virtual network connection (VNC) is for connecting to a single client and it may be a part of an RMM product, but RMM is the best answer.", "notes": [], "multi": false}, {"qnum": 69, "stem": "You are writing a script in Microsoft PowerShell to automate some processes that you perform daily. What file extension will the script file have?", "options": {"A": ".bat", "B": ".ps1", "C": ".vbs", "D": ".py"}, "correct": ["B"], "explanation": "Script files can be used to make repeated tasks much easier by automating the process. PowerShell is a very popular scripting program among network administrators, and PowerShell files use a.ps1 extension. A batch file has a.bat extension, Visual Basic scripts have a.vbs extension, and Python files have a.py extension. Others are.sh, for Bash (Linux) scripts and.js, for JavaScript.", "notes": [], "multi": false}, {"qnum": 70, "stem": "You need to add a new user on a Windows Pro desktop computer. What tool can you use to do this? (Choose two.)", "options": {"A": "Local Users & Groups", "B": "gpedit.msc", "C": "lusrmgr.msc", "D": "Certificate Manager"}, "correct": ["A", "C"], "explanation": "To add or manage users on a computer with Windows Pro edition installed, use the Local Users & Groups utility, which can be launched by running lusrmgr.msc, or search for user in the Settings application, or use the User Accounts applet of the Control Panel. The group policy editor filename is gpedit.msc, and Certificate Manager (certmgr.msc) stores digital certificates, which verify that websites and other computers have proven who they are and provided a valid certificate.", "notes": [], "multi": true}, {"qnum": 71, "stem": "A user who is less comfortable with technology is having to navigate through File Explorer to a network shared resource several times a day. The user asks if there is an easier way. What will you configure for this user?", "options": {"A": "Mapped drive", "B": "Domain name", "C": "Subnet mask", "D": "Gateway"}, "correct": ["A"], "explanation": "Mapping a network drive for this user will make navigating to the resource much easier. A domain name identifies a Windows Active Directory domain. A subnet mask is used in Internet Protocol version 4 (IPv4) networking, and a gateway is the proxy server, router, or other device that connects a user to other networks, including the Internet.", "notes": [], "multi": false}, {"qnum": 72, "stem": "One of the users you are responsible for called the Help Desk because when they turned the computer on this morning, instead of booting into Windows, it showed a green screen with 1s and 0s running down it. What will you do?", "options": {"A": "Turn the computer off and boot using boot media from your antivirus/anti-malware company.", "B": "Go into WinRE and repair the operating system installation.", "C": "Go into WinRE and perform a clean installation of the operating system.", "D": "Boot into safe mode and restore from a recent restore point."}, "correct": ["A"], "explanation": "The computer is running a virus program before the operating system (OS) even boots, which indicates that there is a boot sector virus. The best way to remove this malware is using boot media from your antivirus company to clean the computer. You might need to go into the basic input output system/unified extensible firmware interface (BIOS/UEFI) settings and change the boot order to boot to the anti-malware media. You wouldn’t need to repair or replace the operating system (OS) yet, although as part of the remediation you may need to replace it. It is unlikely with this scenario that you would be able to boot into safe mode, and even if you did, the malware could be lurking in the restore point. Part of the best practice procedures for malware removal is to disable System Restore in Windows Home.", "notes": [], "multi": false}, {"qnum": 73, "stem": "Your mobile device locks after a short inactivity period for security reasons. Which of the following are common biometric devices for opening a mobile device whose screen is locked? (Choose two.)", "options": {"A": "Facial recognition", "B": "Fingerprint readers", "C": "PIN codes", "D": "Swipe to unlock"}, "correct": ["A", "B"], "explanation": "Facial recognition and fingerprint readers are common methods of biometric identification on smartphones, tablets, and laptops. A personal identification number (PIN) code is a number, which is not biometric. Swipe to unlock offers virtually no security on a mobile device and is not a biometric method.", "notes": [], "multi": true}, {"qnum": 74, "stem": "A user logs on to their computer system and notices that several of their files are missing. What should you do?", "options": {"A": "Begin the malware removal process.", "B": "Reimage the machine.", "C": "Restore the files from a backup.", "D": "Restore from the last restore point."}, "correct": ["A"], "explanation": "This is a classic symptom of malware. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7 . Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end-user.", "notes": [], "multi": false}, {"qnum": 75, "stem": "A new network admin wants to try their hand at writing a PowerShell script. You tell them that’s fine but to show it to you before they run it. What are possible undesirable effects of running a script file? (Choose two.)", "options": {"A": "Inadvertently changing system settings", "B": "Saving time in remapping network drives", "C": "Browser or system crashes due to mishandling of resources", "D": "Automating backups"}, "correct": ["A", "C"], "explanation": "Possible undesirable outcomes of running or allowing script files to be run are inadvertently changing system settings, browser or system crashes, and unintentionally introducing malware. The other options listed are advantages of script files.", "notes": [], "multi": true}, {"qnum": 76, "stem": "A user has called the Help Desk and told you that all of their Microsoft Word documents now have a .boo extension. What is your first course of action?", "options": {"A": "Ask the user to restart the computer.", "B": "Ask the user to rename all the files to a .doc extension.", "C": "Run anti-malware.", "D": "Isolate the system from the network."}, "correct": ["D"], "explanation": "Renamed files is a symptom of a malware attack. Isolate the system from the network (i.e., unplug the patch cable or turn off Wi-Fi), and then run anti-malware. Restarting the computer or manually renaming the files won’t remove the malware.", "notes": [], "multi": false}, {"qnum": 77, "stem": "You have a macOS computer that is behaving in an unstable manner, so you press the Command+R keys while it is booting and enter Disk Utility. What option in Disk Utility will check and repair the filesystem?", "options": {"A": "First Aid", "B": "Partition", "C": "Erase", "D": "Restore"}, "correct": ["A"], "explanation": "First Aid in the macOS Disk Utility will check and repair the filesystem, similar to Windows Error Checking. From Disk Utility, you can also erase, create, and restore partitions.", "notes": [], "multi": false}, {"qnum": 78, "stem": "You need to configure encryption for the data-at-rest on a new Windows Pro workstation. Which of the following are options? (Choose two.)", "options": {"A": "Kerberos", "B": "EFS", "C": "BitLocker", "D": "RADIUS"}, "correct": ["B", "C"], "explanation": "For data-at-rest, which means it’s on a storage media, your options are Encrypting File System (EFS) and BitLocker. BitLocker is more secure and would be preferred. Kerberos and remote authentication dial-in user service (RADIUS) secure information that is moving (i.e., data-in-transit/motion) between two points.", "notes": [], "multi": true}, {"qnum": 79, "stem": "An employee using their own smartphone for work (i.e., BYOD) calls the Help Desk and tells you that they have no Internet connectivity and can’t even make phone calls. They are panicking, thinking their phone is broken. What might solve the problem?", "options": {"A": "Turning Bluetooth on", "B": "Turning Airplane mode off", "C": "Restarting the smartphone", "D": "Turning on their hotspots"}, "correct": ["B"], "explanation": "Airplane mode disables all wireless communication. Because the user can’t make calls or connect to the Internet, ask them to ensure that Airplane mode is off.", "notes": [], "multi": false}, {"qnum": 80, "stem": "A user has a Windows 10 Pro laptop that they have installed and tested lots of software on, and now it will barely run. There is nothing that they want to save on it, and they’ve asked if you can just make it run like new again. What is the easiest way to do this?", "options": {"A": "Create installation media from the Microsoft website and perform a repair installation.", "B": "Create installation media from the Microsoft website and perform a clean installation.", "C": "Boot to a recovery partition and perform a factory installation.", "D": "Install a new hard drive and perform a clean installation from Microsoft installation media."}, "correct": ["C"], "explanation": "Most laptops, and many commercial desktop computers, have a recovery partition that can be used to restore the computer to factory defaults. Usually, you can get there by pressing a key or group of keys during the bootup. This would be better than using installation media made from the Microsoft website, because it will have the proper drivers and other software that came with the computer. There is no need to buy a new hard drive, unless the drive is physically damaged.", "notes": [], "multi": false}, {"qnum": 81, "stem": "You’re verifying settings on your router and notice that it only has WPA2, not WPA3. Your devices have all been working with WPA2, and you have some older and some newer devices. What should your next steps be? (Choose two.)", "options": {"A": "Update the router’s firmware.", "B": "Choose WPA2/WPA3 Transitional.", "C": "Choose WPA3 Personal.", "D": "Choose WPA2 Personal (AES)."}, "correct": ["A", "B"], "explanation": "Many routers that don’t have a setting for WPA3 can get it by updating the router’s firmware. If some of your devices are older, they may not work with WPA3. WPA2/WPA3 Transitional (also known as WPA2/WPA3 mixed mode) is a mode that allows older devices to still work with WPA2, but they should be replaced or updated to WPA3 as soon as practicable. If you choose WPA3 Personal, some devices might not work. If you choose WPA2 Personal, your network is not as secure as it should be.", "notes": [], "multi": true}, {"qnum": 82, "stem": "Your client has a computer on their network that they have configured to be a secure web server. How should you configure their router to ensure that traffic for the server is going to the server? (Choose two.)", "options": {"A": "Forward outgoing requests for port 443 to the web server’s IP address.", "B": "Forward incoming requests for port 443 to the web server’s IP address.", "C": "Set the router to use UPnP.", "D": "Create a screened subnet for the web server."}, "correct": ["B", "D"], "explanation": "Creating a screened subnet will protect your network from traffic interacting with the server and can be done with one router, as long as the web server, outside world, and internal network are on different router ports. Incoming requests for HTTPS port 443 should be forwarded to the web server. Universal Plug and Play (UPnP) is considered unsafe, but it is irrelevant to this web server question. You wouldn’t forward outgoing requests.", "notes": [], "multi": true}, {"qnum": 83, "stem": "You’ve tried to access a website that you’re sure is safe, but you’re getting an invalid certifi- cate warning. What should you do?", "options": {"A": "Verify the date and time on your computer.", "B": "Run anti-malware.", "C": "Report the website as dangerous.", "D": "Delete the certificate from your computer."}, "correct": ["A"], "explanation": "Always try the simplest things first. An invalid certificate warning can come up if your date and time are incorrect, making them fall outside of the time the certificate is valid. That’s the easiest fix.", "notes": [], "multi": false}, {"qnum": 84, "stem": "A friend asks you what it means to gain root access to an Android device and if they should do it. Which of the following is not true about Android root access?", "options": {"A": "Android root access is like cracking software or jailbreaking an iPhone, which makes your device more vulnerable to attack.", "B": "Android root access might not be illegal; however, it may void your device’s warranty.", "C": "Android root access is a safe way to get more out of your device.", "D": "Android root access gives the user full access to the device, opening the potential to accidentally make undesirable changes."}, "correct": ["C"], "explanation": "Gaining Android root access does let you do more with your device, but it isn’t necessarily safe. Jailbreaking is most commonly done with Apple devices because they are more locked down than Android devices are. Jailbreaking an iPhone, for instance, enables the user to install apps that are not approved by Apple. When you open any device up for your own use by cracking software or gaining root access, it also opens your device up more for cybercriminals to perpetrate an attack on it. Jailbreaking and gaining root access often void the warranty on your device. The device may become unstable due to changes made in that mode, and with the warranty voided, you are not likely to receive support in fixing problems. Jailbreaking may be illegal, depending on where you are in the world.", "notes": [], "multi": false}, {"qnum": 85, "stem": "A user calls the Help Desk and tells you that their iPhone is slow to respond. They have closed open apps, but it’s still very slow. What will you check next?", "options": {"A": "If the phone is overheating", "B": "How much data is being used", "C": "If they’re having strange pop-ups", "D": "How much space is on the device’s storage"}, "correct": ["D"], "explanation": "iPhones tend to have fewer malware incidents than other mobile devices, so it’s most likely that the smartphone is too full, resulting in the device appearing to run more slowly just as it would with a desktop drive. Overheating, excessive data use, and pop-ups can be signs of a malware infection.", "notes": [], "multi": false}, {"qnum": 86, "stem": "A user has a 32-bit application that they want to use on a 64-bit operating system, and they have asked you if that will work. What do you tell them?", "options": {"A": "Both 32-bit and 64-bit are interchangeable.", "B": "Yes, a 32-bit application will work on a 64-bit operating system.", "C": "No, the application must be 64-bit to run on a 64-bit operating system.", "D": "A 64-bit application will run on a 32-bit operating system, but a 32-bit application will not run on a 64-bit operating system."}, "correct": ["B"], "explanation": "A 64-bit operating system (OS) will support both 32-bit and 64-bit applications. A 32-bit application will work on a 64-bit OS, but it won’t take advantage of the 64-bit speed. It will essentially run half as fast as a 64-bit application would. A 32-bit OS only supports 32-bit programs; you can’t run a 64-bit application on a 32-bit OS. Luckily, there aren’t many computers with 32-bit OSs around anymore.", "notes": [], "multi": false}, {"qnum": 87, "stem": "You are required to enter a username, password, and a code from an authenticator app on your phone before you can access the company website. What type of authentication is this?", "options": {"A": "Multi sign-on", "B": "Single sign-on", "C": "Multifactor", "D": "Domain"}, "correct": ["C"], "explanation": "This is a classic example of multifactor authentication (MFA). The username identifies you; the password (i.e., something you know) and the authenticator app code (i.e., something you have) are multiple ways to prove (i.e., authenticate) who you are. The four types of authentication are something you know, something you have, something you are (i.e., biometrics), and some place you are.", "notes": [], "multi": false}, {"qnum": 88, "stem": "You’re troubleshooting a computer that appears to have contracted a boot sector virus. After following the best-practice procedures for malware removal, it seems to be booting okay now, and you have created a restore point in Windows. What is your next step?", "options": {"A": "Schedule scans and run updates.", "B": "Quarantine the infected system.", "C": "Disable System Restore in Windows Home.", "D": "Educate the end-user."}, "correct": ["D"], "explanation": "Educating the end-user on how to recognize malware and avoid it is paramount to preventing infections. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7 . Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end-user.", "notes": [], "multi": false}, {"qnum": 89, "stem": "Computer users are often reluctant to have anything change, so gaining their acceptance prior to the change will make a transition run more smoothly. What are two ways that you can gain end-user acceptance to a change? (Choose two.)", "options": {"A": "Make them fill out request forms.", "B": "Involve them in the planning process.", "C": "Thoroughly explain why this change is necessary.", "D": "Don’t tell them, and just have the change done when they come in on a Monday."}, "correct": ["B", "C"], "explanation": "No one likes to have changes forced on them, but in IT there are changes every day. When you have a major change, your headaches will be less if you can gain end-user acceptance before the change occurs. One of the best ways to do this is to involve them in the parts of the planning process that affect them, such as user input screens. Have a meeting and listen to input from the people who will actually be using the system. They may have some insight that you don’t. Also be sure to thoroughly explain why the change is necessary. The worst thing to do is spring the change on them by not telling them about it and having them discover it when they log in on Monday morning.", "notes": [], "multi": true}, {"qnum": 90, "stem": "Your company does a full backup every Sunday and incremental backups all the other days of the week at the end of each day. If you come in on Wednesday morning and your system has crashed overnight, what backups will need to be restored so that your system will be fully recovered?", "options": {"A": "Sunday only", "B": "Sunday and Monday", "C": "Sunday and Tuesday", "D": "Sunday, Monday, and Tuesday"}, "correct": ["D"], "explanation": "Incremental backups will only back up what has changed since the last full backup or the last incremental backup. An incremental or full backup resets the archive bit, so only Monday’s changes will be backed up on Monday, only Tuesday’s changed files will be backed up on Tuesday, and so on. You will need to restore all three backups to get all the changes that have occurred since Sunday.", "notes": [], "multi": false}, {"qnum": 91, "stem": "You need to make a secure connection to a remote router and perform some configuration changes. What will enable you to do that securely?", "options": {"A": "SSH", "B": "Telnet", "C": "Videoconferencing software", "D": "FTP"}, "correct": ["A"], "explanation": "Secure shell (SSH) has virtually replaced Telnet as a remote access protocol and program. Telnet is not secure, but SSH is. Videoconferencing software enables users to see and talk to one another as if in the same room while they may be thousands of miles apart. File Transfer Protocol (FTP) is used for efficiently transferring files, but it is not secure.", "notes": [], "multi": false}, {"qnum": 92, "stem": "What is the danger in using an operating system that has reached EOL?", "options": {"A": "Lack of feature updates", "B": "Lack of security updates", "C": "No technical support", "D": "Very expensive technical support"}, "correct": ["B"], "explanation": "When an operating system (OS) has reached end-of-life (EOL) status, not only are there no more feature updates or support, but there are no security updates and patches, and therein lies the danger. Using an EOL OS might open your system up to hackers. When an OS reaches EOL, it’s past the time to upgrade.", "notes": [], "multi": false}, {"qnum": 93, "stem": "A user calls the Help Desk and tells you that they’re trying to watch a training video full screen, but the screen won’t autorotate when they turn the phone. What will you have them do?", "options": {"A": "Swipe down, look for the autorotate icon, and enable it.", "B": "Restart their smartphone.", "C": "Watch the video on their desktop computer.", "D": "Click the full-screen icon on the video."}, "correct": ["A"], "explanation": "Although iPhones and Android smartphones use different icons for autorotate, for most smartphones a swipe from the top will reveal a quick menu showing autorotate and other commonly used features. Simply enable autorotate. Restarting the smartphone won’t resolve the issue. The user may not have a desktop computer available and using it won’t solve the problem. Clicking the full screen icon on the video won’t help because failing to display full screen isn’t the problem.", "notes": [], "multi": false}, {"qnum": 94, "stem": "You have hired a new network administrator. Assume their name is NewUser. How many and what types of accounts will you set up for NewUser?", "options": {"A": "NewUser, an administrator account only", "B": "NewUser, a standard user only", "C": "NewUser_Admin, which is an administrator account, and NewUser, a standard user account", "D": "NewUser_Admin, which is an administrator account, and NewUser_Guest, which is a guest account"}, "correct": ["C"], "explanation": "Following best practices, this user would need two accounts: one is a member of the Administrators group, and another is a standard user. They should be instructed to only log on to the administrator account if they can’t do what they need to from their standard user account, using features like Run As Administrator or entering their administrator password in the User Account Control (UAC) window.", "notes": [], "multi": false}, {"qnum": 95, "stem": "An application on your mobile device will not close and is unresponsive. What should be your first choice to fix it?", "options": {"A": "Force-close the application.", "B": "Restart the device.", "C": "Revert to factory defaults.", "D": "Reinstall the application."}, "correct": ["A"], "explanation": "The first step for any unresponsive app on your mobile device is to force-close it. How that is done will be different, depending on whether it is an Apple or an Android device. If the app is still causing problems, you can try restarting your device, and if that doesn’t work, uninstall and reinstall the application. Reverting your mobile device to factory default shouldn’t be necessary.", "notes": [], "multi": false}, {"qnum": 96, "stem": "You are running late because your morning appointment took longer than you thought it would. Your next client meeting is in 5 minutes, and they’re 20 minutes away. What do you do?", "options": {"A": "You get there when you get there. Your time is valuable.", "B": "Skip that meeting and go on to the next, so you’re not late all day.", "C": "Call the client and apologize. Let them know the situation and ask if they would prefer to reschedule or see you a bit later.", "D": "Call the client and tell them you’re running late."}, "correct": ["C"], "explanation": "When you tell a client you will do something, you are setting their expectations. The rule is to meet or exceed the expectations that you set. Remember, people like options. Let them know that you’re running late, apologize, and give them the option of how to proceed. Be sure to call the other clients scheduled for the day too.", "notes": [], "multi": false}, {"qnum": 97, "stem": "You have downloaded some open-source license software. What are you usually allowed to do with it?", "options": {"A": "Modify the program to suit your needs.", "B": "Resell the software to other people for a profit.", "C": "Make copies but credit the original source and redistribute it under the same license under which you received it.", "D": "Run only one copy on one machine."}, "correct": ["A", "C"], "explanation": "The exact terms of what you can and cannot do with the software will be spelled out in the license. However, it is common that you can use, modify, and share the source code, but not sell it for a profit, and you usually need to credit the original author of the software.", "notes": [], "multi": true}, {"qnum": 98, "stem": "You’re in the middle of a major IT systems change and have gotten to a point where you realize that it’s not going to work without shutting down everything for a week. This would cost the company a fortune and will put production way behind. What will you do?", "options": {"A": "Let management know, and continue with the project.", "B": "Follow the rollback plan.", "C": "Fire the responsible staff member.", "D": "Follow the AUP."}, "correct": ["B"], "explanation": "A case like this is exactly why you have a rollback plan. Occasionally, despite your best efforts, you get into a project and discover that it isn’t going to work, or it will take longer than expected. Perhaps if you rework the plan, you could make the changes without a big disruption to the business. Involving management in what is going on is always a good idea. The acceptable use policy (AUP) likely doesn’t have any bearing here.", "notes": [], "multi": false}, {"qnum": 99, "stem": "You’re working at your desktop computer, viewing a web page you use often, when a website that you know should be updating doesn’t seem to be. In fact, if you access it from a different device, the website looks different. What can you do to force the website to update on your computer? (Choose two.)", "options": {"A": "Clear the browser’s cache.", "B": "Clear the browser’s stored cookies.", "C": "Uninstall and reinstall your browser.", "D": "Hold the Ctrl and F keys simultaneously while on the website."}, "correct": ["A", "B"], "explanation": "Websites store parts of pages in the cache to make loading them faster the next time. If you clear the browser’s cache and cookies, then when you access the website, it must download all of the data that was previously cached, which means that it will be the updated version. It may take a little longer, but it will be up to date. If it’s a site where you use cached credentials to log in, you must log in again. Uninstalling and reinstalling your browser isn’t necessary. The Ctrl key and F key pressed simultaneously usually brings up a Find dialog box.", "notes": [], "multi": true}, {"qnum": 100, "stem": "You’re on your smartphone and notice that the apps are all responding slowly, almost jittery when you change from one to the other. What is the first thing to do?", "options": {"A": "Check the device’s storage.", "B": "Close some running apps.", "C": "Suspect a virus.", "D": "Check the battery charge. Answers to the Review Questions Appendix 394 Appendix ▪ Answers to the Review Questions"}, "correct": ["D"], "explanation": "If the battery is very low, the applications can show a slower-than-n const bankSelect = document.getElementById('bankSelect');
const jumpInput = document.getElementById('jumpInput');
const jumpBtn = document.getElementById('jumpBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const bankMeta = document.getElementById('bankMeta');
const progressMeta = document.getElementById('progressMeta');
const typeMeta = document.getElementById('typeMeta');
const questionText = document.getElementById('questionText');
const answersBox = document.getElementById('answersBox');
const resultBox = document.getElementById('resultBox');
const submitRow = document.getElementById('submitRow');
const submitBtn = document.getElementById('submitBtn');
const skipLine = document.getElementById('skipLine');
const jumpHelp = document.getElementById('jumpHelp');

const bankKeys = Object.keys(DATA);
const state = {
  bank: bankKeys[0],
  indexByBank: Object.fromEntries(bankKeys.map(k => [k, 0])),
  answered: Object.fromEntries(bankKeys.map(k => [k, {}]))
};

for (const key of bankKeys) {
  const option = document.createElement('option');
  option.value = key;
  option.textContent = DATA[key].title;
  bankSelect.appendChild(option);
}

bankSelect.addEventListener('change', () => {
  state.bank = bankSelect.value;
  render();
});
jumpBtn.addEventListener('click', jumpToQuestion);
jumpInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') jumpToQuestion(); });
prevBtn.addEventListener('click', () => move(-1));
nextBtn.addEventListener('click', () => move(1));
submitBtn.addEventListener('click', gradeMulti);

function currentBankData() {
  return DATA[state.bank];
}
function currentQuestion() {
  return currentBankData().questions[state.indexByBank[state.bank]];
}
function move(delta) {
  const bank = currentBankData();
  const idx = state.indexByBank[state.bank] + delta;
  if (idx < 0 || idx >= bank.questions.length) return;
  state.indexByBank[state.bank] = idx;
  render();
}
function jumpToQuestion() {
  const target = parseInt(jumpInput.value, 10);
  if (!target) return;
  const bank = currentBankData();
  const idx = bank.questions.findIndex(q => q.qnum === target);
  if (idx === -1) {
    alert('That original book question number is not available in this bank. It may have been skipped because it depended on an image.');
    return;
  }
  state.indexByBank[state.bank] = idx;
  render();
}

function render() {
  bankSelect.value = state.bank;
  const bank = currentBankData();
  const idx = state.indexByBank[state.bank];
  const q = currentQuestion();
  const saved = state.answered[state.bank][q.qnum];

  bankMeta.textContent = bank.title;
  progressMeta.textContent = `Question ${idx + 1} of ${bank.questions.length} • Original book #${q.qnum}`;
  typeMeta.textContent = q.multi ? 'Multi-answer' : 'Single-answer';
  questionText.textContent = q.stem;
  answersBox.innerHTML = '';
  resultBox.style.display = 'none';
  resultBox.className = 'result';
  resultBox.innerHTML = '';
  submitRow.classList.toggle('hidden', !q.multi);

  const letters = ['A','B','C','D'];
  const selectedSaved = saved?.selected || [];

  if (q.multi) {
    for (const letter of letters) {
      const label = document.createElement('label');
      label.className = 'answer-check';
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.value = letter;
      input.checked = selectedSaved.includes(letter);
      if (saved) input.disabled = true;
      const span = document.createElement('div');
      span.innerHTML = `<strong>${letter}.</strong> ${escapeHtml(q.options[letter])}`;
      label.appendChild(input);
      label.appendChild(span);
      if (saved) {
        if (q.correct.includes(letter)) label.classList.add('correct');
        if (saved.selected.includes(letter) && !q.correct.includes(letter)) label.classList.add('incorrect');
      }
      answersBox.appendChild(label);
    }
  } else {
    for (const letter of letters) {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.innerHTML = `<strong>${letter}.</strong> ${escapeHtml(q.options[letter])}`;
      if (saved) {
        btn.disabled = true;
        if (q.correct.includes(letter)) btn.classList.add('correct');
        if (saved.selected.includes(letter) && !q.correct.includes(letter)) btn.classList.add('incorrect');
      } else {
        btn.addEventListener('click', () => gradeSingle(letter));
      }
      answersBox.appendChild(btn);
    }
  }

  if (saved) showResult(saved.correct);

  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === bank.questions.length - 1;
  skipLine.textContent = bank.skipped.length
    ? `Skipped original book question numbers in this bank: ${bank.skipped.map(x => x[0]).join(', ')}`
    : 'No image-based questions were skipped in this bank.';
  jumpHelp.textContent = 'Jump uses the original book question number for the selected bank.';
}

function gradeSingle(letter) {
  const q = currentQuestion();
  const correct = q.correct.length === 1 && q.correct[0] === letter;
  state.answered[state.bank][q.qnum] = { selected: [letter], correct };
  render();
}

function gradeMulti() {
  const q = currentQuestion();
  const selected = [...answersBox.querySelectorAll('input[type="checkbox"]')]
    .filter(x => x.checked).map(x => x.value).sort();
  const correct = JSON.stringify(selected) === JSON.stringify([...q.correct].sort());
  state.answered[state.bank][q.qnum] = { selected, correct };
  render();
}

function showResult(isCorrect) {
  const q = currentQuestion();
  resultBox.style.display = 'block';
  resultBox.classList.add(isCorrect ? 'good' : 'bad');
  const notesHtml = q.notes && q.notes.length
    ? q.notes.map(n => `<div class="note"><strong>Extra note:</strong> ${escapeHtml(n)}</div>`).join('')
    : '';
  resultBox.innerHTML = `
    <div class="result-title">${isCorrect ? 'Correct' : 'Incorrect'}</div>
    <p><strong>Correct answer:</strong> ${q.correct.join(', ')}</p>
    <p><strong>Explanation:</strong> ${escapeHtml(q.explanation)}</p>
    ${notesHtml}
  `;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

render();
</script>
