nctions. It is usually placed between the outside world and the local area network (LAN), so it can function as a gateway as well as a security appliance. A proxy server can be a very powerful force for good on your network. Proxy servers can be a firewall blocking traffic based on port number. They can also inspect packets for objectionable content or malware. They can even work as a cache for fre- quently visited websites, and because all traffic goes through the proxy server into and out of your network, they are the default gateway. A spam gateway is software that is used for filtering spam out of email. A load balancer appliance is used in an environment where there are multiple servers to distribute the workload across those servers instead of it all going to one.", "notes": [], "multi": true}, {"qnum": 9, "stem": "In IPv6, which of the following identifies the multicast range?", "options": {"A": "::1", "B": "2001;dba:45c:1::5/64", "C": "FE80::abc:1:2/64", "D": "FF00::/8"}, "correct": ["D"], "explanation": "The FF00::/8 range in IPv6 is for multicasts. Remember that IPv6 does not use broadcasts. The closest IPv6 gets is the use of multicast addresses. The::1 is the loopback address for IPv6. IP addresses that begin with 2001 are in the global unicast range, meaning that they are routable on the Internet, and the first 64 bits identify the network. Any number that starts with FE80 is non-routable and is called a link-local address.", "notes": [], "multi": false}, {"qnum": 10, "stem": "Several Bluetooth devices are connected in an ad hoc (without a hub, switch, or WAP) network. Which acronym best describes this type of network?", "options": {"A": "LAN", "B": "WAN", "C": "PAN", "D": "MAN"}, "correct": ["C"], "explanation": "A personal area network (PAN) is a small-scale network designed around one person within a limited boundary area. The term generally refers to networks that use Bluetooth technology. A local area network (LAN) connects devices in a small area, such as a house or business or a single floor in an office building. A wide area network (WAN) covers a very large geographic area, traversing many roads or areas not owned by the entity, and it may use leased lines. The Internet is a worldwide WAN, but a WAN can also connect a single company with offices in New York, Chicago, and D.C., for example. A metropolitan area network (MAN) connects devices in a smaller geographic area, such as a city or community.", "notes": [], "multi": false}, {"qnum": 11, "stem": "Users on your network complain of poor wireless network access in a certain part of your building. They say that the connection is slow and disconnects frequently. You are using 802.11ac wireless routers and access points. What tool should you use to troubleshoot the situation?", "options": {"A": "Wi-Fi analyzer", "B": "Loopback plug", "C": "Tone generator and probe", "D": "Multimeter"}, "correct": ["A"], "explanation": "A wireless locator or a Wi-Fi analyzer can be either a handheld hardware device or specialized software that is installed on a laptop or smartphone, and its purpose is to detect and analyze Wi-Fi signals. A loopback plug is used to test a network interface card (NIC). A toner probe (or tone generator and probe) is used to find a wire out of a bunch of wires or to figure out where the wire runs. A multimeter has many uses, among them is testing for continuity, checking power supplies, and checking electrical wall outlets.", "notes": [], "multi": false}, {"qnum": 12, "stem": "What type of audio/video connector is shown in the graphic?", "options": {"A": "DisplayPort", "B": "DVI", "C": "HDMI", "D": "VGA"}, "correct": ["C"], "explanation": "The image shown is a high-definition multimedia interface (HDMI) cable. HDMI carries audio and video signals in a digital format. A DisplayPort connector is angled on one side, not both. DisplayPort connectors are intended for video only but can also carry audio signals. DisplayPorts provide a digital connection. A digital video interface (DVI) connector is rectangular with 24 pins on the left side in eight rows of three, and four pins on the right, arranged in a square. By definition, a DVI is digital, but there are DVI-A connectors that are analog, and integrated DVI (DVI-I) connectors that are both analog and digital, whereas DIV-D connectors are strictly digital. The number and arrangement of pins changes, depend- ing on which type of DVI connector is being used. A video graphics array (VGA) connector has a total of 15 pins arranged in three rows. VGA is strictly video and transmits only an analog signal.", "notes": [], "multi": false}, {"qnum": 13, "stem": "The computer users in your accounting department have called you stating that their laser printer keeps jamming and have asked that you resolve the issue. Which of the following are common reasons for jamming that you can check? (Choose two.)", "options": {"A": "Incorrect paper thickness or the tray is too full", "B": "Ink cartridges need cleaning", "C": "Debris in the paper path", "D": "Printhead needs cleaning"}, "correct": ["A", "C"], "explanation": "There are several reasons that paper might jam in a laser printer: if you buy the least expensive paper and it’s the wrong weight or coating for the printer, debris in the paper path such as dust and pieces of paper, paper with wrinkles or bent corners, too much humidity causing sheets to stick together, and worn paper feed rollers. Ink cartridges are used in inkjet printers, not laser printers, and printheads are found in impact and thermal printers, not laser printers.", "notes": [], "multi": true}, {"qnum": 14, "stem": "About four computer users in the HR area of the building are complaining that their Wi-Fi connection is very slow. You use your Wi-Fi analyzer and find out that they are on the same channel as your neighbors in the office next door. What can you do?", "options": {"A": "Set the radio signal to maximum.", "B": "Change the channel that the WAP uses.", "C": "Add another WAP.", "D": "Check the cable from the WAP to the router."}, "correct": ["B"], "explanation": "The best option to try first is changing the channel that the wireless access point (WAP) uses to connect. The intermittent connections could be caused by interference with the neighboring Wi-Fi. Turning up the power on your WAP would only make the crossover more between your Wi-Fi and the neighbor’s Wi-Fi, increasing the interference and slowing the connection even more. Adding another WAP might help if the problem was too many users, but with only four users in that area, it’s not that. You could check the cable connecting the WAP to the router, if changing the channel doesn’t resolve the issue.", "notes": [], "multi": false}, {"qnum": 15, "stem": "Which type of connector, shown in the graphic, is used for network connections?", "options": {"A": "RJ11", "B": "RJ45", "C": "F-type", "D": "ST"}, "correct": ["B"], "explanation": "An registered jack 45 (RJ45) connector is used to terminate Ethernet cables used in local area networks (LANs). It has eight wires. An RJ11 connector is narrower than an RJ45 because it only has four wires. RJ11 is used for landline telephones. An F-type connector is used for cable television transmission, satellite television connections, and cable modems. It has a twist-on connector with a solid pin in the middle and is used with coaxial cables. A straight tip (ST) connector has a bayonet-type plug and socket. It is used with fiber-optic cable, and if bidirectional signals are needed, two cables and two connectors are needed.", "notes": [], "multi": false}, {"qnum": 16, "stem": "You’re reading the documentation for a desktop motherboard, which says it uses 240-pin DIMMs. What type of DIMM does it use?", "options": {"A": "DDR3", "B": "DDR4", "C": "DDR5", "D": "SODIMM"}, "correct": ["A"], "explanation": "Double data rate 3 dual in-line memory modules (DDR3 DIMMs) have 240 pins, double data rate 4 (DDR4) and double data rate 5 (DDR5) both have 288 pins, and a small outline dual in-line memory module (SODIMM) is not a type of desktop random access memory (RAM); it is used in laptops.", "notes": [], "multi": false}, {"qnum": 17, "stem": "You don’t have enough ports on your laptop for all the devices that you want to connect. What should you purchase?", "options": {"A": "Port replicator", "B": "Trackpad", "C": "Docking station", "D": "Stylus"}, "correct": ["A"], "explanation": "One simple way to add ports is to use a port replicator, sometimes sold as a “hub.” It usually plugs into one USB-C port and supplies multiple USB-C ports. A trackpad is a surface, usually on a laptop, that enables the user to move their finger(s) either across it or in pinch-and-spread fashion, to control the mouse. A stylus looks like a pen but has a special tip and is used with a touchscreen to control a mouse. A docking station is a bit different than a port replicator, although the terms are often used interchangeably. A docking station replicates the functions of the ports on the back of a laptop, so that peripherals, such as displays, keyboards, printers, and so on, that don’t travel with the laptop can remain connected to the dock and don’t all have to be unplugged physically whenever the laptop is removed. Docking stations effectively turn a laptop computer into a desktop computer, and the docking station may offer its own devices, such as an optical drive and speakers. It may have a generic connector such as a universal serial bus (USB) USB-C or a proprietary connector. Docking station can also refer to a charging cradle for a smartphone or tablet to plug in vertically that provides other functions such as built-in speakers for music playback or a clock. This differs from a port replicator, whose main function is to let the user connect several devices at once and doesn’t require the laptop to be connected to offer that connectivity between the devices.", "notes": [], "multi": false}, {"qnum": 18, "stem": "A user reports that their smartphone will not make any sounds. They have turned the phone off and back on, and the problem is still there. You check the settings, and the phone is not in silent mode and the volume is set to maximum. What can you do to fix this problem?", "options": {"A": "Reset the phone to factory specifications.", "B": "Replace the speakers.", "C": "Replace the sound card.", "D": "Replace the phone."}, "correct": ["D"], "explanation": "If the device does not produce sound, first ensure that it’s not set to silent operation. Most mobile devices will have a switch on the side that users can set to silent or vibrate mode, which will mute the device and keep it from making noises. Also check settings for volume as well as the possible redirection of sound, such as an active Bluetooth pairing. If the speakers have failed on a mobile device, it’s time for a new device. You could try cycling the power on the phone, or the other options listed as possible answers, but they likely won’t work.", "notes": [], "multi": false}, {"qnum": 19, "stem": "A laser printer you are working on is producing images with vertical black streaks running the length of the page. Which of the following could be causing this? (Choose two.)", "options": {"A": "There is a scratch in the EP drum.", "B": "The fusing assembly is not heating up properly.", "C": "The paper exit rollers are worn.", "D": "The charging corona wire is dirty."}, "correct": ["A", "D"], "explanation": "A groove or scratch in the EP drum can cause the problem of vertical black lines running down all or part of the page. Because a scratch is lower than the surface, it doesn’t receive as much (if any) of a charge as the other areas. The result is that toner sticks to it as though it were discharged. The groove may go around the circumference of the drum, so the line may go all the way down the page. Another possible cause of vertical black lines is a dirty charging corona wire, which prevents a sufficient charge from being placed on the EP drum. Because the charge on the EP drum is almost zero, toner sticks to the areas that correspond to the dirty areas on the charging corona. The symptom displayed when a fusing assembly isn’t heating properly is toner sliding off the page when the paper is removed from the printer. Worn exit rollers might cause a paper jam, but not lines down every page.", "notes": [], "multi": true}, {"qnum": 20, "stem": "The motherboard documentation you are reading says that the RAM modules for this motherboard must be purchased in identical sets of four. What type of motherboard is this?", "options": {"A": "Dual channel", "B": "Triple channel", "C": "Quad channel", "D": "Single channel"}, "correct": ["C"], "explanation": "Some motherboards support accessing more than one random access memory (RAM) module at a time. When that is the case, we say that the motherboard has multiple channels. Typically, you will purchase identical RAM modules in quantities that match the number of channels there are. In this case, the documentation says to purchase RAM in identical sets of four, so you can assume it is a quad-channel motherboard. Dual would require identical sets of two, and triple would require identical sets of three, although triple channel motherboards were only popular for a brief period of time.", "notes": [], "multi": false}, {"qnum": 21, "stem": "You have installed an 802.11ac Wi-Fi network. The network has three overlapping wireless access points. What channel width should the access points be set to in order to avoid communications problems while providing the best bandwidth?", "options": {"A": "20 MHz", "B": "40 MHz", "C": "80 MHz", "D": "It doesn’t matter in 802.11ac."}, "correct": ["B"], "explanation": "An 802.11ac network operates in the 5 GHz band, and can be 20, 40, or 80 MHz wide. With the 80 MHz channel width, there are effectively two channels: channel 36–48 and channel 149–161. Because you have three access points, you should use the 40 MHz channel width, which provides four possible channels: 36–40, 44–48, 149–153, and 157–161. The 20 MHz channel width provides nine channels, but you don’t need that many, and the narrower channel width would decrease the performance per client. The 20 MHz channels are 36, 40, 44, 48, 149, 153, 157, 161, and 165.", "notes": [], "multi": false}, {"qnum": 22, "stem": "A user complains that their desktop computer randomly shuts down. No error messages are displayed before it happens, and there is not a specific program that triggers the reboot. Which of the following components is most likely to be causing this problem?", "options": {"A": "RAM", "B": "Storage drive", "C": "BIOS/UEFI", "D": "Network adapter"}, "correct": ["A"], "explanation": "Memory problems can cause system lockups, unexpected shutdowns or reboots, or errors such as the dreaded blue screen of death (BSOD) in Windows or the rotating/spinning pinwheel in macOS. Issues with a central processing unit (CPU) can also cause intermittent rebooting. BIOS/UEFI, network adapters, and storage drives would produce different symptoms than those in the question.", "notes": [], "multi": false}, {"qnum": 23, "stem": "A user calls the Help Desk to report that their display is black. It was working yesterday, but when the desktop computer was booted this morning, nothing showed on the display. They did hear a beep like normal when the computer booted up. What is the first thing you should do?", "options": {"A": "Reseat the plug on the video card.", "B": "Replace the video card.", "C": "Ask the user to press the display’s power button.", "D": "Refresh the operating system."}, "correct": ["C"], "explanation": "When troubleshooting, always start with simple things first. It would not be the first time that a display had been inadvertently turned off. If that doesn’t resolve it, check the cabling to ensure that nothing is loose, check display settings to ensure that the brightness isn’t turned all the way down, and whether the display is using the correct input if it has more than one.", "notes": [], "multi": false}, {"qnum": 24, "stem": "In your company’s lobby, there is a desktop computer with an LCD that plays a continuous loop of a welcome video. The display is enclosed in a cabinet. Recently, the display shuts itself down near the end of the day for no apparent reason. What is likely causing this problem?", "options": {"A": "Backlight failure", "B": "Incorrect video resolution", "C": "Display card failure", "D": "Display overheating"}, "correct": ["D"], "explanation": "Displays may have their own internal power supply, and they all have internal circuitry, which means they can overheat. Ensure that the air vents on the back of the display are free of both dust and debris. In this case, removing the display from the cabinet might help to increase cooling air flow to the display. If the problem persists, it’s best to replace the display. The other options would exhibit different symptoms.", "notes": [], "multi": false}, {"qnum": 25, "stem": "Your pet’s veterinarian has implanted a microchip under their skin so that if your pet is lost, whoever finds the pet can take them to almost any veterinarian and the pet’s name as well as your name and contact information can be read from the microchip using a special reader device. This tag does not provide GPS tracking. What type of technology is in this chip?", "options": {"A": "NFC", "B": "RFID", "C": "HDD", "D": "GPU"}, "correct": ["B"], "explanation": "Radio frequency identification (RFID) tags have numerous uses, including tagging pets to locate the owners when the pet is lost. Near-field communication (NFC) technology is also used to transfer data over a small distance, but that technology is not used in animal tags. Hard disk drives (HDDs) and graphics processing units (GPUs) are found inside computers, not inside a pet, unless of course the pet is a robot.", "notes": [], "multi": false}, {"qnum": 26, "stem": "The design of the micro-ATX motherboard makes which of the following statements true?", "options": {"A": "It will fit in standard ATX cases.", "B": "It will fit in standard ATX cases when used with a mounting adapter kit.", "C": "It will fit in standard ATX cases but can’t support full-length expansion cards.", "D": "It will not fit in standard ATX cases."}, "correct": ["A"], "explanation": "The micro-advanced technology extended (ATX) form factor is designed to work in standard ATX cases as well as its own smaller cases, with no adapter or special cards required.", "notes": [], "multi": false}, {"qnum": 27, "stem": "You are examining an existing coaxial cable installation and notice that the previous technician installed a splitter. Which of the following statements is true?", "options": {"A": "The splitter will cause the network connection to fail.", "B": "The splitter will increase the distance the network signal will travel.", "C": "The splitter will degrade the quality of the network signal.", "D": "The splitter will have no effect on the network signal."}, "correct": ["C"], "explanation": "Splitters generally have two effects on a coaxial cable: They degrade the signal and limit the distance the signal will travel. Avoid using them whenever possible.", "notes": [], "multi": false}, {"qnum": 28, "stem": "A desktop computer will not retain the system time or date. The user always needs to reset them after the system is powered off. What should you do to fix the problem?", "options": {"A": "Flash the BIOS/UEFI.", "B": "Replace the BIOS/UEFI chips.", "C": "Replace the CMOS battery.", "D": "Use the jumper on the motherboard to reset the BIOS/UEFI to factory settings."}, "correct": ["C"], "explanation": "If a computer is a few years old, the basic input/output system/unified extensible firmware interface (BIOS/UEFI) may fail to retain your computer’s settings, such as time and date and hard drive configuration. The BIOS/UEFI uses a small, flat, 3-volt battery (much like a watch battery) on the motherboard to help it retain settings when the system power is off. If this battery fails, the BIOS/UEFI won’t retain its settings. Simply replace the battery with the same type to solve the problem. There is usually a number printed on top of the battery, such as CR2032 or 2035 so you know which one to get. You would not flash the BIOS to fix this problem, and BIOS/UEFI chips are not user replaceable. Resetting the BIOS/UEFI jumper on the motherboard will clear the settings, which is what you’re trying to avoid.", "notes": [], "multi": false}, {"qnum": 29, "stem": "A new technician trainee just turned a computer on, and it beeped once. They had heard about motherboard beep codes and ask you what that single beep means. What will you tell them?", "options": {"A": "Bad RAM", "B": "CPU issue", "C": "Video isn’t working", "D": "POST completed successfully"}, "correct": ["D"], "explanation": "When the power-on self-test (POST) completes successfully, most motherboards will emit a single beep to let you know. If it doesn’t turn on normally after one beep, or multiple beeps, refer to the motherboard manufacturer’s documentation, but continuous beeps are usually a RAM issue, and a series of long and short beeps are usually a video issue. Some mother- boards have status indicator lights on the motherboard instead of beep codes. If it’s the CPU, it usually just won’t start.", "notes": [], "multi": false}, {"qnum": 30, "stem": "A user has turned in a tablet computer that has a swollen battery. What should you do to resolve the problem?", "options": {"A": "Turn the tablet off, let it cool down, and then return it to the user.", "B": "Order a new tablet for the user, drain the excess electrolyte from the battery, and then dispose of the defective one in the trash.", "C": "Order a new tablet for the user, and take the defective one to a recycling center.", "D": "Order a new tablet for the user, and throw the defective one in the trash."}, "correct": ["C"], "explanation": "If you have a swollen battery, turn the device off immediately and ensure that it’s not plugged into a charger. It might be possible to remove the battery, but swollen batteries are more prone to explosions than normal ones because the casing is already compromised, and most batteries in small devices are not user replaceable. The best course of action is to purchase a new device. Take the battery or device to a proper recycling center to dispose of it. Never just throw it in the trash because it can explode and harm sanitation workers as well as cause significant environmental damage.", "notes": [], "multi": false}, {"qnum": 31, "stem": "You have multiple web servers and want to ensure that the web traffic is equally distributed between them to maintain fast response times. What network appliance will you employ to achieve the desired result?", "options": {"A": "Spam gateway", "B": "Proxy server", "C": "Load balancer", "D": "UTM"}, "correct": ["C"], "explanation": "A load balancer distributes requests among different servers. One of the main reasons for using a load balancer is to improve server response times, whether the servers support a website or internal data. Not surprisingly, spam gateways detect and block spam. A proxy server usually serves as the gateway between networks or a network and the Internet and will filter traffic based on various user specified criteria. Unified threat management (UTM) combines multiple security features such as a firewall, anti-malware, packet filtering, intrusion detection services (IDS), and intrusion protection services (IPS) all in a single network appliance or software.", "notes": [], "multi": false}, {"qnum": 32, "stem": "Your motherboard supports up-plugging for PCIe adapter cards. Which of the following statements is true?", "options": {"A": "You can’t put an x8 card into an x16 slot.", "B": "You can put an x8 card into an x16 slot, but it will run at x1 speed.", "C": "You can put an x8 card into an x16 slot, but it will run at x8 speed.", "D": "You can put an x8 card into an x16 slot, and it will run at x16 speed."}, "correct": ["C"], "explanation": "The x8 card won’t completely fill the x16 slot, but it will work at x8 speeds if up-plugging is supported by the motherboard. Otherwise, the specification requires up-plugged devices to operate at only the x1 rate.", "notes": [], "multi": false}, {"qnum": 33, "stem": "Your company needs a fast Internet connection, so it has purchased a fiber-optic connection from an ISP. You need to connect your router to the ISP using an Ethernet cable. Where will this connection take place?", "options": {"A": "At the DSL", "B": "At a NIC", "C": "At a PoE", "D": "At the ONT"}, "correct": ["D"], "explanation": "An optical network terminal (ONT) is usually a box on the outside of a building where a fiber-optic line connects to a network. The ONT will have fiber-optic connections, Ethernet (RJ45) connections, and perhaps others. It also contains a transducer that converts the flashes of light from the fiber-optic cable to pulses of electricity needed by the Ethernet cable.", "notes": [], "multi": false}, {"qnum": 34, "stem": "Your coworker needs to transfer files from a mobile device using a memory card reader and an SD memory card. They quickly discover that the maximum capacity on their SD card is 1 TB. Which technology does the coworker have?", "options": {"A": "SD", "B": "SDXC", "C": "SDHC", "D": "SDLC"}, "correct": ["B"], "explanation": "Currently there are three form factors for secure digital (SD) cards; they are SD, MiniSD, and MicroSD. The cards also come in different capacities and filesystems as follows: ▪ Secure Digital (SD): 2 GB or less, FAT12 or FAT16 ▪ Secure Digital High Capacity (SDHC): 2 GB to 32 GB, FAT32 ▪ Secure Digital Extended Capacity (SDXC): 32 GB to 2 TB, exFAT ▪ Secure Digital Ultra Capacity (SDUC): 2 TB to 128 TB, exFAT", "notes": [], "multi": false}, {"qnum": 35, "stem": "A user reports that when they press the L key on their laptop keyboard, the L character repeats across the screen and doesn’t stop until the L key is pressed several more times. When you look at the laptop, it does not appear that the key is physically sticking. What should you do next?", "options": {"A": "Replace the keyboard.", "B": "Replace the L key.", "C": "Clean under the key with compressed air.", "D": "Reboot the laptop."}, "correct": ["D"], "explanation": "If a key on the laptop keyboard is stuck, you need to determine whether the contact is having problems or whether the key itself is stuck. If the key is not physically stuck but the laptop thinks it is, rebooting generally solves the problem.", "notes": [], "multi": false}, {"qnum": 36, "stem": "You’re working on a stormy night and the power in your house goes out, but your cellular service (i.e., smartphone) is working. You have a report on your laptop that absolutely must be submitted tonight, and luckily your laptop is fully charged. What can you do to submit your report?", "options": {"A": "Connect your laptop to your car’s antenna to send via Wi-Fi.", "B": "Use your smartphone’s hotspot feature.", "C": "Go out in the storm and drive to the nearest place with power that has public Wi-Fi.", "D": "Call and let them know that the report won’t be submitted because your power is out."}, "correct": ["B"], "explanation": "The hotspot feature available on virtually all smartphones will enable you to connect other devices to the Internet via the cellular tower system. Typically, you turn the hotspot feature on in the phone’s settings. It will display a wireless password and allow you to connect wirelessly via Wi-Fi or Bluetooth or connect physically via universal serial bus (USB) by connecting a cable between your laptop and phone. The downside of using your smart- phone as a hotspot is that it eats up data quickly and could be expensive if you don’t have unlimited data on your cellular plan.", "notes": [], "multi": false}, {"qnum": 37, "stem": "You have determined that you need to replace the Wi-Fi antenna in your laptop. Where will you most likely find it?", "options": {"A": "In the housing with the display", "B": "Under the keyboard", "C": "Under a removable panel on the back/bottom of the laptop", "D": "Plugged into a USB port"}, "correct": ["A"], "explanation": "Most laptop antennas connect to the main board and have wires that run up the sides of the display. Occasionally, you might find one on the mainboard. Modern laptops typically don’t have removable areas on the bottom/back like legacy laptops do. If a laptop’s antenna quits working, one option is to purchase a Wi-Fi network card that plugs into an external port, such as a universal serial bus (USB) port.", "notes": [], "multi": false}, {"qnum": 38, "stem": "Which of the following are common components of cloud storage applications that can be used to store and synchronize data on all of your devices, including smartphones, laptops, desktop computers, and other devices? (Choose three.)", "options": {"A": "Calendar", "B": "Contacts", "C": "Microsoft 365 Copilot", "D": "Cloud Mail"}, "correct": ["A", "B", "C"], "explanation": "Calendar, Contacts, Mail, and storage are common components of cloud applications that enable you to synchronize information across your devices. Microsoft 365 Copilot, Google, and other companies provide could application services.", "notes": [], "multi": true}, {"qnum": 39, "stem": "You pay a premium for faster Internet service at home but have noticed that the download times have slowed considerably, and you see a spinning wheel indicating slow downloads more than normal. What is likely the problem?", "options": {"A": "You have reached a data cap.", "B": "You didn’t pay your last bill, so they’re slowing the service down.", "C": "You’re synchronizing too much data all at once.", "D": "The Internet is down."}, "correct": ["A"], "explanation": "Most Internet Service Providers (ISPs) offer faster Internet access for a premium price, but they also put a cap on that service, and although they won’t turn your service off, they may slow it down when you reach that cap.", "notes": [], "multi": false}, {"qnum": 40, "stem": "You have a small office with frequent visitors and want to provide a separate VLAN to segregate the visitor traffic from your network traffic for security reasons. What is the minimum connectivity device needed to accomplish this?", "options": {"A": "Hub", "B": "Bridge", "C": "Managed switch", "D": "Unmanaged switch"}, "correct": ["C"], "explanation": "To segregate a local area network (LAN) into two virtual LANs (VLANs), you would need a managed switch. Managed switches contain software that allows for port configuration, diagnostics, and monitoring situations, such as port flapping. An unmanaged switch is simply a connectivity device. It can’t be used to segregate ports into separate VLANs. A bridge is used to aggregate two or more networks into one. A hub is simply a connectivity device that is a single collision domain, whereas each port on a switch (managed or not) is its own collision domain. Hubs are seldom found on networks now, but they are often used to provide multiple ports for a single connection on a computer, such as a USB port. Note that some routers have the ability to create a VLAN by using different IP address ranges, but more often a switch is used.", "notes": [], "multi": false}, {"qnum": 41, "stem": "You are creating a virtual machine (VM) host that will support multiple VMs. The host software will be installed directly on the computer hardware, not in an operating system. What type of hypervisor is being used?", "options": {"A": "Type 1", "B": "Type 2", "C": "Sandbox", "D": "Storage"}, "correct": ["A"], "explanation": "A Type 1 hypervisor is also called a bare metal hypervisor, because it is installed directly on the hardware and not within an operating system (OS) such as Microsoft Windows. Type 2 requires an operating system for installation. Virtual machines (VMs) can be used to create a sandbox, which is a network or system for testing software or configuration changes, or even malware, without compromising the live network. Storage is simply space in RAM or on a drive where data is kept.", "notes": [], "multi": false}, {"qnum": 42, "stem": "Which of the following IP addresses is not routable on the Internet?", "options": {"A": "192.169.1.1", "B": "192.168.1.1", "C": "168.192.1.1", "D": "169.192.1.1"}, "correct": ["B"], "explanation": "Private IP addresses are not routable on the Internet. The following are the IPv4 private address ranges and non-routable number ranges, with the /n indicating the bits in the subnet mask that identify the network portion of each group: ▪ 10.0.0.0–10.255.255.255/8 (Class A) ▪ 172.16.0.0/16–172.31.255.255/12 (Class B) ▪ 192.168.0.0–192.168.255.255/16 (Class C) ▪ 169.254.0.0–169.254.255.255 (APIPA) ▪ 127.0.0.1 (Loopback address)", "notes": [], "multi": false}, {"qnum": 43, "stem": "When setting up your network, you configured your clients to obtain IP addressing informa- tion automatically from a DHCP server. You set the group of numbers that it can assign from 192.168.100.11 to 192.168.100.211. What is this group of assignable numbers called?", "options": {"A": "APIPA", "B": "Leases", "C": "Scope", "D": "Reservations"}, "correct": ["C"], "explanation": "The range of numbers that can be assigned by a Dynamic Host Configuration Protocol (DHCP) server to client computers is called the DHCP scope. Each of those numbers can be leased to the client for a period of time that you choose in the server settings. Reservations are numbers that you set aside for specific devices on the network whose IP address you don’t want to change, like a server or IP printer. Automatic Private IP Addressing (APIPA) addresses are self-assigned by a computer that is set for dynamic IP addressing but that is unable to reach a DHCP server.", "notes": [], "multi": false}, {"qnum": 44, "stem": "You’re considering setting up a WISP. What is an advantage of using an unlicensed frequency versus using a licensed frequency?", "options": {"A": "The frequencies are not congested.", "B": "The radiated power is unlimited by regulations.", "C": "The performance is better than licensed frequencies.", "D": "Equipment is readily available."}, "correct": ["D"], "explanation": "There are advantages and disadvantages to using the unlicensed frequency bands. Advantages include equipment is widely available and inexpensive, there are no fees for using the unlicensed spectrum, and its use is widespread, so information is available to help set one up. The disadvantages of using the unlicensed frequency spectrum are that it is congested (because it’s free) and many places regulate how powerful the signal can be.", "notes": [], "multi": false}, {"qnum": 45, "stem": "What type of port is shown in the graphic?", "options": {"A": "USB-C", "B": "Molex", "C": "SC", "D": "LC"}, "correct": ["A"], "explanation": "The port shown in the graphic is a universal serial bus Type C (USB-C) port. It is identical in shape to a lightning port. A Molex connector is a type of 4-pin power connector used for legacy hard drives and some motherboard and expansion card power connections. The subscriber connector (SC) and Lucent connector (LC) are used for fiber-optic connections. An SC is about twice the size of the LC connector. Both have square housing. The SC uses a small locking tab, and the LC uses a locking latch to hold it in place.", "notes": [], "multi": false}, {"qnum": 46, "stem": "Which of the following would most likely use NVMe technology?", "options": {"A": "5,400 rpm drive", "B": "HDD", "C": "mSATA", "D": "M.2"}, "correct": ["D"], "explanation": "Nonvolatile memory express (NVMe) is a driver and communication interface for Peripheral component interconnect express (PCIe)-based solid-state drives (SSDs). It uses the PCIe bus but can be in PCIe, M.2, and U.2 form factors. It transfers data much faster than the advanced host controller interface (AHCI) that was used for serial advanced technology attachment (SATA). Both AHCI and NVMe SSDs can use the PCIe slot and M.2 connectors on motherboards, so it’s important to know whether the M.2 connector supports AHCI, NVMe, or both. U.2 is only NVMe, but it isn’t on the CompTIA A+ objectives. SATA will use the AHCI interface, even if it’s connected to an M.2 slot on the motherboard. Mini SATA (mSATA) is a different form factor and can’t be used in an M.2 slot.", "notes": [], "multi": false}, {"qnum": 47, "stem": "Which level of RAID will provide both better performance and fault tolerance with the fewest drives possible?", "options": {"A": "RAID 0", "B": "RAID 1", "C": "RAID 5", "D": "RAID 10"}, "correct": ["C"], "explanation": "Redundant array of independent disks (RAID) level 0 is disk striping and provides improved performance but no fault tolerance. RAID 1, mirroring, provides fault tolerance but no improvement in performance. Both RAID 0 and RAID 1 require two drives. RAID 5 provides both fault tolerance and enhanced performance and requires a minimum of three drives. RAID 10 (or 1+0) is a stripe of mirrored drives and provides both fault tolerance and enhanced performance but requires a minimum of four drives.", "notes": [], "multi": false}, {"qnum": 48, "stem": "You purchased an expansion card for your desktop that fits in a PCIe x1 slot. The documen- tation says that the card supports USB 3.0 with a 5 Gbps maximum transfer rate. What version of PCIe is the card?", "options": {"A": "PCIe 1.0", "B": "PCIe 2.0", "C": "PCIe 3.x", "D": "PCIe 4.x"}, "correct": ["B"], "explanation": "Mini PCIe cards running in PCIe 1.0 x1 mode have a maximum speed of 2.5 Gbps per lane. Each send and receive pair in Peripheral Component Interconnect Express (PCIe) is a lane, and PCIe can have 1, 2, 4, 8, 12, or 16 lanes. PCIe that uses one lane is noted as PCIe x1, two lanes are x2, and so on. Successive versions of PCIe have increased the speed per lane. PCIe 2.0 speed per lane is 5 Gbps, 3.x is 8 Gbps, and 4.x is 16 Gbps per lane. Those speeds are the bandwidth, the theoretical speeds, but the actual throughput will be slightly less.", "notes": [], "multi": false}, {"qnum": 49, "stem": "A user complains of a burning smell coming from their computer. After shutting it down, you notice that the motherboard has burn marks on it. You replace the motherboard. The next day, the user complains again of a burning smell, and you see this motherboard is burnt as well. What should you do next?", "options": {"A": "Replace the motherboard.", "B": "Replace the power supply.", "C": "Replace the motherboard and power supply.", "D": "Plug the computer into a different wall outlet."}, "correct": ["C"], "explanation": "If you have scorch marks on a component, say a video card or a motherboard, it could be that the specific component has gone bad. It could also be a sign of a problem with the power supply. If you see a component with a burn mark, it would be a good idea to test the power supply as well. Not all power supply problems will show up by using a tester, so if you replace the component and a similar problem occurs, definitely replace the power supply as well as the damaged component.", "notes": [], "multi": false}, {"qnum": 50, "stem": "You are installing an ATX12V (sometimes called ATX2) power supply with a 24-pin main power connector. Which of the following is not a voltage provided by the power supply?", "options": {"A": "−3.3 VDC", "B": "+5 VDC", "C": "+12 VDC", "D": "−12 VDC"}, "correct": ["A"], "explanation": "Power supplies convert the volts of alternating current (VAC) from a wall outlet into volts of direct current (VDC) that computers can use. ATX12V power supplies provide the following voltages for the computer: +3.3 VDC, +5 VDC, +12 VDC, and −12 VDC. Older (ATX) power supplies that have a 20-pin main power connector also supply −5 VDC. Power supplies use shapes as keys so connectors can’t be plugged in incorrectly. Many companies also have proprietary power supplies, meaning that you must replace their power supply with an identical one, because they don’t match the standard.", "notes": [], "multi": false}, {"qnum": 51, "stem": "You have a Windows 11 desktop computer that is connected directly to your office printer. Your office is running a workgroup (not a domain). You want to share the office printer with a new user. What are two places you can do this? (Choose two.)", "options": {"A": "Search for printers, right-click the desired printer, and choose Share.", "B": "In the Settings app, choose Bluetooth & Devices and then Printers & Scanners. Select the printer to share, and then, on the window that displays, choose Printer Properties, and choose the Sharing tab.", "C": "In the Control Panel, choose Devices and Printers, which will take you to Bluetooth & Devices in the Settings app.", "D": "In Device Manager, click the printer and select the Sharing tab."}, "correct": ["B", "C"], "explanation": "A local printer can easily be shared with other people in your workgroup. Simply navigate to the Printer properties, which can be accomplished in various ways, and choose the Sharing tab.", "notes": [], "multi": true}, {"qnum": 52, "stem": "Your company produces software and employs about 20 developers. They need to program apps for different operating systems. You decide to purchase cloud-based services to support the development team. What type of service should you purchase so that they can develop their programs and then test them in environments other than where they were developed?", "options": {"A": "IaaS", "B": "SaaS", "C": "PaaS", "D": "NaaS"}, "correct": ["C"], "explanation": "Platform-as-a-Service (PaaS) adds a layer to Infrastructure-as-a-Service (IaaS) that includes software development tools, such as runtime environments. Because of this, it can be helpful to software developers; the vendor manages the various hardware platforms. This frees up the software developers to focus on building their application and scaling it. The best PaaS solutions allow for the client to export its developed programs and run them in an environment other than where they were developed. Software-as-a-Service (SaaS) provides access to applications online, and Network-as-a-Service (NaaS) provides a scalable network infrastructure.", "notes": [], "multi": false}, {"qnum": 53, "stem": "Your RAID array is beeping steadily. What could be the problem? (Choose two.)", "options": {"A": "Faulty NIC", "B": "Controller problem", "C": "Failed VM", "D": "Missing or nonworking drive"}, "correct": ["B", "D"], "explanation": "If your redundant array of independent disks (RAID) system is beeping steadily, it’s warning you that there is a problem with the array. It might be the controller, but it’s more likely that the problem is a failed drive. You might have to replace a drive or rebuild the array, depending on how the RAID is configured.", "notes": [], "multi": true}, {"qnum": 54, "stem": "What feature of cloud computing means that you can expand your network immediately as needed?", "options": {"A": "Shared resources", "B": "Metered utilization", "C": "Elasticity", "D": "File synchronization"}, "correct": ["C"], "explanation": "Elasticity is one of the greatest benefits of cloud computing. You can add servers or network components as needed, on the fly. Shared resources are what makes rapid elasticity possible. Metered utilization means you pay for what you use, and file synchronization keeps your files up to date across different devices.", "notes": [], "multi": false}, {"qnum": 55, "stem": "A client complains about the occupied space, profuse power usage, and hardware costs of the multiple machines used in its small data center. Still, the client does not wish to lose control over any of the machines. What might you recommend to the client to resolve all of those issues?", "options": {"A": "Establish clusters for high availability.", "B": "Create virtual machines.", "C": "Outsource to an IaaS provider.", "D": "Shut down the nonessential machines."}, "correct": ["B"], "explanation": "The creation of virtual machines (VMs) would alleviate the issue of space, power, and most of the hardware costs associated with maintaining individual computer systems. VMs can provide the same functionality at a fraction of the cost by enabling a single set of hardware to provide much of the computing power needed. Control and management of the machines would remain with the company.", "notes": [], "multi": false}, {"qnum": 56, "stem": "A computer is making a grinding noise and is working but seems to be very slow in accessing information. Which component will you likely need to replace?", "options": {"A": "HDD", "B": "SSD", "C": "NIC", "D": "LED"}, "correct": ["A"], "explanation": "Grinding noise is a telltale sign of a hard disk drive (HDD) that is failing. Unlike solid-state drives (SSDs), HDDs have moving parts that sometimes wear out. If you hear a grinding noise, back up the data and replace the HDD as soon as possible!", "notes": [], "multi": false}, {"qnum": 57, "stem": "You have configured two hard drives so that when you write to one, it makes an exact copy on the other, and it looks like one drive in your operating system. What level of RAID is this?", "options": {"A": "RAID 0", "B": "RAID 1", "C": "RAID 5", "D": "RAID 10"}, "correct": ["B"], "explanation": "This configuration is a mirrored drive, Redundant Array of Independent Disks 1 (RAID 1). If one drive fails, you have an exact duplicate on the other. It provides fault tolerance, but it doesn’t protect your system against human error, so you still need backups! RAID 0 is disk striping, which enhances performance but doesn’t help at all with fault tolerance. RAID 5 is disk striping with parity, so it offers fault tolerance and performance improvement. Data is written on two drives, and the third is striped with recovery data. The recovery data is put on each drive in turn. If one drive fails, there is enough recovery data on the other two to rebuild it. RAID 10 is a striped set of mirrors, so like RAID 5 it offers fault tolerance and performance improvement but does so in a different way.", "notes": [], "multi": false}, {"qnum": 58, "stem": "A technician is troubleshooting a computer in the field and calls you to report that they are getting a S.M.A.R.T. error ID 188 and command timeout. Which component is likely to be causing this error?", "options": {"A": "CPU", "B": "RAM", "C": "Motherboard", "D": "HDD"}, "correct": ["D"], "explanation": "Nearly every hard drive is built with Self-Monitoring, Analysis, and Reporting Technology (S.M.A.R.T.) software installed on it, which monitors hard drive reliability and theoretically can warn you in the event of an imminent failure. The error ID makes no difference. If it is a S.M.A.R.T. error, it’s the hard drive.", "notes": [], "multi": false}, {"qnum": 59, "stem": "You just took a new display out of the box and set it up. Now, you notice that it has two dead pixels. What do you do?", "options": {"A": "Return the display for a refund.", "B": "Keep the display but ask for a discount.", "C": "Calibrate the display.", "D": "Keep the display; it is fine."}, "correct": ["D"], "explanation": "It is normal that a display may have a dead (i.e., black) pixel or two. This is not consid- ered a big flaw; there is nothing you, as a tech, can do to fix it. If there are many dead pixels or you’re just not happy with your display, your only recourse is to return it for another one, if the vendor will take it back.", "notes": [], "multi": false}, {"qnum": 60, "stem": "A user complains that the color on their display is strange. It was working fine yesterday. What will you do first?", "options": {"A": "Check for a loose cable connection at both ends.", "B": "Replace the display.", "C": "Turn the display off and back on.", "D": "Check the settings on the display itself."}, "correct": ["A"], "explanation": "This is a typical symptom of a loose cable. You need to check both ends of the cable and ensure that they are properly seated. Turning the display or the PC off and back on may also fix it and checking that someone hasn’t bumped or changed the display’s settings is a quick fix too. If none of those work, the next step would be to try a known good display on the computer. If the problem still exists, it’s not the display. It might be time to get a new graphics card.", "notes": [], "multi": false}, {"qnum": 61, "stem": "A mobile device user dropped their smartphone, and now the charging port is damaged. The device is fairly new, but they didn’t pay for a warranty to cover user error. They don’t typically plug it into a computer or anything else. What should you do first?", "options": {"A": "Take the phone apart and replace the charging port.", "B": "Return the phone to the store for a refund.", "C": "See if the device supports wireless charging.", "D": "Replace the phone."}, "correct": ["C"], "explanation": "If the phone will charge wirelessly, then it should be fine. If it’s not covered by a warranty, the store isn’t going to fix or replace it for free. Charging ports aren’t normally considered a user-replaceable part. Components like charging ports can be replaced by a service center where there are people trained to work on smartphones. In any case, make sure that person is backing up the data on their phone to the cloud.", "notes": [], "multi": false}, {"qnum": 62, "stem": "A grinding noise is coming from your office printer. You know that can’t be good, and you just put new toner in two days ago. What do you do?", "options": {"A": "Try replacing the toner cartridge.", "B": "Take all the paper out and reload it.", "C": "Thoroughly clean the printer.", "D": "Check for any loose rollers or gears."}, "correct": ["A"], "explanation": "In troubleshooting, try the simple things first. If it wasn’t grinding before, and it is since you installed a new toner cartridge, then the problem is most likely the toner cartridge. Take it out and put a new one in. If that doesn’t fix it, then look for loose rollers or gears and jammed paper. Thoroughly cleaning it would be the next step. Chances are that reloading the paper won’t help.", "notes": [], "multi": false}, {"qnum": 63, "stem": "Several users who access the network through the same WAP are complaining that they have limited connectivity. They can see each other on the network but not any network resources like printers and servers. Everything was working fine yesterday, and network users in other parts of the building are not having problems. What should you troubleshoot first?", "options": {"A": "The power of the radio signal from the WAP", "B": "The connection between the WAP and the router", "C": "Their IP configuration", "D": "The default gateway"}, "correct": ["B"], "explanation": "When a Wi-Fi user is getting limited connectivity messages, it means that they are able to connect to the wireless access point (WAP) but not the Internet. Because others are also receiving this error message, you can assume it’s the connection between the WAP they’re connecting to and the wired network where the router resides. The router connects the WAP to the wired network and the Internet.", "notes": [], "multi": false}, {"qnum": 64, "stem": "You just bought a new laptop and were told that it uses biometrics to log you in. Which of the following might they be? (Choose two.)", "options": {"A": "Face scanner", "B": "Entering your password", "C": "Fingerprint reader", "D": "Entering a code from your phone"}, "correct": ["A", "C"], "explanation": "Biometrics are any device that uses a part of your body to identify you. It’s common on modern laptops to have the availability of a face scanner or fingerprint reader to log in to the computer. Other biometrics are retina scanners, palm scanners, and voice recognition.", "notes": [], "multi": true}, {"qnum": 65, "stem": "There is a white streak down all of the printouts of your inkjet printer. What will you do to fix it? (Choose two.)", "options": {"A": "Change the toner cartridge.", "B": "Clean the printheads (nozzle-cleaning routine).", "C": "Clear debris from the paper path.", "D": "Use different paper."}, "correct": ["B", "C"], "explanation": "It is likely that the ink on your print nozzles is dried out, or if there is something stuck in the printer, like a piece of sticky label, it could be blocking the ink from going where you want it on the paper. The first step would be to do the nozzle-cleaning routine, which cleans the printheads, and you may have to do it more than once. If the nozzle-cleaning check printout looks good, but you’re still having the issue, look inside for something blocking the ink. You might need to replace the ink cartridges. Inkjet printers don’t use toner cartridges, and the wrong paper would present different problems.", "notes": [], "multi": true}, {"qnum": 66, "stem": "The company president is presenting at a meeting in the conference room, and the projector there keeps shutting down after a few minutes. What will you do to remedy the problem? (Choose two.)", "options": {"A": "Unplug the projector and plug it in again.", "B": "Remove dust from the vents.", "C": "Allow the fan to run and cool down the system.", "D": "Change the input source."}, "correct": ["B", "C"], "explanation": "The most likely problem is overheating. DO NOT unplug the projector, as this will stop the fan from cooling down the system and could result in a blown bulb. You can use canned air or a small anti-static brush to remove dust from the vents to promote better air flow. Allow the fan to run and cool down the projector. If an incorrect input source is chosen, it could shut the projector down because it doesn’t sense any input, but then you would have received a call that it simply “doesn’t work.”", "notes": [], "multi": true}, {"qnum": 67, "stem": "Users at your workplace are complaining that the audio over their VoIP phones is of poor quality. It’s often choppy and difficult to understand. Which of these would help with that and could be done fairly quickly? (Choose two.)", "options": {"A": "Configure QoS to give the VoIP phones priority.", "B": "Upgrade the cabling on the network.", "C": "Set up the VoIP phones on their own VLAN.", "D": "Set up the VoIP phones using a VPN."}, "correct": ["A", "C"], "explanation": "Configuring quality of service (QoS) to give priority to the voice over IP (VoIP) phones would likely help the situation, but not as much as putting them on their own virtual local area network (VLAN). Upgrading the cabling to something with more bandwidth might help, but that isn’t a quick solution. If you have a managed switch, setting up a VLAN could be done fairly quickly and would segregate your VoIP traffic on its own network, so that it isn’t competing with computer traffic. A virtual private network (VPN) enables a remote user to connect to a network as if they were in the same physical location.", "notes": [], "multi": true}, {"qnum": 68, "stem": "You notice that your friend’s smartphone is swollen. They said that it happens all the time. What should be done?", "options": {"A": "Replace the battery.", "B": "Replace the device.", "C": "Unplug it and let it cool down, and then plug it back in.", "D": "Use a different power outlet."}, "correct": ["B"], "explanation": "First, if it is plugged in, unplug it. A swollen smartphone is usually a sign of a battery problem, and compromised batteries may explode or burst into flame. Most modern smartphones don’t have replaceable batteries, so your friend should replace the smartphone.", "notes": [], "multi": false}, {"qnum": 69, "stem": "What are the benefits of virtualization? (Choose two.)", "options": {"A": "Saves power", "B": "Requires more licenses", "C": "Less hardware to pay for", "D": "Distributed management"}, "correct": ["A", "C"], "explanation": "Virtualization has many benefits. If you need, for example, Windows 10, Windows 11, and a Linux distro, instead of having three computers you would only need one. Windows 11 could be the host operating system (OS) and the other two could reside in a virtual machine (VM). This saves power, space, and hardware expense. You would need the same number of licenses whether or not you have the OSs installed on a VM, and managing the OSs is simple because they are all in one box.", "notes": [], "multi": true}, {"qnum": 70, "stem": "All the users on your network, wired and wireless, are complaining that they’re getting a limited-connectivity message. Where will you start troubleshooting? (Choose the best answer.)", "options": {"A": "WAP", "B": "Default gateway", "C": "Switch", "D": "Router"}, "correct": ["B"], "explanation": "If everyone is receiving a limited connectivity message, then no one is connecting to the Internet. The place to start troubleshooting is the default gateway, which on many networks could be a router, but it could also be a proxy server, so the default gateway is the best answer here. It’s not the wireless access point (WAP) because wired users are having trouble too. It’s not the switch because switches connect devices on a LAN; they don’t connect the LAN to the Internet.", "notes": [], "multi": true}, {"qnum": 71, "stem": "You’re shopping for a wireless speaker to use with your smartphone and considering different connection methods. Which of the following wireless connection types generally has a functional communication distance of 10 meters?", "options": {"A": "NFC", "B": "IR", "C": "Bluetooth", "D": "Wi-Fi"}, "correct": ["C"], "explanation": "The vast majority of consumer Bluetooth mobile devices are Class 2 devices, which have a maximum communication distance of 10 meters (i.e., about 30 feet). The maximum commu- nicating distance for near-field communication (NFC) is only about four inches, infrared (IR) requires line of sight, and Wi-Fi has a much greater distance depending on the Wi-Fi standard being used.", "notes": [], "multi": false}, {"qnum": 72, "stem": "What type of display is increasingly being used in smaller mobile devices for its picture quality, lower power consumption, and foldability?", "options": {"A": "IPS", "B": "OLED", "C": "LED", "D": "VA"}, "correct": ["B"], "explanation": "Organic light-emitting diode (OLED) displays have many advantages over liquid-crystal displays (LCDs). In-plane switching (IPS) and vertical alignment (VA) are both types of LCDs, and some displays use light-emitting diode (LED) backlighting. OLEDs don’t need backlighting because the carbon-based material they are created from provides light and color. Fewer layers are needed so OLED displays can be made thinner than LED displays. The color contrast is better than LED displays, and they have faster refresh rates and the unique characteristic of being foldable.", "notes": [], "multi": false}, {"qnum": 73, "stem": "Your company allows workers to use their personal devices for company business. What will you, as the IT director, use to ensure that company information is safe on those personal devices?", "options": {"A": "MDM", "B": "BYOD", "C": "PRL", "D": "GSM"}, "correct": ["A"], "explanation": "Mobile device management (MDM) systems can be used to ensure the security of your company information on employees’ personal devices. They can be used to block downloading or printing of certain information and can be used to lock or wipe lost or stolen devices or remove company data from mobile devices when an employee has left the company. A bring your own device (BYOD) policy is agreed to by an employee at onboarding and defines how BYOD devices will be used and secured, but the policy doesn’t actually do the securing. A preferred roaming list (PRL) will be updated as needed on a mobile device, to ensure that you can roam and connect to the proper cell towers. The Global System for Mobile Communications (GSM) defines how 2G cellular networks work. GSM is used in Europe and in much of the world. Code Division Multiple Access (CDMA) is mainly used in the United States and was used on 2G and 3G phone systems. The current standard is 5G in many places.", "notes": [], "multi": false}, {"qnum": 74, "stem": "Which of the following would not be considered authentication in a system using MFA?", "options": {"A": "Key fob", "B": "Authenticator app", "C": "Username", "D": "Soft token"}, "correct": ["C"], "explanation": "Your username is identification—telling a system who you are. Authentication means proving to a system that you are who you say you are, and that is done by providing something you know, something you have, something you are (i.e., biometrics), or somewhere you are. These are the factors used to authenticate you. In a multifactor authenti- cation (MFA) system, you first identify yourself to the system (i.e., by providing your username), and provide your first authentication, usually a password (i.e., something you know), then you need another authentication factor. A key fob is a small device, about the size of a key chain, that uses algorithms to generate a numeric key that lasts for only a few seconds and is unique to the application and the user. An authenticator app is software on a device, which does the same thing, and is a type of soft token. A key fob is considered a hard token.", "notes": [], "multi": false}, {"qnum": 75, "stem": "Which two TCP/IP protocols are designed to download email from mail servers? (Choose two.)", "options": {"A": "SMTP", "B": "POP3", "C": "IMAP", "D": "SMB"}, "correct": ["B", "C"], "explanation": "Post Office Protocol version 3 (POP3) and Internet Message Access Protocol (IMAP) are used for downloading email messages from a server. The difference between the two is that IMAP allows the messages to remain on the server so they can be accessed from different devices, where with POP3 the email messages will only exist on the device on which they were downloaded. Simple Mail Transfer Protocol (SMTP) is used for sending an email. A good way to remember which is for sending and receiving is to remember that S (as in SMTP) is for sending. Server Message Block (SMB) is a protocol for sharing files across a network.", "notes": [], "multi": true}, {"qnum": 76, "stem": "Which TCP/IP protocol is responsible for resolving IP addresses to MAC addresses?", "options": {"A": "IP", "B": "SSH", "C": "DHCP", "D": "ARP"}, "correct": ["D"], "explanation": "Address Resolution Protocol (ARP) is responsible for resolving Internet Protocol (IP) addresses to media access control (MAC) addresses. IP is used in routing information packets from one Internet location to another. Secure Shell (SSH) is a connection-oriented protocol used to securely manage a network and its devices remotely. Dynamic Host Configuration Protocol (DHCP) is a connectionless protocol used to dynamically assign network configuration information to clients that request it on a network.", "notes": [], "multi": false}, {"qnum": 77, "stem": "You need a WAP in a loading dock, but there is not an appropriate power receptacle close enough to plug it into, so you decided to use a PoE WAP. The problem is that your switch is not PoE compliant. Which of the following will you need to purchase in addition to the PoE WAP?", "options": {"A": "Very long extension cord", "B": "PoE injector", "C": "New switch", "D": "New router"}, "correct": ["B"], "explanation": "If your wireless access point (WAP) is Power-over-Ethernet (PoE) compliant but your switch is not, then you can purchase a PoE injector to send power (along with the data) to a PoE device with a single Ethernet cable. The distance is limited by the cable category and Ethernet standard being used.", "notes": [], "multi": false}, {"qnum": 78, "stem": "Which wireless networking (Wi-Fi) standards can use both the 2.4 GHz and 5 GHz frequencies? (Choose two.)", "options": {"A": "802.11g", "B": "802.11n", "C": "802.11ac (Wi-Fi 5)", "D": "802.11ax (Wi-Fi 6)"}, "correct": ["B", "D"], "explanation": "Only the 802.11n, 802.11ax, and 802.11be standards can use both the 2.4 GHz and 5 GHz frequencies, which makes them backward compatible with all the other standards. Standards 802.11a and 802.11ac use only the 5 GHz frequency. Standards 802.11b and 802.11g use only the 2.4 GHz frequency.", "notes": [], "multi": true}, {"qnum": 79, "stem": "When setting up your network, you configured your clients to obtain IP addressing informa- tion automatically from a DHCP server. Which of the following configuration items can the DHCP server provide?", "options": {"A": "IP address", "B": "IP address and subnet mask", "C": "IP address, subnet mask, and default gateway", "D": "IP address, subnet mask, default gateway, and DNS server address"}, "correct": ["D"], "explanation": "A Dynamic Host Configuration Protocol (DHCP) server can be configured to provide all required and optional Transmission Control Protocol/Internet Protocol (TCP/IP) configura- tion information to clients. This includes an IP address, subnet mask (for IPv4), default gateway, and Domain Name System (DNS) server address.", "notes": [], "multi": false}, {"qnum": 80, "stem": "A computer on your network is not able to reach the DHCP server. The DHCP server assigns addresses in the 200.100.1.11–200.100.1.110 range. What address might this computer get when it boots up? (Choose two.)", "options": {"A": "APIPA", "B": "Class C", "C": "169.254.1.101", "D": "200.100.1.15"}, "correct": ["A", "C"], "explanation": "Because this computer is not able to reach the Dynamic Host Configuration Protocol (DHCP) server, it will self-assign an Automatic Private Internet Protocol Addressing (APIPA) address. The APIPA address range is 169.254.0.0–169.254.255.255. (In the last octet, 0 and 255 would not be assigned, because the last number of a range is the broadcast number and the first number of a range identifies the network.)", "notes": [], "multi": true}, {"qnum": 81, "stem": "Which of the following is not true about DNS servers?", "options": {"A": "They translate IP addresses to domain names like Sybex.com.", "B": "AAAA DNS records identify IPv6 addresses.", "C": "A records identify IPv4 addresses.", "D": "There is a setting in the IP configuration to identify the DNS server to use."}, "correct": ["A"], "explanation": "Domain Name Service (DNS) servers reconcile human friendly names like Sybex.com to Internet Protocol (IP) addresses so that a browser can find them (not IP address to domain name). A Domain Name System (DNS) server setting can be configured on a client computer automatically by a Dynamic Host Configuration Protocol (DHCP) server, or manually on the Networking tab of a network connection by clicking on either IPv4 or IPv6 properties. DNS differentiates between IPv4 and IPv6 by identifying IPv6 addresses as AAAA records and IPv4 addresses as A records.", "notes": [], "multi": false}, {"qnum": 82, "stem": "A UTP cable just failed and needs to replaced. You have a spool of cable and connectors but no premade cables. Which tool do you need to use to make a new cable?", "options": {"A": "Toner probe", "B": "Punchdown tool", "C": "Multimeter", "D": "Crimper and cable stripper"}, "correct": ["D"], "explanation": "A crimper is a handy tool for helping you put connectors on the ends of a cable. Most crimpers will be a combination tool that strips and snips wires, as well as crimps the connec- tor onto the end. A toner probe helps a technician locate a particular wire in a bunch that look the same. A punchdown tool is used to attach wires to a punchdown block on a wiring rack in a telecommunications closet. A multimeter has many uses, among them testing continuity, checking power supplies, and checking wall outlets. UTP is unshielded twisted pair.", "notes": [], "multi": false}, {"qnum": 83, "stem": "You need to create several UTP patch cables from a roll of bulk cable. Your company uses the T568A standard. What is the correct order for wires in the connectors?", "options": {"A": "Orange stripe, orange, green stripe, blue, blue stripe, green, brown stripe, brown", "B": "Orange stripe, green, green stripe, blue, blue stripe, orange, brown stripe, brown", "C": "Green stripe, green, orange stripe, blue, blue stripe, orange, brown stripe, brown", "D": "Green stripe, green, orange, blue, blue stripe, orange stripe, brown stripe, brown"}, "correct": ["C"], "explanation": "Unshielded twisted pair (UTP) wire has eight wires. The colors are orange, green, blue, and brown, with a solid and striped wire of each color. The American National Standards Institute/Telecommunications Industry Association (ANSI/TIA) 568A Standard is green stripe, green, orange stripe, blue, blue stripe, orange, brown stripe, brown. The ANSI/TIA 568B standard is orange stripe, orange, green stripe, blue, blue stripe, green, brown stripe, brown. To make it easier to remember, notice that only the green and orange change posi- tions. Blue and brown stay in the same positions.", "notes": [], "multi": false}, {"qnum": 84, "stem": "You need a cable that will run a distance of 200 feet and support speeds up to 10 Gbps. Which cable will you use?", "options": {"A": "Cat 5e", "B": "Cat 6", "C": "Cat 6a", "D": "Plenum"}, "correct": ["C"], "explanation": "Both Cat 6 and Cat 6a will support up to 10 Gbps, but for Cat 6 the maximum distance for 10 Gbps is about 55 meters (i.e., 165 feet). Cat 6a can support a frequency that is twice as fast, so it can support 10 Gbps up to 328 feet (i.e., 100 meters). Because the distance in the question is 200 feet, you would need to use Cat 6a cable. Cat 5e has a maximum bandwidth of 1 Gbps. Plenum simply means that the cable has a coating that doesn’t produce toxic fumes when burned. It is required by certain building codes.", "notes": [], "multi": false}, {"qnum": 86, "stem": "The people in your office want a printer that will print on both sides of the paper automati- cally. What feature is this?", "options": {"A": "Duplex", "B": "Orientation", "C": "Tray settings", "D": "Print quality"}, "correct": ["A"], "explanation": "Duplexing is automatically printing on both sides of the paper—no need to stand at the printer and flip the copies over. Orientation refers to whether a paper is wider than it is tall (i.e., landscape), or taller than it is wide (i.e., portrait). Tray settings refer to configuration settings, such as if a print job is 11 14 inches instead of 8.5 11, then you must select tray two which is filled with the larger paper. It’s just one of many settings. Most printers will have a fast print mode or a quality print mode.", "notes": [], "multi": false}, {"qnum": 87, "stem": "A receipt printer is unable to print receipts because it has run out of paper. You’ll be replac- ing a roll of thermal paper to fix the problem. What type of printer are you working on?", "options": {"A": "Inkjet", "B": "Impact", "C": "Laser", "D": "Thermal"}, "correct": ["D"], "explanation": "Thermal printers require a special thermal paper that will turn black when subjected to heat. Inkjet printers use paper that resists colors bleeding into other areas; impact printers often use no carbon required (NCR) forms to make multiple copies of a form when they print; and laser printers use toner, electricity, and heat to transfer an image to paper.", "notes": [], "multi": false}, {"qnum": 88, "stem": "A friend has asked for your help because their smartphone thinks they’re clicking where they aren’t. It seems like the touch calibration is incorrect. What is the first step to resolve their problem?", "options": {"A": "Calibrate the screen.", "B": "Replace the screen protector.", "C": "Clean the screen.", "D": "Look for damage."}, "correct": ["C"], "explanation": "Cleaning the screen should be your first step. Dirty screens can cause problems because even clean hands can leave oil from your skin on the screen’s surface. Although any or all of the options could be a part of your troubleshooting, cleaning the screen should be your first step.", "notes": [], "multi": false}, {"qnum": 89, "stem": "You’re comparing current performance to a baseline on a computer system and have noticed that the drive’s read/write times are extended. Which of the following would be your last resort?", "options": {"A": "Check for low available disk space.", "B": "Replace the drive.", "C": "Check for malware.", "D": "Defragment if it’s an HDD."}, "correct": ["B"], "explanation": "There are many reasons why a drive might be working more slowly, but you don’t necessarily need to replace it. My first thought would be to check for malware in the system. Then, you should defragment it if it is a hard disk drive (HDD). Solid-state drives (SSDs) should not be defragmented. Ensure that the drive has ample available space, look for physical problems, suspect that the HDD may be failing, and replace it with an SSD for improved performance.", "notes": [], "multi": false}, {"qnum": 91, "stem": "A technician has two hard drives and wants to increase the data access speed of a computer. You tell them to install both drives, but which of the following configurations is their best option?", "options": {"A": "Configure them as separate volumes.", "B": "Implement RAID 0.", "C": "Implement RAID 1.", "D": "Implement RAID 6."}, "correct": ["B"], "explanation": "RAID 0 is called disk striping. Data can be written to or read from multiple devices at the same time, increasing data access speed. However, if one drive fails, all data is lost. (Back up early and often!) RAID 1 is a mirror set, which does not increase data access but provides fault tolerance. RAID 5 is disk striping with parity, which provides both speed and fault tolerance but requires three drives. RAID 6 is disk striping with double parity, so two drives can fail, and the array’s data is still safe, but it requires a minimum of four drives to implement.", "notes": [], "multi": false}, {"qnum": 92, "stem": "You’re setting up a virtual machine for a developer who needs three instances of Windows 11, plus the host OS, which is also Windows 11. How many licenses will you need?", "options": {"A": "One", "B": "Two", "C": "Four", "D": "None"}, "correct": ["C"], "explanation": "Generally speaking, you will need a license for each instance of an operating system (OS) that is running in your virtual machine (VM), plus the host OS.", "notes": [], "multi": false}, {"qnum": 93, "stem": "What are the three major categories of cloud computing? (Choose three.)", "options": {"A": "SaaS", "B": "RaaS", "C": "PaaS", "D": "IaaS"}, "correct": ["A", "C", "D"], "explanation": "While Software-as-a-Service (SaaS), Platform-as-a-Service (PaaS), and Infrastructure-as-a-Service (IaaS) are widely considered to be the major categories of cloud computing, RaaS is not an acronym for a specific type of cloud computing.", "notes": [], "multi": true}, {"qnum": 94, "stem": "A user calls the Help Desk because their printer isn’t printing. They tell you that “nothing happens” when they send a print job. Which of the following is the least likely solution?", "options": {"A": "Help them choose the right printer.", "B": "Replace the paper with paper designed for the printer.", "C": "Stop and restart the print queue.", "D": "Troubleshoot a connectivity issue."}, "correct": ["B"], "explanation": "The least likely problem in this scenario is the paper. If the paper is too thin, too heavy, or too humid, then they would hear the printer attempt to pick up the paper, and there may be a paper jam. They said, “nothing happens,” so look for an issue that happens before the printer tries to pick up the paper. Some common issues are that they have chosen the wrong printer, the print queue is frozen for some reason, or they have a connectivity issue with the printer. If it prints from another application, then they have a software issue.", "notes": [], "multi": false}, {"qnum": 95, "stem": "The Help Desk receives a call that the printout from a printer is garbled, with strange characters printing. What will you do?", "options": {"A": "Replace the paper.", "B": "Clear a paper jam.", "C": "Clean the pickup rollers.", "D": "Replace the printer driver."}, "correct": ["D"], "explanation": "Garbled print is a classic sign of a corrupted printer driver. Update or replace the printer driver.", "notes": ["This is more of a policy-and-imaging answer than a deep troubleshooting answer. In real environments, whether you reimage immediately depends on incident handling rules and data-preservation needs."], "multi": false}, {"qnum": 96, "stem": "Your company has grown drastically, and rather than adding more networking devices and computers, it wants to move its network’s hardware to the cloud so employees can access it from anywhere. What is the company using?", "options": {"A": "IaaS", "B": "SaaS", "C": "PaaS", "D": "NaaS"}, "correct": ["A"], "explanation": "Infrastructure-as-a-Service (IaaS) enables companies to scale their environments without purchasing new hardware and running network wires. IaaS services are typically “pay as you go” and work well for companies experiencing rapid expansion. Software-as-a-Service (SaaS) means that software is being provided online, such as accounting and tax preparation software, sales management, and data backup services. Platform-as-a-Service (PaaS) provides developers all that they need to develop software such as the infrastructure and development software. Network-as-a-Service (NaaS) provides network infrastructure and management. Examples of NaaS providers are Palo Alto Networks and CISCO.", "notes": [], "multi": false}, {"qnum": 97, "stem": "What must be defined when wanting to maintain confidentiality, integrity, and availability of the system resources and should be a part of the decision when choosing a cloud solution?", "options": {"A": "Scalability", "B": "Security requirements", "C": "Elasticity", "D": "Emulation ability"}, "correct": ["B"], "explanation": "When wanting to maintain confidentiality, integrity, and availability, security require- ments and regulations must first be defined. A company can then consider if an Internet cloud solution would be appropriate. Scalability is the ability to purchase more services over time. Elasticity is similar but is on-demand scaling up or down in service levels automatically. Emulation is when one hardware or software is able to act as if it were another. It is especially helpful when, for example, a piece of hardware that a manufacturing process uses is no longer viable, so more modern hardware is used but software is written to interface between the manufacturing process and the newer hardware. The manufacturing process acts as if it is still running on the older hardware because it can’t detect the difference.", "notes": [], "multi": false}, {"qnum": 98, "stem": "A company using cloud services wishes to better prepare for surges in the services it needs from the cloud services provider. What sort of capacity provisioning by its cloud provider should the company ask for?", "options": {"A": "Elasticity", "B": "IaaS", "C": "Metered utilization", "D": "Multitenancy"}, "correct": ["C"], "explanation": "For a company needing additional cloud resources on demand, they should request metered utilization, in which a cloud service will bill much like a utility would, as resources are used. Elasticity means that the cloud service can provide additional or fewer resources as the company needs them, on demand. Infrastructure-as-a-Service (IaaS) refers to hard- ware and networking in the cloud. Multitenancy means that resources are pooled and delivered as needed to many clients.", "notes": [], "multi": false}, {"qnum": 99, "stem": "A group of real estate agents has realized that they have similar computing resource needs. They’ve reached out collectively to your IT services company and asked if there is a solution that will enable them to pool their resources and save money, possibly sharing industry-specific software, but still ha
