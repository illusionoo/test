 filter, blocking content from prohibited websites and blocking sensitive data from leaving the network. Three, the proxy server can modify the requester’s information when passing it to the destination, blocking the sender’s identity and acting as a measure of security; the user can be made anonymous. A domain name server (DNS) server resolves IP addresses to domain names. An authentica- tion server verifies the identity of a user and their access to resources, and a web server provides information in files that can be read by a web browser, whether internal to the company or on the Internet.", "notes": [], "multi": false}, {"qnum": 190, "stem": "A coworker is being blocked from a website that they have used in the past. A message on their browser says, “Your connection is not private.” What do you suspect is the problem? (Choose two.)", "options": {"A": "Their browser cache needs clearing.", "B": "Their browser history needs clearing.", "C": "The website needs to update their certificates.", "D": "The coworker’s computer has the wrong date/time."}, "correct": ["C", "D"], "explanation": "Certificates are issued by a certificate authority and prove that the website (or person) is who they say they are. When they expire, the browser gives an indicator that the certificate is expired or invalid and may block your access to the website. Websites that you access are stored in a cache on your computer, so that the next time you visit the website, it will only download the changes and make websites load much more quickly. If a website you visit isn’t updating properly, clearing the cache should resolve the issue. Browser history should be cleared when you exit the browser for privacy and to maintain browser performance.", "notes": [], "multi": true}, {"qnum": 191, "stem": "A company visits your location when called to destroy old hard drives and paper copies. What are the advantages of paying someone else to do this? (Choose two.)", "options": {"A": "They can provide a certificate of destruction and recycling.", "B": "You can prove compliance with regulations and environmental requirements.", "C": "You have to pay for expensive equipment.", "D": "You must zero-write all the drives first."}, "correct": ["A", "B"], "explanation": "Data destruction contractors (who are third-party vendors) can be certified by groups such as National Association for Information Destruction (NAID), or they can show that they follow government rules (such as the Health Insurance Portability and Accountability Act [HIPAA] in the United States) for data destruction. They can provide proof of destruction, which would be difficult to do on your own. While you could destroy the data on your own, either physically or logically, it would be better to have a third-party vendor certify the data’s destruction. The data destruction company pays for the equipment, and you pay them for their services. You likely would only zero-write the drives if your company policy required you to do so.", "notes": [], "multi": true}, {"qnum": 192, "stem": "Your company allows employees to bring their own devices to work. Security is a concern, so how can your company enforce compliance with corporate policies for remote workers? (Choose two.)", "options": {"A": "Have the employees bring in the device so you can configure it.", "B": "Send the employees instructions on how to configure their device.", "C": "Use MDM software.", "D": "Require the installation of configuration profiles."}, "correct": ["C", "D"], "explanation": "Mobile device management (MDM) software can be used to deploy configuration profiles to remote devices. For initial installation, it could be as simple as scanning a quick response (QR) code to install the required software, which enables the company to push policies and policy changes to the end users. A company can create multiple different configuration profiles for different roles, such as executive, salesperson, and so on. You can’t always have an employee bring their device in, and sent instructions could be intercepted.", "notes": [], "multi": true}, {"qnum": 193, "stem": "You’re setting up group policies for passwords. Which of the following policies will you configure to ensure that users can’t reuse old passwords until some time has passed?", "options": {"A": "Maximum Password Age", "B": "Enforce Password History", "C": "Minimum Password Age", "D": "Password Complexity Requirements"}, "correct": ["B"], "explanation": "The Enforce Password History policy enables the administrator to choose a setting between 0 and 24, which represents the number of unique passwords that a user must set before they can reuse a password. The Maximum Password Age policy determines how long a password can exist before it must be changed. The Minimum Password Age policy defines how many days must pass before a user is allowed to reset their password. The Meeting Password Complexity Requirements policy forces the user to use at least one each of uppercase letters, lowercase letters, digits 0 through 9, and special characters like ! and $.", "notes": [], "multi": false}, {"qnum": 194, "stem": "A new IT hire has asked you what they should do about services running in the background of their OS, and which ones are necessary. Because you’re focused on cybersecurity, what will you tell them about background services?", "options": {"A": "They should all be on.", "B": "They should all be off.", "C": "Unused/unneeded services should be disabled.", "D": "Other services should be set to turn on only when needed."}, "correct": ["C"], "explanation": "Some services are needed all the time, so they must be constantly running. Depending on the situation, other services are likely never needed. Those services that are never needed should be disabled to reduce the computer’s attack surface. Some services turn themselves on when they’re needed and off when they aren’t.", "notes": [], "multi": false}, {"qnum": 195, "stem": "A temporary employee called the IT department because they were unable to log in to their account. Their work contract was set to be completed yesterday, but it was extended. What will you check in Active Directory?", "options": {"A": "Account expiration dates", "B": "Group membership", "C": "Signs of a malware attack", "D": "That their computer is in the system"}, "correct": ["A"], "explanation": "Like any IT expert, you’ve set an account expiration date for them and now need to reset it. Account expiration dates, especially for temporary staff, are a great way to ensure that unused accounts are not left open, which a hacker could use to access a network. Also accounts of employees who’ve left the company should be disabled immediately upon their exit. Group membership and their computer’s inclusion shouldn’t be a problem. Although a malware attack is always a possibility, it isn’t likely in this situation.", "notes": [], "multi": false}, {"qnum": 196, "stem": "You want to ensure that your workstations are hardened so that unauthorized users can’t load the OS, and if they do, that they won’t be able to launch malware by inserting a USB drive. Which two of the following are hardening techniques to ensure that they are blocked?", "options": {"A": "Configure a BIOS/UEFI password", "B": "Restrict login times", "C": "Disable guest accounts", "D": "Disable AutoRun/AutoPlay"}, "correct": ["A", "D"], "explanation": "A user password can be configured in the basic input output system (BIOS) interface or unified extensible firmware interface (UEFI) so that the operating system (OS) won’t load without it. If an intruder does access the OS, they can’t quickly load malware by inserting a universal serial bus (USB) drive if AutoPlay is disabled. Restricting login times is a hardening process, but it won’t protect against someone using a USB drive during working hours. The guest account is disabled by default, but ensuring its disabled status is also a hardening policy. However, neither of these options will keep someone from loading the OS. If the AutoRun/AutoPlay feature isn’t disabled, a malicious actor can use a USB to quickly load malware or run their own OS and access a network.", "notes": [], "multi": true}, {"qnum": 197, "stem": "Your system is infected with malware. You have verified the symptoms, quarantined the infected system, and disabled System Restore. Which are good choices to do next? (Choose two.)", "options": {"A": "Boot into safe mode to clean out the malware files.", "B": "Reboot Windows as normal.", "C": "Rebuild the Registry.", "D": "Use updated bootable anti-malware tools to remove malicious files."}, "correct": ["A", "D"], "explanation": "Remediating infected systems is the next step in the procedures for malware removal. While the exact steps for eradicating malware depend on the type of malware and the damage done, it’s easier to get rid of the malware files if you don’t boot to the drive the malware is on. You could boot into safe mode, which is a limited operating system (OS), and run anti-malware; or boot with installation media from a completely separate drive and run anti-malware on the infected drive; or boot from a bootable universal serial bus (USB) drive that was made by using tools from your favorite anti-malware company and running its antivirus/anti-malware eradication tools. In any case, you will want to ensure that you’ve downloaded the most current malware definition files or other updates available to scan and remove the threat. This is not the time to boot into Windows as normal, and hopefully you won’t need to rebuild the Registry before you’re done troubleshooting. CompTIA has developed specific steps for removing malware from small office/home office (SOHO) networks. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7. Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end user.", "notes": [], "multi": true}, {"qnum": 198, "stem": "You are training technicians on the creation and use of restore points. Restore points can sometimes fix problems with slow, infected, or unresponsive systems. Which of the follow- ing is not a way in which restore points are created?", "options": {"A": "Windows creates them automatically by default.", "B": "You manually create them.", "C": "Windows creates them before a system crashes.", "D": "Some installation utilities will create them before installing a new program."}, "correct": ["C"], "explanation": "It’s unlikely that Windows would be able to predict when a system crash is about to happen, so it isn’t going to create a restore point. There are, however, common activities that can present a risk to a system, such as installing new hardware drivers or new applications. In those instances, Windows will create a restore point before the software or hardware driver is installed. A system restore point is also created by default once a week, and you can manually create them whenever you would like.", "notes": [], "multi": false}, {"qnum": 199, "stem": "A technician is fixing a Windows Home workstation that has contracted a virus. They are following the best practices for malware removal and have enabled System Restore and created a restore point. What is the next step that should be taken?", "options": {"A": "Educate the end user.", "B": "Disable System Restore.", "C": "Quarantine the infected system.", "D": "Remediate the infected system."}, "correct": ["A"], "explanation": "An educated end user who is aware of the signs of malware is one of the best protections against malware. CompTIA has developed specific steps for removing malware from small office/home office (SOHO) networks. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7. Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end user.", "notes": [], "multi": false}, {"qnum": 200, "stem": "A network user with an Android tablet wants to back up and synchronize their data with their phone. Which service should they use to perform these tasks?", "options": {"A": "Google Sync", "B": "Google Cloud", "C": "Sync My Phone", "D": "Bogus Cloud"}, "correct": ["A"], "explanation": "Because problems tend to occur no matter how careful you are, it’s important to back up devices and be able to restore your device from those backups after an incident. Google Sync is available for backups and synchronization of data between Android-based devices and PCs that have a Microsoft Exchange account. Google Cloud is their Infrastructure-as- a-Service (IaaS) platform. Sync My Phone and Bogus Cloud are not real services.", "notes": [], "multi": false}, {"qnum": 201, "stem": "A step in the malware removal best practices is to manually create a restore point in Windows. What will the restore point do?", "options": {"A": "Create a copy of the entire hard drive.", "B": "Create a copy of the Users folder and system configuration data.", "C": "Create a copy of system configuration data.", "D": "Create a bootable media with copies of key system files."}, "correct": ["C"], "explanation": "A restore point is a copy, or snapshot, of your system configuration at a given point in time. It’s like a backup of your configuration but not your data. Snapshots are created within Windows by clicking the Search icon, typing Create a Restore Point, and selecting it from the list of results. The System Properties window opens. It should open on the System Protection tab. If not, click the System Protection tab, and near the bottom of the screen is the Create button next to Create a restore point right now for the drives that have System protection turned on. Clicking the Create button begins the process of creating a restore point. A restore point does not back up the hard driver or create a copy of the users’ folder and system configuration, nor does it create bootable media.", "notes": [], "multi": false}, {"qnum": 202, "stem": "You are troubleshooting a Windows 11 workstation that might have malware on it. To follow the best practices for malware removal, what is the first step you should take?", "options": {"A": "Quarantine the infected system.", "B": "Update the anti-malware software.", "C": "Enable System Restore and create a restore point.", "D": "Investigate and verify malware symptoms."}, "correct": ["D"], "explanation": "CompTIA has developed specific steps for removing malware from small office/home office (SOHO) networks. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7. Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end user.", "notes": [], "multi": false}, {"qnum": 203, "stem": "You are troubleshooting a workstation on your network and believe it has malware. To follow the best practices for malware removal, after you investigate and verify malware symptoms, which step should you take?", "options": {"A": "Update anti-malware software.", "B": "Disable System Restore.", "C": "Quarantine the infected system.", "D": "Scan for and remove the malware."}, "correct": ["C"], "explanation": "You don’t want an infected system to infect others on your network! CompTIA has developed specific steps for removing malware from small office/home office (SOHO) networks. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7. Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end user.", "notes": [], "multi": false}, {"qnum": 204, "stem": "Which type of security method allows you to bring your security device near a reader (but does not require touching) to validate access?", "options": {"A": "PIN code", "B": "Badge reader", "C": "Soft token", "D": "Biometrics"}, "correct": ["B"], "explanation": "A smart card is a type of badge or card that gives you access to resources, including buildings, parking lots, and computers. It contains information about your identity and access privileges. A protected computer or area has a badge reader in which you insert your card. In the case of radio frequency identification (RFID), the reader is a wireless no-contact technology, and the user does not need to touch the card to the reader. A personal identification number (PIN) code is a number that would be entered to gain access to a device. A soft token is usually software on a cell phone or mobile device that generates a code for the user to input. Biometrics uses part of a person’s body to prove identity.", "notes": [], "multi": false}, {"qnum": 205, "stem": "Which of the following authentication encryption protocols is older than the others and was developed by Cisco, but became an open protocol in the 1990s, and can be found on Linux distributions?", "options": {"A": "AES", "B": "TACACS+", "C": "Kerberos", "D": "RADIUS"}, "correct": ["B"], "explanation": "Released in 1993, terminal access controller access-control system (TACACS+) is an authentication protocol developed by Cisco that is now an open standard. It separates the Authentication, Authorization, and Accounting (AAA) packets and encrypts them. Remote authentication dial-in user service (RADIUS) is an authentication protocol that was released in 1997. Kerberos is an open-source authentication protocol that has been around since the 1980s. Advanced encryption standard (AES), which is for wireless encryption not authentication, has been around since 2001, and is the successor to temporal key integrity protocol (TKIP).", "notes": [], "multi": false}, {"qnum": 206, "stem": "Which type of security device displays a randomly generated code that a user enters for access to computer resources?", "options": {"A": "ID badge", "B": "RFID badge", "C": "Smart card", "D": "Key fob"}, "correct": ["D"], "explanation": "A key fob is a small device about the size of a car key that can easily be carried in a pocket or on a keychain. It generates a random number every few seconds that can be used for multifactor authentication (MFA) to gain access to a secure system like a bank account. Key fobs are also a type of external hardware token. The other three choices—an identification (ID) badge, a radio frequency identification (RFID) badge, and smart card—are all something that can be carried by an employee to gain access to a specific area. Smart cards or RFID badges store electronic information that could be used to access equipment as well. Information on them is accessed by devices called readers.", "notes": [], "multi": false}, {"qnum": 207, "stem": "Your company’s web server has been compromised because a malicious actor placed code into a name input field in the company’s website. What type of attack has been perpetrated?", "options": {"A": "Keylogger", "B": "Stalkerware", "C": "SQL injection", "D": "Trojan"}, "correct": ["C"], "explanation": "A structured query language (SQL) injection happens when a poorly written website doesn’t specify limits on what an input field can contain, and that field is used by a malicious actor to insert code into the website. SQL is used by databases, and most websites have databases running on the backend to take orders or capture visitor data for newsletters and such. A keylogger records keyboard input for a malicious actor to use later. Stalkerware is any software, whether a commercial app or a malware, which is used to perform surveillance on a person or business for malicious intent, which is stalking. A Trojan is malware that appears to be a useful program that is unwittingly downloaded by the victim, and then often installs a backdoor for a malicious actor to use later.", "notes": [], "multi": false}, {"qnum": 208, "stem": "You receive an SMS from an overseas bank notifying you that you have won a random drawing. You need to respond with your bank routing information so the bank can electronically transfer the funds directly to your account. What is this most likely an example of?", "options": {"A": "Phishing", "B": "Ransomware", "C": "Whaling", "D": "Smishing"}, "correct": ["D"], "explanation": "Smishing is a type of social engineering attack that is perpetrated via short message service (SMS) messages. Social engineering is a process in which an attacker attempts to acquire information about you, your network, and your system by social means, such as talking to people in the organization. A social engineering attack may occur over the phone, by email, or in person. When the attempt is made through email, it is known as phishing and often made to look as if a message is coming from sites where users are likely to have accounts (e.g., banks, eBay, and PayPal are popular) or a relative or friend. Ransomware is software that holds your computer hostage in a logical way, such as encrypting your drive and refusing to give you the key until you pay a ransom. Whaling is phishing for a wealthy or influential target.", "notes": [], "multi": false}, {"qnum": 209, "stem": "You have just transformed a Windows workgroup into a small domain and are configuring user accounts. Which of the following is considered a best practice for managing user account security?", "options": {"A": "Require every user to log on as a Guest user.", "B": "Allow all users Read and Write access to all server files.", "C": "Follow the principle of least privilege.", "D": "Place all user accounts in the Administrator group."}, "correct": ["C"], "explanation": "When assigning user permissions, follow the principle of least privilege, where you give users only the bare minimum that they need to do their job and nothing more. Assign permissions to groups rather than users and make the users members of groups (or remove them from groups) as they change roles or positions. You would not let anyone log in as a Guest user or give them Read and Write access to all your server files, and placing them in the Administrator group would negate your security settings, unless the setting was an NTFS Deny setting, because Deny overrides every other setting, even for administrators. (Caution! Don’t deny the Administrator group on anything!)", "notes": [], "multi": false}, {"qnum": 210, "stem": "An employee scanned a QR code with their company smartphone to visit a potential supplier’s website and input their contact information. Suddenly, they receive notice that their name and phone number have been spotted on the dark web. What type of attack were they a victim of?", "options": {"A": "QR code phishing", "B": "Ransomware", "C": "Whaling", "D": "Smishing"}, "correct": ["A"], "explanation": "Quick response (QR) code phishing occurs when an unsuspecting person scans a QR code and visits a website that they think is legitimate, but it’s actually a phishing site intended to gather their personal information. Ransomware is software that holds your computer hostage in a logical way, such as encrypting your hard drive and refusing to give you the key until you pay a ransom. Whaling is phishing for a wealthy or influential target. Smishing is a type of social engineering attach perpetrated via short message service (SMS) messages.", "notes": [], "multi": false}, {"qnum": 211, "stem": "A malware attack was recently thwarted by your payroll manager. The malicious actor was trying to get them to give up the company’s banking information. What type of attack was attempted?", "options": {"A": "Spear phishing", "B": "Spyware", "C": "Virus", "D": "Whaling"}, "correct": ["A"], "explanation": "Spear phishing is a social engineering attack aimed at a specific person for a specific purpose. In this case, the payroll manager was the “fish.” Spyware watches what you do and reports back to someone. A virus spreads from computer to computer through some contact between the machines, often through email. Whaling is phishing for “big fish” who are very wealthy or influential people. Phishing gets its name from fishing for information.", "notes": [], "multi": false}, {"qnum": 212, "stem": "An employee receives an email from someone claiming to be from the IT department, asking for their network password, claiming that it needs to be reset because it’s expired. If they provide the existing email, the new password then would be sent back to them via email. The employee has been to cybersecurity training, so they take a screenshot of the email and call the IT department immediately. What type of attack is it?", "options": {"A": "Spear phishing", "B": "Spyware", "C": "BEC", "D": "Whaling"}, "correct": ["C"], "explanation": "A business email compromise (BEC) occurs when someone impersonates another person (or entity) in an attempt to gain sensitive information from someone. Spear phishing is a social engineering attack aimed at a specific person for a specific purpose. In this case, the payroll manager was the “fish.” Spyware watches what you do and reports back to someone. Whaling is phishing for a “big fish,” who is very wealthy or influential. Phishing gets its name from fishing for information.", "notes": [], "multi": false}, {"qnum": 213, "stem": "Which of the following practices for managing user accounts are in line with following the principle of least privilege? (Choose two.)", "options": {"A": "Restrict user permissions.", "B": "Restrict login times.", "C": "Enable the Guest account.", "D": "Give all users administrative access."}, "correct": ["A", "B"], "explanation": "Following the principle of least privilege, users should be given only the access that they need and nothing more. If a user needs to read files but not change them, then they should be restricted to reading those files only. Sometimes, even the most careful users can make changes that they did not intend. If a user works only Monday to Friday, then they should not be able to log in on the weekend. Having their log-in available gives a hacker one more way to access your system. The guest account is disabled by default and should remain disabled. Even administrators should have a standard user account that they will use unless they are doing something requiring administrative access. Then they would only log on as an administrator while doing that activity, or enter their administrator password into a user account control (UAC) pop-up box.", "notes": [], "multi": true}, {"qnum": 214, "stem": "Your friend called you and said that they’re suddenly being sent to an online store that they’ve never used whenever they try to access their favorite online store. You ask if they’ve installed any software recently. They confirmed that they recently installed a new game. What type of attack is your friend a victim of?", "options": {"A": "SQL", "B": "Smishing", "C": "PUP", "D": "OS"}, "correct": ["C"], "explanation": "Your friend is the victim of a potentially unwanted program (PUP) attack, which occurred when they installed the game. A PUP can launch almost any type of attack, but often they are used for browser redirection or to install adware. PUPs differ from Trojans in that a Trojan makes you believe it’s a harmless software, and a PUP is usually bundled with something else, and you agreed to install it. Structured query language (SQL) is used to interact with a database. Smishing is using small message service (SMS) for phishing attacks. OS merely stands for operating system.", "notes": [], "multi": false}, {"qnum": 215, "stem": "Your company installed a new appliance that scans email and isolates potential phishing attacks, malware, and the potential dissemination of sensitive information. What type of appliance has been installed?", "options": {"A": "SQL", "B": "EDR", "C": "Proxy server", "D": "Email security gateway"}, "correct": ["D"], "explanation": "The appliance described is an email security gateway, which examines incoming and outgoing email for numerous possible problems and can quarantine emails until their intent is confirmed. Structured query language (SQL) is used to interact with a database. Endpoint detection and response (EDR) protects a network’s endpoints such as servers and workstations from attacks. A proxy server hides internal nodes from the outside world and can filter traffic based on various specifications.", "notes": [], "multi": false}, {"qnum": 216, "stem": "You’ve been working on a compromised computer to eradicate malware. You’ve tried using multiple malware removal tools, but the system is still behaving erratically. The system is backed up daily, so data backups are available. What is your best option at this point?", "options": {"A": "SQL", "B": "EDR", "C": "OS reinstallation", "D": "PUP"}, "correct": ["C"], "explanation": "When all else fails in your attempts to eradicate malware, you can perform an operating system (OS) reinstallation, which effectively wipes the system clean. It takes time to rebuild the settings and reinstall or restore programs and data, but sometimes it’s the only way to truly clean the system. Structured query language (SQL) is used to interact with a database. Endpoint detection and response (EDR) protects a network’s endpoints like servers and workstations from malware. A potentially unwanted program (PUP) is often installed with other legitimate software, and although it can launch any malware, it generally is used for browser redirection and adware.", "notes": [], "multi": false}, {"qnum": 217, "stem": "Your department is interviewing vendors for a system that will monitor computers, smartphones, servers, and any other company endpoint devices for potential malware attacks. When a malware attack is discovered, the system will then automatically launch countermeasures to protect the company’s data and endpoints, and monitor, report on, and mitigate the spread of potential problems. What type of system are you examining?", "options": {"A": "MDR", "B": "EDR", "C": "DDoS", "D": "PUP"}, "correct": ["A"], "explanation": "Endpoint detection and response (EDR) becomes managed EDR (MDR) when EDR systems are provided by a third-party vendor that manages EDR for you. EDR monitors network endpoints continuously in an attempt to recognize, remediate, and prevent the spread of any malware or data loss in a system. They also provide reporting capabilities. Distributed denial-of-service (DDoS) is an attack performed by many computers to keep legitimate traffic from reaching a server. A potentially unwanted program (PUP) is often installed with other legitimate software, and although it can launch any malware, it generally is used for browser redirection and adware.", "notes": [], "multi": false}, {"qnum": 218, "stem": "You’ve decided that an EDR system isn’t enough. You need to monitor multiple places where endpoints exist, such as in the cloud and email. You’ve decided to use software that leverages AI and automation to identify, investigate, report, and respond to threats. What type of system are you installing?", "options": {"A": "EDR", "B": "MDR", "C": "XDR", "D": "MXDR"}, "correct": ["C"], "explanation": "When an endpoint detection and response (EDR) system investigates, identifies, reports, and responds to information gathered from multiple places and security levels like the cloud and email, applications, endpoints, and networks, it is considered an extended EDR (XDR) system. These systems are so complex that they need automation and artificial intelligence (AI) to sort and analyze the data in a timely manner. Managed EDR (MDR) systems are EDR services provided by a third party. Similarly, managed XDR (MXDR) systems are XDR managed by a third party. EDR, MDR, and XDR are on the CompTIA exam; however, MXDR is not.", "notes": [], "multi": false}, {"qnum": 219, "stem": "Which of the following is not a way to run a program as an administrator when you’re logged on as a standard user?", "options": {"A": "Right-click a program and choose Run as Administrator.", "B": "Launch a program that requires administrator privileges, and type the administrator password in the UAC box.", "C": "Press the Windows Key+the R key, and in the Run dialog box, type a command followed by admin and press Enter.", "D": "Press the Windows Key+the R key, and in the Run dialog box, type cmd. Press Ctrl+Shift+Enter to open a command prompt as an administrator. Enter the password in the UAC box and press Enter."}, "correct": ["C"], "explanation": "You can’t launch a program as an administrator by typing %command% admin in the run box. One best practice for an administrator is to log in as a standard user and only use administrator privileges when required. To run a program as an administrator, you can right-click a program and choose Run as administrator or launch the program and type an administrator password in the user account control (UAC) box, or you can open the command prompt as an administrator and then launch a program from the command prompt. Remember that administrators can do anything in a system, while a standard user can’t, so only work as an administrator when it’s necessary to do so.", "notes": [], "multi": false}, {"qnum": 220, "stem": "Which security model requires that, rather than assuming a user is who they say they are because they’re logged in to a network, they must continually authenticate who they are to access or continue accessing resources?", "options": {"A": "Zero-trust", "B": "Principal of least privilege", "C": "Inheritance", "D": "UAC"}, "correct": ["A"], "explanation": "With a zero-trust model, a user is not assumed to have access to resources because they have logged in to a network as a specific user. They must provide authentication information on a recurring basis. The principle of least privilege states that you only give a user access to the resources that they need and nothing more. Inheritance means that when an object is inside a container, it takes on the access rules of the parent container. User accounts control (UAC) is a method of requiring authentication before being able to run a restricted program.", "notes": [], "multi": false}, {"qnum": 221, "stem": "Which logical security tool provides a password or code that expires in a short time period?", "options": {"A": "SSO", "B": "TOTP", "C": "Zero-trust", "D": "PAM"}, "correct": ["B"], "explanation": "A time-based one-time password (TOTP) expires after a given period of time and can’t be used to authenticate a user after that time. Single sign-on (SSO) assumes that a user is who they say they are, because they’ve signed in to a network with their username and password. It’s essentially the opposite of the zero-trust model. Privileged access management (PAM) is a system for monitoring who and what has administrative access and reporting unusual events to mitigate cybersecurity attacks.", "notes": [], "multi": false}, {"qnum": 222, "stem": "Which security feature provides a password that is often delivered via email or SMS and can only be used once to grant access to a resource?", "options": {"A": "SSO", "B": "JIT", "C": "OTP", "D": "PAM"}, "correct": ["C"], "explanation": "A One-time password (OTP) is often delivered via email or short message service (SMS) and is only valid for that session. This helps verify the person requesting access is the person who previously entered their email or phone number into a system. Single sign-on (SSO) assumes that a user who has gained access to a network is that person and is not required to authenticate again, although they may be required to enter an OTP or other credential to access some resources. Just-in-time (JIT) systems grant access to resources only when needed and for a specific time period. JIT is part of privileged access management (PAM). PAM tracks, monitors, and manages access beyond a standard user, whether the user is a person, an application, or a machine.", "notes": [], "multi": false}, {"qnum": 223, "stem": "Which of the following is a feature of PAM that grants access to a system only when it is needed for a limited period of time?", "options": {"A": "SSO", "B": "JIT", "C": "OTP", "D": "IAM Chapter Software Troubleshooting THE COMPTIA A+ 220–1202 TOPICS COVERED IN THIS CHAPTER INCLUDE THE FOLLOWING: ✓ 3.1 Given a scenario, troubleshoot common Windows OS issues. ▪ Blue screen of death (BSOD) ▪ Degraded performance ▪ Boot issues ▪ Frequent shutdowns ▪ Services not starting ▪ Applications crashing ▪ Low memory warnings ▪ USB controller resource warnings ▪ System instability ▪ No OS found ▪ Slow profile load ▪ Time drift ✓ 3.2 Given a scenario, troubleshoot common mobile OS and application issues. ▪ Application fails to launch ▪ Application fails to close/crashes ▪ Application fails to update ▪ Application fails to install ▪ Slow to respond ▪ OS fails to update ▪ Battery life issues ▪ Randomly reboots ▪ Connectivity issues ▪ Bluetooth ▪ Wi-Fi ▪ Near-field communication (NFC) ▪ Screen does not autorotate ✓ 3.3 Given a scenario, troubleshoot common mobile OS and application security issues. ▪ Security concerns ▪ Application source/unofficial application stores ▪ Developer mode ▪ Root access/jailbreak ▪ Unauthorized/malicious application ▪ Application spoofing ▪ Common symptoms ▪ High network traffic ▪ Degraded response time ▪ Data-usage limit notification ▪ Limited Internet connectivity ▪ No Internet connectivity ▪ High number of ads ▪ Fake security warnings ▪ Unexpected application behavior ▪ Leaked personal files/data ✓ 3.4 Given a scenario, troubleshoot common personal computer (PC) security issues. ▪ Common symptoms ▪ Unable to access the network ▪ Desktop alerts ▪ False alerts regarding antivirus protection ▪ Altered system or personal files ▪ Missing/renamed files ▪ Inability to access files ▪ Unwanted notifications within the OS ▪ OS update failures ▪ Browser-related symptoms ▪ Random/frequent pop-ups ▪ Certificate warnings ▪ Redirection ▪ Degraded browser performance"}, "correct": ["B"], "explanation": "Just-in-time (JIT) systems grant access to resources only when needed and for a specific period of time. JIT is part of privileged access management (PAM). PAM tracks, monitors, and manages access beyond a standard user, whether the user is a person, an application, or a machine. Single sign-on (SSO) assumes that a user who has gained access to a network is that person and is not required to authenticate again, although they might be required to enter a one-time password (OTP) or other credential to access some resources. An OTP is often delivered via email or short message service (SMS) and is only valid for that session. This helps verify that the person requesting access is the person who previously entered their email or phone number into a system. Identity access management (IAM) supports SSO but uses adaptive multifactor authentication (MFA), where the specific factor used is based on situations such as time of day, location, IP address, device, and so on.", "notes": [], "multi": false}], "skipped": []}, "ch8": {"title": "Chapter 8 - Software Troubleshooting", "questions": [{"qnum": 1, "stem": "A coworker is having problems with the Bluetooth connection between a device and their laptop. Which of the following can you do to check connectivity between the laptop and the device? (Choose two.)", "options": {"A": "Ensure that Bluetooth is turned on in Settings.", "B": "Ensure that Airplane mode is on.", "C": "Ensure that Airplane mode is off.", "D": "Go to a command prompt or terminal and type Bluetooth to enable it."}, "correct": ["C"], "explanation": "Artificial intelligence (AI) has many appropriate uses, but it’s also important to know when not to use it. For example, AI should not be used to prescribe medicine; however, it could be used to give a doctor a list of new medications for a condition, leading the doctor to research them and choose the best one for a patient. AI excels at generating ideas and performing repetitive tasks. It can quickly analyze historical data, but a human needs to make decisions based on that data, not AI. AI is a tool to enhance human work, to streamline processes, but not to replace the human element or critical thinking.", "notes": [], "multi": true}, {"qnum": 2, "stem": "You just installed a new sound card and its drivers in a Windows workstation. Now, the computer has crashed and given you a blue screen of death. You turn the computer off. What should you try to resolve the issue?", "options": {"A": "Reinstall Windows.", "B": "Boot to the Windows installation media and start the WinRE.", "C": "Boot to safe mode and uninstall the sound card driver.", "D": "Remove the sound card from the computer and reboot."}, "correct": ["B"], "explanation": "A splash screen appears on a computer before a user logs in. It can contain information related to the acceptable use policy (AUP) or regulatory information to which the user must agree and adhere. This information is accepted by clicking a button, indicating agreement to it before they can log in. The act of logging in alone does not prove acceptance of the conditions unless there is a statement telling the user that they must either accept the conditions or not continue. An incident report is filed when someone identifies a breach of company policies. A signature on an AUP should always be obtained as a part of employee onboarding, but it won’t include any changes to the policy.", "notes": [], "multi": false}, {"qnum": 3, "stem": "An iPad user reports that when they are in a certain part of the building, their wireless connection intermittently drops. What are the most likely causes of this? (Choose two.)", "options": {"A": "Poor wireless buffering in the iPad", "B": "Interference with the wireless signal", "C": "Weak signal strength from the wireless access point", "D": "Retracted Wi-Fi antenna on the iPad"}, "correct": ["B"], "explanation": "One component that people frequently overlook is the case itself. Cases are generally made of metal, and some have sharp edges inside, so be careful when handling them. You can, for example, cut yourself by jamming your fingers between the case and the frame when", "notes": [], "multi": true}, {"qnum": 4, "stem": "You noticed that your browser is running much more slowly than normal, even though you have a strong Wi-Fi connection. Which of the following are likely causes? (Choose three.)", "options": {"A": "Too many tabs open", "B": "Cache needs clearing", "C": "Too much RAM", "D": "Poorly written extension or add-on"}, "correct": ["A", "B", "D"], "explanation": "There are a number of reasons why your browser might be running slowly (experiencing degraded performance). First, close any tabs that aren’t needed. Having more than one instance of a browser open can also slow down the browser. A full cache will also slow down your browser, and if you’ve added any new extensions or add-ons, try uninstalling them and see if the performance is better. Of course, malware or a browser that isn’t up to date can cause degraded browser performance. Too much RAM is never a problem!", "notes": [], "multi": true}, {"qnum": 5, "stem": "On your MacBook Pro, you use the Safari browser to surf the Internet. Yesterday, a friend borrowed your laptop. Today, when you try to browse the Web, no matter what site’s URL you type into the address bar, you are sent to a different website. What is most likely happening to your computer?", "options": {"A": "A practical joke by your friend", "B": "Browser redirection", "C": "Rogue antivirus", "D": "Spam infection"}, "correct": ["B"], "explanation": "This is a classic symptom of browser redirection, which means that you type in a specific Uniform Resource Locator (URL) and are taken to a different website. The perpetrator has one goal, which is to direct you to websites that they want you to visit, regardless of what you actually want to see. Removing the redirector might be as simple as uninstalling an application (by dragging it to the Trash and emptying it), or it might require full-scale malware mitigation.", "notes": [], "multi": false}, {"qnum": 6, "stem": "Your company purchases a custom database software package from an outside vendor. You install the client software on a Windows workstation, and it crashes when you try to open it. You remove the software and reinstall it, but again it crashes when you open it. What should you do next?", "options": {"A": "Run an anti-malware remediation on the workstation.", "B": "Contact the vendor to see whether an update or patch is available.", "C": "Delete and reinstall Windows.", "D": "Enable Software Compatibility through the Control Panel."}, "correct": ["B"], "explanation": "When an application crashes, you want to isolate the cause of the crash. It could be a compatibility issue, hardware, or a host of other problems. Once it’s isolated, you can solve the issue. One step to take early in the resolution process is to look for updates, patches, or fixes to the application released by the vendor. It’s not likely to be a malware issue because you just installed this application and haven’t mentioned any malware symptoms. Deleting and reinstalling Windows is a drastic measure that would be your last-ditch effort. Compatibility settings can be found in the Properties menu of a program file.", "notes": [], "multi": false}, {"qnum": 7, "stem": "An iPhone user reports that their phone will not connect to their wireless headset for hands-free phone calls. The headset is powered on and has worked previously. Their iPhone screen is shown in the graphic. What is most likely the problem?", "options": {"A": "The headset is not paired with the iPhone.", "B": "Bluetooth is turned off.", "C": "Wi-Fi is turned off.", "D": "Airplane mode is turned on."}, "correct": ["B"], "explanation": "Lack of Bluetooth connectivity is often caused when a device is not turned on and/or has an improper setting for discoverability. Make sure the device is turned on and discoverable (checking the manufacturer’s documentation if necessary).", "notes": [], "multi": false}, {"qnum": 8, "stem": "A user reports that their Windows Start menu looks wrong and takes too long to load. You know the environment relies on roaming profiles. What is a reliable solution to the user’s problem?", "options": {"A": "Rebuild the desktop image.", "B": "Rebuild the Windows user profile.", "C": "Delete the Registry on the local machine.", "D": "Reboot the machine."}, "correct": ["B"], "explanation": "There are many reasons why a profile might load slowly. If the user hasn’t logged on to this computer before, the entire profile is downloaded instead of only what needs updating. If they have and it’s still slow, then it may be a very large profile. Sometimes the profile is corrupted, which can show as a screen looking strange. Rebuilding the Windows profile will fix a corrupted profile. Roaming profiles tend to experience problems, most of which can be reliably fixed by rebuilding the Windows profile.", "notes": [], "multi": false}, {"qnum": 9, "stem": "While working on a Windows workstation, a user receives a flashing pop-up message saying that their computer has been infected with ransomware and they need to download an anti-malware update now to fix it. What will most likely happen if they click the button to download the recommended anti-malware?", "options": {"A": "It will download malware to their computer.", "B": "It will download an anti-malware program to their computer and remediate it.", "C": "The anti-malware program they download will scan their computer and find nothing because their company already uses an anti-malware program.", "D": "It will take them to a website that will allow them to purchase an anti-malware program to remediate the system."}, "correct": ["A"], "explanation": "One of the more clever ways of spreading a virus is to disguise it so that it looks like an actual anti-malware program. When it alerts the user to a fictitious problem, the user then begins interacting with and allowing the rogue program to do all sorts of damage. One of the trickier tactics that troublemakers use is to make the program look as if it came from a trusted source—such as Microsoft—and mimic the user interface enough to fool an unsuspecting user. The other three options are not likely to occur.", "notes": [], "multi": false}, {"qnum": 10, "stem": "You have 20 Windows 11 workstations on your network. You want to create bootable media that will allow you to fix Windows boot issues. Where can you create this media?", "options": {"A": "Use Windows Security in the Settings app.", "B": "Back up and sync your settings in the Settings app.", "C": "Download and use Microsoft’s media creation tool.", "D": "Copy the contents of the C drive to a USB."}, "correct": ["C"], "explanation": "If you need installation media, search for and download the Windows media creation tool, which will enable you to create a bootable universal serial bus (USB) or DVD. In addition to creating bootable media, you can download an international organization for standardization (ISO) file, which can be stored on a server and accessed over a network. Copying the contents of the C drive will not create installation media, and the drive won’t be bootable. Windows Security in the Settings app will bring you to several security options, but none of them can create installation media; neither does backing up and syncing your settings.", "notes": [], "multi": false}, {"qnum": 11, "stem": "Your Windows system doesn’t appear to be stable. It’s slow to respond when you want it to open a file. You just installed a new software application yesterday. What actions can you take to fix this problem? (Choose two.)", "options": {"A": "Reinstall Windows.", "B": "Run an anti-malware scan.", "C": "Use WinRE to reformat the drive.", "D": "Restore from a recent system restore point."}, "correct": ["B", "D"], "explanation": "Because you just installed a new application, chances are that it is the cause of all the problems you’re having now. It’s possible that malware was introduced into your system. If the scan finds nothing, then it might be a problem with the application. In that case, a restore point will restore any system settings that may have been changed and may uninstall the software, but your data won’t be affected. Reinstalling Windows is likely not necessary. You would not want to reformat the drive unless the system could not be repaired.", "notes": [], "multi": true}, {"qnum": 12, "stem": "Your Windows system is running sluggishly. When you look at the storage drive, you notice that there is very little space available. Which tool should you run to attempt to free some space on the drive?", "options": {"A": "Optimize and Defragment Drive", "B": "Disk Cleanup", "C": "regedit", "D": "SFC"}, "correct": ["B"], "explanation": "If you save many large files, and the storage drive gets to be under ten percent of free space, its performance can slow down dramatically. The Disk Cleanup utility will show how much disk space is being taken up by temporary files, log files, the Recycle Bin, and other items that can easily be deleted. This could free up some disk space. You will possibly need to delete some files as well. The Optimize and Defragment Drive utility will help with mechanical hard disk drives (HDDs), but not solid-state drives (SSDs). In fact, running it could damage an SSD. Although it could help a sluggish system perform better, it doesn’t free up space. The Registry Editor is a tool that should only be used when there isn’t another utility that can do the same task. Improperly changing the Registry could cause the operating system to crash. Run system file checker (SFC) if you’re having problems related to system files; it won’t free up space on your drive.", "notes": [], "multi": false}, {"qnum": 13, "stem": "A user reports that a Word document they need will not open. Other documents open as they should. They have not made a backup of this file. Which of the following statements is true?", "options": {"A": "The file is probably corrupted, and its contents are lost.", "B": "They can use a restore point to get the file back.", "C": "They can use the command-line utility to open the document.", "D": "They can use WinRE to repair the file and then open it."}, "correct": ["A"], "explanation": "Sadly, if the user hasn’t backed up this file, it is likely lost. A restore point backs up system configuration, not user files. If a file won’t open in the graphical user interface (GUI), it probably won’t open at a command prompt either. The Windows Recovery Environment (WinRE) can fix problems with the system booting or restore the entire machine from an image, but if the files aren’t on the image, then WinRE can’t restore or open the file either.", "notes": [], "multi": false}, {"qnum": 14, "stem": "You’ve been working very hard and have several Word documents open on your desktop. Luckily, you’ve been saving them often, because suddenly the Word app is showing all sorts of strange characters on the screen, even in the ribbon at top. It appears to be corrupted, and it won’t respond to any commands, including Close. How can you force the app to close, so you can reopen the saved files and continue your work? (Choose two.)", "options": {"A": "Double-click the program file.", "B": "Right-click anywhere in the program window and choose Close.", "C": "Open Task Manager and select the Processes tab. Then right-click the program name and choose End Task.", "D": "Reboot the computer."}, "correct": ["C", "D"], "explanation": "Rebooting the computer should close the app and clear anything out of random access memory (RAM), but you might be able to solve the problem with less-drastic measures by ending the process using Task Manager. Double-clicking the program file and right-clicking in the window won’t help because the program is corrupted and not responding.", "notes": [], "multi": true}, {"qnum": 15, "stem": "Your iPad is experiencing slow performance. What are the best two options to increase performance speed? (Choose two.)", "options": {"A": "Close open apps.", "B": "Perform a reset to the factory default.", "C": "Increase the RAM.", "D": "Perform a soft reset."}, "correct": ["A", "D"], "explanation": "Slow performance is often related to random access memory (RAM). Look for any apps that are running and can be closed or perform a soft reset (i.e., cycle power off and on again) to try to free up memory. Resetting to the factory default will delete all data on the device. You can’t upgrade the RAM in an iPad, because the RAM is soldered directly to the motherboard and is not designed to be user replaceable.", "notes": [], "multi": true}, {"qnum": 16, "stem": "You just downloaded an app to connect to your bank on your mobile device. You weren’t sure which app to choose, so you picked the one that looks most like your bank. After installing the app, something didn’t look right, and you noticed misspelled words on the screen where it’s asking for your username and password. What should you do next?", "options": {"A": "Enter your username and password.", "B": "Call the bank and ask them about the app.", "C": "Uninstall the app immediately and run an anti-malware scan.", "D": "Run a spell checker on the app."}, "correct": ["C"], "explanation": "Most likely this is a malicious application that is trying to steal your login or other personal information (PI). Misspellings are a red flag that the application is an attempt by a malicious person to spoof your bank’s app. Uninstall the offending app immediately and run a malware scan to ensure that nothing malicious was loaded on your system when you downloaded the app. Whatever you do, don’t enter your username and password! You could also call the bank and let them know about the app so they can warn other bank patrons. Running spell check on the app wouldn’t help you or even be possible on the app.", "notes": [], "multi": false}, {"qnum": 17, "stem": "You are visiting a website using your favorite browser, and without you clicking anything, a new browser window opens in front of it with an advertisement. Which of the following is the most likely explanation?", "options": {"A": "Your computer has been infected with adware.", "B": "Your computer has been infected with spyware.", "C": "Your computer has been infected with a virus.", "D": "The website is programmed to show a pop-up advertisement."}, "correct": ["D"], "explanation": "Pop-ups are annoying but not necessarily an indication that your browser or computer is infected with anything. Most likely, the website is programmed to show a pop-up advertisement. Adware pop-ups usually spam your desktop with multiple (if not dozens of) windows at the same time. Spyware generally doesn’t announce its presence, and viruses generally do more damage than a simple pop-up ad does.", "notes": [], "multi": false}, {"qnum": 18, "stem": "You are talking to a friend about purchasing a gift, and they recommend a website to purchase it. When you put the website’s secure address into your browser, you receive a message stating that there is an invalid certificate. What should you do?", "options": {"A": "Visit the website anyway; it’s probably okay.", "B": "Do not visit the website.", "C": "Visit the secure version of the website by changing the address to start with HTTPS://.", "D": "Visit the unsecure version of the website by changing the address to start with HTTP://."}, "correct": ["B"], "explanation": "An invalid certificate usually means that the certificate that you have (or the one the website has) has expired. It could mean that the website is fine. But it could also mean someone has set up a Trojan that imitates the website you are seeking. Do not visit it. If it’s a website you are not familiar with, the best bet is to avoid it altogether. An invalid certificate could also indicate that the time and/or date on your computer is incorrect.", "notes": [], "multi": false}, {"qnum": 19, "stem": "Your favorite restaurant locator app on your iPhone won’t load. You closed it and tried to reopen it a few times, and it still doesn’t work. What should you try next?", "options": {"A": "Remove and reinstall the app.", "B": "Perform a factory reset.", "C": "Force-stop the app.", "D": "Reboot the phone and try the app again."}, "correct": ["D"], "explanation": "Rebooting (i.e., powering off and back on) any device will clear what is in its memory and sometimes help with application problems, so try rebooting the phone and try the app again. If that doesn’t work, you might want to remove and reload the app. Be sure to check the vendor’s website for any known problems. You would not want to perform a factory reset for a problem with one app, because that would delete everything on your phone. Performing a force-stop on the app would close it if it were open, but in this scenario, you can’t load the app.", "notes": [], "multi": false}, {"qnum": 20, "stem": "You’re using your smartphone. When is it generally necessary to force-close running apps?", "options": {"A": "When you receive out-of-memory errors", "B": "When the phone is sluggish", "C": "When an app locks up", "D": "When you are done using them for the day"}, "correct": ["C"], "explanation": "If an app on your smartphone is locked up, then you need to force-close the app, which is done on many devices by swiping the app up. Depending on the device, it may be done differently. Apps running in the smartphone’s background aren’t really running or using resources, unless you’ve set them up to refresh in the background. (Android apps aren’t as good at this as iPhone apps are.) You likely won’t get an “out of memory” error message, but you might run out of storage space. If your phone is sluggish, it’s likely that the battery is low or you’re running out of storage space. You don’t need to close apps when you’re done with them for the day. If they’re in the background, they aren’t using resources.", "notes": [], "multi": false}, {"qnum": 21, "stem": "You receive an email warning you of a new form of ransomware. It contains a link to receive more information on how to protect yourself from this terrible threat. What should you do next?", "options": {"A": "Click the link to receive more information.", "B": "Check your antivirus provider’s website for information on the threat.", "C": "Check to ensure that your system has a rogue antivirus installed.", "D": "Forward the email to everyone in your contacts list."}, "correct": ["B"], "explanation": "The email could be real, but most likely it’s a fake security warning. Worse yet, it could be malware itself, and by clicking the link you will activate it on your computer. Always check a reputable source, such as a trusted anti-malware vendor for information on the latest threats. At a minimum, delete the email and don’t click the link!", "notes": [], "multi": false}, {"qnum": 22, "stem": "Mobile device users on your network are required to use a VPN app to connect to the corporate network when they are out of the office. A user reports that the app will not open for them. They’re using a tablet, which they have turned off and back on again, and the app still will not open. What should be tried next?", "options": {"A": "Cycle the power.", "B": "Reset the device to factory defaults.", "C": "Uninstall and reinstall the app.", "D": "Perform a force-stop."}, "correct": ["C"], "explanation": "If an app does not load, the first thing to try is rebooting. If that does not work, attempt to uninstall and reinstall the app. Be sure to check the vendor’s website for any similar problems (and solutions) encountered by others. Cycling the power is turning the device off and on again. The user has already done that. A reset to factory default wipes the device, and would be the last remedy you would try for repairing any device problem, whether the device is a phone, a tablet, or any other computing device. A force-stop, also called a force-close, is merely closing the app, which you can’t do because it won’t open.", "notes": [], "multi": false}, {"qnum": 23, "stem": "Your Windows desktop system is running sluggishly. You have a magnetic hard drive and an M.2 drive. What could you do that might improve system performance? (Choose two.)", "options": {"A": "Run Optimize and Defragment Drive on the magnetic media drive.", "B": "Run Disk Cleanup on both drives.", "C": "Run Optimize and Defragment Drive on the M.2 drive.", "D": "Run SFC."}, "correct": ["A", "B"], "explanation": "If you save many large files, and the hard drive gets to be under ten percent of free space, its performance can slow down dramatically. The Disk Cleanup utility will show how much disk space is being taken up by temporary files, log files, the Recycle Bin, and other items that can easily be deleted. This could free up some disk space. Optimize and Defragment Drive will help with mechanical hard disk drives (HDDs), but not solid-state drives. In fact, running it could damage a solid-state drive like your M.2. As you access and change files on a drive, the parts of the files can end up scattered in different places. With a mechanical drive, retrieving the files will be faster if the file’s pieces are next to each other on the drive. This isn’t as important in a solid-state drive. Defragmenting the drive rearranges it and places each file’s scattered pieces together. System file checker (SFC) should be run if you’re having problems related to system files. It won’t free up space on your drive.", "notes": [], "multi": true}, {"qnum": 24, "stem": "You are visiting a website using your favorite browser. You haven’t clicked anything, yet you can barely read the page because there are so many pop-ups. Which of the following is most likely causing the random, frequent pop-ups?", "options": {"A": "Your computer has been infected with adware.", "B": "The website is poorly written.", "C": "The website uses pop-ups to interact with you.", "D": "The website is programmed to show a pop-up advertisement."}, "correct": ["A"], "explanation": "Adware pop-ups usually spam your desktop with multiple (if not dozens of) windows at the same time. The website could be poorly written, but that’s not the most likely issue. If a website is using pop-ups to gather information from you, they wouldn’t have so many that you can’t see their website. A website may have legitimate pop-up ads, but they won’t have so many that it sends you to another website.", "notes": [], "multi": false}, {"qnum": 25, "stem": "Client computers on your network connect to the Internet through a proxy server. Recently, a Windows client was infected with adware and a browser redirector. You have removed the malware, and now the computer will not connect to the Internet. What should you do to resolve the problem?", "options": {"A": "Disable the network card. Reboot and enable the network card.", "B": "Perform malware remediation again.", "C": "Disable the proxy server configuration to connect directly to the Internet.", "D": "Check the IP configuration to ensure that it’s pointing to the correct proxy server address."}, "correct": ["D"], "explanation": "Malware can change more settings than you might be aware of on a computer. For example, adware might be obvious because of the pop-ups and browser redirects, but it can also change the client-side IP settings that point to a Domain Name System (DNS) or proxy server. Check the IP configuration on the client computer and be sure it’s set properly. The other options are not likely the cause or fix to this issue and may cause other problems.", "notes": [], "multi": false}, {"qnum": 26, "stem": "Your company has recently made changes to infrastructure services such as DNS. Since then, a number of users have reported that they are no longer able to connect to internal servers by name. What can be done at each affected workstation to fix the problem? (Choose two.)", "options": {"A": "Reboot.", "B": "Manually update network settings.", "C": "Disable the software firewall.", "D": "Boot to safe mode."}, "correct": ["A", "B"], "explanation": "Updating the network settings manually or rebooting should apply the new Domain Name System (DNS) information. Disabling the firewall or booting to safe mode will not help the issue.", "notes": [], "multi": true}, {"qnum": 27, "stem": "Your windows computer has not been functioning properly since you installed a new application. You believe the application was poorly written and is causing the issue. You want to refresh your Windows installation but keep your personal files. Where can this be done? (Choose three.)", "options": {"A": "System Recovery in the Settings app", "B": "Safe mode", "C": "Emergency repair disk", "D": "WinRE"}, "correct": ["A", "B", "D"], "explanation": "If you’re able to use the operating system (OS), then go to the Settings app and search for System Recovery, which provides recovery options, including resetting the OS without touching your files. Another option on the same screen is Advanced Startup, where you can click Restart Now. This will restart the computer and bring up the Windows Recovery Environment (WinRE). In WinRE, one of the options is to boot into safe mode, which will enable you to use the options in Settings, as already explained. Alternately, hold the Shift key while restarting the computer. This will also cause the PC to boot into the WinRE. Read carefully: A Windows Repair Disk will enable you to boot into safe mode via WinRE, but without knowing what the “emergency” repair disk is, you don’t know what it will do. It could be an anti-malware boot disk, or another bootable disk with troubleshooting tools.", "notes": [], "multi": true}, {"qnum": 28, "stem": "A Windows user’s vertical market application has crashed. They reboot the computer and try to open it again, and it crashes again. What should be done next to solve the problem? (Choose two.)", "options": {"A": "Look for a patch or update on the manufacturer’s website.", "B": "Delete the application and reinstall it.", "C": "Remove and reinstall Windows.", "D": "Repair the application through Programs and Features in the Control Panel."}, "correct": ["A", "D"], "explanation": "When an application crashes, you want to isolate the cause of the crash—it could be a compatibility issue, hardware, or a host of other problems—and solve it. One early step to take is to look for updates/patches/fixes to the application released by the vendor. You can also try to repair the installation through the Control Panel. If needed, you can delete and reinstall the software, but you should try patching or repairing first. You would not want to remove and reinstall Windows.", "notes": [], "multi": true}, {"qnum": 29, "stem": "A user reports that an application has been crashing on their mobile device. They said an error pop-up window flashes on the screen briefly, but they are unable to read it. What would be your next step?", "options": {"A": "Wait for the next crash to read the error pop-up yourself.", "B": "Install and run a screen recorder to capture the next pop-up.", "C": "Reinstall the application.", "D": "Check the application log for error messages."}, "correct": ["D"], "explanation": "Whatever message appears in the pop-up window is likely logged in the mobile applica- tion log. Steps for accessing the log will vary by device and operating system. If it was too fast for the user to read, it’s probably too fast for you to read too. You would not want to install any additional software until this problem is resolved, and reinstalling the application may not be necessary.", "notes": [], "multi": false}, {"qnum": 30, "stem": "A user reports that the battery life on their smartphone is very short. It works for only about three hours before it needs to be recharged. What can you recommend they do to extend their phone’s battery life? (Choose two.)", "options": {"A": "Turn off unnecessary wireless connections.", "B": "Perform a reset to factory defaults.", "C": "Set the screen to automatically dim.", "D": "Install an antivirus app."}, "correct": ["A", "C"], "explanation": "Tips for increasing battery life include keeping operating system (OS) updates applied (they may include energy-saving patches), avoiding ambient temperatures that are too high or too low, letting the screen automatically dim, and turning off location-based services. Also turn off Wi-Fi if you’re away from your network or not using Wi-Fi, because if it’s on and not connected, the phone will continually search for Wi-Fi connections. You should also disconnect peripherals and quit applications that are not in use. (Bluetooth, for example, uses power when enabled, even if you are not using it to connect to anything.) A reset to factory defaults won’t help with battery life, and you’ll lose all your stuff! Installing an antivirus app also won’t help here.", "notes": [], "multi": true}, {"qnum": 31, "stem": "A laptop user is unable to access the Wi-Fi network and is receiving an error message that a duplicate IP exists on the system. You are confused because you have a DHCP server. What do you need to do next?", "options": {"A": "Manually configure the IP address.", "B": "Ensure that this computer is set to obtain an IP address automatically.", "C": "Ping the IP address from another computer to find out the name of the duplicate computer.", "D": "At a command prompt, enter ipconfig /release and then ipconfig /renew."}, "correct": ["B"], "explanation": "Every network device must have a unique IP address. Many networks use a Dynamic Host Configuration Protocol (DHCP) server to assign IP addresses, because keeping track of them manually would create a great deal of work. If there are two identical IP addresses attempting to access a network with DHCP, then at least one of them very likely has its IP address configured manually. Ensuring that this computer is set to obtain an IP address automatically should be your first step. If it isn’t, then you have found the problem. If it is, then you could ping the IP address using ping -a ipaddress, substituting the dupli- cated IP address for the variable ipaddress in the command. This will return the hostname of the other computer. Every network admin should have a list of computer names and where they are located. You could then ensure that the other computer is also set to obtain an IP address automatically, or if the other device requires a static IP, remove the IP address in question from the available pool of addresses on the DHCP server. Manually configuring an IP address is what caused the problem. The ipconfig /release and ipconfig /renew commands wouldn’t help in this situation.", "notes": [], "multi": false}, {"qnum": 32, "stem": "You are working on your Windows computer and a security alert pops up, as shown in this graphic. What should your next action be?", "options": {"A": "Click the Protect Now button.", "B": "Click the X in the upper-right corner to close the alert.", "C": "Shut down your computer. Reboot it using an anti-malware boot device, and then initiate a malware scan.", "D": "Use System Restore to create a snapshot, and then click the Protect Now button."}, "correct": ["C"], "explanation": "Don’t click anywhere on the warning! This is a fake security warning. It is either a hoax, or when you click on the pop-up, it will install malware. Even clicking the X to close the window may install malware, so don’t do it. Your best course of action is to shut down the computer, reboot, and initiate a malware scan using your anti-malware software. Note that if the computer is on a wired network, you should disconnect the cable before restarting, or if on Wi-Fi, disable Wi-Fi before restarting to protect the rest of the network.", "notes": [], "multi": false}, {"qnum": 33, "stem": "You have a Windows workstation that is spontaneously shutting down and restarting. What should you do to troubleshoot and resolve the issue?", "options": {"A": "Check the system BIOS/UEFI settings to ensure that the boot order is set properly.", "B": "Boot to the Windows installation media, and navigate to the WinRE command prompt.", "C": "Boot into safe mode and see if the problem still persists.", "D": "Reinstall Windows."}, "correct": ["C"], "explanation": "Occasionally, a rogue system will begin automatically shutting down and/or restarting while in use. Although it could be indicative of a hardware problem (e.g., a malfunctioning motherboard or faulty internal connector), it can also indicate a setting misconfiguration or driver problem. The most likely setting problem is with sleep settings, such as hibernation mode. If that’s not it, then it could be a corrupt driver. To begin ruling out possibilities, boot the system into safe mode, and then see whether the problem continues. If the problem does not occur while in safe mode, then boot normally and begin testing what occurs as you eliminate drivers/devices one by one (e.g., sound, video, etc.) until you find the culprit. The boot order in the basic input/output system/unified extensible firmware interface (BIOS/ UEFI) settings would have nothing to do with this problem. While you might need to go into Windows Recovery Environment (WinRE) to fix the problem, that would not be your next step. You certainly don’t need to reinstall Windows, at least not yet.", "notes": [], "multi": false}, {"qnum": 34, "stem": "A Windows desktop computer always shuts down about 10 minutes after the user boots it up. The computer works fine for those first 10 minutes, and if they boot up again a few minutes after a shutdown, it works fine again for 10 minutes. How might you fix this? (Choose two.)", "options": {"A": "Reinstall Windows.", "B": "Use compressed air or an ESD vacuum to clean dust and debris from the system.", "C": "Use SFC to search for and repair corrupted system files.", "D": "Replace the thermal paste on the processor."}, "correct": ["B", "D"], "explanation": "Although it may appear to be a problem with the operating system (OS), this is classic behavior for a system that is overheating. There are a few things to do here. Ensure that all system vents are free of dust and debris, so that air can move freely through. Use compressed air or an antistatic computer vacuum to remove dust from inside the case. Note that the vacuum cleaner must be one designed for use on electronics. Other vacuums cause static, which can damage the computer. Dust on a motherboard can act as a blanket holding heat in, or worse, conductive particles in dust can cause a short circuit and damage the motherboard. Make sure there is adequate room around the case for airflow; if the system is overclocked, revert to running the central processing unit (CPU) at its manufacturer’s recommended speed. If none of those remedy the situation, try replacing the processor’s thermal paste with new thermal paste. Reinstalling Windows or checking system files is not necessary when the computer is overheating.", "notes": [], "multi": true}, {"qnum": 35, "stem": "Your Windows computer was working fine yesterday, but today it is exhibiting slow (degraded) performance. Which of the following tools should be used to check for a potential problem causing the slowdown? (Choose two.)", "options": {"A": "Anti-malware software", "B": "Event Viewer", "C": "Task Manager, Processes tab", "D": "Programs and Features in the Control Panel"}, "correct": ["A", "C"], "explanation": "If the computer was fine yesterday and slow today, your first thought should be that it might have been attacked by malware. Malware running in the background is notorious for taking up system resources. Scan your system with anti-malware, or shut down the system and restart with an anti-malware boot device (which can detect malware loaded before the operating system [OS] is loaded). If malware is not found on your system, look next at the Processes tab of Task Manager. Click Memory at the top to sort the list by how much memory each program is using. It may be software launched at startup that you don’t need or another program that doesn’t need to run all the time. Based on what you find there, take appropriate action.", "notes": [], "multi": true}, {"qnum": 36, "stem": "A user on your Active Directory domain is complaining that their profile is taking a long time to load. They’ve been waiting several minutes. Upon questioning, you find out that this is their first logon at a different computer. What is happening here?", "options": {"A": "They are not listed as a user on this computer.", "B": "Their roaming profile is downloading to this computer, and it takes longer the first time a user logs on to a different PC.", "C": "A peripheral is not connected as it should be, causing a loop in the boot process.", "D": "They entered the wrong password."}, "correct": ["B"], "explanation": "Active Directory (AD) stores user information on a Windows domain, including their profile. The first time a user logs on to a machine on the domain, the en
