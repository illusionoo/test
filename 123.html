Firewall & network protection, then choosing Private network, will enable you to configure firewall settings for use with a private network.", "notes": [], "multi": true}, {"qnum": 235, "stem": "You need to create an exception to allow Open Office to communicate through the local Windows computer’s firewall. How do you configure this? (Choose two.)", "options": {"A": "In the Search box, type Firewall & network protection, and then choose it and click Allow An App Through Firewall.", "B": "In Windows Settings, choose the Apps group.", "C": "In the Control Panel, choose Windows Defender Firewall, and then select Allow An App Or Feature Through Windows Defender Firewall.", "D": "In the Control Panel, open the Programs and Features utility."}, "correct": ["A", "C"], "explanation": "You can drill down through Windows Settings to find Firewall & Network Protection Settings, but it’s far easier to search for it, then choose Allow an app through firewall. Once there, if the app is in the list, check the Change Settings button, then check the box next to the application you want to allow access for under the listing for Private or Public network, depending on your needs. If it isn’t in the list, click Allow another app. Drilling down through the Control Panel, choose Windows Defender Firewall, then Allow an app or feature through Windows Defender Firewall will take you to the same setup screen. The other two options in the question enable you to uninstall applications.", "notes": [], "multi": true}, {"qnum": 236, "stem": "A user has a laptop that they think has WWAN capabilities. Where can you quickly check?", "options": {"A": "Disk Management", "B": "Device Manager", "C": "Apps & Features", "D": "Programs and Features"}, "correct": ["B"], "explanation": "A quick check of Device Manager and clicking on Network Adapters should show you what you have for network devices. Most likely you’ll see a Bluetooth Device (personal area network) entry, possibly an Ethernet local area network (LAN) adapter, a wireless area network (WAN) adapter and, if you have one, a wireless wide area network (WWAN) adapter. If it doesn’t show there, it either isn’t being detected by the system, or one does not exist in your system. Disk Management is for configuring and managing drives. Apps & Features and Programs and Features both have the same job—that is providing a way to install or repair applications and add or remove Windows features. The former is in Settings, and the latter is in the Control Panel.", "notes": [], "multi": false}, {"qnum": 237, "stem": "A user wants to use a WWAN connection to the Internet because they travel, and Ethernet and Wi-Fi networks aren’t always available for connection. What will this user need? (Choose two.)", "options": {"A": "A wireless NIC", "B": "A WWAN card or device", "C": "A cellular service provider", "D": "An RJ-45 connector"}, "correct": ["B", "C"], "explanation": "Wireless wide area networks (WWANs) use the cellular system to connect to the Internet. To make a connection, you would need either a WWAN card in your laptop, or a WWAN device, sometimes called a mobile hotspot device, and a cellular service connection. Some cellular companies require a contract for this type of cellular service, but not all do. The WWAN card or WWAN device needs to be compatible with your cellular provider. Wireless network interface cards (NICs) are used for Wi-Fi connections, and an RJ-45 connector is used for wired Ethernet connections.", "notes": [], "multi": true}, {"qnum": 238, "stem": "A user at your company just signed up for WWAN service through their cellular provider. Their data is capped at 10 GB per month. It’s very costly if they go over, so they’ve asked you if there is a way for them to avoid going over their data limit. What will you do for them?", "options": {"A": "Set up their cellular WWAN as a metered service.", "B": "Use Performance Monitor to track their WWAN use.", "C": "Switch them to a VPN so it won’t cost anything.", "D": "Use a proxy server so their data downloads won’t count."}, "correct": ["A"], "explanation": "Metered network settings can be configured for wired, Wi-Fi, or a wireless wide area network (WWAN) connection. For example, to configure a Wi-Fi network as a metered connection, go to Settings, then choose the Network & Internet group, click on Wi-Fi, then Manage known networks, and select the Network. In Windows 10, you need to click Properties, but in Windows 11 you’re already on the Properties screen. Locate the metered connection setting and turn it on. You can then set a data limit to control data usage. Performance Monitor won’t show data usage. A WWAN can connect to a virtual private network (VPN), but it will still use data. Your connection might go through a proxy server when connecting to a network, but a proxy server’s job is to filter network traffic. Anytime you’re connecting to the Internet or a VPN via your WWAN connection, you’ll be using data.", "notes": [], "multi": false}, {"qnum": 239, "stem": "A junior network administrator wants to know what the fastest way is to access File Explorer, because they use it often. What do you tell them?", "options": {"A": "Press Windows Logo Key+F key.", "B": "Press Windows Logo Key+M key.", "C": "Press Windows Logo Key+E key.", "D": "Press Windows Logo Key+X key, and then choose File Explorer from the menu."}, "correct": ["C"], "explanation": "File Explorer should be showing on the Windows taskbar, but if it isn’t, pressing the Windows Logo Key plus the E key simultaneously will open the File Explorer window. Pressing the Windows Logo Key+X key, then selecting File Explorer from the menu will also work, but it’s not the fastest or most direct way. Windows Logo Key+F will bring up a feedback window, and Windows Logo Key+M will minimize all the open windows, leaving you at the desktop.", "notes": [], "multi": false}, {"qnum": 240, "stem": "You need to establish a wired connection between a newly installed Windows Pro computer and an Ethernet home network. The router is located next to the desk and provides DHCP services. What will you need to connect a desktop computer to this network? (Choose two.)", "options": {"A": "Patch cable", "B": "Wireless NIC", "C": "NIC with RJ-45 port", "D": "IP address and subnet mask"}, "correct": ["A", "C"], "explanation": "For a new Windows installation, the default network setting is to configure IP addresses dynamically, so the computer should get its IP address and subnet mask from the Dynamic Host Configuration Protocol (DHCP) server. All you need is a patch cable to connect to the router and a compatible network interface card (NIC) installed (with its drivers, of course) with a registered jack 45 (RJ-45) port. You would not use a wireless NIC for an Ethernet network. A wireless NIC is for a Wi-Fi network. You don’t need to know the IP address and subnet mask because the DHCP server will assign them automatically.", "notes": [], "multi": true}, {"qnum": 241, "stem": "You need to know the path to a network resource. How can you locate it? (Choose two.)", "options": {"A": "In File Explorer, look at the path in the title bar.", "B": "In File Explorer, right-click the resource, choose Properties, and then click the Sharing tab and look under Network Path.", "C": "Type mynetworkdrives in a browser.", "D": "In Computer Management, choose Shared Folders and then Shares."}, "correct": ["A", "B"], "explanation": "There are multiple ways to view the path to a resource. In File Explorer, you can right-click the resource, then choose Properties and the Sharing tab. The screen will say Network Path and list the path just below it. You can also see it at the top of File Explorer when you’re in the resource. If it isn’t there, click on the ellipsis (…), choose Options, then the View tab, and ensure that Show full path in address bar is checked. Shares in Computer Management shows what you are sharing, not what is being shared with you. Typing mynetworkdrives in a browser is invalid.", "notes": [], "multi": true}, {"qnum": 242, "stem": "When installing a new application, which of the following is not an advantage of using a mountable file over physical media?", "options": {"A": "Ease of installation", "B": "Lower cost to distribute", "C": "Easier to change", "D": "Easier to locate"}, "correct": ["A"], "explanation": "Software on a mountable file or physical media should be equally easy (or difficult) to install, because it’s the same software; only the method of delivery is different. Mountable media has a lower cost to distribute because there is no physical media to purchase and nothing to mail to someone else; mountable files can be distributed over a network. It’s easier to change because changes can be made to the file and uploaded instead of retrieving existing media and making multiple copies of the new file. It’s also easier to locate because there is no need to find a Universal Serial Bus (USB) drive among the several that someone has. Files with an.iso extension are disk image files. To install the software they contain, you first need to mount the image. You might be able to double-click it. If not, right-click and choose Mount or locate the file in File Explorer. Select the file, then click Mount under Disk Image Tools. Once the file is mounted, the operating system (OS) will treat it as a disk in an optical drive. You’ll look for an installer or autorun file to start the software installation. When you’re done using the image, right-click it and choose Eject.", "notes": [], "multi": false}, {"qnum": 243, "stem": "You’ve installed a new hard drive in a Windows PC and need to partition the drive and format the volumes. What tools can you use to format it? (Choose two.)", "options": {"A": "diskmgmt.msc", "B": "diskpart", "C": "perfmon.msc", "D": "services.msc"}, "correct": ["A", "B"], "explanation": "Once a hard drive is installed, partitions must be created (even if there is only one), and the volumes must then be formatted before they will show in File Explorer and be ready for the user to store information on them. Disk Management (diskmgmt.msc) and diskpart are two excellent and powerful tools for doing just that. Disk Management is a utility with a user-friendly graphical user interface (GUI), while diskpart is run from the command line and is the more powerful of the two and worth spending some time exploring. Performance Monitor (perfmon.msc) shows resource usage in real-time, and the Services console (services.msc) shows all the services available in the system and their current status.", "notes": [], "multi": true}, {"qnum": 244, "stem": "You’re troubleshooting problems with an application on a Mac computer. You’ve unin- stalled the application, but it won’t reinstall because it says the application is already installed. You’re going to manually delete the application file so you can then reinstall it. What file extension will you look for?", "options": {"A": ".pkg", "B": ".bat", "C": ".dmg", "D": ".app"}, "correct": ["D"], "explanation": "Files with an.app extension are applications. A file with a.pkg extension in a Mac is a compressed package file. A file with a.dmg extension is a disk image and treated like a drive in the macOS. It can be “mounted” like a physical hard drive, the contents read, and files opened, or applications installed from it. Files with a.bat extension are batch files used in Windows to run a string of commands that have been entered into a text file.", "notes": [], "multi": false}, {"qnum": 245, "stem": "Your company has Windows on its workstations and wants to use file encryption and advanced permissions at the file level. What filesystem will the company be using?", "options": {"A": "ReFS", "B": "FAT32", "C": "ext4", "D": "NTFS"}, "correct": ["D"], "explanation": "New Technology File System (NTFS) is the Windows filesystem that supports file encryption and NTFS permissions for file sharing. Resilient File System (ReFS) is a feature available on Windows Pro for Workstations and Windows Enterprise editions. ReFS will detect when data on a mirrored drive has been corrupted and will use a healthy copy of the data on other drives to attempt to correct corrupted data and protect data. The File Allocation Table 32 (FAT32) filesystem is most compatible between operating systems (OSs) but doesn’t support NTFS permissions and file-level encryption. The Fourth Extended File System (ext4) filesystem is used in the Linux world.", "notes": [], "multi": false}, {"qnum": 246, "stem": "Which of the following filesystem types are you most likely to find on a Linux workstation?", "options": {"A": "FAT32", "B": "NTFS", "C": "XSF", "D": "ext4"}, "correct": ["D"], "explanation": "Although the XSF filesystem and Fourth Extended File System (ext4) are both filesystems used with Linux, the ext4 filesystem is most likely to be found on a Linux workstation. The XSF filesystem uses parallel execution and is designed to handle the large file sizes of database servers. File Allocation Table 32 (FAT32) is commonly used for memory cards, Universal Serial Bus (USB) drives, and external hard drives. It is the filesystem that was used when only 32-bit processors were available. It can still be used for compatibility issues with legacy devices; however, Windows 10 and Windows 11 require the New Technology File System (NTFS). NTFS has been available for decades and offers security features that FAT32 doesn’t have.", "notes": [], "multi": false}, {"qnum": 247, "stem": "Which of the following filesystem types is required on Windows 11?", "options": {"A": "FAT32", "B": "NTFS", "C": "XSF", "D": "ext4"}, "correct": ["B"], "explanation": "Windows 10 and Windows 11 require the New Technology File System (NTFS). NTFS has been available for decades and offers security features that File Allocation Table 32-bit (FAT32) doesn’t have. FAT32 is the filesystem that was used when only 32-bit processors were available and can still be used for compatibility issues with legacy devices. It is commonly used when compatibility between different operating system (OS) platforms is required, and for memory cards, Universal Serial Bus (USB) drives, and external hard drives. The XSF filesystem and Fourth Extended File System (ext4) are both used with Linux.", "notes": [], "multi": false}, {"qnum": 248, "stem": "You want to automate a repetitive process. You press the Windows Logo Key+R Key simultaneously. What do you type in the Run dialog box?", "options": {"A": "automate", "B": "tasksched.msc", "C": "diskmgmt.msc", "D": "dfrgui.exe"}, "correct": ["B"], "explanation": "The Task Scheduler (tasksched.msc) enables users to set times and dates for programs to run, whether they run one time or repetitively. automate isn’t a valid command. Disk Management (diskmgmt.msc) provides a quick graphical user interface (GUI) for managing volumes on storage drives, and Disk Defragment (dfrgui.exe) is a GUI where a user can defragment a hard disk drive (HDD).", "notes": [], "multi": false}, {"qnum": 249, "stem": "You want to know who is currently logged in to a workstation. What command works in both the Linux terminal and Windows Command Prompt and Terminal and will show information about the current user?", "options": {"A": "whoami", "B": "users", "C": "idme", "D": "net use"}, "correct": ["A"], "explanation": "The whoami command returns information about the currently logged on user. It works in both Windows and Linux, but CompTIA only has it listed under Windows. Exactly what it displays depends on what computer you’re using when you run it. On a workstation, it will display the computer name/username. On a Windows server, it will return the users along with their groups and privileges. Users is a folder that contains information about all the users of the computer. It isn’t a command. The option of idme isn’t a real command, and the net use command enables a person to use shared resources on a network.", "notes": [], "multi": false}, {"qnum": 250, "stem": "You find that you are often using System Configuration, Disk Cleanup, and Event Viewer. What Windows 10 Control Panel utility gives you quick access to these and more tools?", "options": {"A": "Computer Management", "B": "Resource Monitor", "C": "Administrative Tools", "D": "Task Scheduler"}, "correct": ["C"], "explanation": "Administrative Tools, which can be found in the Windows 10 Control Panel, has many of the computer-management tools that are used to maintain and troubleshoot computer systems, not just the ones listed in this question. In Windows 11, Administrative Tools has been renamed to Windows Tools and is not identical to Administrative Tools. Computer Management is a Microsoft Management Console (MMC) that contains other tools as well. In it, you can find Task Scheduler, Event Viewer, Shared Folders, Performance, Device Manager, and Disk Management, as well as Services and Windows Management Instrumentation (WMI) Control. In Windows Pro and above editions, Computer Management also contains Local Users and Groups. Resource Monitor shows resources being used by process in real-time, and Task Scheduler is just as the name sounds—it can be used to schedule other applications, even batch files, to run based on time or other predetermined events.", "notes": [], "multi": false}, {"qnum": 251, "stem": "You just upgraded a computer from Windows 10 to Windows 11 and can’t find Administrative Tools. What Windows 11 utility is most similar to Windows 10 Administrative Tools?", "options": {"A": "Computer Management", "B": "Resource Monitor", "C": "Windows Tools", "D": "Task Scheduler"}, "correct": ["C"], "explanation": "Administrative Tools, which can be found in the Windows 10 Control Panel, has many of the computer management tools that are used to maintain and troubleshoot computer systems. In Windows 11, Administrative Tools has been renamed to Windows Tools. Computer Management is a Microsoft Management Console (MMC) that contains other tools as well. In it, you can find Task Scheduler, Event Viewer, Shared Folders, Performance, Device Manager, and Disk Management, as well as Services and Windows Management Instrumentation (WMI) Control. In Windows Pro and above editions, Computer Management also contains Local Users and Groups. Resource Monitor shows resources being used by process in real-time, and Task Scheduler is just as the name sounds—it can be used to schedule other applications, even batch files, to run based on time or other predeter- mined events.", "notes": [], "multi": false}, {"qnum": 252, "stem": "You’ve been called to troubleshoot a customer’s computer. You first observe that the desktop has the taskbar icons slid to the left of the taskbar instead of in the center, and when you click on the Windows button at bottom-left, a start screen with tiles appears. What version of Windows does this user have?", "options": {"A": "Windows 8", "B": "Windows 9", "C": "Windows 10", "D": "Windows 11"}, "correct": ["C"], "explanation": "One of the notable differences between Windows 11 and Windows 10 is the user interface. In Windows 10, the taskbar icons are all the way to the left, and clicking the Windows icon brings up a Start menu with live tiles. Windows 11 has centered taskbar icons, and clicking the Windows icon launches a Start menu with pinned icons and a search bar. Windows 8 didn’t have a Start button. There is no Windows 9.", "notes": [], "multi": false}, {"qnum": 253, "stem": "Which of the following is not an available tab in the File Explorer Options applet found in the Control Panel?", "options": {"A": "General tab", "B": "View tab", "C": "Search tab", "D": "Options tab"}, "correct": ["D"], "explanation": "File Explorer Options in the Control Panel has three tabs: General, View, and Search. In the General tab, under Browse folders, there is only one option, which is to choose whether to open each folder in the same window or its own window. The other two sections of the General tab control whether you single or double-click to open a file, and whether the list of previously accessed files and folders is shown. The View tab has many advanced settings in the checklist shown in the graphic. The Search tab enables you to change how searches are conducted. There is no Options tab.", "notes": [], "multi": false}, {"qnum": 254, "stem": "In macOS, which of the following folders holds universal fonts, settings, and other informa- tion used by everyone who uses the system?", "options": {"A": "/Library", "B": "/Users~/Library", "C": "/System", "D": "/Applications"}, "correct": ["A"], "explanation": "In macOS, the /Library folder holds information that all users need for the system to function. /Users~/Library holds data and software for the particular named user. The /System folder holds files needed to run the operating system (OS). /Applications holds the files of applications that have been installed on the Mac, like the \\Program Files folder in a Windows system does.", "notes": [], "multi": false}, {"qnum": 255, "stem": "In macOS, which of the following folders holds information about everyone who uses the computer?", "options": {"A": "/Library", "B": "/Users", "C": "/System", "D": "/User"}, "correct": ["B"], "explanation": "In macOS, the /Users folder contains a folder named for each user in the system. The /Library folder holds information that is shared among all users, like system-wide fonts. /System holds the Mac operating system (OS) files. Don’t rename or delete it! /User isn’t valid in the macOS world. \\User in a Windows system contains a list of all users who have logged in to the system.", "notes": [], "multi": false}, {"qnum": 256, "stem": "What two iCloud applications enable audio, video, and text messages to be shared between Mac systems? (Choose two.)", "options": {"A": "iPhone", "B": "iMessage", "C": "FaceTime", "D": "Teams"}, "correct": ["B", "C"], "explanation": "iMessage is the Short Message Service (SMS) software used by Mac devices, and FaceTime enables users to see the other person to which they’re talking. iPhone is a platform, not an application, and Teams is Microsoft’s sharing platform for Windows users.", "notes": [], "multi": true}, {"qnum": 257, "stem": "Your mom has an Apple Watch that enables her to answer and make phone calls, check her email, and read and respond to messages, even if her iPhone is not near her. What’s the name of the feature of Apple devices that enables these devices to synchronize?", "options": {"A": "Continuity", "B": "Individuality", "C": "Integration", "D": "iCloud"}, "correct": ["A"], "explanation": "Continuity is an Apple feature that enables synchronization of information between Apple devices. iCloud plays a role in this synchronization but isn’t the name of the feature. Individuality and Integration are not Apple features, and iCloud is Apple’s online storage space.", "notes": [], "multi": false}, {"qnum": 258, "stem": "Which of the following are involved in filesystem management in a Linux system? (Choose two.)", "options": {"A": "du", "B": "fsck", "C": "mount", "D": "kernel"}, "correct": ["B", "C"], "explanation": "In a Linux system, fsck and mount are used for filesystem management. The filesystem consistency check (fsck) looks for and repairs errors in the filesystem. The mount command enables the user to add files from an external source to their directory tree so they can easily use them. du calculates and reports disk space usage, and the kernel files are the main part of the operating system (OS). The kernel accepts commands.", "notes": [], "multi": true}, {"qnum": 259, "stem": "Which of these Linux networking commands enables a user to communicate with a client computer through the Linux Terminal?", "options": {"A": "ping", "B": "traceroute", "C": "curl", "D": "dig"}, "correct": ["C"], "explanation": "In a Linux distribution, the curl command is used in the Terminal (Linux’s command-line interface) to communicate with a specific client URL (cURL). ping tests connectivity. traceroute shows the routers a packet traverses to get from sender to destination, and dig, which is also used in macOS, provides several functions related to the Domain Name System (DNS) and provides DNS lookups.", "notes": [], "multi": false}, {"qnum": 260, "stem": "Which of these is a Linux command that is used to install, update, and remove packages?", "options": {"A": "man", "B": "cat", "C": "curl", "D": "dnf"}, "correct": ["D"], "explanation": "In a Linux distribution, the dnf command is used to install, update, and remove packages. man displays the manual (help) for the specified command. cat, short for concatenate, can read, display, and combine files. The curl command is used at a Terminal (Linux’s command-line interface) to communicate with a specific client URL (cURL).", "notes": [], "multi": false}, {"qnum": 261, "stem": "Which of these is a Linux OS component that runs the initialization programs in many Linux distributions and manages services and systems?", "options": {"A": "systemd", "B": "kernel", "C": "bootloader", "D": "traceroute"}, "correct": ["A"], "explanation": "In many (but not all) Linux distributions, the kernel loads systemd, which then initializes all the other processes needed to run the operating system (OS). The bootloader in Linux is akin to the bootloader in a Windows system; it is part of the master boot record (MBR) and is the file that finds and loads the OS files, in this case, the kernel. traceroute is a networking command used to see the path a packet takes to get from one point to another.", "notes": [], "multi": false}, {"qnum": 262, "stem": "Windows has administrator accounts that can control everything in a Windows computer. What is the username with similar power in a Linux system?", "options": {"A": "admin", "B": "boss", "C": "root", "D": "systemd"}, "correct": ["C"], "explanation": "The Linux root account has ultimate power in a Linux system. systemd is a part of the operating system (OS) that is loaded by the bootloader. It initializes the system and loads the kernel. admin is a common administrator username on some routers, and boss is not a real computing term.", "notes": [], "multi": false}, {"qnum": 263, "stem": "Which of these Linux OS folders holds a hashed version of username passwords?", "options": {"A": "/ect/passwd", "B": "/ect/shadow", "C": "/ect/hosts", "D": "/ect/resolve.conf"}, "correct": ["B"], "explanation": "A hashed list of user passwords is held in the /ect/shadow folder. /ect/passwd holds other information about users, such as their username, ID, home directory and group, and a marker that points to their entry in the /ect/shadow file. The option of /ect/ hosts is used to resolve hostnames to Internet Protocol (IP) addresses on the local network, and /ect/resolve.conf is used to specify Domain Name System (DNS) server IP addresses to be used in resolving domain names to IP addresses.", "notes": [], "multi": false}, {"qnum": 264, "stem": "Which of these Linux OS folders is used to resolve hostnames on a local network to IP addresses?", "options": {"A": "/ect/passwd", "B": "/ect/fstab", "C": "/ect/hosts", "D": "/ect/resolve.conf"}, "correct": ["C"], "explanation": "The /ect/hosts folder contains a table resolving local hostnames to their IP addresses. /ect/passwd holds information about users, such as their username, ID, home directory and group, and a marker that points to their entry in the /ect/shadow file, which contains a hashed version of their password. /ect/fstab contains a configuration table for mounting and unmounting filesystems. It makes using devices like Universal Serial Bus (USB) drives easier because using it means the user doesn’t have to manually mount and unmount drives. /ect/resolve.conf is used to specify Domain Name System (DNS) server Internet Protocol (IP) addresses to be used in resolving domain names to IP addresses.", "notes": [], "multi": false}, {"qnum": 265, "stem": "Which of these Linux OS folders automatically mounts and unmounts external devices?", "options": {"A": "/ect/passwd", "B": "/ect/fstab", "C": "/ect/hosts", "D": "/ect/resolve.conf"}, "correct": ["B"], "explanation": "The /ect/fstab folder contains a configuration table for mounting and unmounting filesystems. It makes using devices like Universal Serial Bus (USB) drives easier because using it means the user doesn’t have to manually mount and unmount drives. /ect/ passwd holds information about users, such as their username, ID, home directory and group, and a marker that points to their entry in the /ect/shadow file, which contains a hashed version of their password. The /ect/hosts folder contains a table resolving local hostnames to their Internet Protocol (IP) address. /ect/resolve.conf is used to specify Domain Name System (DNS) server IP addresses to be used in resolving domain names to IP addresses.", "notes": [], "multi": false}, {"qnum": 266, "stem": "What two pieces of information are usually all that are required to configure a user’s cloud-based email system? (Choose two.)", "options": {"A": "Email address", "B": "DNS server", "C": "Password", "D": "Mail server IP address"}, "correct": ["A", "C"], "explanation": "Usually when creating or configuring an online email service, all that is needed is the user’s email address and a password.", "notes": [], "multi": true}, {"qnum": 267, "stem": "Which of these is not a cloud storage system/service?", "options": {"A": "Google Drive", "B": "OneDrive", "C": "Dropbox", "D": "Linux drive"}, "correct": ["D"], "explanation": "Linux doesn’t have a specific online storage named Linux drive, but there are several online spaces that Linux users can use to collaborate, like Slack and Google Drive. Google Drive is a Google tool that provides not only storage but also the ability to share documents and collaborate. Microsoft’s online storage solution, OneDrive, works with Office 365 Copilot. Dropbox is a third-party application for storing and backing up files.", "notes": [], "multi": false}, {"qnum": 268, "stem": "A family member has a new iPhone and wants to know how to synchronize their photos so they can be viewed with their iPad. What do you tell them? (Choose two.)", "options": {"A": "It can’t be done.", "B": "On the phone, go to Settings, their name, and then iCloud, tap iCloud Drive, and click the button next to Sync This iPhone. Do the same on the iPad.", "C": "On the phone, go to Settings, their name, and then iCloud, tap iCloud Drive, and click the button next to Sync This iPhone. On the iPad, navigate to icloud.com, and then sign in with their Apple account.", "D": "On the phone, go to Settings and then their name, click Synchronize, and then enter their username and password. Click Synchronize Now to Google Drive. Access their Google Drive from the iPad."}, "correct": ["B", "C"], "explanation": "Synchronizing between an iPhone and an iPad is easy. Go to Settings, click on your name, then iCloud, tap iCloud drive, and click the button next to Sync this iPhone. Then on the iPad, the user can either perform the same synchronization setup or access the data from icloud.com.", "notes": [], "multi": true}, {"qnum": 269, "stem": "You’re a network admin and need to give employees access to Microsoft 365 apps for business. You’ve already purchased licenses, so you go to https://admin.cloud. microsoft. Which of the following isn’t required?", "options": {"A": "Downloading Office 365", "B": "Adding the user’s email address", "C": "Assigning a license to the user", "D": "Sending the user their credentials Chapter Security THE COMPTIA A+ 220–1202 TOPICS COVERED IN THIS CHAPTER INCLUDE THE FOLLOWING: ✓ 2.1 Summarize various security measures and their purposes. ▪ Physical Security ▪ Bollards ▪ Access control vestibule ▪ Badge Reader ▪ Video surveillance ▪ Alarm systems ▪ Motion sensors ▪ Door locks ▪ Equipment locks ▪ Security guards ▪ Fences ▪ Physical access security ▪ Key fobs ▪ Smart cards ▪ Mobile digital key ▪ Keys ▪ Biometrics ▪ Retina scanner ▪ Fingerprint scanner ▪ Palm print scanner ▪ Facial recognition technology (FRT) ▪ Voice recognition technology ▪ Lighting ▪ Magnetometers ▪ Logical Security ▪ Principle of least privilege ▪ Zero Trust model ▪ Access control lists (ACLs) ▪ Multifactor authentication (MFA) ▪ Email ▪ Hardware token ▪ Authenticator application ▪ Short Message Service (SMS) ▪ Voice call ▪ Time-based one-time password (TOTP) ▪ One-time password/passcode (OTP) ▪ Security Assertions Markup Language (SAML) ▪ Single sign-on (SSO) ▪ Just-in-time access ▪ Privileged access management (PAM) ▪ Mobile device management (MDM) ▪ Data loss prevention (DLP) ▪ Identity access management (IAM) ▪ Directory services ✓ 2.2 Given a scenario, configure and apply basic Microsoft Windows OS security settings. ▪ Defender Antivirus ▪ Activate/deactivate ▪ Update definitions ▪ Firewall ▪ Activate/deactivate ▪ Port security ▪ Application security ▪ Users and groups ▪ Local vs. Microsoft account ▪ Standard account ▪ Administrator ▪ Guest user ▪ Power user ▪ Log-in OS options ▪ Username and password ▪ Personal identification number (PIN) ▪ Fingerprint ▪ Facial recognition ▪ SSO ▪ Passwordless/Windows Hello ▪ NTFS vs. share permissions ▪ File and folder attributes ▪ Inheritance ▪ Run as administrator vs. standard user ▪ User Account Control (UAC) ▪ BitLocker ▪ BitLocker-To-Go ▪ Encrypting File System (EFS) ▪ Active Directory ▪ Joining domain ▪ Assigning log-in script ▪ Moving objects within organizational units ▪ Assigning home folders ▪ Applying Group Policy ▪ Selecting security groups ▪ Configuring folder redirection ✓ 2.3 Compare and contrast wireless security protocols and authentication methods. ▪ Protocols and encryption ▪ Wi-Fi Protected Access 2 (WPA2) ▪ WPA3 ▪ Temporal Key Integrity Protocol (TKIP) ▪ Advanced Encryption Standard (AES) ▪ Authentication ▪ Remote Authentication Dial-in User Service (RADIUS) ▪ Terminal Access Controller Access-control System (TACACS+) ▪ Kerberos ▪ Multifactor ✓ 2.4 Summarize types of malware and tools/methods for detection, removal, and prevention. ▪ Malware ▪ Trojan ▪ Rootkit ▪ Virus ▪ Spyware ▪ Ransomware ▪ Keylogger ▪ Boot sector virus ▪ Cryptominer ▪ Stalkerware ▪ Fileless ▪ Adware ▪ Potentially unwanted program (PUP) ▪ Tools and methods ▪ Recovery console/environment/modes ▪ Endpoint detection and response (EDR) ▪ Managed detection and response (MDR) ▪ Extended detection and response (XDR) ▪ Antivirus ▪ Anti-malware ▪ Email security gateway ▪ Software firewalls ▪ User education regarding common threats ▪ Antiphishing training ▪ OS reinstallation ✓ 2.5 Compare and contrast common social engineering attacks, threats, and vulnerabilities. ▪ Social engineering ▪ Phishing ▪ Vishing ▪ Smishing ▪ QR code phishing ▪ Spear phishing ▪ Whaling ▪ Shoulder surfing ▪ Tailgating ▪ Impersonation ▪ Dumpster diving ▪ Threats ▪ Denial of service (DoS) ▪ Distributed denial of service (DDoS) ▪ Evil twin ▪ Zero-day attack ▪ Spoofing ▪ On-path attack ▪ Brute-force attack ▪ Dictionary attack ▪ Insider threat ▪ Structured Query Language (SQL) injection ▪ Cross-site scripting (XSS) ▪ Business email compromise (BEC) ▪ Supply chain/pipeline attack ▪ Vulnerabilities ▪ Non-compliant systems ▪ Unpatched systems ▪ Unprotected systems (missing antivirus/missing firewall) ▪ EOL ▪ Bring your own device (BYOD) ✓ 2.6 Given a scenario, implement procedures for basic small office/home office (SOHO) malware removal. ▪ 1. Investigate and verify malware symptoms. ▪ 2. Quarantine infected system. ▪ 3. Disable System Restore in Windows Home. ▪ 4. Remediate infected systems. ▪ 5. Update anti-malware software. ▪ 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). ▪ 7. Reimage/reinstall. ▪ 8. Schedule scans and run updates. ▪ 9. Enable System Restore and create a restore point in Windows Home. ▪ 10. Educate the end user. ✓ 2.7 Given a scenario, apply workstation security options and hardening techniques. ▪ Data-at-rest encryption ▪ Password considerations ▪ Length ▪ Character types ▪ Uniqueness ▪ Complexity ▪ Expiration ▪ Basic input/output system (BIOS)/Unified Extensible Firmware Interface (UEFI) passwords ▪ End-user best practices ▪ User screensaver locks ▪ Log off when not in use ▪ Secure/protect critical hardware (e.g., laptops) ▪ Secure personally identifiable information (PII) and passwords ▪ Use password managers ▪ Account management ▪ Restrict user permissions ▪ Restrict login times ▪ Disable guest account ▪ Use failed attempts lockout ▪ Use timeout/screen lock ▪ Apply account expiration dates ▪ Change default administrator’s user account/password ▪ Disable AutoRun ▪ Disable unused services ✓ 2.8 Given a scenario, apply common methods for securing mobile devices. ▪ Hardening techniques ▪ Device encryption ▪ Screen locks ▪ Facial recognition ▪ PIN codes ▪ Fingerprint ▪ Pattern ▪ Swipe ▪ Configuration profiles ▪ Patch Management ▪ OS updates ▪ Application updates ▪ Endpoint security software ▪ Antivirus ▪ Anti-malware ▪ Content filtering ▪ Locator applications ▪ Remote wipes ▪ Remote backup applications ▪ Failed log-in attempts restrictions ▪ Policies and procedures ▪ MDM ▪ BYOD vs. corporate-owned devices ▪ Profile security requirements ✓ 2.9 Compare and contrast common data destruction and disposal methods. ▪ Physical destruction of hard drives ▪ Drilling ▪ Shredding ▪ Degaussing ▪ Incinerating ▪ Recycling or repurposing best practices ▪ Erasing/wiping ▪ Low-level formatting ▪ Standard formatting ▪ Outsourcing concepts ▪ Third-party vendor ▪ Certification of destruction/recycling ▪ Regulatory and environmental requirements ✓ 2.10 Given a scenario, apply security settings on SOHO wireless and wired networks. ▪ Router settings ▪ Change default passwords ▪ IP filtering ▪ Firmware updates ▪ Content filtering ▪ Physical placement/secure locations ▪ Universal Plug and Play (UPnP) ▪ Screened subnet ▪ Configure secure management access ▪ Wireless specific ▪ Changing the service set identifier (SSID) ▪ Disabling SSID broadcast ▪ Encryption settings ▪ Configuring guest access ▪ Firewall settings ▪ Disabling unused ports ▪ Port forwarding/mapping ✓ 2.11 Given a scenario, configure relevant security settings in a browser. ▪ Browser download/installation ▪ Trusted sources ▪ Hashing ▪ Untrusted sources ▪ Browser patching ▪ Extensions and plug-ins ▪ Trusted sources ▪ Untrusted sources ▪ Password managers ▪ Secure connections/sites - valid certificates ▪ Settings ▪ Pop-up blocker ▪ Clearing browsing data ▪ Clearing cache ▪ Private-browsing mode ▪ Sign-in/browser data synchronization ▪ Ad blockers ▪ Proxy ▪ Secure DNS ▪ Browser feature management ▪ Enable/disable ▪ Plug-ins ▪ Extensions ▪ Features"}, "correct": ["A"], "explanation": "When giving new users access to Microsoft 365 apps for business, you will go to your admin account and choose Go to setup, which starts a wizard. You don’t need to download and install Microsoft 365 at this time. Instead, go to the next screen and add users. They", "notes": [], "multi": false}], "skipped": [[21, "image-based"], [28, "image-based"], [85, "image-based"], [227, "image-based"]]}, "ch7": {"title": "Chapter 7 - Security", "questions": [{"qnum": 1, "stem": "A client has a Windows 11 Home computer with a virus on it. They have quarantined the system from the rest of their network. To follow malware removal best practices, what should be done next?", "options": {"A": "Investigate and verify malware symptoms.", "B": "Disable System Restore in Windows Home.", "C": "Enable System Restore and create a restore point in Windows.", "D": "Update anti-malware software."}, "correct": ["A", "C"], "explanation": "Bluetooth must be turned on in Settings before it will work. Airplane mode must be off for Bluetooth or any other wireless connection to work. Typing Bluetooth at a command prompt will not enable it.", "notes": [], "multi": true}, {"qnum": 2, "stem": "Someone has configured an external server with an IP address that should belong to one of your sister company’s servers. With this new computer, they are attempting to establish a connection to your internal network. What type of attack is this?", "options": {"A": "Spoofing", "B": "On-path attack", "C": "Zombie/botnet", "D": "Non-compliant system"}, "correct": ["C"], "explanation": "The first thing to try when you get a blue/black screen of death (BSOD) error is to reboot. (In Windows 11, the black screen of death was reverted to the familiar blue screen. A black screen of death means that the build of Windows is outdated.) If the problem goes away, it may have been a one-time glitch. Often BSOD errors are caused by hardware or drivers, and because you just installed a new sound card and drivers in Windows, that would be the likely suspect. Use the Windows Recovery Environment (WinRE) to boot into safe mode. Once in safe mode, uninstall the driver and look for an updated one on the sound card manufacturer’s website.", "notes": [], "multi": false}, {"qnum": 3, "stem": "Which of the following options best describes the type of security device that often incorpo- rates RFID technology to grant personnel access to secure areas or resources?", "options": {"A": "Smart card", "B": "Security token", "C": "Access control vestibule", "D": "Key fob"}, "correct": ["B", "C"], "explanation": "There are a number of reasons intermittent wireless connections can occur, but the two most common are lack of a good signal and interference. Increasing the number of wireless access points (WAPs), or being closer to one, can address the lack of a good signal. Interference can be addressed by reducing the number of devices competing for the same channel or by moving away from walls, appliances operating on the same frequency, or obstacles. A poor wireless signal can cause video buffering, not the other way around, and Wi-Fi antennas for mobile devices are often found inside the display housing, not a retractable antenna.", "notes": [], "multi": true}, {"qnum": 4, "stem": "You are configuring a wireless network for a small office. What should you enable for the best encryption possible for network transmissions?", "options": {"A": "WPS", "B": "WEP", "C": "WPA", "D": "WPA3"}, "correct": ["D"], "explanation": "There are four wireless encryption methods available for Wi-Fi networks. From least to most secure, they are Wired Equivalent Privacy (WEP), Wi-Fi Protected Access (WPA), and two newer versions of WPA called WPA2 and WPA3. WPA3 is the latest and the most secure and should be used unless strange circumstances prevent you from doing so. Wi-Fi Protected Setup (WPS) is an easy way to configure Wi-Fi for devices like printers, where a number would be generated on a printer, for example, and the number would need to be entered on the access point, or vice versa. WPS has security flaws and is not listed in the CompTIA A+ exam objectives.", "notes": [], "multi": false}, {"qnum": 5, "stem": "You are working in a company with a domain. An employee received a new position in the company and will be relocating from the Miami, Florida, office to the Paris, France, office. What will be the result when you move them from the Miami OU to the Paris OU?", "options": {"A": "Their rights will stay the same, but permissions will change.", "B": "Their group policies and security settings will remain the same as at the Miami OU.", "C": "They will inherit group policies and security settings from the Paris OU.", "D": "You will need to create a new OU for moved employees."}, "correct": ["C"], "explanation": "When an object is moved from one Organizational Unit (OU) to another, the object inherits the group policies and security settings of the new OU. Their rights, permissions, and group policies probably won’t remain the same, unless the two OUs have the same settings. There is no need to create a new OU for moved employees.", "notes": [], "multi": false}, {"qnum": 6, "stem": "Which types of security threats involve the attacker attempting to directly contact a potential victim? (Choose two.)", "options": {"A": "Spoofing", "B": "Phishing", "C": "Social engineering", "D": "Brute-force attacking"}, "correct": ["B", "C"], "explanation": "Social engineering is a process in which an attacker attempts to acquire information about your network and system by social means, such as talking to people in the organization, shoulder surfing, tailgating, or other methods. When this is done via email or instant messaging, it’s called phishing or smishing. Spoofing involves pretending to be a trusted resource, for example, by using a trusted resource’s Internet Protocol (IP) address to gain access to something else. A brute-force attack usually involves software that keeps trying passwords or codes until it hits upon the right one to gain access.", "notes": [], "multi": true}, {"qnum": 7, "stem": "An employee uses their security badge to enter the building through a secured door. Another person tries to enter the building behind them before the door closes, without swiping a badge. What type of behavior is the second person demonstrating?", "options": {"A": "Shoulder surfing", "B": "On-path attack", "C": "Brute-force", "D": "Tailgating"}, "correct": ["D"], "explanation": "Tailgating refers to being so close to someone when they enter a building that you can come in right behind them, without needing to use a key, a card, or any other security device. Using an access control vestibule, which is a small room that limits access to one or a few individuals, is a great way to stop tailgating. Revolving doors can also help prevent tailgating. Shoulder surfing is walking behind someone hoping to see passwords or other security information they may be entering. Privacy screens and physical barriers can help prevent shoulder surfing. On-path attacks occur when data transmissions are intercepted by someone enroute, then forwarded on to their destination, sometimes with changes, sometimes without. A brute-force attack involves software that keeps trying passwords or codes until it hits upon the right one to gain access.", "notes": [], "multi": false}, {"qnum": 8, "stem": "You have a Windows domain network and want to ensure that users are forced to meet password complexity requirements. What is the best way to implement this on the network?", "options": {"A": "Use a firewall.", "B": "Use a VPN.", "C": "Use a GPO.", "D": "Use DLP processes."}, "correct": ["C"], "explanation": "In a Windows Active Directory (i.e., domain), password policies can be configured at the domain level using Group Policy Objects (GPOs). There are hundreds of variables that can be configured. Variables that can be configured relating to passwords include password com- plexity and length and the time between allowed changes to passwords. A firewall can be configured to block certain types of traffic based on things like IP address, protocol, or a Media Access Control (MAC) address. A virtual private network (VPN) is a secure path between a local and remote device. Data Loss Prevention (DLP) is the process of monitoring and identifying sensitive data to make sure it is only accessed by authorized persons.", "notes": [], "multi": false}, {"qnum": 9, "stem": "You are planning security protocols for your company’s new server room. What is the simplest way to keep potential attackers physically away from your servers?", "options": {"A": "Lock the door.", "B": "Use cable locks.", "C": "Install an access control vestibule.", "D": "Implement biometrics."}, "correct": ["A"], "explanation": "Sometimes, the obvious solutions are the best ones! A key aspect of access control involves physical barriers. One of the easiest ways to prevent those intent on creating problems from physically entering your environment is to lock your doors and keep them out. Cable locks are used to secure mobile devices like laptops to a table or fixed device so they can’t be carried away. An access control vestibule is a small room between two doors, where the secure access area is beyond the second door, and biometrics uses a part of the body to identify a person.", "notes": [], "multi": false}, {"qnum": 10, "stem": "A user on your network reported that their screen went blank and a message popped up. It’s telling them that their files are no longer accessible, and if they want them back, they need to enter a credit card number and pay a $2,000 fee. Which type of malware has infected this system?", "options": {"A": "Rootkit", "B": "Ransomware", "C": "Trojan", "D": "Spyware"}, "correct": ["B"], "explanation": "Ransomware is software, often delivered through a Trojan, that takes control of a system and demands that a third party be paid. The “control” can be accomplished by encrypting the hard drive, by changing user password information, or via any of several other creative ways. Users are usually assured that by paying the extortion amount (i.e., the ransom), they will be given the code needed to revert their systems to normal operations. Even among malware, ransomware is particularly nasty. A rootkit is software that gains access to a system as administrator, giving it full control over a system. Rootkits are adept at hiding their presence and are difficult to eradicate. A Trojan is named after the Trojan horse of Greek mythology. Trojans are malicious software that hide in that fun game or screensaver that you just downloaded, and it installs when you install the innocent-looking files. Trojans often install a backdoor that a malicious actor can use later to access the infected system. Spyware is designed to watch what you do and where you go, hoping to gain information such as logins, passwords, and bank account numbers.", "notes": [], "multi": false}, {"qnum": 11, "stem": "You are setting up a new wireless SOHO router. Which of the following should you change immediately when initially configuring the network? (Choose two.)", "options": {"A": "The router’s default administrator username and password", "B": "The default SSID", "C": "The radio power level", "D": "The guest account password"}, "correct": ["A", "B"], "explanation": "When configuring a new small office/home office (SOHO) or any other wireless router, always change the default administrator username and password first. This prevents would-be hackers from having easy access to the router. Then change the default service set identifier (SSID). These default values can easily be found online and not changing them immediately makes your router vulnerable to attack. The radio power level might be changed later if you discover the signal is too weak or too strong. There is no actual guest account on a router.", "notes": [], "multi": true}, {"qnum": 12, "stem": "You are configuring a router for a small office network. The network users should be able to access regular and secure websites and send and receive email. Those are the only connec- tions allowed to the Internet. Which security feature should you configure to prevent additional traffic from coming through the router?", "options": {"A": "MAC filtering", "B": "Content filtering", "C": "Port forwarding/mapping", "D": "Port security/disabling unused ports"}, "correct": ["D"], "explanation": "Port security involves disabling all unneeded protocols and ports. In this case, ports 80 and 443 are needed for Hypertext Transfer Protocol (HTTP) and HTTP Secure (HTTPS) access, and ports 25, 110, 143, 465, or 587 may be needed for email. That’s it. If you don’t need them, remove the additional protocols, software, or services, or prevent them (i.e., disable them, or block them, as the setting is typically called on a router) from loading. Ports left open but not in use present an open door for an attacker to enter. Media Access Control (MAC) filtering is an option on most routers that will only allow devices with specific MAC addresses to access the router. Content filtering blocks undesirable traffic, such as social media or hate sites on a corporate network. Port forwarding/mapping will send all traffic that comes in on a specified port number to a specific node on the network.", "notes": [], "multi": false}, {"qnum": 13, "stem": "On a Windows workstation, there are two NTFS volumes. The Managers group has Modify access to the D:\\mgmt directory. You move the folder to the D:\\keyfiles folder, to which the Managers group has Read access. What level of permissions will the Managers group have to the new D:\\keyfiles\\mgmt directory?", "options": {"A": "Full Control", "B": "Modify", "C": "Read & Execute", "D": "Read"}, "correct": ["B"], "explanation": "When you move a file or folder on the same New Technology File System (NTFS) volume, in this case the D:\\ drive, it will keep its original permissions. If you copy it or move it to a different volume, it will inherit permissions from its new parent directory.", "notes": [], "multi": false}, {"qnum": 14, "stem": "For users to log on to your network from a remote location, they are required to supply a username and password as well as a code from an RSA token. What type of security is being used?", "options": {"A": "Firewall", "B": "Multifactor authentication", "C": "Access control list", "D": "Principle of least privilege"}, "correct": ["B"], "explanation": "When users log on to a computer or network, they are generally required to provide credentials such as a username and password. In multifactor authentication (MFA), the user is required to provide two or more factors proving who they are. These items are generally from two of four categories: Something they know, such as a password, something they have, such as a code from a security token, something they are, such as a fingerprint or palmprint scan), or somewhere they are based on global positioning system (GPS) location or Wi-Fi and cell tower triangulation. A firewall is a software or hardware device that will block traffic into or out of a network based on parameters that the administrator specifies. An access control list (ACL) exists for each resource. It defines who has what level of access to that resource. The principle of least privilege states that you give a user only enough access to do what they need to do their job and nothing more.", "notes": [], "multi": false}, {"qnum": 15, "stem": "You want to recycle some hard drives that your company no longer uses, but you need to ensure that other people will not be able to access the data. Which methods of removing the data are acceptable for your purposes? (Choose two.)", "options": {"A": "Formatting the drive.", "B": "Using an overwrite utility.", "C": "Using a drive erasing\\wiping utility.", "D": "Using electromagnetic fields."}, "correct": ["B", "C"], "explanation": "The best methods for destroying sensitive data without destroying the drive are using either overwrite or drive wipe programs. Overwriting the drive entails copying over the data with new data. A common practice is to replace the data with 0s. Drive wipes do a similar thing. Formatting the drive does not guarantee that others can’t read the data. Using electro- magnetic fields (or degaussing) isn’t reliable and can damage the hard drive, and it won’t work at all on solid-state drives (SSDs).", "notes": [], "multi": true}, {"qnum": 16, "stem": "Your department is taking steps to create a system that will monitor computers, smartphones, servers, and any other company devices that interact with the outside world for potential malware attacks. When an attack is discovered, the system will automatically launch countermeasures to protect company data and endpoints, and monitor, report on, and mitigate the spread of potential problems. What type of system are you deploying?", "options": {"A": "MDR", "B": "EDR", "C": "DDoS", "D": "PUP"}, "correct": ["B"], "explanation": "Endpoint detection and response (EDR) monitors network endpoints continuously in an attempt to recognize, remediate, and prevent spread of any malware or data loss in a system. They also provide reporting capabilities. Managed EDR (MDR) is EDR managed by a third party. Distributed denial-of-service (DDoS) is an attack performed by many computers to keep legitimate traffic from reaching a server. A potentially unwanted program (PUP) is often installed with other legitimate software and although it can launch any malware, it generally is used for browser redirection and adware.", "notes": [], "multi": false}, {"qnum": 17, "stem": "You have installed Windows 11 Pro on a workstation. For better security, which user account should you ensure is disabled?", "options": {"A": "Administrator", "B": "DefaultAccount", "C": "Power User", "D": "Guest"}, "correct": ["D"], "explanation": "When Windows is installed, one of the default accounts it creates in local users and groups is Guest, and this represents a weakness that can be exploited by an attacker. While the account cannot do much, it can provide initial access to a system, and the attacker can use that to find another account or acquire sensitive information about the system. To secure the system, disable all accounts that are not needed, especially the Guest account, which is disabled by default, although verifying this should be a part of your security plan. The Administrator account should be renamed. If a hacker knows a valid username, then they are halfway into your system. The DefaultAccount is an account that is managed by the system and is disabled by default. Power User is not an account that is installed with Windows 11, however, there is a Power Users group that is kept for backward compatibility.", "notes": [], "multi": false}, {"qnum": 18, "stem": "Which type of network attack involves an intermediary hardware device intercepting data and altering it, or transmitting it to an unauthorized user?", "options": {"A": "On-path attack", "B": "Non-compliant system", "C": "Zombie/botnet", "D": "Spoofing"}, "correct": ["A"], "explanation": "On-path attacks clandestinely place something (such as a piece of software or a rogue router) between a server and the user, and neither the server’s administrator nor the user is aware of it. The on-path attack intercepts data, then sends the information to the server as if nothing is wrong. The on-path attack software may be recording information for someone to view later, altering it, or in some other way compromising the security of your system and session. A non-compliant system is one that is not in line with acceptable security policies and procedures. Zombie and botnet are attacks where the user of the computer doesn’t know there is malware on their computer. Their computer is a zombie, and when many zombies are used to attack a system, it’s known as a botnet attack. Spoofing occurs when another system pretends or appears to be a trusted system.", "notes": [], "multi": false}, {"qnum": 19, "stem": "You are implementing new password policies for your network, and you want to follow guidelines for password best practices. Which of the following will best help improve the security of your network? (Choose two.)", "options": {"A": "Force passwords to expire every 180 days.", "B": "Require passwords to be a minimum of eight characters.", "C": "Encourage users to use passphrases.", "D": "Restrict passwords to be no more than 10 characters long."}, "correct": ["B", "C"], "explanation": "Setting strong passwords is critical to network security. They should be as long as possible, with a maximum of 64 characters. Eight characters is the minimum for standard users, but in secure environments or for privileged user accounts the minimum required should be 15 characters. Passphrases, such as a line from a favorite poem, are longer than the eight character minimum, but easier for the user to remember. Password complexity means using a combination of uppercase and lowercase letters, a number, and a special character such as #, @, &, or others. It’s important to note that just before release of the exam, the National Institute of Standards and Technology (NIST), which makes recommendations for computer security in the United States of America, had dropped the recommendation for enforcing password complexity and password expiration. They are mentioned here because they are included in the CompTIA objectives for the 220–1202 exam.", "notes": [], "multi": true}, {"qnum": 20, "stem": "What does NTFS use to track users and groups and their level of access to resources?", "options": {"A": "ACLs", "B": "Tokens", "C": "Badges", "D": "Control rosters"}, "correct": ["A"], "explanation": "With New Technology File System (NTFS), each file, directory, and volume can have its own security. NTFS tracks security in access control lists (ACLs) for each resource. The ACL will contain the user or group name and the level of access they have been granted. The basic permissions to choose from are Full Control, Modify, Read & execute, List Folder Contents, Read, and Write. There are also special permissions and settings that can be applied. A token is software or hardware that is used in multifactor authentication (MFA) and falls under the category of something that a user has. Badges may use radio frequency identification (RFID) or other technology that is read to allow physical entry to a secure area. Control rosters are used in areas that have security guards and contain a list of people who are allowed to enter.", "notes": [], "multi": false}, {"qnum": 21, "stem": "You have created a user account for a contract employee on a Windows 11 PC. The contrac- tor will be with the company for one month. Which user group should this user’s account be placed in?", "options": {"A": "Power Users", "B": "Administrators", "C": "Standard Users", "D": "Guest"}, "correct": ["D"], "explanation": "The Guest account is created and disabled by default (and should remain disabled) and is a member of the Guests group. For the most part, members of Guests have the same rights as Users, except they can’t get to log files. The best reason to make users members of the Guests group is to access the system only for a limited time. Although there is a Standard User account type, there is no group named Standard Users by default. There are groups created automatically called Users, Administrators, Power Users, Guests, and a few others. The Power Users group is kept for backward compatibility, but they are the same as someone in the Users group. Administrators have complete control over the systems that they are an administrator on.", "notes": [], "multi": false}, {"qnum": 22, "stem": "On your network, there are multiple systems that users need to access, such as domain resources, a cloud site for storage, and order processing software. You want to configure the network such that users do not need to remember separate usernames or passwords for each site; their login credentials will be good for different systems. Which technology should you use?", "options": {"A": "EFS", "B": "MDM", "C": "SSO", "D": "UAC"}, "correct": ["C"], "explanation": "One of the big problems larger networks must deal with is the need for users to access multiple systems or applications. This may require a user to remember multiple accounts and passwords. The purpose of single sign-on (SSO) is to give users access to all the applications and systems that they need when they log on. Some systems may require users to enter their credentials again, but the username and password will be consistent between systems. SSO is often configured as a part of the network’s directory services. Encrypting file system (EFS) is used to encrypt volumes, files, and folders in Windows OSs. Mobile device management (MDM) enables an IT department to retain some control, even though an organization may allow users to bring your own devices (BYOD) to the workplace. User account control (UAC) requires entering an administrator password to verify that the person has the authority to change a Windows system before allowing them to make any changes.", "notes": [], "multi": false}, {"qnum": 23, "stem": "A user discovers a strange text file at the root of their user directory. It contains everything they have typed over the past few days, including their credentials. What is the likely cause of the text file?", "options": {"A": "System auditing enabled", "B": "Keylogger installed", "C": "Email application in debug mode", "D": "Backup file"}, "correct": ["B"], "explanation": "A keylogger seems to be running on the system, monitoring and copying all that is typed on the keyboard. Obviously, this malware needs to be removed and incident response steps taken. The other three options would not cause the symptoms stated.", "notes": [], "multi": false}, {"qnum": 24, "stem": "What security solution would protect a user from unwanted network traffic probing their workstation?", "options": {"A": "Software firewall", "B": "Anti-phishing training", "C": "Anti-malware", "D": "Antivirus"}, "correct": ["A"], "explanation": "A software-based firewall on the workstation would be able to stop unwanted network traffic, including port scans and probes. Anti-phishing training teaches users to avoid malicious emails. Anti-malware and antivirus are software designed to recognize and quarantine or eradicate malicious code. Viruses are a subset of malware.", "notes": [], "multi": false}, {"qnum": 25, "stem": "The user wants to use MFA on their PC but does not want to carry a key fob and is strongly against biometrics. What method can you suggest?", "options": {"A": "Second password", "B": "Hardware token", "C": "Software token", "D": "Fingerprint reader"}, "correct": ["C"], "explanation": "The software token is stored on a general-purpose device, such as a PC or smartphone. The hardware token option would involve carrying an added key fob or device. A fingerprint reader would be unacceptable as it involves biometrics. A second password defeats the benefit of using multifactor authentication (MFA).", "notes": [], "multi": false}, {"qnum": 26, "stem": "What wireless protocol used in WPA compensated for the weak encryption of WEP?", "options": {"A": "VLAN", "B": "TKIP", "C": "VPN", "D": "AES"}, "correct": ["B"], "explanation": "Temporal key integrity protocol (TKIP) is an encryption protocol, used in Wi-Fi protected access (WPA) for wireless connections. It was intended to replace the weak encryption of wired equivalent privacy (WEP) by creating a unique key for each data frame. It has since been subject to wireless attacks and is deprecated. A virtual LAN (VLAN) occurs when devices from multiple local area networks (LANs) are joined together virtually and can act as if on the same physical network even though they are not, while a virtual private network (VPN) is similar because it creates a private tunnel through a public network using encryption protocols. A VPN might be used by someone working remotely to access a corporate server. Advanced encryption standard (AES) is the successor to TKIP and is used in WPA2 along with TKIP for backward compatibility; however, AES is also vulnerable to certain attacks. WPA3 uses the simultaneous authenti- cation of equals (SAE) protocol on networks, and the opportunistic wireless encryption (OWE) protocol on open networks. Although WPA3 is most secure, its adoption has been slow due to compatibility issues and vulnerabilities (leaked passwords) that have been discovered. Most routers offer WPA2/WPA3 mixed mode, which can be used until all devices are updated to WPA3. Despite its vulnerabilities, WPA3 is the most secure of these standards.", "notes": [], "multi": false}, {"qnum": 27, "stem": "Which of the following Active Directory concepts can help enforce security settings? (Choose two.)", "options": {"A": "EFS", "B": "Group policy/updates", "C": "Disabling unused ports", "D": "Assigning login scripts"}, "correct": ["B", "D"], "explanation": "Group policy/updates and assigning login scripts are common ways to push and enforce security settings on Active Directory objects. Encrypting file system (EFS) is used to encrypt volumes, files, and folders. Disabling unused ports is an important part of device/ network hardening and is performed on a firewall, which may be a service of a router or a separate firewall device.", "notes": [], "multi": true}, {"qnum": 28, "stem": "What 128-bit block encryption that uses an encryption key of 128, 192, or 256 bits is used in WPA2 and is more secure than TKIP?", "options": {"A": "AES", "B": "VPN", "C": "RADIUS", "D": "Kerberos"}, "correct": ["A"], "explanation": "Advanced encryption standard (AES) is used in Wi-Fi protected access, version 2 (WPA2). A virtual private network (VPN) is a connection that transmits data across a public network using encryption. Remote authentication dial-in user service (RADIUS) and Kerberos are both authentication protocols.", "notes": [], "multi": false}, {"qnum": 29, "stem": "What protocol was originally designed to authenticate remote users to a dial-in access server?", "options": {"A": "TKIP", "B": "TACACS+", "C": "VPN", "D": "RADIUS"}, "correct": ["D"], "explanation": "Remote authentication dial-in user service (RADIUS) was originally designed to authenti- cate remote users to a dial-in access server but is now used in several authentication situa- tions. Temporal key integrity protocol (TKIP) is a wireless encryption protocol used in Wi-Fi protected access (WPA), which made WPA more robust/secure than wired equivalent privacy (WEP). Terminal access controller access-control system (TACACS+) is an authentication protocol for centralized authentication, and a virtual private network (VPN) uses encryption to create a private connection using a public network.", "notes": [], "multi": false}, {"qnum": 30, "stem": "A user is complaining that they can no longer sign in to their account because of too many bad login attempts. What basic directory services security function is at work here?", "options": {"A": "Failed login attempts restrictions", "B": "Antivirus/anti-malware", "C": "A bollard", "D": "A rootkit"}, "correct": ["A"], "explanation": "By using directory services, like Active Directory settings or the Local Group Policy Editor, you can restrict the number of failed log-in attempts before the user is locked out of their account. This is important to help prevent a brute-force attack, which attempts to guess passwords until it hits upon the right one. Antivirus/anti-malware is important to have installed and identifies malicious software based on its signature code but is not at work here. A bollard is a physical post intended to block vehicular traffic, and a rootkit is a particularly difficult malware to eradicate, because it is working with administrator rights and it’s good at hiding in a system.", "notes": [], "multi": false}, {"qnum": 31, "stem": "What concept in Active Directory creates a directory subdivision within which may be placed users, groups, computers, and other objects to which the same group policies will be applied?", "options": {"A": "User", "B": "Domain", "C": "Organizational unit", "D": "Home folder"}, "correct": ["C"], "explanation": "The organizational unit (OU) is a subdivision within which users, groups, more OUs, and other objects can be placed. The OU exists on a domain, which is a group of users and resources under a single administrative control. Windows domains are managed by software called an Active Directory, which is organized into organizational units, usually for security purposes. A home directory is where an individual user stores their documents and such, and in a Windows domain, that location is usually on the Domain Controller or another server.", "notes": [], "multi": false}, {"qnum": 32, "stem": "A technician is troubleshooting a Windows 10 computer that is acting strangely, and they suspect that it is infected with a virus. They have followed the best practices for malware removal and remediated the computer. What should they do next?", "options": {"A": "Schedule scans and run updates.", "B": "Educate the end user.", "C": "Enable System Restore and create a restore point.", "D": "Disable System Restore in Windows."}, "correct": ["A"], "explanation": "CompTIA has developed specific steps for removing malware from small office/home office (SOHO) networks. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7 . Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end user.", "notes": [], "multi": false}, {"qnum": 33, "stem": "Your data center recently experienced the theft of a server from its rack. Which security mechanisms would protect servers from future theft? (Choose two.)", "options": {"A": "Equipment lock", "B": "Security token", "C": "Door lock", "D": "External hardware token"}, "correct": ["A", "C"], "explanation": "An equipment lock and door lock would slow down a would-be thief. A security token is involved in multifactor authentication (MFA) and an external hardware token is one of two types of security tokens, the other being a software token.", "notes": [], "multi": true}, {"qnum": 34, "stem": "What other security devices are often employed in an access control vestibule? (Choose two.)", "options": {"A": "Bollard", "B": "Motion sensors", "C": "Security guards", "D": "Video surveillance"}, "correct": ["C", "D"], "explanation": "Often an access control vestibule will have either a security guard, or video surveillance, or both. Once in the vestibule, the second door could be opened remotely by someone watching through the surveillance camera, or by a guard who personally clears the person trying to gain access. A bollard is a post used to block vehicular traffic. A motion sensor detects movement and is often used to trigger an alarm, turn on a light, turn on a camera, or a combination of those.", "notes": [], "multi": true}, {"qnum": 35, "stem": "Normally, your company places users’ profiles and folders on the local machine. Now, the organization would like users to be able to log in from other computers. What concept in Active Directory allows a user’s profile folders to be placed in storage somewhere else on the network?", "options": {"A": "Home folder", "B": "Folder redirection", "C": "Organizational unit", "D": "VPN"}, "correct": ["B"], "explanation": "Folder redirection allows users’ profile folders to be stored in a more centralized location on the network, instead of on the local machine. A profile stored this way is called a roaming profile. The home folder is the specific location where a user’s documents and such are stored. An organization unit (OU) is a management tool that can be used to organize Active Directory (AD) resources and can contain users, computers, and other resources. A virtual private network (VPN) is created across a public network by using strong encryption protocols.", "notes": [], "multi": false}, {"qnum": 36, "stem": "What wireless encryption protocol uses both TKIP for backward compatibility and AES, and replaced WPA?", "options": {"A": "WEP", "B": "WPA2", "C": "WPA3", "D": "RADIUS"}, "correct": ["B"], "explanation": "Wi-Fi protected access, version 2 (WPA2) replaced Wi-Fi protected access (WPA), which had replaced wired equivalency protocol (WEP). WEP was the first wireless security protocol. WPA was developed next and used temporal key integrity protocol (TKIP) for encryption. WPA2 uses TKIP for backward compatibility and the more secure advanced encryption standard (AES). Wi-Fi protected access, version 3 (WPA3) was released in 2018 to replace WPA2, whose security had been broken. WPA3 also includes better security for the proliferation of Internet of Things (IoT) devices. WPA, WPA2, and WPA3 all have personal and enterprise options, and all have been proven to have vulnerabilities, but WPA3 is the most secure.", "notes": [], "multi": false}, {"qnum": 37, "stem": "When should OS and application patches be applied to a system to avoid an unpatched system vulnerability?", "options": {"A": "Every 6 months", "B": "Every 3 months", "C": "Once a month", "D": "As soon as they are available"}, "correct": ["D"], "explanation": "Operating system (OS) and application patches may fix vulnerabilities in the software and should be applied as soon as possible after they are released. In a corporate environment, it would be best to test them in a sandbox first to avoid any problems. In a Windows PC’s settings, Windows Updates manages the process for you.", "notes": [], "multi": false}, {"qnum": 38, "stem": "What do security groups manage in a Windows Active Directory environment? (Choose two.)", "options": {"A": "Permissions to access file servers", "B": "Applying group policies", "C": "Access to resources", "D": "Updating OS on client computers"}, "correct": ["A", "C"], "explanation": "Security groups in Windows Active Directory (AD) are similar to groups in a workstation; they are used to group objects (i.e., users, computers, etc.) together that need the same permissions (i.e., the same access to resources). For example, if I belong to the accounting clerk group, I will have access to the accounting folders but not the production folders. Conversely, organizational units (OUs) are used mainly for applying group policies. You would likely use an OU to apply updates to client computers.", "notes": [], "multi": true}, {"qnum": 39, "stem": "You need to join a new Windows 11 workstation to your company’s domain. What utility will you access to do this?", "options": {"A": "Administrative Tools", "B": "System", "C": "Computer Management", "D": "System Information"}, "correct": ["B"], "explanation": "To log in to a domain instead of a workgroup, you can either right-click the Windows icon on the taskbar and choose System or go into the Control Panel and choose System. Both take you to the System screen in Settings. From there, choose Domain or Workgroup, and click on change. Windows 10 Administrative tools has been renamed Windows tools in Windows 11, and it won’t take you to the screen you need. Computer management is for managing drives and volumes. System information tells you about the hardware, software, and users in a system, but it doesn’t provide a way to change anything.", "notes": [], "multi": false}, {"qnum": 40, "stem": "Which of the following are examples of physical security methods? (Choose two.)", "options": {"A": "Access control vestibule", "B": "Multifactor authentication", "C": "Keys", "D": "Firewalls"}, "correct": ["A", "C"], "explanation": "An access control vestibule is a holding area between two doors that often uses video surveillance and has a security guard that will grant or deny physical access to an area. They may employ other means of authentication as well and are considered physical security, as are simple door keys. Multifactor authentication (MFA) is security that requires identification and two or more methods of authentication, such as a password and key fob. Authentication can be verified by something you know (e.g., passwords), something you have (e.g., key fob, smart card, etc.), something you are (e.g., fingerprint, palmprint, retina scan), or somewhere you are (e.g., using Global Positioning System [GPS] position or Wi-Fi network and cell tower triangulation). Firewalls are logical security devices that filter incoming and outgoing packets to allow or reject them based on criteria you choose.", "notes": [], "multi": true}, {"qnum": 41, "stem": "A user on your network reported that they received a phone call from someone in the IT department saying the user needed to reset their password. The caller offered to do it for them if the user could provide the IT worker with their current password. What is this
