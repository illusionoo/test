ve their servers and information held securely and locally. What will you recommend?", "options": {"A": "Community cloud", "B": "Public cloud", "C": "Private cloud", "D": "Hybrid cloud"}, "correct": ["A"], "explanation": "A community cloud is the solution for such situations. It enables a limited group of people or companies to share cloud resources. The group can benefit from economies of scale, but each keep their information separate from the other organizations in the commu- nity. They could even share in joint projects. Their servers could be in a data center or stored locally by one of the members. The group will have more control than they would over a public cloud but could share the maintenance costs of their cloud. A community cloud is similar to a private cloud but with multiple members. A private cloud is owned by a single entity, although it may be accessed by several locations owned by that entity. A public cloud service is one that anyone can purchase shared resources or services from, such", "notes": [], "multi": false}, {"qnum": 100, "stem": "An employee travels between multiple offices, using a desktop system in each office. What technology would ensure that the employee’s desktop icons, files, and applications stay uniform across systems in all the offices?", "options": {"A": "On-demand desktop streaming", "B": "VDI in the cloud", "C": "Desktop emulation", "D": "Synchronized folders Chapter"}, "correct": ["B"], "explanation": "Creating a private artificial intelligence (AI) system instead of publicly available AI will likely cost a company more, in terms of time and cost to implement. The advantages to developing a private AI are all related to the data. A private AI system lets you choose what data will be included, control the data’s security, and choose who has access to the data, keeping the data private rather than publicly available. This may even include maintaining regulatory compliance when the information includes personally identifiable information (PII) or medical information.", "notes": [], "multi": false}, {"qnum": 101, "stem": "Which of the following would not be a possible consequence of the failure to maintain compliance with government regulations?", "options": {"A": "Fines and fees", "B": "Business shutdown", "C": "Extra paid holidays", "D": "Lives lost"}, "correct": ["C"], "explanation": "If you fail to comply with government regulations, there are usually severe conse- quences. Not only fines and fees, business shutdown, or possible jail time, but if a failure to comply with rules meant that someone’s health data was hacked, for example, the cost could be measured in lives lost.", "notes": [], "multi": false}, {"qnum": 102, "stem": "Which of the following is not an example of regulated data?", "options": {"A": "Credit card payment information", "B": "Software licensing data for software that you use", "C": "Healthcare data", "D": "PII"}, "correct": ["B"], "explanation": "While it is important to maintain records of your software licenses, the way that licensing data set is stored, moved, and used is not regulated. Credit card payment information, healthcare data, and personally identifiable information (PII) all have industry and/or governmental rules about what happens to that data. Said data is worth far more than the hardware that it resides on, so ensuring the confidentiality, integrity, and availability (CIA) of that information is a primary concern of any IT department. Often regulated data will be concerned with not only how it is used, but also how it is stored (data-at-rest), and how long it is stored, how it is moved (data-in-transit) and how it is protected.", "notes": [], "multi": false}, {"qnum": 103, "stem": "Which of these third-party tools allows multiple users in diverse locations to see one another, possibly share a screen, and discuss information with one another as if they were in the same room?", "options": {"A": "Screen-sharing software", "B": "File transfer software", "C": "Desktop management software", "D": "Videoconferencing software"}, "correct": ["D"], "explanation": "Videoconferencing software has been around for a long time. It enables people who might be on the other side of the world to take part in the same meeting, seeing the other attendees and participating in discussions. Some types of videoconferencing software allow screen sharing as well. Screen-sharing software enables you to show others a window, your entire desktop, or a section of it (such as an application window). File transfer software enables the secure and quick transfer of large files from one system to another remote system. Desktop management software is any software that allows you to manage multiple desktops remotely, often on different platforms.", "notes": [], "multi": false}, {"qnum": 104, "stem": "Which of the following file extensions is used by software in the Linux/UNIX environment?", "options": {"A": ".sh", "B": ".py", "C": ".vbs", "D": ".ps1"}, "correct": ["A"], "explanation": "A filename with an.sh extension indicates that this is a script for Bash, which stands for Bourne-Again Shell. The other file extensions—.py,.vbs, and.ps1—are used in Python, Visual Basic, and PowerShell, respectively.", "notes": [], "multi": false}, {"qnum": 105, "stem": "Which of the following is not a type of information recorded in a ticketing system that must have very clear, concise, written communication?", "options": {"A": "Issue descriptions", "B": "Progress notes", "C": "Valid licenses", "D": "Issue resolution"}, "correct": ["C"], "explanation": "Tracking valid licenses is a part of asset management, not a ticketing system. It is very important that the issue’s description, progress notes, and resolution be written in clear concise language so that anyone who reads them in the future will be able to understand what transpired.", "notes": [], "multi": false}, {"qnum": 106, "stem": "What is used to initiate the change management process?", "options": {"A": "Affected systems/impact form", "B": "Request form", "C": "Risk analysis documentation", "D": "Change board approval"}, "correct": ["B"], "explanation": "A request form is used to initiate the change management process. Risk analysis and a report of the affected systems and the impact on them is part of the document that is presented to the change board for their approval before the change can be implemented.", "notes": [], "multi": false}, {"qnum": 107, "stem": "Which of the following would not be included in change management documentation?", "options": {"A": "End-user acceptance", "B": "Responsible staff member", "C": "Affected systems and the impact on them", "D": "Scope of the change"}, "correct": ["A"], "explanation": "End-user acceptance is a desirable result of meeting with and including end-users in the decision-making process of change management. It is a desired result, not necessarily a part of the documentation. The responsible staff member(s) needs to be listed in the documentation, along with a person who will be a champion for the project, meaning someone in a position of power who supports the change and who may or may not be listed as a responsible party. A careful analysis of the affected systems and the impact the change will have on them must be included. The change document also must include the scope of the change, which is an explanation of what will and will not be changed and how far-reaching the project is.", "notes": [], "multi": false}, {"qnum": 108, "stem": "What type of software includes programs like batch files, Visual Basic, PowerShell, and so on and is used for activities like basic automation, remapping network drives, automating backups, gathering information/data, and restarting machines based on triggers?", "options": {"A": "RMM", "B": "Screen-sharing software", "C": "Scripting programs", "D": "Remote access technologies"}, "correct": ["C"], "explanation": "Batch files, Visual Basic, and PowerShell are all examples of scripting programs. They have many uses and are used daily by network administrators to facilitate network management. Remote monitoring and management (RMM) is a type of remote access technology. Screen-sharing software lets the user show their screen to people who are working with them remotely. Remote access technologies is a general term that encompasses any software that enables someone to access a computer system located in another place.", "notes": [], "multi": false}, {"qnum": 109, "stem": "You are newly hired at a company’s Help Desk. Which one of the following is a type of information that does not need to be included on every ticket in a Help Desk’s ticket- ing system?", "options": {"A": "Category of the issue", "B": "Severity of the issue", "C": "Escalation levels", "D": "Procurement lifecycle"}, "correct": ["D"], "explanation": "Every ticket in a Help Desk ticketing system should include the category of the issue, its severity, and any escalation levels that were used. The procurement lifecycle is a part of asset management.", "notes": [], "multi": false}, {"qnum": 110, "stem": "Which process is designed to enable changes that benefit an organization with as little disruption as possible to the IT services, to maintain the efficient function of that organization?", "options": {"A": "Asset management", "B": "Change management", "C": "Ticketing systems", "D": "Knowledgebases and articles"}, "correct": ["B"], "explanation": "The aim of change management is to control change in such a way that it continues to move the organization forward with as little disruption as possible to the employees and IT processes of the organization—to affect change without causing any adverse results or negative effects to the company’s bottom line. Asset management is maintaining documentation on a company’s IT assets. Ticketing systems allow for tracking of support issues and results, and knowledgebases and articles provide a wealth of information for resolving IT problems that have been previously encountered.", "notes": [], "multi": false}, {"qnum": 111, "stem": "What part of asset management includes processes such as a request for information (RFI), a request for proposal (RFP), and identifying the business need?", "options": {"A": "Configuration Management Database (CMDB)", "B": "Assigned users", "C": "Procurement lifecycle", "D": "Warranty and licensing"}, "correct": ["C"], "explanation": "A configuration management database (CMDB) system, assigned users, and warranty and licensing, are all a part of asset management records. The procurement lifecycle is also a part of asset management, and it starts with identifying a business need for what is being purchased. The exact steps might vary by company and be different for government entities, but they often include vendor analysis, request for information (RFI), request for proposal (RFP), and request for quote (RFQ) before a decision is made regarding what vendor to use and what specific products to purchase.", "notes": [], "multi": false}, {"qnum": 112, "stem": "What feature of change management examines all the possible positive and negative events that might impact a project and then identifies a response plan if the event occurs and assigns a score to the possible event?", "options": {"A": "Scope of the change", "B": "Change board approval", "C": "Risk analysis and risk level", "D": "Sandbox testing"}, "correct": ["C"], "explanation": "A part of every project should be a risk analysis with an identified risk level for each possible negative (or positive) event that might affect the project. The risk is assigned a score, known as the risk level, and response plans are identified so that in the event that the risk is realized, there is a clear plan of action on how to handle it. The scope of the change identifies what it will and will not affect. A change board approval is the last step before a kickoff meeting to initiate the change. Sandbox testing is setting up a system that mimics the production system in order to try the change in a safe environment before implementing it.", "notes": [], "multi": false}, {"qnum": 113, "stem": "Part of your job is managing IT for new hires and terminations. What items can be used to facilitate the onboarding and offboarding of employees to ensure that new employees have everything they need to do their job and that exiting employees aren’t able to damage systems or take company information with them? (Choose two.)", "options": {"A": "Incident report", "B": "New user onboarding setup checklist", "C": "User offboarding checklist", "D": "Splash screens"}, "correct": ["B", "C"], "explanation": "It’s easiest to onboard and offboard employees if you have a checklist to follow. The checklist can include items such as adding the employee to security groups based on their department or job title and ensuring that their user account is disabled when they leave. An incident report should be filed whenever an IT employee observes a breach of protocol regarding acceptable use, or whenever someone is injured. Splash screens are a way to ensure nonrepudiation (i.e., the idea that someone cannot deny the authenticity of a message or signature) of agreement to company policies each time a user logs on to a company computer system.", "notes": [], "multi": true}, {"qnum": 114, "stem": "When you are working at a client’s site, which of the following are examples of distractions that should be avoided? (Choose three.)", "options": {"A": "Taking personal calls", "B": "Actively listening to the customer", "C": "Texting your coworker for “just a minute”", "D": "Telling the client about the last customer"}, "correct": ["A", "C", "D"], "explanation": "Avoid distraction and/or interruptions when talking with customers. You need to make them feel that their problem is important and that it has your full attention. Distractions can include personal calls, texting, social media, talking to coworkers, and other personal interruptions. Listening, taking notes, and asking appropriate questions are all part of good customer service.", "notes": [], "multi": true}, {"qnum": 115, "stem": "You want to ensure that employees aren’t installing whatever software packages they want to because of licensing concerns and possible impacts to the company’s network. What document will you use to identify and explain what the procedures are for custom installa- tion of software packages?", "options": {"A": "End-user termination checklist", "B": "New-user onboarding checklist", "C": "CMDB", "D": "SOP"}, "correct": ["D"], "explanation": "Procedures for custom installation of software packages should be spelled out in a standard operating procedures (SOP) document. This should also be a part of an acceptable use policy (AUP). The checklists for new-user onboarding and user offboarding will help ensure that all necessary steps take place, and a configuration management database (CMDB) provides a record of how devices are configured and relate to each other and is used in proving compliance and making management decisions.", "notes": [], "multi": false}, {"qnum": 116, "stem": "Which of the following is not important to keep track of as part of your inventory manage- ment system, and to ensure compliance with local, regional, national, or perhaps interna- tional regulations?", "options": {"A": "Valid licenses in use by your company", "B": "Perpetual license agreements", "C": "Technical jargon used by your company", "D": "Open-source licenses being used by your company"}, "correct": ["C"], "explanation": "Keeping track of technical jargon used by your company is not a part of inventory management or compliance, and most likely not done. Valid licenses are those that are not void for any reason, such as using a personal license for corporate use, having more users than are allowed by the license, or using a software with a license that has expired. Software licensing can be so complicated that there are companies who make their living ensuring that other companies are compliant with licensing agreements. Even open-source licenses that are used by a company should be documented, and a periodic accounting of all software on all computers should be performed to ensure that the company is compliant with licensing laws and agreements. Inventorying the software used by your company is just as important as keeping an inventory of the hardware.", "notes": [], "multi": false}, {"qnum": 117, "stem": "Which of the following would not constitute an invalid, and quite possibly illegal, use of software?", "options": {"A": "Using a personal license in a corporate setting", "B": "Having more software users than the license allows", "C": "Using software whose license has expired", "D": "Modifying open-source software"}, "correct": ["D"], "explanation": "One of the great features of open-source software is that you are allowed to modify the software code to meet your needs. The other three options for this question—using software licensed for personal use in a corporate setting, using more copies or having more users than the license allows, and using software whose license has expired—are all invalid uses of software and may subject you or your company to fines or even jail time. It’s very important to keep an inventory of your software and valid nonexpired licenses and where they are being used. You should do at least an annual accounting of all the software being used on all the computers in your organization.", "notes": [], "multi": false}, {"qnum": 118, "stem": "You found that someone left the company with confidential information. What document will you file as a part of the SOP?", "options": {"A": "Incident report", "B": "New user onboarding setup checklist", "C": "User offboarding checklist", "D": "Splash screens"}, "correct": ["A"], "explanation": "An incident report should be filed whenever an IT employee observes a breach of protocol regarding acceptable use, or when someone is injured and should be a part of the organization’s standard operating procedures (SOPs). It’s easiest to onboard and offboard employees if you have a checklist to follow. The checklist can include items such as adding the employee to security groups based on their department or job title and ensuring that their user account is disabled when they leave. Splash screens are a way to ensure nonrepudiation of agreement to company policies each time a user logs on to a company computer system.", "notes": [], "multi": false}, {"qnum": 119, "stem": "You are updating the list of procedures that will be followed for various situations such as security incidents and new hires. What is the document that you’re updating?", "options": {"A": "CMDB", "B": "ITAM", "C": "SOP", "D": "KB"}, "correct": ["C"], "explanation": "A standard operating procedure (SOP) defines what actions will be taken when various incidents occur such as a security incident, new hires, and procuring equipment. A configuration management database (CMDB) keeps track of how devices and user accounts are configured, can serve as a part of proving compliance, and can be used as a tool in managing computer purchases and such. IT asset management (ITAM) is the process of keeping track of assets, such as tagging them and keeping inventory and where each asset is located. A knowledgebase (KB) is a repository of known issues with equipment or software and how to resolve them.", "notes": [], "multi": false}, {"qnum": 120, "stem": "The computer that manages the timing of the conveyor belt in the packaging department has failed and requires replacement as soon as possible because it’s affecting production. It hasn’t happened before and wasn’t expected. What type of change is this?", "options": {"A": "Normal", "B": "Incremental", "C": "Emergency", "D": "Standard"}, "correct": ["C"], "explanation": "This is an emergency change and will go straight to the change approval board (CAB) because it needs to be fixed now and waiting negatively impacts the organization. A standard change is something that happens frequently and can be planned for. Companies can create a list of preapproved/predefined changes that are considered standard, like replacing pickup rollers in a printer. A normal change is one that goes through the entire change process. It isn’t standard, but it’s also not an emergency. It may be a suggestion to streamline processes. An incremental change is not a term used in change management.", "notes": [], "multi": false}, {"qnum": 121, "stem": "You’re the manager of an IT department. You’ve created a step-by-step plan that your department can follow to recover from either a planned change that has failed, or some- thing unexpected that has caused a problem with your computer systems, network, or data. What type of plan have you created?", "options": {"A": "Contingency", "B": "Backup/backout", "C": "Emergency", "D": "Standard"}, "correct": ["B"], "explanation": "The plan described is a backout plan, which is listed as a backup plan in the CompTIA objectives. A backout plan is a step-by-step list for IT departments to follow, so they can restore a system to the state it was in before a change, whether planned or unplanned, occurred. While rollback and backout plans are similar, the difference is that a rollback is considered, planned, and tested ahead of time for a specific planned change, while a backup/backout plan can encompass a rollback plan but also has steps to recover from unexpected issues/changes.", "notes": [], "multi": false}, {"qnum": 122, "stem": "Your office uses five HP LaserJet printers. An administrator has placed used toner car- tridges in boxes and stacked them in the storage room. Which of the following statements is true regarding toner cartridge disposal?", "options": {"A": "Toner is not harmful, but because the cartridges contain plastic, they should be recycled.", "B": "Toner is not harmful, and the cartridges are made of biodegradable plastic, so they can be thrown away.", "C": "Toner will make a mess if it gets out of the cartridge, so to avoid making a mess, cartridges should be burned.", "D": "Toner is a carcinogen, so cartridges should be taken to an authorized recycling center."}, "correct": ["D"], "explanation": "The toner itself is a carcinogen, and toner cartridges can contain heavy metals that are bad for the environment. PC recycling centers will take old toner cartridges and properly dispose of them. Most toner cartridge manufacturers will also take them back for recycling.", "notes": [], "multi": false}, {"qnum": 123, "stem": "You’re excited because the change that you recommended has gone through the change approval process and is about to start. What type of change is this?", "options": {"A": "Normal", "B": "Incremental", "C": "Emergency", "D": "Standard"}, "correct": ["A"], "explanation": "This is a normal change. A normal change is one that goes through the entire change process. It isn’t standard, but it’s also not an emergency. It may be a suggestion to streamline processes. Incremental change is not the type of change used in change management; it is a type of backup. An emergency change will go straight to the change approval board (CAB) because it needs to be fixed now, and waiting negatively impacts the organization. A standard change is something that happens frequently and can be planned for. Companies can create a list of preapproved/predefined changes that are considered standard, like replacing pickup rollers in a printer.", "notes": [], "multi": false}, {"qnum": 124, "stem": "You’re working on creating a change management document for a proposed project. Which of the following will you include? (Choose two.)", "options": {"A": "Date and time of change", "B": "Incremental change", "C": "Backstage testing", "D": "Peer review"}, "correct": ["A", "D"], "explanation": "Parts of a typical change management plan include a rollback plan, which is part of a backout/backup plan, sandbox testing, responsible staff member, request forms, purpose of the change, scope of the change, data and time of the change, affected systems/impact, risk analysis, peer review, implementation schedule, and change board approval. Incremental change isn’t a type of change management and neither is backstage testing. Hopefully when all is said and done, your change will have end-user acceptance.", "notes": [], "multi": true}, {"qnum": 125, "stem": "The change that you proposed has gone through all of the parts of the change management approval process. Now you’re ready to begin making the change happen. What stage have you reached?", "options": {"A": "Risk analysis", "B": "Implementation", "C": "Sandbox testing", "D": "Peer review"}, "correct": ["B"], "explanation": "Parts of a typical change management plan include a rollback plan, which is part of a backout/backup plan, sandbox testing, responsible staff member, request forms, purpose of the change, scope of the change, data and time of the change, affected systems/impact, risk analysis, peer review, implementation schedule, and change board approval. Incremental change isn’t a type of change management and neither is backstage testing. Hopefully when all is said and done, your change will have end-user acceptance.", "notes": [], "multi": false}, {"qnum": 126, "stem": "You’ve implemented a change, and it’s being tested by several people who will actually be using the new process. Getting their feedback and approval is critical to the project’s success and needed before the system goes live across all your company locations. What stage have you reached?", "options": {"A": "Risk analysis", "B": "Peer review", "C": "Sandbox testing", "D": "End-user acceptance"}, "correct": ["D"], "explanation": "End-user acceptance is when people who will actually be using the changed systems give their stamp of approval. Usually, a small implementation of a change is used to test the change among users. Getting end-user acceptance of a change is critical to ensure that the change will be followed and work as expected. Risk analysis lists all the issues, good or bad, that could occur during a change and assigns a risk level for each and a contingency plan for the risks that need them. Peer review happens early in a plan when the change is examined by another technical person at the same level, to ensure that the plan will meet the established goals and is in alignment with company goals, as well as whether the plan will work. Sandbox testing is creating a mockup of the system changes in an isolated setting and testing them before the changes go live to ensure that they will work as expected.", "notes": [], "multi": false}, {"qnum": 127, "stem": "Your company shuts down two weeks a year to perform a deep cleaning of its cheese-processing equipment. You’ll be updating systems and performing standard changes during this time. What is this period of time known as?", "options": {"A": "Risk analysis", "B": "Maintenance window", "C": "Sandbox testing", "D": "Peer review"}, "correct": ["B"], "explanation": "A maintenance window is a scheduled time when changes can be made to a system, without affecting the system’s users. Often for standard changes, this is during the evening or weekend hours. Risk analysis lists all the issues, good or bad, that could occur during a change and assigns a risk level for each and a contingency plan for the risks that need them. Sandbox testing is creating a mockup of the system changes in an isolated setting and then testing them before the changes go live, to ensure that they will work as expected. Peer review happens early in a plan, when the change is examined by another technical person at the same level, to ensure that the plan will meet the established goals and is in alignment with company goals as well as whether the plan will work.", "notes": [], "multi": false}, {"qnum": 128, "stem": "One of your servers had an issue, and several files need to be restored so they can be used. You’ve decided to put them on a different volume so you still have the original files to analyze what went wrong. What type of restore from backup are you performing?", "options": {"A": "Incremental", "B": "In-place/overwrite", "C": "Alternative location", "D": "Differential"}, "correct": ["C"], "explanation": "When you’re restoring files from a backup to a place that they didn’t come from, this is restoring them to an alternative location. The other type of restore from a backup is an in-place/overwrite location, which means that you’re placing the files back where they originally were. Incremental and differential are types of backups, not restores.", "notes": [], "multi": false}, {"qnum": 129, "stem": "You’re working on a computer and need to plug a second monitor into the computer. There are no power outlets at the desk, but there is one just on the other side of the aisle. Which of the following is appropriate and safe cable management? (Choose two.)", "options": {"A": "Run the cable across the floor—it’s only for a minute.", "B": "Run the cable across the top of the cubicle dividers, across the walkway. It’s about five feet high. People can duck under it if they need to.", "C": "Plug in a power strip where you’re working, and plug both monitors into it.", "D": "Run an extension cord across the floor, but cover it with a pedestrian cable cover."}, "correct": ["C", "D"], "explanation": "Working safely should always be your priority. Using an approved power strip to temporarily add an outlet to an area is the best of the options given, but you could also run an extension cord across the floor if it’s covered with a pedestrian cable cover designed to prevent people from tripping on the wire. This is good cable management. Cables should never be run across a walkway, even for a minute. That presents a tripping hazard. Likewise, they should never be run through the air where someone walking through could run into them and get hurt.", "notes": [], "multi": true}, {"qnum": 130, "stem": "You’ve discovered inappropriate content on a computer system. You leave it powered on to preserve data. According to the order of volatility, which of these should you preserve first?", "options": {"A": "Data in the CPU and cache", "B": "Data in memory", "C": "Data on a hard drive", "D": "Notes you’ve taken on the incident"}, "correct": ["A"], "explanation": "Although you want to move the computer to a secure place, it’s important not to turn it off until evidence has been gathered from it, because some of that information will disappear as soon as the computer is turned off. (It’s volatile.) Always gather evidence from most volatile to least. Following is the order of volatility, from most to least. 1. Cache, Central Processing Unit (CPU) registers 2. Routing and process tables, Address Resolution Protocol (ARP) cache, and kernel statistics 3. Random access memory (RAM) 4. Swap file or other temporary file systems 5. Storage drives (i.e., Hard Disk Drives (HDD), Solid-State Drives (SSDs), M.2 drives, flash drives, and so on 6. Remote data such as logging and monitoring systems 7 . Archival media (such as backup drives and tapes), physical configuration and network topology information, and your notes on the incident", "notes": [], "multi": false}, {"qnum": 131, "stem": "Your company just finished negotiations with another company, and the companies want a legally binding contract stating that confidential, proprietary information about each other will not be disclosed. What type of document will they be signing?", "options": {"A": "AUP", "B": "NDA", "C": "MNDA", "D": "BYOD"}, "correct": ["C"], "explanation": "A mutual non-disclosure agreement (MNDA) is used when both parties want legally protect their confidential or proprietary information from being shared by the other party. An acceptable use policy (AUP) states what you may and may not do with company equipment. A non-disclosure agreement (NDA) is a signed document stating what you may not reveal about your partner companies and their business dealings. A bring your own device (BYOD) policy states whether you may use your personal device for business purposes and under what conditions.", "notes": [], "multi": false}, {"qnum": 132, "stem": "You’re troubleshooting an issue at an end-user's computer. What is one of the best ways to find out what the problem is?", "options": {"A": "Ask close-ended (yes/no) questions.", "B": "Don’t ask questions; examine the computer.", "C": "Ask open-ended questions.", "D": "Ask what they think is wrong."}, "correct": ["C"], "explanation": "Open-ended questions are those that allow the end-user to explain what’s happening, and they’re a great way to determine the next question to ask, or where to start looking for the offending issue. Close-ended questions require yes or no answers and are helpful in certain situations, after you’ve let the user explain the issue. Going directly to the computer without asking the user anything is not only rude, but not the most productive way to solve a problem. Even if the user caused the problem, they probably don’t know how or they might have been able to fix it without calling you.", "notes": [], "multi": false}, {"qnum": 133, "stem": "You’re looking at a program that’s causing an issue. You’ve noticed that the file extension is .py. What program was this written in?", "options": {"A": "Batch Scripting", "B": "Python", "C": "JavaScript", "D": "Shell"}, "correct": ["B"], "explanation": "Python uses a.py extension. Batch scripting, which uses the filename extension.bat, is typically a series of command-line commands. Such a script file would run on the Windows systems’ command line. JavaScript uses a.js file extension, and Shell uses a.sh extension.", "notes": [], "multi": false}, {"qnum": 134, "stem": "You’re looking for an open-source solution for remotely accessing computers on your LAN. Which of the following options is designed to meet your goal?", "options": {"A": "JavaScript", "B": "Linux", "C": "macOS", "D": "SPICE"}, "correct": ["D"], "explanation": "Simple Protocol for Independent Computing Environments (SPICE) is open-source and free, designed specifically for remote access on a local area network (LAN) or wide area network (WAN). JavaScript is a programming language. Linux is the basis for many open-source operating systems (OSs), and macOS is a commercial OS that is most definitely not open-source.", "notes": [], "multi": false}, {"qnum": 135, "stem": "You’re considering what to use for remote access. What are the biggest security concerns with methods like RDP, VNC, RMM, WinRM, and VPNs? (Choose two.)", "options": {"A": "Misconfiguration", "B": "Inadequate passwords/authentication", "C": "Open-source", "D": "Open ports"}, "correct": ["A", "B"], "explanation": "The most common problems that come up when researching the Remote Desktop Protocol (RDP), virtual network computing (VNC), remote monitoring and management (RMM), Windows Remote Management (WinRM), and virtual private networks (VPNs) are misconfiguration and inadequate passwords. Requiring multifactor authentication (MFA) and enforcing strong passwords can help, along with role-based access control (RBAC), monitoring logs, and encrypting data.", "notes": [], "multi": true}, {"qnum": 136, "stem": "Which remote access method requires opening port 5900 for HTTP and adds a display number, which makes securing it with a firewall more difficult, and is vulnerable because by default, remote traffic is not encrypted?", "options": {"A": "RDP", "B": "VNC", "C": "SSH", "D": "RMM"}, "correct": ["B"], "explanation": "The virtual network computing (VNC) method of remote access uses port 5900 and a display number, which makes it difficult to secure with firewalls that only allow a port number. The Remote Desktop Protocol (RDP) has been compromised with dynamic link library (DLL) hijacking, and Secure Shell (SSH) and remote monitoring and management (RMM) are vulnerable when they are not patched and updated, or due to human errors like misconfiguration and inadequate passwords.", "notes": [], "multi": false}, {"qnum": 137, "stem": "When dealing with a customer, which of the following demonstrates the communication technique for using proper language?", "options": {"A": "Use computer jargon.", "B": "Use acronyms.", "C": "Use slang terms.", "D": "Use basic terms."}, "correct": ["D"], "explanation": "When talking with customers, it’s important to remember that they don’t have the training that you do, so they won’t understand all the terminology that technicians use. Describe the situation in terms that the user will understand, but don’t be condescending. Never use jargon, acronyms, or slang terms, even if they are commonly used with your peers. It takes practice to put complex concepts in simple terms, but your customers will appreciate it. More tech-savvy customers will usually let you know that they understand and you can use more advanced terms with them as needed.", "notes": [], "multi": false}, {"qnum": 138, "stem": "You have an application, and you would like to add AI to enhance it. What is this pro- cess called?", "options": {"A": "Application integration", "B": "Artificial integration", "C": "Updating", "D": "Facilitating"}, "correct": ["A"], "explanation": "Application integration occurs when artificial intelligence (AI) capabilities are added to an existing application. The other three terms are not related.", "notes": [], "multi": false}, {"qnum": 139, "stem": "Which of the following are limitations of using AI in a business setting? (Choose three.)", "options": {"A": "Bias", "B": "Hallucinations", "C": "Manifestations", "D": "Accuracy"}, "correct": ["A", "B", "D"], "explanation": "Common limitations of artificial intelligence (AI) are bias, hallucinations, and accuracy. Manifestations is not a limitation of AI. Bias can occur due to the data that is used to train an AI system or poor programming. Once learned, a bias can be exacerbated by an AI system. Hallucinations are when AI output seems factual, but in fact, is not. They can be caused by limited or outdated data sets or programming error, which causes an AI system to interpret (i.e., put together) information inaccurately, providing an incorrect output. Accuracy is one of several metrics used to determine an AI system’s performance. It’s a measure of how often the AI returns correct answers.", "notes": [], "multi": true}, {"qnum": 140, "stem": "You’re setting up a CMDB. Which of the following will you include? (Choose three.)", "options": {"A": "Router configuration information", "B": "Networks and interrelationships", "C": "Knowledgebase", "D": "Warranty and licensing"}, "correct": ["A", "B", "D"], "explanation": "A configuration management database (CMDB) system stores information about the relationships between key components of an IT infrastructure and how they are configured. This can include router configuration information, networks and interrelationships, and warranty and licensing information. It can even include people. It is not asset management, which is more concerned with acquiring, monitoring, and disposing of assets. The size of the database depends on the size of the company and what the company determines should be included. In general, it helps to track compliance and make management decisions.", "notes": [], "multi": true}, {"qnum": 141, "stem": "You’re using AI while working on a research paper for your job. Which of the following constitutes plagiarism? (Choose two.)", "options": {"A": "Using AI to check grammar on something you’ve written", "B": "Using AI to find information online", "C": "Using an AI rephrasing tool", "D": "Asking AI for information and posting the output as your own"}, "correct": ["C", "D"], "explanation": "Plagiarism occurs when you take credit for someone else’s work. This is true even if the “someone else” is an artificial intelligence (AI) program. Using an AI rephrasing tool to rephrase what AI or someone else has generated is also plagiarism. There are ways to use AI that are perfectly acceptable, such as using AI to check your grammar or to point you to websites about what you’re looking for. Remember to cite any sources whose ideas you use.", "notes": [], "multi": true}, {"qnum": 142, "stem": "One of your management employees works from home most days, but they need to have access to the server as if they were sitting there in the office, and the connection must be secure. What technology will you employ to do this?", "options": {"A": "RMM", "B": "VPN", "C": "RDP", "D": "VNC Chapter Practice Exam 1 (220-1201)"}, "correct": ["B"], "explanation": "A virtual private network (VPN) allows a user to be away from their office, such as a remote worker or traveling salesperson, and connect to the company server or other resources with their laptop or other mobile computer as if they were in the company offices. This is accomplished using tunneling protocols. It differs from a virtual network computer (VNC) in that the VNC allows a user to manipulate a computer remotely. Some VNC systems allow a smartphone to control a computer remotely. Remote monitoring and management (RMM) is a category of software used by managed service providers to remotely manage, configure, and control the resources of many different IT networks, and Remote Desktop, which uses the Remote Desktop Protocol (RDP), is a type of VNC that is part of the Windows operating system (OS).", "notes": [], "multi": false}], "skipped": [[85, "image-based"], [90, "image-based"]]}, "ch11": {"title": "Chapter 11 - Practice Exam 2 (220-1202)", "questions": [{"qnum": 1, "stem": "Your Windows computer is experiencing frequent shutdowns. It typically runs five minutes and then shuts down. These shutdowns are not scheduled in the OS. What will you do first?", "options": {"A": "Boot with an anti-malware boot media and check for malware.", "B": "Reinstall the OS.", "C": "Run SFC.", "D": "Check the temperature in the case or on the CPU."}, "correct": ["D"], "explanation": "The system is most likely overheating. This is a tough question, because there are so many reasons that a computer will shut down on its own. The five-minute interval here is significant. The computer is running long enough to heat up, and when the central processing unit (CPU) gets too hot, it will shut the system down to avoid damage. If it isn’t overheating, your next course of action is to check for malware. System File Checker (SFC) will attempt to fix problems with operating system (OS) files. Reinstalling the OS would be a last resort.", "notes": [], "multi": false}, {"qnum": 2, "stem": "You are on-site fixing a client’s laptop that will not load the OS. You are waiting to hear about your friends’ awesome party that they are hosting this weekend, and your phone starts to vibrate and keeps vibrating. You’re sure that all your friends are texting information about the party. What should you do? (Choose two.)", "options": {"A": "Turn your phone off and apologize to the client. Tell them that the phone was distracting you from your job, but it won’t be a problem now.", "B": "Ignore your phone.", "C": "Text your friends back and tell them that you are working.", "D": "Call your friend and tell them to wait until after this job before planning all the details because you want to help."}, "correct": ["A", "B"], "explanation": "When working with customers, it’s important to avoid distractions, such as personal phone calls, texting, or social media sites. Exceptions can be made if it’s an emergency, but in those cases notify the client that you might get a call or text, and explain that you will deal with it only if it’s an emergency. Otherwise, ignore the personal interruption until you are not working with a client.", "notes": [], "multi": true}, {"qnum": 3, "stem": "You are planning on formatting a hard drive with NTFS that will be used to share files between Windows 10 and Windows 11 Pro computers. Which of the following features are present in NTFS? (Choose two.)", "options": {"A": "Linux OS support", "B": "File and folder encryption", "C": "File compression", "D": "Enhanced flash drive support"}, "correct": ["B", "C"], "explanation": "The New Technology File System (NTFS) is available with all current versions of Windows. NTFS is an advanced filesystem that includes such features as file and folder encryption, compression, and RAID support, as well as support for extremely large file and partition sizes and disk transaction monitoring.", "notes": [], "multi": true}, {"qnum": 4, "stem": "You are logged in to a Linux workstation with a regular user account. You need to execute a command with root permissions. Which command do you need to use?", "options": {"A": "su", "B": "sudo", "C": "grep", "D": "man"}, "correct": ["B"], "explanation": "The sudo (“substitute user do” or “superuser do”) command is used to run a command with a different privilege level than the current user logged in. Typically, this means running a command with superuser or root permissions. The su command switches to a different user, again the default is root, but with sudo you need to enter sudo before each command. With su, you don’t. Considering best practices, you would use sudo if you had one com- mand to run, and su if you had several. The grep command is used to search for patterns in a file, so if you can’t remember the filename but know what is in it, you can still find it. The man command brings up a manual—for example, man grep would show you how to use the grep command.", "notes": [], "multi": false}, {"qnum": 5, "stem": "A security consultant recommends that your secure facility implement biometrics as a form of building access control. Which of the following systems might they be referring to?", "options": {"A": "RFID badges", "B": "Key fobs", "C": "Palm print scanner", "D": "Guards"}, "correct": ["C"], "explanation": "Biometric devices use physical characteristics to identify the user. Biometric systems include fingerprint/palm/hand scanners, retina scanners, and anything else that uses part of your body to identify you. To gain access to resources, you must pass a physical screening process. While it’s true that guards are humans, they are not biometric devices. Radio frequency identification (RFID) badges have information on them that is read by an RFID scanner, and key fobs generate a new code every few seconds to allow access.", "notes": [], "multi": false}, {"qnum": 6, "stem": "You are looking online to find pictures to use in promotional materials that your company wants to make. Which of the following statements is true regarding online content?", "options": {"A": "Online content is considered open-source; therefore, you may use whatever you find.", "B": "Online content can be protected through the use of DRM.", "C": "Online content is protected through the use of the EULA.", "D": "Online content is protected through terms established by Microsoft."}, "correct": ["B"], "explanation": "Many companies rely on digital rights management (DRM) to protect digital assets such as online photos or videos. Unlike an end-user license agreement (EULA), which legally protects software and other objects, DRM physically protects the information by not allowing copies to be made, printing a watermark on the face of an image or document, or incorporating similar measures to prevent the use, modification, and distribution of copyrighted materials. DRM is not as established as licensing agreements are, but you should still respect the property of the owners of digital content.", "notes": [], "multi": false}, {"qnum": 7, "stem": "In which type of security threat will someone try to gain access to a secure area without credentials by following someone else who used their access rights into the secured area?", "options": {"A": "Brute-force", "B": "Shoulder surfing", "C": "Evil twin", "D": "Tailgating"}, "correct": ["D"], "explanation": "Tailgating refers to being so close to someone when they enter a building that you can enter right behind them, without needing to use a key, card, or any other security device. Using access control vestibules, which are devices like small rooms that limit access to one or a few individuals, is a great way to stop tailgating. A brute-force attack attempts to repeatedly guess a password. Shoulder surfing is just like it sounds—someone is looking over your shoulder to gain passwords and logins, and an evil twin is an unauthorized wireless access point that has the same service set identifier (SSID) as a legitimate one.", "notes": [], "multi": false}, {"qnum": 8, "stem": "A management directive requires that you keep hard copies of all your workstations’ system configurations. You have all Windows workstations. Which command can you use to easily gather this information for remote workstations and save a report as a text file?", "options": {"A": "msinfo32", "B": "compmgmt", "C": "mmc", "D": "perfmon"}, "correct": ["A"], "explanation": "The msinfo32 tool displays a thorough list of machine settings on the local computer. You cannot change any values from here, but you can search, export, and save reports. When run from a command prompt, the /computer option allows you to specify a remote computer on which to run the utility, and the /report option saves the report as a text file. Another option while in the msinfo32 graphical user interface (GUI) is clicking the View menu then Remote Computer to collect information related to the chosen remote PC. The compmgmt command opens the Computer Management console, mmc opens the Microsoft Management Console, and perfmon opens Performance Monitor.", "notes": [], "multi": false}, {"qnum": 9, "stem": "You have a situation that requires installing Windows 11 from installation media. You’ll be launching Setup on the media while you are on the existing Windows 10 desktop. Which of the following is not an option?", "options": {"A": "Full upgrade", "B": "Keep data only", "C": "Forensic install", "D": "Clean install"}, "correct": ["C"], "explanation": "Forensic install is not an option. The easiest way to install Windows 11 on a Windows 10 computer is through Windows Update in the Settings app. If you have a situation where that’s not possible, you can create Windows 11 installation media and use it to install the operating system (OS). When you launch the installation from within Windows 10, you have three options. The first is Full Upgrade, which will keep Windows settings, drivers, personal files, and apps. The second, Keep Data Only, will keep drivers and personal files but no installed apps or Windows Settings. The third option is a Clean Install, which will wipe out everything on the drive and install a fresh copy of Windows 11.", "notes": [], "multi": false}, {"qnum": 10, "stem": "You are configuring a wireless router for a home office. Which of the following changes will have the least impact on improving the security of the network?", "options": {"A": "Disabling guest access", "B": "Disabling the SSID broadcast", "C": "Configuring WPA3", "D": "Changing the default username and password"}, "correct": ["B"], "explanation": "Even if you disable the service set identifier (SSID) broadcast, potential attackers still have many simple tools available to see your wireless network traffic and get the SSID anyway. It is a weak form of security that will keep out only the most casual intruders. Disabling guest access limits who can connect to your network, but if you must have guest access, look for a setting that will isolate the guest network from your network. WPA3 is the best commonly available form of encryption for wireless routers. WPA2 is usually available alongside of WPA3 for networks that are transitioning between WPA2 and WPA3. The router may have an option that says WPA2/WPA3 or WPA3 transitional, which will allow newer devices to connect using WPA3 and older devices to connect using WPA2. Changing the wireless router default username and password is always recommended, because those are often easy to find online.", "notes": [], "multi": false}, {"qnum": 11, "stem": "You are going to move a desktop computer from one office location to another. It’s on the floor, underneath the desk. Which of the following are good personal safety procedures to follow? (Choose two.)", "options": {"A": "Bend at the waist and lift straight up.", "B": "Bend at the knees and lift with your legs.", "C": "Tie back any loose jewelry, long hair, or neckties.", "D": "Leave the computer plugged in to avoid ESD."}, "correct": ["B", "C"], "explanation": "To ensure your personal safety, always remember some important techniques before moving equipment. The first thing is to always ensure that the equipment is unplugged. There’s nothing worse (and potentially more dangerous) than getting yanked because you’re still tethered to the wall. Remove any loose jewelry and secure long hair or neckties. Lift with your legs, not your back (i.e., bend at your knees when picking something up, not at the waist).", "notes": [], "multi": true}, {"qnum": 12, "stem": "A user calls the Help Desk saying that they have tried to boot their computer several times but keep receiving “No OS found” errors. What will you ask them first?", "options": {"A": "Was it working yesterday?", "B": "What did you do to it?", "C": "Is there a USB drive in one of the USB ports?", "D": "Do you know how to enter UEFI?"}, "correct": ["C"], "explanation": "In troubleshooting, it’s often best to check the simple things first. Ask them if there is a drive in the universal serial bus (USB) port. If the system is set to check there before the hard drive for boot media, then non-bootable media in the port might prevent the system from booting. (Disabling the ability to boot from a USB port is considered a security best practice.) If it wasn’t working yesterday, they likely would have called you yesterday. Never ask an end-user what they did to a system. Even if it is a user error, they probably won’t know they did something wrong, and that question will make them more upset; what you want instead is to make them feel that you’re professional and confident in your ability. An end-user should not be entering the Unified Extensible Firmware Interface (UEFI).", "notes": ["This follows a common A+ pattern: check for simple external boot causes first, such as a USB device, before assuming a failed drive or OS corruption."], "multi": false}, {"qnum": 13, "stem": "Which feature of Windows Pro or higher editions is designed to encrypt storage volumes, must be activated by an administrator, and can encrypt operating system startup files?", "options": {"A": "BitLocker", "B": "EFS", "C": "OneDrive", "D": "ShadowDrive"}, "correct": ["A"], "explanation": "BitLocker allows the user to use drive encryption to protect files, including those needed for startup and log-on. BitLocker can be turned on or off only by administrators, and it’s enabled by default in Windows 11. It is only available in Pro or higher editions of both Windows 10 and Windows 11. The encrypting file system (EFS) can encrypt data at the volume, file, or folder level but not an entire hard drive. OneDrive is Microsoft’s online cloud storage service, and ShadowDrive is not a valid computer term.", "notes": [], "multi": false}, {"qnum": 14, "stem": "Your iPhone has been stolen. To ensure that the thief does not have access to your data, what should you do?", "options": {"A": "Perform a remote backup.", "B": "Enable full-device encryption.", "C": "Enable BitLocker.", "D": "Perform a remote wipe."}, "correct": ["D"], "explanation": "The best way to remove data from a device is to perform a remote wipe. Ideally, you have backed up or synced the device before then, or you will lose data. Full-device encryption is a good security practice, but it should have been completed prior to the phone being stolen. BitLocker is a Microsoft Windows feature for full-drive encryption.", "notes": [], "multi": false}, {"qnum": 15, "stem": "You have installed a second hard drive in a Windows workstation. In Disk Management, what type of partition can you create that will allow you to create an unlimited number of logical partitions in it?", "options": {"A": "Extended", "B": "Dynamic", "C": "Logical", "D": "GPT"}, "correct": ["D"], "explanation": "When you create a partition in Windows 10, it will ask if you want to create a master boot record (MBR) or globally unique identifier (GUID) partition table (GPT) partition. GPT is newer and has far more features than MBR. One of those features is that you can create an unlimited number of logical partitions on it. Only the operating system (OS) will limit you; Windows 10 will only allow 128 partitions on one drive. Windows 11 supports only the GPT partition type. In older computer systems, there were primary and extended partitions. There could be a maximum of four partitions, and only one could be extended. Logical drives could be created in an extended partition and were limited to the remaining letters of the alphabet. If there were three primary partitions, they would likely be labeled C, D, and E. An extended partition could hold logical partitions F through Z. Dynamic drives are unique to Windows and support software RAID.", "notes": [], "multi": false}, {"qnum": 16, "stem": "You have some older drives that you intend to donate to a nonprofit organization. You want to set all data on the drive to be nothing but 0s. What should you use to accomplish this?", "options": {"A": "Drive-wiping software", "B": "format command", "C": "Degaussing", "D": "Incinerating"}, "correct": ["A"], "explanation": "Removing all data on a drive by repeatedly replacing it with binary bits, 0s or 1s, is commonly done using drive-wiping software. Government or other highly secure environments may have specific rules regarding data destruction. Drive wiping can make the data unrecoverable and make it safe to donate the drives. The format command will erase the file allocation table or master file table, but the files may still be able to be recovered. It is not a secure way to ensure that your data can’t be read. Degaussing and incinerating are ways to physically destroy drives. Degaussing works with only magnetic media.", "notes": [], "multi": false}, {"qnum": 17, "stem": "A small business has two servers in its telecommunications room. The business has come seeking your advice because the area has frequent power outages and the company has lost important data on its servers as a result. What will you recommend for it to protect against this issue?", "options": {"A": "Surge suppressor.", "B": "Power strip.", "C": "UPS.", "D": "Line conditioner."}, "correct": ["C"], "explanation": "An uninterruptible power supply (UPS) is designed to provide enough power to keep systems running until they can be safely shut down or switched to another power source. The UPS must provide adequate wattage for the devices connected to it as well as sufficient battery capacity. Most also offer protected and unprotected outlets; surge suppression, which protects against power surges; and line conditioning, which improves the quality of power delivered to the device, such as boosting the power when there is a sag on the input side. Power strips only give you a place to plug devices in and turn them all off at once. A smart UPS can notify an administrator that there is a power outage.", "notes": [], "multi": false}, {"qnum": 18, "stem": "You are working on a Windows workstation that is operating very slowly. You want to quickly check the system’s CPU and RAM usage to see whether anything appears amiss. Which utilities can you use to do this? (Choose two.)", "options": {"A": "Resource Monitor", "B": "Performance Monitor", "C": "System", "D": "Device Manager"}, "correct": ["A", "B"], "explanation": "There are three tools in Windows 10 and Windows 11 that quickly show you the central processing unit (CPU) and random access memory (RAM) usage in Windows. They are Resource Monitor, Performance Monitor, and Task Manager. The easiest way to find Resource Monitor (resmon.exe) is to click the search icon on the taskbar and type res, then click on Resource Monitor. Performance Monitor (perfmon.exe) can be accessed through Computer Management. Task Manager (taskmgr.exe) can be opened in several ways, the fastest is by right-clicking the Windows icon on the taskbar and choosing Task Manager. System and Device Manager are accessed in multiple ways but do not provide the information needed.", "notes": [], "multi": true}, {"qnum": 19, "stem": "As the network administrator, you have set account lockout policies so that an account is locked out after five unsuccessful login attempts. What type of security threat will this deter?", "options": {"A": "Shoulder surfing", "B": "Brute-force attack", "C": "Zero-day attack", "D": "Spear phishing"}, "correct": ["B"], "explanation": "A brute-force attack is an attempt to guess passwords until a successful guess occurs. Because of the nature of this attack, it usually occurs over a long time period. To make passwords more difficult to guess, longer is better, with eight characters being the minimum that should be required, or 15 for privileged accounts. Limiting the number of unsuccessful login attempts before lockout may also help thwart this type of attack. Password requirements can be set using the Local Group Policy Editor.", "notes": [], "multi": false}, {"qnum": 20, "stem": "Occasionally when visiting websites using Google Chrome, you receive a pop-up window in front of your browser. Generally, it’s an advertisement trying to sell you something. Which of the following actions will stop this from happening?", "options": {"A": "Enable Chrome’s pop-up blocker.", "B": "Install an antivirus program.", "C": "Install an anti-malware program.", "D": "Enable Windows Firewall."}, "correct": ["A"], "explanation": "Pop-ups are annoying but not necessarily an indication that your computer is infected with anything. Enabling Chrome’s pop-up blocker should prevent them. Antivirus and anti-malware programs don’t generally deal with pop-ups unless they’re associated with malware and most aren’t—they are just coded into the website. A firewall won’t help with pop-ups either.", "notes": [], "multi": false}, {"qnum": 21, "stem": "Your company works with confidential government files. It is illegal for employees to copy any files to flash drives. Where do you specify this rule as well as the penalties for not complying with it?", "options": {"A": "APK", "B": "ACL", "C": "ADF", "D": "AUP"}, "correct": ["D"], "explanation": "Acceptable use policies (AUPs) describe how the employees in an organization can use company systems and resources, both software and hardware. This policy should also outline the consequences for misuse. In addition, the policy should address the installation of personal software on company computers and the use of personal hardware such as USB devices. The AUP is often signed during the employee onboarding process and may be part of an employee handbook but is not required to be. An Android package (APK) is a file for installing an Android app, an access control list (ACL) defines who has what permissions on an object, and an automatic document feeder (ADF) sits atop a copier or multifunction device (MFD) to send a stack of papers through, one at a time without user intervention.", "notes": [], "multi": false}, {"qnum": 22, "stem": "A Windows computer user reports that their computer just completely locked up. On the screen is a message saying that the person pictured has participated in an illegal activity. The webcam turned on by itself, and the computer user was pictured. The message also says they can resolve the charges against them by paying a $500 fine. They are understandably shaken by the incident. What should you do next?", "options": {"A": "Tell the user that if they performed an illegal activity with their work computer, their employment will be terminated.", "B": "Boot to a bootable media from your anti-malware provider, and run a remediation.", "C": "Delete and reinstall Windows.", "D": "Pay the fine."}, "correct": ["B"], "explanation": "This is a form of ransomware, which can be programmed to take control over a user’s webcam. It’s just another layer of complexity to scare users. Deleting and reinstalling Windows will work, but it isn’t necessary. The system will be locked, so you can’t open the anti-malware software. You can, however, boot to a bootable media from the anti-malware software provider and start a remediation that way.", "notes": [], "multi": false}, {"qnum": 23, "stem": "One of your technicians just touched a plastic bottle containing chemicals with which you are unfamiliar. Their hand starts to feel like it’s burning. Where can you find information on how to properly wash the technician’s hands without making the problem worse, and how to dispose of the chemicals?", "options": {"A": "OSHA", "B": "Container’s bottom", "C": "Warning label", "D": "MSDS"}, "correct": ["D"], "explanation": "While it’s possible that the disposal information and risks may be on the container somewhere, you will always find it on the product’s material safety data sheet (MSDS). It should be stated that, while CompTIA still refers to these sheets as MSDSs as an exam objective, the name has been changed to safety data sheet (SDS). SDSs include information such as physical product data (i.e., boiling, melting, and flash point, etc.), potential health risks, storage and disposal recommendations, and spill/leak procedures. With this information, technicians and emergency personnel know how to handle the product as well as respond in the event of an emergency.", "notes": [], "multi": false}, {"qnum": 24, "stem": "You want to protect mobile device users on your network from potentially leaked files or data. Which of the following should you do to help reduce this risk? (Choose two.)", "options": {"A": "Disable network autoconnection.", "B": "Enforce data transmission over limits.", "C": "Enable device encryption.", "D": "Install mobile firewalls."}, "correct": ["A", "C"], "explanation": "When authorized users access devices through unintended connections or unauthorized users access stolen devices, they can access the data on the device. Disable autoconnection to avoid unintended connections and encrypt data on devices to help protect the data on them in the event they are stolen.", "notes": [], "multi": true}, {"qnum": 25, "stem": "You are at a Windows command prompt. The folder you are in has hundreds of files, so when you view a folder listing, you want it to only show one page of files at a time. Which command should you use to do this?", "options": {"A": "dir /p", "B": "dir /o:s", "C": "dir /w", "D": "dir /s"}, "correct": ["A"], "explanation": "The dir command shows a folder (i.e., directory) listing. The /p switch displays only one page at a time. Think of it as the pause switch. The dir /o:s command lists the files in order by size, dir /w shows a wide format, and dir /s includes all the subdirectories. There are many other switches that can be used to modify the output of the dir command. Type dir /? at a command prompt to see them.", "notes": [], "multi": false}, {"qnum": 26, "stem": "You have assigned the Finance group Modify permissions on the D:\\MonthlyReports folder. You then create a folder named D:\\MonthlyReports\\January. What level of permissions does the Finance group have to the D:\\MonthlyReports\\January folder?", "options": {"A": "No access, because no permissions were explicitly set", "B": "Full control, because no permissions were explicitly set", "C": "Modify, because the folder inherits permissions from its parent folder", "D": "Modify, because the folder inherits permissions from the Finance Group, and the Finance Group members can grant permissions to other users or groups for this folder"}, "correct": ["C"], "explanation": "Inheritance is the default behavior throughout the permission structure, unless a specific setting is created to override it. For example, a user who has Read and Write permissions in one folder will have that in all the subfolders unless a change has been made specifically to one of the subfolders. Modify access does not give users permissions to change permissions for others. Only Full Control allows it.", "notes": [], "multi": false}, {"qnum": 27, "stem": "Your company has a policy prohibiting illegal content on company computers. You have identi- fied and verified illegal content on a user’s workstation. What is the next step you should take?", "options": {"A": "Ask the user to delete the material.", "B": "Delete the illegal material yourself.", "C": "Document the situation.", "D": "Report the incident through proper channels."}, "correct": ["D"], "explanation": "If you have your policy in place, then your incident response plan should be relatively scripted. Your first priority as the first responder is to identify the improper activity or content. Then you should always get someone else to verify the material or action, so that it doesn’t turn into a situation of your word against someone else’s. Immediately report the situation through proper channels and secure the drive away from the user.", "notes": [], "multi": false}, {"qnum": 28, "stem": "Your Windows workstation is having intermittent video issues. The manufacturer’s website suggests you install the latest driver. Which utility should you use to check the driver version installed on your computer?", "options": {"A": "Display Settings", "B": "Device Manager", "C": "Services", "D": "Disk Management"}, "correct": ["B"], "explanation": "Device Manager enables you to manage all your hardware devices, including updating drivers and disabling the device. It is found within the Computer Management console and in the Control Panel, but the quickest way is to right-click the Start button and select it there.", "notes": [], "multi": false}, {"qnum": 29, "stem": "On a MacBook Pro running macOS, what is the name of the bar of icons that runs along the bottom of the screen, enabling you to quickly open apps?", "options": {"A": "Remote Disc", "B": "Finder", "C": "Spotlight", "D": "Dock"}, "correct": ["D"], "explanation": "In macOS, there is a bar of icons that runs along the bottom (or side, if so configured) of your screen. That set of icons is known as the Dock, and it provides easy access to key apps that come with the Mac (such as Safari, Mail, Videos, and Music) or others that you choose to add there. Remote Disc enables Macs without optical drives to use another computer’s optical drive across a network. The Finder is similar to Windows File Explorer and enables the user to drill down through files and folders to find what they are seeking. Spotlight is a search tool.", "notes": [], "multi": false}, {"qnum": 30, "stem": "A Windows workstation is not booting properly, and you believe it’s a problem with system files. Which utility can scan and repair corrupt Windows system files?", "options": {"A": "chkdsk", "B": "diskpart", "C": "tracert", "D": "sfc"}, "correct": ["D"], "explanation": "The purpose of the System File Checker (SFC) utility is to keep the operating system (OS) alive and well. SFC is launched at a command prompt and after the system reboots, it automatically verifies that system files have not been altered or corrupted. If a corrupted or altered file is found, a stored (cached) copy of the system file overwrites it. The check disk utility, chkdsk, is used to verify the integrity of the filesystem and to identify bad sectors of a hard drive. In the graphical user interface (GUI), it is called error checking. The Windows command-line utility diskpart allows you to perform disk partition operations. The tracert utility traces the route a packet takes from one computer to another.", "notes": [], "multi": false}, {"qnum": 31, "stem": "An Android phone user reports that their phone can’t connect to the company’s wireless network, but they have a cellular signal. What is the first thing to have them try?", "options": {"A": "Check whether the phone is in Airplane mode.", "B": "Check whether the phone’s Wi-Fi is enabled.", "C": "Adjust the phone’s Wi-Fi signal receptivity.", "D": "Reset the phone to factory defaults."}, "correct": ["B"], "explanation": "The user should check to ensure that the phone’s Wi-Fi is enabled. A common cause for a lack of wireless connectivity is for a device to be in Airplane mode, but because the user has a cellular signal, the phone definitely isn’t in this mode. The other wireless signal types (i.e., Wi-Fi and Bluetooth) can be individually disabled, so check them both. Adjusting receptivity isn’t an available option on smartphones, and resetting the phone to factory defaults will wipe out the phone’s data.", "notes": [], "multi": false}, {"qnum": 32, "stem": "You are troubleshooting a Windows Home workstation with malware on it. Following the best-practice procedures for malware removal, you have gotten to the point where you’ve scheduled system scans and run anti-malware updates. What is the next step you should take?", "options": {"A": "Educate the end user.", "B": "Enable System Restore and create a restore point.", "C": "Disable System Restore in Windows Home.", "D": "Remediate the infected system."}, "correct": ["B"], "explanation": "The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected systems. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7. Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end-user.", "notes": [], "multi": false}, {"qnum": 33, "stem": "When configuring NTFS permissions on a Windows workstation, what is the recommended method?", "options": {"A": "Grant permissions to user accounts.", "B": "Put user accounts into groups. Grant folder permissions to groups and file permissions to users.", "C": "Put user accounts into groups. Grant folder permissions to users and file permissions to groups.", "D": "Put user accounts into groups. Grant permissions to groups."}, "correct": ["D"], "explanation": "The recommended way to assign permissions on Microsoft systems is to grant them to groups. Then, users can be assigned to groups depending on their access needs. This is far less work than managing permissions on a user-by-user basis.", "notes": [], "multi": false}, {"qnum": 34, "stem": "You are at a Windows command prompt in the D:\\users folder. You want to use the copy command to copy the D:\\users\\jdoe folder to the D:\\files folder. Which of the following statements is true?", "options": {"A": "You need to use the robocopy command to perform this task.", "B": "You can use the command copy d:\\users\\jdoe\\*.* d:\\files.", "C": "You can use the command copy d:\\users\\jdoe d:\\files.", "D": "You can use the command copy d:\\users\\jdoe d:\\files /y."}, "correct": ["A"], "explanation": "The copy command makes a copy of a file in a second location. It cannot be used to copy folders. To copy a folder, you need to use the robocopy or xcopy command. The robocopy command is in the CompTIA A+ objectives. The copy and xcopy commands are not.", "notes": [], "multi": false}, {"qnum": 35, "stem": "You are working on your Windows computer and a security alert pops up, as shown in this graphic. What should your next action be?", "options": {"A": "Click the Continue Unprotected button.", "B": "Click the Remove All Threats Now button.", "C": "Create a restore point and then click the Remove All Threats Now button.", "D": "Shut down your computer, reboot, and initiate a malware scan using your anti-malware software."}, "correct": ["D"], "explanation": "Don’t click the buttons! This is a fake security warning. When you click either button, something bad will happen—something like malware being installed on your computer. Attackers are very creative about making their pop-ups look like legitimate security alerts. Shut your computer down, and after you reboot, run a malware scan, or if possible, boot with bootable media from your anti-malware company.", "notes": [], "multi": false}, {"qnum": 36, "stem": "You are instructing a new Mac user on the features of macOS. They ask if the system is capable of storing their passwords to various Internet sites. Which feature would they use for that?", "options": {"A": "Keychain", "B": "Mission Control", "C": "FileVault", "D": "Terminal"}, "correct": ["A"], "explanation": "Keychain is a password management system from Apple. It enables you to store passwords for websites, mail servers, Wi-Fi, and so forth. There is an iCloud variant (i.e., iCloud Keychain) that keeps such information as Safari usernames/passwords and credit card information. Mission Control gives you a look at all the open apps, windows, and desktop spaces on your machine. FileVault provides encryption. Terminal is the command-line interface on macOS and most Linux systems. Windows 11 has the traditional Command Prompt and a new tool called Windows Terminal that opens a PowerShell prompt. Unlike Command Prompt, it enables the user to create multiple tabs. Typing exit in Windows Terminal exits the program instead of returning the user to a regular command prompt as it would in the Command Prompt.", "notes": [], "multi": false}, {"qnum": 37, "stem": "You are troubleshooting a malware problem with a Windows 11 computer and find that you need to boot into safe mode/safe boot, which loads with minimal drivers. Which management tool can you use to force the system to boot into safe mode when it reboots?", "options": {"A": "Task Scheduler", "B": "Computer Management", "C": "System Configuration", "D": "Task Manager"}, "correct": ["C"], "explanation": "The System Configuration tool (msconfig.exe) allows you to force the operating system (OS) to boot into safe mode by clicking the box next to Safe Boot on the Boot tab. The System Configuration utility (msconfig.exe) has five tabs: General, Boot, Services, Startup, and Tools. Task Scheduler wouldn’t work here because the OS loads before Task Scheduler could run. Computer Management and Task Manager don’t have settings for booting.", "notes": [], "multi": false}, {"qnum": 38, "stem": "Which of the following is an advantage of using share permissions over using NTFS permissions?", "options": {"A": "Share permissions will override NTFS permissions if there is a conflict.", "B": "Share permissions can be enabled to secure resources across the network that are not on an NTFS partition.", "C": "Share permissions apply when users access a resource across the network, but NTFS permissions apply only to local users.", "D": "Share permissions can be set at the file level, whereas NTFS permissions can be set only at the folder level."}, "correct": ["B"], "explanation": "The one big advantage of share permissions is that they can be used if the New Technology File System (NTFS) is not in place. Of course, share permissions are in effect only when the user connects to the resource via the network. NTFS permissions can protect at the file level. Share permissions can be applied to the folder level only. NTFS permissions can affect users logged on locally or across the network to the system where the NTFS permissions are applied.", "notes": [], "multi": false}, {"qnum": 39, "stem": "Your manager is concerned that your company could divulge PII. Which of the following types of data is not considered PII?", "options": {"A": "First name", "B": "Home address", "C": "Family member names", "D": "Employee ID number"}, "correct": ["A"], "explanation": "Personally identifiable information (PII) is anything that can be used to identify an individual
