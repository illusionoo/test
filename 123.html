 most likely an example of?", "options": {"A": "The IT department helping the user to reset their password", "B": "A spoofing attack", "C": "A social engineering attack", "D": "A brute-force attack"}, "correct": ["C"], "explanation": "A person in the IT department is not likely to ask for your password. If they want you to reset it, they can use software to reset it, which will make you choose a new password on next login. This is a social engineering attack. Social engineering means using kindness, coercion, or fear to get you to give up privileged information like your password. Spoofing is when a website or server, for example, is made to look like a trusted one, but in reality, there is an attacker lurking there. A brute-force attack uses software to repeatedly try different passwords to break into a system.", "notes": [], "multi": false}, {"qnum": 42, "stem": "Your corporate IT department has decided that, to enhance security, they will draft an MDM policy to require both a password and a fingerprint scan to unlock a mobile device for use. Which of the following is this not an example of?", "options": {"A": "An authenticator application", "B": "Biometric authentication", "C": "Device hardening", "D": "Multifactor authentication"}, "correct": ["A"], "explanation": "Authenticator apps run on devices like smartphones or PCs and provide a unique key that changes every few seconds. An authenticator app can be a part of multifactor authentication (MFA) and device hardening but is not described in the question. A fingerprint scan is a type of biometric authentication. Device hardening means taking steps to protect devices and the data on them from attack. Anytime there is more than one authentication method required, it’s MFA. In this case, it does involve using biometrics, but the password is not a biometric factor. MFA requires two or more of the following four types of inputs: something you know (e.g., password), something you have (e.g., token), something you are (e.g., biometrics), or somewhere you are (i.e., Global Positioning System [GPS] or other location services).", "notes": [], "multi": false}, {"qnum": 43, "stem": "Several employees at your company have been tailgating to gain access to secure areas. Which of the following security methods is the best choice for stopping this practice?", "options": {"A": "Door lock", "B": "Entry control roster", "C": "Access control vestibule", "D": "ID badges"}, "correct": ["C"], "explanation": "Tailgating refers to being so close to someone when they enter a building that you can come in right behind them without needing to use a key, a card, or any other security device. Using an access control vestibule, which is a device such as a small room that limits access to one or a few individuals, is a great way to stop tailgating. With a door lock or ID badge, the tailgaters could still follow the other employee in. An entry control roster is merely a list of people who are allowed access to an area and isn’t much use without a guard to check it.", "notes": [], "multi": false}, {"qnum": 44, "stem": "A user has joined your company as a network administrator. Assume their user account name is AOShea. What is the recommended way to give AOShea the administrative privileges they need?", "options": {"A": "Add the AOShea user account to the Administrators group.", "B": "Create an account called AdminAOShea. Add that account to the Administrators group. Have the new administrator use the AOShea account unless they need administrative rights, in which case they should use the AdminAOShea account.", "C": "Copy the Administrator account and rename it AOShea.", "D": "Add the AOShea user account to the Power Users group."}, "correct": ["B"], "explanation": "Adding AOShea to the Administrators group will certainly work, but it’s not the recom- mended approach. Because members of the Administrators group have such power, they can inadvertently do harm, for example, accidentally deleting a file that a standard user could not. To protect against this, the practice of logging in with an Administrators group account for daily interaction is strongly discouraged. Instead, system administrators should log in with a user account with lesser privileges and change to the Administrators group account with elevated privileges only when necessary. The original Administrator account shouldn’t be renamed to this user, because there is usually more than one administrator. The Power User’s group is only kept for backward compatibility.", "notes": [], "multi": false}, {"qnum": 45, "stem": "You are designing a security policy for laptops on your network. Which of the following is a common method of biometric authentication used with laptops and other mobile devices?", "options": {"A": "Fingerprint scan", "B": "Retina scan", "C": "Swipe lock", "D": "DNA lock"}, "correct": ["A"], "explanation": "Biometric authentication requires identification of a physical feature of the user, such as a fingerprint or palmprint. Laptops and other mobile devices commonly use your fingerprint to prove who you are. Most modern laptops can also use a facial scan to identify you. DNA and retina scanners are considered a form of biometric authentication, but they are not commonly used today with mobile devices. (Imagine your phone needing to collect blood or saliva to authenticate you—no thanks!) DNA isn’t on the CompTIA A+ objectives yet, but facial recognition, retina scanners, and fingerprint and palm print scanners are. A swipe lock is not a type of biometrics. It’s also not secure!", "notes": [], "multi": false}, {"qnum": 46, "stem": "An administrator is transferring confidential files from one Windows Pro workstation to another using a flash drive. Policy dictates that the files on the flash drive must be encrypted. Which technology should be used?", "options": {"A": "BitLocker", "B": "BitLocker-To-Go", "C": "EFS", "D": "AES"}, "correct": ["B"], "explanation": "BitLocker allows you to use drive encryption to protect files—including those needed for startup and log-on. For removable drives, BitLocker-To-Go provides the same encryption technology to help prevent unauthorized access to the files stored on them. Encrypting file system (EFS) is used to encrypt volumes, files, and folders on a drive. Advanced encryption standard (AES) is an encrypting protocol for Wi-Fi.", "notes": [], "multi": false}, {"qnum": 47, "stem": "Which type of security system uses physical characteristics to allow or deny access to locations or resources?", "options": {"A": "ID badges", "B": "Bollards", "C": "Biometrics", "D": "Tokens"}, "correct": ["C"], "explanation": "Biometric devices use physical characteristics to identify the user. Biometric systems include fingerprint/palm/hand scanners, retinal scanners, face scanners, and soon, possibly, DNA scanners. To gain access to resources, you must pass a physical screening process. ID badges often use radio frequency identification (RFID) to communicate with a reader and verify your identity. Bollards are vertical posts used to block vehicular traffic. Tokens can be either hard (e.g., key fob) or soft (e.g., software on a system) and are often used in multifactor authentication (MFA).", "notes": [], "multi": false}, {"qnum": 48, "stem": "Your company’s president has been contacted and threatened by someone who seems to know everything they’ve been doing on their computer system. What type of malware has their system been attacked by?", "options": {"A": "Keylogger", "B": "Stalkerware", "C": "SQL injection", "D": "Trojan"}, "correct": ["B"], "explanation": "Stalkerware is any software whether a commercial app or a malware that is used to perform surveillance on a person or business for malicious intent, which is stalking. A keylogger records keyboard input for a malicious actor to use later. A Structured Query Language (SQL) injection happens when a poorly written website doesn’t specify limits on what an input field can contain, and that field is used by a malicious actor to insert code into the website. SQL is used to interact with databases, and most websites have databases running on the backend to take orders or capture visitor data for newsletters and such. A Trojan is malware that appears to be a useful program and is unwittingly downloaded by the victim, then often installs a backdoor for a malicious actor to use later for accessing the system.", "notes": [], "multi": false}, {"qnum": 49, "stem": "A security consultant for your company recommended that you begin shredding or burning classified documents before disposing of them. What security risk is the consultant trying to protect the company from?", "options": {"A": "Shoulder surfing", "B": "Dumpster diving", "C": "Social engineering", "D": "Brute-force attack"}, "correct": ["B"], "explanation": "Companies normally generate a huge amount of paper, most of which eventually winds up in dumpsters or recycle bins. Dumpsters may contain information that is highly sensitive in nature, and attackers may seek it out by practicing dumpster diving. In high-security and government environments, sensitive papers should be either shredded or burned. Shoulder surfing is literally looking over someone’s shoulder to see passwords or other sensitive information. Social engineering happens anytime someone tries to coerce, threaten, or cajole someone into giving up privileged security information. A brute-force attack is repeatedly trying passwords in an effort to guess the correct one.", "notes": [], "multi": false}, {"qnum": 50, "stem": "Several workstations on your network have operating systems and antivirus software that are outdated. The workstations don’t have the most recent security policies applied. They do not have the standard operating environment configured. What type of vulnerability does this represent?", "options": {"A": "Non-compliant systems", "B": "Zombie/botnet", "C": "Brute-force attack", "D": "Zero-day attack"}, "correct": ["A"], "explanation": "The systems are not up-to-date and therefore are more vulnerable to attacks. These systems are considered non-compliant systems. It’s a violation of security best practices to fail to keep all software on your network up to date. Zombie and botnet are attacks where the computer’s user doesn’t know there is malware on their computer. Their computer is a zombie, controlled by a bad actor, and when many zombies are used to attack a system, it is known as a botnet attack. A brute-force attack usually involves software that keeps trying passwords or codes until it hits upon the right one to gain access. A zero-day attack happens when a hole is found in a web browser or other software and attackers begin exploiting it before the software developer or anti-malware vendors have time to plug the hole.", "notes": [], "multi": false}, {"qnum": 51, "stem": "On the Internet, you get a news flash that the developer of one of your core applications found a security flaw. They will issue a patch for it in two days. Before you can install the patch, it’s clear that the flaw has been exploited and someone has illegally accessed your network. What type of attack is this?", "options": {"A": "Zombie/botnet", "B": "Non-compliant system", "C": "Zero-day attack", "D": "Brute-force attack"}, "correct": ["C"], "explanation": "When a hole is found in a web browser or other software and attackers begin exploiting it the very day it is discovered by the developer (i.e., bypassing the one- to two-day response time that many software providers need to put out a patch once the hole has been found), it is known as a zero-day attack (or exploit). Zombie and botnet are attacks where the com- puter’s user doesn’t know there is malware on their computer. Their computer is a zombie, controlled by a bad actor, and when many zombies are used to attack a system, it’s known as a botnet attack. Non-compliant systems are those whose software is not up to date or they are not following best practices or corporate restrictions and rules. A brute-force attack usually involves software that keeps trying passwords or codes until it hits upon the right one to gain access.", "notes": [], "multi": false}, {"qnum": 52, "stem": "UserA is a member of the Dev group and the HR group. They are trying to access a local resource on an NTFS volume. The HR group has Allow Full Control permission for the payroll folder, and the Dev group has Deny Read permission for the same folder. What is UserA’s effective access to the payroll folder?", "options": {"A": "Full Control", "B": "Read", "C": "Write", "D": "Deny"}, "correct": ["D"], "explanation": "When there are conflicting New Technology File System (NTFS) permissions, generally they are combined, and the most liberal is granted. The exception to that is when there is an explicit Deny. As in this case, Deny overrides any allowed permissions.", "notes": [], "multi": false}, {"qnum": 53, "stem": "Which default Windows group was designed to have more power than normal users but not as much power as administrators, and is now kept for backward compatibility only?", "options": {"A": "Superuser", "B": "Standard Users", "C": "Power Users", "D": "Advanced Users"}, "correct": ["C"], "explanation": "Microsoft wanted to create a group in Windows that was not as powerful as the Administrators group, which is how the Power Users group came into being. The idea was that membership in this group would be given Read/Write permission to the system, allowing members to install most software but keeping them from changing key OS files or accessing other user’s data. However, for many Windows versions now, the Power Users group now assigns permissions equivalent to the Standard user, a member of the Users group. There is no group called Superuser, or Standard Users, or Advanced Users.", "notes": [], "multi": false}, {"qnum": 54, "stem": "You have installed a Window workstation on your LAN. Which of the following are recommended best practices for maximizing security regarding the Administrator account? (Choose two.)", "options": {"A": "Disable the Administrator account.", "B": "Rename the Administrator account.", "C": "Remove the Administrator account from the Administrators group.", "D": "Create a different user with Administrator access, and only use it when necessary."}, "correct": ["A", "D"], "explanation": "You should disable the default Administrator account because most people are familiar with its existence, so part of the work of hacking in is already done if it isn’t disabled. Renaming it isn’t enough because it will still have the same Security Identifier (SID), and an attacker can use that to identify the Administrator account. Disabling it is the preferred way to keep it safe, not removing it from the group. Any users with administrative privileges should have a regular account and an admin account, and only use administrative privileges when necessary, such as when a User Account Control (UAC) window pops up, entering their admin password.", "notes": [], "multi": true}, {"qnum": 55, "stem": "Your friend asks you if it’s necessary to clear browser history. What will you tell them the advantages of clearing history on exit are? (Choose two.)", "options": {"A": "To maintain their privacy", "B": "To synchronize with other devices", "C": "Their browser will exhibit better performance.", "D": "To clear invalid certificates"}, "correct": ["A", "C"], "explanation": "Browser history should be cleared when you exit the browser for privacy and to maintain browser performance. Clearing it doesn’t trigger synchronization unless you are logged in. To clear just the history of the computer you’re on, log out of the browser. Clearing data doesn’t clear invalid certificates. That’s done usually under Manage Certificates or a similar setting.", "notes": [], "multi": true}, {"qnum": 56, "stem": "Which of the following are advantages of using NTFS permissions over using Share permis- sions? (Choose two.)", "options": {"A": "NTFS permissions will override Share permissions if there is a conflict.", "B": "NTFS permissions affect users at the local computer, but Share permissions do not.", "C": "NTFS permissions are more restrictive in their access levels than Share permissions.", "D": "NTFS permissions can be set at the file level, but Share permissions cannot."}, "correct": ["B", "D"], "explanation": "NTFS permissions affect users regardless of whether they are at the local computer or accessing the resource across the network. They can also be applied to individual files, whereas Share permissions only work across a network and can be applied only to folders. One set of permissions is not inherently more restrictive than the other, as either type can be used to deny access in a given situation (at least when accessing across the network). When New Technology File System (NTFS) and Share permissions affect the same folders, the most restrictive permission applies.", "notes": [], "multi": true}, {"qnum": 57, "stem": "Someone has placed an unauthorized wireless router on your network and configured it with the same SSID as your network. Users can access the network through that router, even though it’s not supposed to be there. What type of security threat could this lead to?", "options": {"A": "Zombie/botnet", "B": "Spoofing", "C": "Non-compliant system", "D": "On-path attack"}, "correct": ["D"], "explanation": "An unauthorized router with a seemingly legitimate configuration is specifically known as an evil twin. Those can lead to on-path attacks, which involve clandestinely placing something (such as a piece of software or a rogue router) between a server and the user, and neither the server’s administrator nor the user is aware of it. The unauthorized device in the middle intercepts data and then sends the information to the server as if nothing is wrong. The unauthorized device software may be recording information for someone to view later, altering it, or in some other way compromising the security of your system and session. A zombie is a computer system that a hacker has a backdoor into and can use to perpetrate attacks, unknown to the computer system’s legitimate user. A botnet is a system of zombie computers engaged in an orchestrated attack on a target. Spoofing occurs when an attacker causes a system or node to appear to be a different one. It’s like impersonation but is technology-based rather than human-based. A non-compliant system is one that is not updated or not following company protocols regarding security.", "notes": [], "multi": false}, {"qnum": 58, "stem": "You’re working in Active Directory, and you need to change an employee’s security group. How do you associate an employee (user) with a selected security group? (Choose two.)", "options": {"A": "Open Active Directory Users and Computers, right-click the user account, click on the Member Of tab, and then click on Add and search for the group.", "B": "Move them to a new OU.", "C": "Delete the employee in Active Directory Users and Computers, and choose the right security group when you set them up again.", "D": "Open Active Directory Users and Computers, right-click the group, click the Members tab, and then click Add and search for the employee."}, "correct": ["A", "D"], "explanation": "Changing security group membership can be done in Active Directory Users and Computers by right-clicking either the user or the group and clicking either the Member Of or Members tab, then clicking Add. Moving them to a new organizational unit (OU) does not change the security group membership. There is no need to delete and re-create a user, and in fact that could cause many other problems!", "notes": [], "multi": true}, {"qnum": 59, "stem": "You’re working at a high-security server farm and must ensure that vehicles stay a certain distance away from the building. What physical security methods can be used for this purpose? (Choose two.)", "options": {"A": "Bollards", "B": "Motion sensors", "C": "Fences", "D": "Lighting"}, "correct": ["A", "C"], "explanation": "Bollards are vertical posts that are short and sturdy, sometimes made of cement or steel. They can be placed closely enough together so that a vehicle can’t go through an area, but people can. Fences can also be erected to keep vehicles and people out of an area. Motion sensors can be used to trigger alarms, but won’t actually keep anyone out, and good lighting is always a deterrent, but again it won’t physically keep anyone out.", "notes": [], "multi": true}, {"qnum": 60, "stem": "Between you and your family members, there are several mobile devices including phones, laptops, and smartwatches. Someone generally forgets where they put their phone, or it may be stolen, and it would be nice to easily find it. In addition, you want to see where other family members are when they are around town. Which type of app will allow you to do this?", "options": {"A": "Trusted source application", "B": "Remote control application", "C": "Locator application", "D": "Firewall application"}, "correct": ["C"], "explanation": "A locator app is what you need. Apple supplies a free locator app called Find My, and Google has the Google Find My Device app. Together with their respective websites, these apps allow multiple mobile devices to be located if powered on and attached to the Internet (via 5G, 4G, 3G, Wi-Fi, Ethernet, and so on). For Apple devices, if not attached to the Internet, nearby devices can identify your device and tell you where it is. Both Find My and Google Find My Device allow the device to be controlled remotely so as to lock it, play a sound (even if audio is off), display a message, or even wipe it clean.", "notes": [], "multi": false}, {"qnum": 61, "stem": "Which security mechanism specifies permissions for users and groups as well as the type of activities the users or groups can perform?", "options": {"A": "ACL", "B": "EFS", "C": "VPN", "D": "PIN"}, "correct": ["A"], "explanation": "File systems such as the New Technology File System (NTFS), and security devices such as firewalls, can track security in access control lists (ACLs). ACLs can hold permissions for local users and groups, and each entry in the ACL can also specify what type of access is given. This allows a great deal of flexibility in setting up a network. Encrypting file system (EFS) is used to encrypt volumes, files, and folders, but not entire drives. A virtual private network (VPN) is a type of network connection that uses encryption to create a private network that traverses a public one. Personal identification numbers (PINs) are used in many applications to identify a user.", "notes": [], "multi": false}, {"qnum": 62, "stem": "You need to know which files have been modified in a folder. Which of the following is not a way to see when files have been modified?", "options": {"A": "Right-click each file and choose Properties and Advanced to see whether the archive bit is set.", "B": "Open the folder in File Explorer and click on Date Modified to sort the files by the date they were last modified.", "C": "Type archive at a command prompt.", "D": "Type attrib at a command prompt."}, "correct": ["C"], "explanation": "On any individual file or folder, you can right-click and choose properties to see the Read-only and Hidden attributes, then click Advanced to see whether the file is ready for archiving (i.e., needs to be backed up). If it needs backing up, then it has been modified. You can also open a folder in File Explorer and click on Date Modified to sort the files by the last date modified. Simply typing attrib at a command prompt will show the file attributes for everything in that folder. Attributes are information such as whether the file is a system file (S), hidden (H), read only (R), or ready to be archived (A). To see the attributes for a single file, type attrib filename. The attrib command is not specifically listed in the CompTIA A+ objectives, but file attributes are. Archive is not a valid command.", "notes": [], "multi": false}, {"qnum": 63, "stem": "You want to create a new policy to encrypt all company drives using BitLocker. Which operating system will need to be upgraded?", "options": {"A": "Windows 10 Pro", "B": "Windows 11 Home", "C": "Windows 11 Pro", "D": "Windows 10 for Workstations"}, "correct": ["B"], "explanation": "Professional and higher operating system (OS) editions in either Windows 10 or Windows 11 will support BitLocker. Home editions will not, regardless of what version of the Windows OS they are.", "notes": [], "multi": false}, {"qnum": 64, "stem": "Software was installed on a laptop without the user’s knowledge. The software has been tracking the user’s activities and has transmitted the user’s credit card information to an attacker. What type of threat is this?", "options": {"A": "Zombie/botnet", "B": "Spoofing", "C": "Spyware", "D": "Ransomware"}, "correct": ["C"], "explanation": "Spyware differs from other malware in that it works—often actively—on behalf of a third party. Rather than self-replicating, like viruses and worms, spyware is often spread to machines by users who inadvertently ask for it. The users may have downloaded other programs that included the spyware, visited infected sites, and so on. The spyware program monitors the user’s activity and gathers information about the user to pass on to marketers, or intercepts personal data such as credit card numbers. Zombies and botnets are innocent computers that are used by a hacker to perpetrate an attack on someone else without the user’s knowledge. A spoofing example is using an IP address that should be someone else and pretending to be them to gain system access to a system. Ransomware locks a system in some way or encrypts data and won’t allow access until the system’s owner pays a ransom.", "notes": [], "multi": false}, {"qnum": 65, "stem": "A new user has joined your company as a network administrator. Which of the following statements is most correct regarding their network access?", "options": {"A": "They should have just one user account, with administrator-level permissions.", "B": "They should have just one user account, with standard user-level permissions.", "C": "They should have two user accounts, one with standard user-level permissions and one with administrator-level permissions.", "D": "They should have three user accounts: one with user-level permissions, one with administrator-level permissions, and one with remote access administrator permissions."}, "correct": ["C"], "explanation": "The new administrator should have a non-administrative user account to use for day-to- day tasks. They also need an account with administrative privileges to perform the adminis- trative duties. When creating user accounts, follow the principle of least privilege: Give users only the permissions they need to do their work and no more. This is especially true with administrators. Those users should be educated on how each of the accounts should be used. A third account is not necessarily needed.", "notes": [], "multi": false}, {"qnum": 66, "stem": "Which types of security threats are direct attacks on user passwords? (Choose two.)", "options": {"A": "Brute-force attack", "B": "Zombie/botnet", "C": "Dictionary attack", "D": "Spoofing"}, "correct": ["A", "C"], "explanation": "Password attacks occur when an account is attacked repeatedly with the intent of determining the password that will gain access. This is accomplished by using applications designed to break the password by sending possible passwords to log in to the account in a systematic manner. Two types of password attacks are brute-force and dictionary attacks. Zombie and botnet are attacks where the user of the computer doesn’t know there is malware on their computer. Their computer is a zombie, and when many zombies are used by a bad actor to attack a system, it’s known as a botnet attack. A spoofing attack is an attempt by someone or something to masquerade as someone or something else.", "notes": [], "multi": true}, {"qnum": 67, "stem": "You read corporate email on your smartphone and do not want others to access the phone if you leave it somewhere. What is the first layer of security that you should implement to keep others from using your phone?", "options": {"A": "Multifactor authentication", "B": "Full device encryption", "C": "Screen lock", "D": "Remote wipe software"}, "correct": ["C"], "explanation": "All options will improve the smartphone’s security. For just the basic level of security, though, enable a screen lock. A user will need to enter a personal identification number (PIN) code, fingerprint, pattern, or facial recognition to gain access to the device. Multifactor authentication (MFA) occurs whenever you need two or more ways to prove who you are (i.e., something you know, something you have, something you are, or someplace you are). Full device encryption would mean encoding the data and requiring a key to decrypt it. Remote wipe is a feature that can remove all the personal or corporate data from a phone if it is lost or stolen.", "notes": [], "multi": false}, {"qnum": 68, "stem": "You use your smartphone for email and extensive Internet browsing. You want to add an additional level of security to always verify your identity online when accessing various accounts. Which type of app do you need?", "options": {"A": "Authenticator app", "B": "Trusted source app", "C": "Bariatric authenticator app", "D": "Account encryption app"}, "correct": ["A"], "explanation": "An authenticator app can help securely verify your identity online, regardless of the account you want to log into. Different apps work in different ways, but the general proce- dure is that the app will generate a random code for you to type in, along with your user- name and password. The random code helps identify you and tells the site you are logging into that you really are who you say you are. The other options are not actual application types.", "notes": [], "multi": false}, {"qnum": 69, "stem": "You have instructed users on your network to not use common words for their passwords. What type of attack are you trying to prevent?", "options": {"A": "Brute-force", "B": "Dictionary", "C": "Social engineering", "D": "Shoulder surfing"}, "correct": ["B"], "explanation": "A dictionary attack uses a dictionary of common words to attempt to find the user’s password. Dictionary attacks can be automated, and several tools exist in the public domain to execute them. As an example of this type of attack, imagine guessing words and word combinations found in a standard English-language dictionary. Brute-force is trying repeatedly to guess a user’s password. Social engineering is using kindness, coer- cion, or fear to get you to give up privileged information such as your password. Shoulder surfing is literally someone looking over your shoulder in an attempt to gain privileged information.", "notes": [], "multi": false}, {"qnum": 70, "stem": "Which type of malware is designed to look like a different program and, when installed, creates a backdoor for an attacker to access the target system?", "options": {"A": "Trojan", "B": "Spyware", "C": "Virus", "D": "Whaling"}, "correct": ["A"], "explanation": "Trojans are programs that enter a system or network under the guise of another program. A Trojan may be included as an attachment or as part of an installation program. It can create a backdoor for an attacker to use later or replace a valid program during installation. Spyware watches what you do and reports back to someone. A virus is spread from computer to computer because of some contact between the machines, often through email. Whaling is phishing for “big fish,” such as very wealthy or influential people. Phishing gets its name from fishing for information.", "notes": [], "multi": false}, {"qnum": 71, "stem": "You have been asked to dispose of several old magnetic hard drives. What are you doing if you use a large magnet to clear the data off a hard drive?", "options": {"A": "Overwriting", "B": "Zero-writing", "C": "Degaussing", "D": "Incineration"}, "correct": ["C"], "explanation": "Degaussing is using a large electromagnet to destroy any magnetic media, such as a hard drive or backup tape set. This process helps ensure that information doesn’t fall into the wrong hands. Overwriting and zero-writing write random binary (or all zeros) on a magnetic hard drive using software. The process is done several times by the software to be effective. Incineration means simply burning the drive.", "notes": [], "multi": false}, {"qnum": 72, "stem": "If you check the Read-only or Hidden box on the graphic, what feature of the folder is being changed?", "options": {"A": "Archive bit", "B": "NTFS permissions", "C": "Attributes", "D": "Share permissions"}, "correct": ["C"], "explanation": "Certain metadata pertaining to a file are called attributes. The most commonly used attributes are system (S), hidden (H), read only (R), and archive (A). There are others that can be viewed by typing attrib /? at a command prompt. The attrib command is how you add attributes, such as attrib myfile +R to make myfile read only. You can also remove attributes using the same command with a minus sign. In the Windows 10/11 Graphical User Interface (GUI), you can view attributes by right-clicking a file or folder and choosing properties. Windows 11 will display a screen like the one in the graphic. The attrib command is not specifically listed on the CompTIA A+ objectives, but file attributes are. The archive bit is set when a file has been modified and needs backing up. New Technology File System (NTFS) permissions, such as read only and full control, are part of the security measures of the NTFS file system. Share permissions are less granular than NTFS permissions and only apply when a resource is accessed across a network.", "notes": [], "multi": false}, {"qnum": 73, "stem": "You’re setting up a Windows 11 Pro machine and want to encrypt the entire hard drive, including startup files. Which technology best meets your needs?", "options": {"A": "Windows OSs do not allow full-drive encryption.", "B": "BitLocker", "C": "BitLocker-To-Go", "D": "EFS"}, "correct": ["B"], "explanation": "BitLocker drive encryption allows you to use drive encryption to protect files—including those needed for startup and log-on. This is available only with Windows Pro and higher editions. For removable drives, BitLocker-To-Go provides the same encryption technology to help prevent unauthorized access to the files stored on them. Encrypting file system (EFS) is used to encrypt volumes, files, and folders but is not capable of encrypting the entire drive.", "notes": [], "multi": false}, {"qnum": 74, "stem": "Which type of security threat gains administrative-level access for an attacker to perform another attack, and then hides its presence from system management tools?", "options": {"A": "Virus", "B": "Whaling", "C": "Rootkit", "D": "Ransomware"}, "correct": ["C"], "explanation": "Rootkits are software programs that can hide certain things from the operating system (OS); they do so by obtaining (and retaining) administrative-level access. With a rootkit, there may be several processes running on a system that don’t show up in Task Manager, or connections that don’t appear in a Netstat display may be established or available—the rootkit masks the presence of these items. Rootkits are known for being particularly difficult to eradicate. A virus is spread from computer to computer because of some contact between the machines, often through email. Whaling is phishing for “big fish,” such as very wealthy or influential people. Phishing gets its name from fishing for information. Ransomware holds a machine or network hostage, making it and its data inaccessible, until a ransom is paid.", "notes": [], "multi": false}, {"qnum": 75, "stem": "A computer user wants to encrypt a few files on an NTFS volume on their Windows Pro workstation. They do not have administrative rights to the computer. Which of the following statements is correct?", "options": {"A": "They can only use device encryption.", "B": "They can use BitLocker.", "C": "They can use BitLocker-To-Go.", "D": "They can use EFS."}, "correct": ["D"], "explanation": "Encrypting file system (EFS) is available in most editions of Windows, and it allows for encryption/decryption of files stored in New Technology File System (NTFS) volumes. All users can use EFS, whereas only administrators can turn on BitLocker. It does not require any special hardware, while BitLocker benefits from having the trusted platform module (TPM). As an additional distinction, EFS can encrypt just one file, if so desired, while BitLocker encrypts the whole volume and whatever is stored on it. BitLocker is device encryption. BitLocker-To-Go is for mobile use, not on a storage drive in a desktop computer.", "notes": [], "multi": false}, {"qnum": 76, "stem": "Which type of digital security protects your network from malicious software programs by both preventing them from entering the system and removing them if they are found?", "options": {"A": "Firewall", "B": "Anti-malware", "C": "EFS", "D": "UAC"}, "correct": ["B"], "explanation": "Anti-malware software will help protect computers from malicious programs. Typically, anti-malware does everything that antivirus software does as well as identify threats beyond just viruses. In fact, viruses are a type of malware. Often anti-malware software is marketed as antivirus software. A firewall is a hardware or software device designed to prevent certain types of traffic from entering or leaving a network. Encrypting file system (EFS) allows a user to encrypt individual volumes, files, or folders, and user account control (UAC) is designed to prevent users from making changes that they are not authorized to make.", "notes": [], "multi": false}, {"qnum": 77, "stem": "Your company has hired a consultant to intentionally send emails asking for login informa- tion from your employees. What is your company engaging in?", "options": {"A": "Phishing", "B": "Whaling", "C": "Zero-day attack", "D": "Anti-phishing training"}, "correct": ["D"], "explanation": "Educating users to recognize phishing is one of the most important steps in preventing hackers from acquiring login credentials. One way to do this is to hire a consulting company to send phishing emails and see which employees respond when they should not and therefore need additional training. Phishing is usually done through email and is an attempt to “fish” for information from an authorized network user, such as logon information. Whaling is phishing for high-profile or wealthy targets. A zero-day attack is one that happens the same day a vulnerability is discovered, so there has not been time to rectify the vulnerability.", "notes": [], "multi": false}, {"qnum": 78, "stem": "On a Windows workstation, there is one volume formatted with NTFS. The Developers group has Modify access to the C:\\dev directory. You copy the folder to the C:\\operations folder, to which the Developers group has Read access. What level of permissions will the Developers group have to the new C:\\operations\\dev directory?", "options": {"A": "Read & Execute", "B": "Read", "C": "Full Control", "D": "Modify"}, "correct": ["B"], "explanation": "When a file or folder is copied on New Technology File System (NTFS) volumes, the new file or folder will inherit its NTFS permissions from its new parent folder. The file in question was copied, so it inherits Read control and the old permission (i.e., Modify) is discarded. However, when files and folders are moved, versus copying them, the original permissions are retained at the new location.", "notes": [], "multi": false}, {"qnum": 79, "stem": "You are configuring NTFS and Share permissions on a Windows 11 workstation. Which of the following statements is true regarding permissions?", "options": {"A": "Both NTFS and Share permissions can be applied only at the folder level.", "B": "NTFS permissions can be applied at the file or folder level, and Share permissions can be applied only at the folder level.", "C": "NTFS permissions can be applied only at the folder level, but Share permissions can be applied to files and folders.", "D": "Both NTFS and Share permissions support inheritance."}, "correct": ["B"], "explanation": "Only New Technology File System (NTFS) permissions can be applied to individual files. Both NTFS and Share permissions can be applied to volumes and folders. Share permissions are only effective when the resource is accessed via a network. NTFS permissions are effective whether the person access the resource locally or via a network. NTFS permissions are inherited from a parent folder. Share permissions do not have inheritance.", "notes": [], "multi": false}, {"qnum": 80, "stem": "You are troubleshooting a Windows Home system that was infected with malware. You’ve worked through all of the best-practice procedures for malware removal up to and including scheduling scans and running updates. What do you need to do next?", "options": {"A": "Enable System Restore and create a restore point in Windows Home.", "B": "Disable System Restore in Windows Home.", "C": "Remediate infected systems.", "D": "Educate the end user."}, "correct": ["A"], "explanation": "CompTIA has developed specific steps for removing malware from small office/home office (SOHO) networks. The ten steps of the malware removal process are as follows: 1. Investigate and verify malware symptoms. 2. Quarantine infected system. 3. Disable System Restore in Windows Home. 4. Remediate infected systems. 5. Update anti-malware software. 6. Scan and removal techniques (e.g., safe mode, preinstallation environment). 7. Reimage/reinstall. 8. Schedule scans and run updates. 9. Enable System Restore and create a restore point in Windows Home. 10. Educate the end user.", "notes": [], "multi": false}, {"qnum": 81, "stem": "You recently noticed a change on your computer. Now, when you open your web browser, no matter what you search for, you get a dozen unsolicited pop-up windows offering to sell you items you didn’t ask for. What type of problem does your computer have?", "options": {"A": "Adware", "B": "Ransomware", "C": "Zombie/botnet", "D": "Trojan"}, "correct": ["A"], "explanation": "Adware differs from other malware in that it works—often actively—on behalf of a third party. Rather than self-replicating, like viruses and worms, spyware is spread to machines by users who inadvertently ask for it. The users often don’t know they have asked for it but have done so by downloading other programs, visiting infected sites, and so on. The adware program monitors the user’s activity and responds by offering unsolic- ited pop-up advertisements, gathers information about the user to pass on to marketers, or intercepts personal data such as credit card numbers. Ransomware is software that takes over a computer and won’t allow access to the data until a ransom is paid. Zombies are computers that have been taken over by another party and are used to perform malicious acts. When there are many zombies acting together, they form a botnet. The computer user is generally unaware of the presence of the attacker. A Trojan is software that is downloaded when the user downloads an innocent-looking software or digital image. Once downloaded, the Trojan loads into the computer system.", "notes": [], "multi": false}, {"qnum": 82, "stem": "A computer user wants to encrypt the data on their Windows Home device. They have administrative rights to the computer. Which of the following statements is correct?", "options": {"A": "They may be able to use Windows device encryption.", "B": "They can use BitLocker.", "C": "They can use BitLocker-To-Go.", "D": "They can use EFS."}, "correct": ["A"], "explanation": "Encrypting File System (EFS) allows for the encryption/decryption of individual volumes, files, and folders stored in New Technology File System (NTFS) volumes, while BitLocker and BitLocker-To-Go encrypt entire drives. However, neither of them is available in Home editions of Windows. If there is supporting hardware, (trusted platform module [TPM] enabled in basic input output system/unified extensible firmware interface [BIOS/UEFI] and secure boot enabled), then device encryption can be used instead. Windows 11 requires TPM v. 2.0. With device encryption, only someone with authorization to use the device will be able to decrypt it. You must be logged in as an administrator to turn on device encryption, which can be found in Windows Settings. If device encryption isn’t there, then it isn’t available on the device. You can also see if the hardware supports it by launching the System Information Utility as an administrator, then scrolling down to Device Encryption Support.", "notes": [], "multi": false}, {"qnum": 83, "stem": "Which of the following are true about the permissions shown in the graphic? (Choose two.)", "options": {"A": "They are in effect only when accessed via a network.", "B": "They are NTFS permissions.", "C": "This type can be used on files and folders.", "D": "Everyone can read files in this folder."}, "correct": ["A", "D"], "explanation": "These are share permissions, not New Technology File System (NTFS) permissions. Share permissions have no effect when someone logs on locally; they only take effect when being accessed via a network. (NTFS permissions apply whether logging on locally or via the network.) Share permissions can only be applied to folders, not individual files. The only share permission set on this folder is that everyone can read it. No one has permission to change it.", "notes": [], "multi": true}, {"qnum": 84, "stem": "Which of the following statements are true regarding file and folder attributes on a Windows 11 workstation? (Choose two.)", "options": {"A": "File attributes are available only on NTFS volumes.", "B": "Only members of the Administrators group can change file/folder attributes.", "C": "Attributes can be accessed by right-clicking the file/folder and choosing Properties, General tab.", "D": "Compression is an advanced file/folder attribute."}, "correct": ["C", "D"], "explanation": "In the graphical user interface (GUI), attributes are accessed by right-clicking the object and choosing Properties, General tab. For some attributes, such as compression and encryption, you need to click Advanced under the Attributes section of the General tab. Compression is an advanced attribute that uses algorithms to remove repeated characters and excess spaces making files take up less space. The user does not need to be an administrator to change attributes. File attributes are available in volumes other than NTFS. In addition to right-clicking the object, you can change attributes using the attrib command.", "notes": [], "multi": true}, {"qnum": 85, "stem": "Which type of digital security uses virus signatures, behavior analysis, and memory scanning to protect your network or computer?", "options": {"A": "Antivirus", "B": "Firewall", "C": "Access control list", "D": "NTFS permissions"}, "correct": ["A"], "explanation": "Antivirus software needs continual updates of virus signatures as new viruses are unleashed daily. The updates are known as definition files and ensure that the antivirus engine will recognize new viruses. However, today’s threat environment requires better tools, such as memory scanning and behavior analysis to catch fileless viruses that hide in memory. Firewalls can be software- or hardware-based and are designed to block or allow network traffic based on certain criteria. Once established, settings are not often changed. Access control lists (ACLs) are tied to objects in a system and are compared to an authenticated user’s informa- tion to determine whether to grant access. These also are seldom changed once they are configured. New Technology File System (NTFS) permissions are part of what creates access control lists. NTFS permissions for an object are granted to a user and can include Full Control, Modify, Read & execute, List Folder Contents, Read, and Write. Share permissions also affect access to a resource, but only when a user accesses it via a network.", "notes": [], "multi": false}, {"qnum": 86, "stem": "You are at work and receive a phone call. The caller ID indicates it’s coming from your manager’s desk. You can see your manager’s desk, and no one is sitting there. Which of the following is likely happening?", "options": {"A": "Zombie/botnet attack", "B": "Impersonation attack", "C": "Zero-day attack", "D": "Phishing attack"}, "correct": ["B"], "explanation": "Impersonation is an attempt by someone or something to masquerade as someone else. You might think of impersonation attacks as affecting network systems, but they can affect phone systems as well. A zombie is a computer system that a hacker has a backdoor into and can use to perpetrate attacks, unknown to the computer system’s legitimate user. A botnet is a system of zombie computers engaged in an orchestrated attack on a target. A zero-day attack occurs when a vulnerability is used to attack a system on the very day that the vulnerability is discovered, before preventive measures to block the vulnerability can be created. In a phishing attack, the attacker uses coercion or other means to attempt to gain passwords or other privileged information.", "notes": [], "multi": false}, {"qnum": 87, "stem": "A user is working on a Windows workstation. Their user account is a member of the Managers group, and they are trying to access a folder named reports, located on a different computer. The NTFS permissions for the reports shared folder on that computer for the Managers group are Read and Write. The folders share permissions for the Managers group is Read permission. What are the user’s effective permissions on the reports folder?", "options": {"A": "Full Control", "B": "Read and Write", "C": "Read", "D": "No Access"}, "correct": ["C"], "explanation": "Because the user is accessing the New Technology File System (NTFS)-based resource over the network, both NTFS and Share permissions are applied. If there is a difference between the two of them, the most restrictive permissions are used. Therefore, the user has Read access only.", "notes": [], "multi": false}, {"qnum": 88, "stem": "Which NTFS permission overrides all the others?", "options": {"A": "Full Control", "B": "Deny", "C": "List Folder Contents", "D": "Read"}, "correct": ["B"], "explanation": "Regardless of what other permissions may be granted, Deny will override all of them and the effective permission will be Deny.", "notes": [], "multi": false}, {"qnum": 89, "stem": "A system administrator is concerned about Windows users inadvertently installing malware from USB drives that contain malicious code. What can they do to help prevent this from happening?", "options": {"A": "Set restrictive user permissions.", "B": "Enable BIOS/UEFI passwords.", "C": "Disable AutoRun/AutoPlay.", "D": "Enable data encryption."}, "correct": ["C"], "explanation": "Disable AutoRun/AutoPlay should be selected on computers connected to the network. (It is never a good idea to put any media in a workstation if you don’t know where it came from or what it is.) The simple reason is that the media (i.e., CD, DVD, USB, and SD) could contain malware. Compounding matters, the malware could be referenced in the autorun. inf file, causing it to be summoned when the media is inserted in the machine and requiring no other action. User permissions are not effective on external drives whose content changes all the time. A basic input/output system/unified extensible firmware interface (BIOS/UEFI) password would prevent the computer from being booted and enabling data encryption can’t be done on media that is subject to change. Note that the CompTIA objectives mention AutoRun, but the feature is now known as AutoPlay. You might see either term used when working in IT.", "notes": [], "multi": false}, {"qnum": 90, "stem": "Someone has placed an unauthorized wireless router on your network and configured it with the same SSID as your network. Users can access the network through that router, even though it’s not supposed to be there. What is this router configuration known as?", "options": {"A": "Zombie/botnet", "B": "Evil twin", "C": "Non-compliant system", "D": "DDoS"}, "correct": ["B"], "explanation": "An unauthorized router with a seemingly legitimate configuration is specifically known as an evil twin. A zombie is a computer system that a hacker has a backdoor into and can use to perpetrate attacks, unknown to the computer system’s legitimate user. A botnet is a system of zombie computers engaged in an orchestrated attack on a target. A non-compliant system is one that is not updated or not following company protocols regarding security. Distributed denial-of-service (DDoS) is the attack perpetrated by a botnet, which floods an unsuspecting server with so many requests that legitimate server users are unable to connect to it.", "notes": [], "multi": false}, {"qnum": 91, "stem": "Which of the following are true about the information shown in the graphic? (Choose two.)", "options": {"A": "The graphic shows Share permissions.", "B": "The graphic shows NTFS permissions.", "C": "These permissions will be inherited by any folder created on the C drive.", "D": "These permissions are effective only when someone accesses them over a network."}, "correct": ["B", "C"], "explanation": "These are New Technology File System (NTFS) permissions, not Share permissions. They will be inherited by any folder created inside this folder, which happens to be the C drive. NTFS permissions are effective regardless of whether the user accesses them locally or over a network. (Share permissions are only effective when the resource is accessed via a network, they can only be applied to folders, and share permissions are not inherited.) Inheritance in NTFS is enabled by default but it can be disabled by clicking the Advanced button (shown in the figure in the bottom right), and selecting Disable Inheritance.", "notes": [], "multi": true}, {"qnum": 92, "stem": "Your office has recently experienced several laptop thefts. Which security mechanism, as pictured in the graphic, is designed to protect mobile devices from theft?", "options": {"A": "Security token", "B": "Equipment lock", "C": "Key fob", "D": "Magnetometer"}, "correct": ["B"], "explanation": "Locks and keys are some of the simplest yet most effective physical security measures. The device shown in the figure is a laptop cable lock. The user has a key to unlock the device. The heavy cable is looped around something solid like a table leg, and the end where the key is inserted locks into a special slot in a laptop or other mobile device. Security tokens can be either soft tokens or external hardware tokens. External hardware tokens are objects a user carries, such as a key fob. Soft tokens are software installed on a system. A magnetometer measures magnetic fields and can be used in a mobile device to determine your location with respect to Earth’s magnetic north and south.", "notes": [], "multi": false}, {"qnum": 93, "stem": "Which of the following is an open-source authentication encryption protocol that is widely used and uses a third party to verify user credentials?", "options": {"A": "AES", "B": "TACACS+", "C": "Kerberos", "D": "RADIUS"}, "correct": ["C"], "explanation": "Kerberos was developed and named by computer scientists at MIT. It is an open-source authentication protocol that uses a third party to verify user credentials and symmetric key cryptography to encode transmissions between parties. Terminal access controller access-control system (TACACS+) is an authentication protocol developed by Cisco that is now an open standard. Remote authentication dial-in user service (RADIUS) is an authentication protocol that was originally used for dial-in access. It has morphed into a protocol used for authenticating remote Wi-Fi or on-premises users. Advanced encryption standard (AES), which is for wireless encryption not authentication, has been around since 2001, and it is the successor to temporal key integrity protocol (TKIP).", "notes": [], "multi": false}, {"qnum": 94, "stem": "Your company allows employees to use their own devices, and as the IT director, you are naturally concerned about the security of corporate information on those devices. Which technology should you require in this situation?", "options": {"A": "EFS", "B": "MDM", "C": "SSO", "D": "UAC"}, "correct": ["B"], "explanation": "Mobile device management (MDM) is a software technology that enables an IT department to retain control over corporate data while allowing users to use their personal devices. Bring your own device (BYOD) policies can save companies money on hardware but present a security risk. Using MDM, an IT administrator can restrict the type of data and applications that are used with company information. They can also wipe all corporate information off a lost or stolen device, or if an employee leaves the company. Encrypting file system (EFS) is used to encrypt files and folders in Windows operating systems (OSs), excluding Home editions. The purpose of single sign-on (SSO) is to give users access to all the applications and systems that they need when they log on. Some systems may require users to enter their credentials again, but the username and password will be consistent between systems. User account control (UAC) verifies that someone has the authority to change a system before making any changes by requiring them to enter an administrator password for certain operations.", "notes": [], "multi": false}, {"qnum": 95, "stem": "Which of the following is not a logical security method of delivering a one-time code for multifactor authentication?", "options": {"A": "Voice call", "B": "Email", "C": "Bollards", "D": "SMS"}, "correct": ["C"], "explanation": "Bollards are a method of physical security that can be used to keep vehicles out of a particular area. Voice calls, email, and short message service (SMS) can all be used to deliver a one-time code for multifactor authentication (MFA).", "notes": [], "multi": false}, {"qnum": 96, "stem": "Which of the following are examples of an external hardware token? (Choose two.)", "options": {"A": "Key fob", "B": "Retina scanner", "C": "Smart card", "D": "Motion sensor"}, "correct": ["A", "C"], "explanation": "Both key fobs and smart cards are external hardware tokens. Hardware tokens are physical security devices that can be carried about by the user. A key fob generates a random number every few seconds that can be entered into a system as part of multifactor authentication(MFA). A smart card has a chip whose data can be accessed by a reader device to enable a user access to a secure area or computer system. Retina scanners are biometric devices, because they use part of your body as authentication/identification, and while motion sensors are a part of physical security, they’re generally used in conjunction with alarm systems.", "notes": [], "multi": true}, {"qnum": 97, "stem": "Which of the following devices, often found in smartphones and other mobile devices, is used to pinpoint a person’s location on Earth and therefore can be used for multifactor authentication?", "options": {"A": "Magnetometer", "B": "Retina scanner", "C": "Key fob", "D": "External hardware token"}, "correct": ["A"], "explanation": "A magnetometer measures magnetic fields and can be used to locate a person’s position on Earth. As a part of multifactor authentication (MFA), that location is compared to an allow or block list, and, if the device to be accessed is in an allowed location, access may be granted. A retina scanner is a biometric device that scans a person’s eye to determine if access should be granted. A key fob will generate a code that changes every few seconds. It is a type of external hardware token used for authentication.", "notes": [], "multi": false}, {"qnum": 98, "stem": "Which of the following is not a physical security measure for protecting computer systems and access to them?", "options": {"A": "Lighting", "B": "Equipment locks", "C": "Motion sensors", "D": "Authenticator application"}, "correct": ["D"], "explanation": "An authenticator application, a type of soft token, is a logical, rather than a physical, security measure. It is often used in multifactor authentication (MFA). An authenticator app is software, often found on your cell phone, which generates a code that when input, will grant access to a website or other resource. The other three options—proper lighting, \u0007equipment and door locks, and motion sensors that trigger alarms—are physical deterrents to keep would-be attackers out.", "notes": [], "multi": false}, {"qnum": 99, "stem": "Which of the following is not a biometric identification device?", "options": {"A": "Fingerprint reader", "B": "Retina scanner", "C": "External hardware token", "D": "Palm print scanner"}, "correct": ["C"], "explanation": "An external hardware token is a security device that a computer user has in their possession, such as a key fob or smart card. External hardware tokens are often used in multifactor authentication (MFA). Fingerprint readers, retina scanners, and palm print scanners are biometric devices. Biometric devices are those that use a part of your body to identify you and either deny or allow access to a system based on your identity.", "notes": [], "multi": false}, {"qnum": 100, "stem": "A user is worried about others shoulder surfing. What should they use to help avoid this problem?", "options": {"A": "Access control vestibule", "B": "Video surveillance", "C": "Display privacy filter", "D": "Smart card"}, "correct": ["C"], "explanation": "To prevent shoulder surfing, a user could install a display privacy filter. In shoulder surfing, a potential attacker is literally looking over someone’s shoulder to try and read what is on their screen. Privacy filters are either film or glass add-ons that are placed over a monitor or laptop screen to prevent the data on the screen from being readable when viewed from the sides. Only the user sitting directly in front of the screen can read the data. An access control vestibule is an area between two doors that helps to prevent tailgating. Video surveillance occurs when there are security cameras watching a secure area and a person observing the output of those cameras. Smart cards are devices a user can carry that will authenticate them to a system as a part of multifactor authentication (MFA) login.", "notes": [], "multi": false}, {"qnum": 101, "stem": "Which type of malware will often cause critical files to disappear, while sometimes display- ing a taunting message, and requires user intervention (usually inadvertent) to spread from computer to computer?", "options": {"A": "Botnet", "B": "Virus", "C": "Trojan", "D": "Rootkit"}, "correct": ["B"], "explanation": "Many viruses will announce that you’re infected as soon as they gain system access. They may take control of your system and flash annoying messages on your screen or destroy your hard disk. When this occurs, you’ll know that you’re a victim. Other viruses will cause your system to slow down, cause files to disappear from your computer, or take over your disk space. Many viruses today are spread using email. The infected system attaches a file to any email that you send to another user. The recipient opens this file, thinking it’s something that you legitimately sent them. When they open the file, the virus infects the target system. A botnet is a group of computers used to perpetrate an attack without the knowledge of the authorized user of that computer. The computer is called a zombie and is controlled by a third-party attacker. A Trojan is malicious software that hides in that fun game or screensaver that you just downloaded, and it installs when you install the innocent looking files. A rootkit is malware that gains access to a system as administrator, giving it full control over a system. Rootkits are adept at hiding their presence and so are difficult to eradicate.", "notes": [], "multi": false}, {"qnum": 102, "stem": "A computer user in the accounting department received a phone call from someone who claimed to be from the company’s bank. They had a partial account number and needed the user to verify the full account number, username, and password before they could discuss the reason for their call with the user. The user said they would call back, and the caller on the other end hung up abruptly. The user contacted you in the IT department because it seemed like such a strange call. What kind of attempted attack will you tell them just happened?", "options": {"A": "Phishing", "B": "Vishing", "C": "Whaling", "D": "Evil twin"}, "correct": ["B"], "explanation": "Vishing, phishing, and whaling are variations of the same type of attack—social engineering. In all of these, someone attempts to gain usernames and passwords or other information by intimidation, coercion, or other means. Then they’ll use that information to attack your company’s systems. They’re all a play on the word fishing. The attacker is casting a line and hoping you will bite on it. Vishing is using voice calls, phishing uses email, and whaling is phishing for powerful or wealthy fish (i.e., people). An evil twin attack happens when someone plugs an unauthorized wireless access point (WAP) into your network and gives it the same service set identifier (SSID) that your valid network has.", "notes": [], "multi": false}, {"qnum": 103, "stem": "Your company allows employees to use their personal devices for company work because it saves the company money on hardware. What is this called?", "options": {"A": "BYOD", "B": "MDM", "C": "SSO", "D": "UAC"}, "correct": ["A"], "explanation": "Bring your own device (BYOD) policies can save companies money on hardware and make users happy but they present a security risk. Mobile device management (MDM) is software technology that enables an IT department to retain control over corporate data while allowing users to use their personal devices. Using MDM, an IT administrator can restrict the type of data and applications that are used with company information. They can also wipe all corporate information off a lost or stolen device, or when an employee leaves the company. The purpose of single sign-on (SSO) is to give users access to all the applications and systems that they need when they log on. Some systems may require users to enter their credentials again, but the username and password will be consistent between systems. User account control (UAC) verifies that someone has the authority to change a system before making any changes, by requiring them to enter an administrator password for certain operations.", "notes": [], "multi": false}, {"qnum": 104, "stem": "Why is an EOL OS a security threat?", "options": {"A": "There will be no more security updates.", "B": "There will be no more feature updates.", "C": "There will be no more company support.", "D": "The software will stop working on the EOL date."}, "correct": ["A"], "explanation": "When an operating system (OS) is at end-of-life (EOL), it means that the software company will no longer be supporting the software with feature updates or company support. That might not be a problem if you’re an expert with the software and it meets your needs. The security problem arises because EOL software will no longer receive security updates, making your system and by extension, your network, vulnerable to attack. The OS won’t magically stop working on the EOL date, but it becomes a threat.", "notes": [], "multi": false}, {"qnum": 105, "stem": "What type of malware is dangerous because it is loaded during system startup, before the antivirus software is able to load?", "options": {"A": "Spyware", "B": "Ransomware", "C": "Boot sector virus", "D": "Keylogger"}, "correct": ["C"], "explanation": "When a virus infects the boot sector, the master boot record (MBR), or a partition table of a hard drive, it is called a boot sector virus. Boot sector viruses load before the operating system (OS) and security software can load. They may delete or modify files needed to boot the system, or the system may show no signs of being infected until an antivirus program is run. Removing the boot sector virus from a system may require booting to a different OS or drive. Spyware is designed to watch what you do and where you go, hoping to gain information such as logins, passwords, and bank account numbers. Ransomware locks a system in some way or encrypts data and won’t allow access until the system’s owner pays a ransom. A keylogger is malware that records every keystroke and reports it back to a third party. This information might include user IDs and passwords, or even bank account numbers and login information.", "notes": [], "multi": false}, {"qnum": 106, "stem": "Which of the following is not a type of malware that needs to be eradicated from a computer system?", "options": {"A": "Keylogger", "B": "Virus", "C": "Recovery console/WinRE", "D": "Spyware"}, "correct": ["C"], "explanation": "Keyloggers, viruses, and spyware are all types of malware, although anti-malware and antivirus are often used interchangeably. Windows Recovery Environment (WinRE), formerly known as the recovery console, is a tool used to repair problems with the operating system (OS). In addition to other tools such as startup repair and refreshing the OS, it provides access to a command prompt utility that can be used to correct problems without booting into the Windows OS.", "notes": [], "multi": false}, {"qnum": 107, "stem": "Which type of malware doesn’t launch from a file, but rather is launched in memory, often utilizing tools like PowerShell, making it difficult to find and eradicate?", "options": {"A": "Trojan", "B": "Fileless", "C": "Boot sector", "D": "Stalkerware"}, "correct": ["B"], "explanation": "Fileless malware hides in memory, so there is no digital footprint, thus making it impossible to use signature files to detect this malware. Instead, anti-malware for fileless attacks relies on memory scanning and behavior analysis, sometimes using Artificial Intelligence (AI) and Machine Learning (ML) to find and eradicate the malware. Trojans pretend to be a useful or desirable program but when the user installs them, they often open a backdoor for a user to infiltrate later. Boot sector viruses hide in the boot sector, which includes the master boot record (MBR) and partition table and launch before the operating system (OS) is loaded. Stalkerware is any software, whether a commercial app or a malware, that is used to perform surveillance on a person or business for malicious intent, which is stalking.", "notes": [], "multi": false}, {"qnum": 108, "stem": "You’re reviewing the Event Viewer logs and notice repeated failed attempts to access the corporate bank account information. The attempts are originating from someone with a company login, and you are able to catch the person, an employee hired only a month ago, in the act. What type of attack is this?", "options": {"A": "Insider threat", "B": "Evil twin", "C": "Whaling", "D": "Social engineering"}, "correct": ["A"], "explanation": "When someone who is an authorized user on your system attempts to gain access to something they should not or attempts a malicious act on your computer system, an insider threat has occurred. An evil twin is when an unauthorized wireless access point (WAP) appears on your network, using your service set identifier (SSID) and users are able to connect to the network using the unauthorized access point. Whaling is going after a big target using vishing or phishing. Social engineering is an attempt to acquire information about your network and system by social means, such as talking to people in the organization, shoulder surfing, tailgating, or other methods.", "notes": [], "multi": false}, {"qnum": 109, "stem": "Your web server just crashed because there was a flood of responses to a packet that looked like it was from your server, but your server didn’t send it. What just happened?", "options": {"A": "Whaling attack", "B": "Denial-of-service attack", "C": "Distributed denial-of-service attack", "D": "Evil twin attack"}, "correct": ["B"], "explanation": "This is a type of denial-of-service (DoS) attack. Someone spoofs your IP address (making it look like you) and sends out requests all at once to multiple hosts who respond to your IP address. Your server is flooded with those responses and crashes. It’s called a denial-of-service attack, because users who want to use the server for legitimate purposes, such as placing an order, are unable to do so because of all the malicious traffic. Whaling is using phishing to go after a big target. Distributed denial-of-service (DDoS) attacks happen when many computers are used, as in a botnet. An evil twin attack happens when someone plugs an unauthorized wireless access point (WAP) into your network and gives it the same service set identifier (SSID) that your valid network has.", "notes": [], "multi": false}, {"qnum": 110, "stem": "A computer user on your network is trying to access a folder named Projects on a local NTFS volume. Their user account is in the Developers group. The Developers group has Read & Execute permissions to the folder, and the user’s user account has Full Control. What is the user’s effective access to the Projects folder?", "options": {"A": "Full Control", "B": "Read & Execute", "C": "Read", "D": "No access"}, "correct": ["A"], "explanation": "In this case, the user has Full Control. When there are conflicting New Technology File System (NTFS) permissions, generally they are combined, and the most liberal is granted. This holds true for conflicting permissions between groups or between a user’s account and group memberships. The exception is Deny, which overrides all other permissions.", "notes": [], "multi": false}, {"qnum": 111, "stem": "You’ve discovered that a system on your network has had its firewall turned off and antivirus disabled. What type of vulnerability does this present?", "options": {"A": "Zero-day attack", "B": "SQL injection", "C": "Unprotected system", "D": "Cross-site scripting"}, "correct": ["C"], "explanation": "This system is vulnerable to attack because it is unprotected. The remedy is to turn on the system’s software firewall and antivirus protection. Zero-day attacks happen the same day a vulnerability is discovered, and attackers are able to evade antivirus programs, because the antivirus companies have not had the time to respond to the vulnerability yet. A structured query language (SQL) injection occurs when an attacker puts code into a database instead of data, and the code is executed, giving the attacker access to the data in the database. Cross-site scripting (XSS) is similar to an SQL injection, except it uses a website and hypertext markup language (HTML) or JavaScript instead of a database. Code is injected into the website and used to gather data from legitimate website users, because their systems don’t see the normally trusted website as a threat.", "notes": [], "multi": false}, {"qnum": 112, "stem": "What directory services security measure moves a user’s data to a server and off the local drive, so that if a laptop is lost or stolen and someone gains access to it, they won’t have access to information in the user’s data files?", "options": {"A": "Home folder", "B": "Security group", "C": "Organizational unit", "D": "Login script"}, "correct": ["A"], "explanation": "Using a home folder on an Active Directory server to store the user’s files adds a level of security because the user’s data is not on the local drive and is less subject to being stolen. A security group is used to grant permissions to a shared resource. Organizational units (OUs) are groupings that can include people, computers, and resources. Group policies can be applied to OUs ensuring that all computers and users in that group are given the proper access to resources. A login script is used to automate activities when a user or computer logs in to a domain.", "notes": [], "multi": false}, {"qnum": 113, "stem": "You notice that your computer seems to be working more than the normal updating it does when you’re not actively using it. It also seems to be running more slowly than normal when you are using it. What type of malware uses your computing power instead of stealing your data?", "options": {"A": "Spyware", "B": "Ransomware", "C": "Keyloggers", "D": "Cryptominers"}, "correct": ["D"], "explanation": "Cryptominers are malware that use your computing power rather than steal your data. You might notice that the computer is performing more slowly than usual. Spyware is designed to watch what you do and where you go, hoping to gain information such as logins, passwords, and bank account numbers. Ransomware locks a system in some way or encrypts data and won’t allow access until the system’s owner pays a ransom. A keylogger is malware that records every keystroke and reports it back to a third party.", "notes": [], "multi": false}, {"qnum": 114, "stem": "Which of the following is not important in preventing malware from damaging your computer system?", "options": {"A": "User education regarding common threats", "B": "Installing a keylogger", "C": "Keeping anti-malware signatures up to date", "D": "Keeping operating system, browser, and application patches up to date"}, "correct": ["B"], "explanation": "Installing a keylogger would be installing malware, and exactly the opposite of what you need to do to keep the system safe. Educating users about malware types, including recognizing them, avoiding them, and what to do with suspicious emails, phone calls, and so on, is one of the best things you can do to protect a system. Keeping antivirus/ anti-malware software updated so new malware can be detected, and keeping operating system (OSs), browsers, and applications updated to patch vulnerabilities is the key to keeping malware out.", "notes": [], "multi": false}, {"qnum": 115, "stem": "A user on your network wants to install an interesting browser extension they found on a download site that neither you nor they have used before. They received a warning before going to the site but clicked an option to continue. What type of website is this?", "options": {"A": "Spoofed", "B": "Trusted source", "C": "Untrusted source", "D": "Certified"}, "correct": ["C"], "explanation": "This is an untrusted source. Not only have you never used it before, but there is a problem with the website’s certificate that caused the warning message the user received. There is no evidence that it is a spoofed site. Clearly it does not have a valid digital certificate, and you’ve never used it before, so it’s not a trusted site. Digital certificates are issued by certificate authorities (CAs), who confirm that a website, person, or company is who they say they are.", "notes": [], "multi": false}, {"qnum": 116, "stem": "As the IT person in a small firm using Windows OSs, you would like a window to pop up whenever apps try to make changes to a system, and when the user makes changes to the system, so that an administrator password will be required to be entered. What utility will you use to configure that setting?", "options": {"A": "UAC", "B": "Windows Defender Firewall", "C": "Facial recognition", "D": "Personalization"}, "correct": ["A"], "explanation": "User account control (UAC) settings is where you can change when the operating system (OS) requests an administrator password before making changes to the system. The options range from Always No
